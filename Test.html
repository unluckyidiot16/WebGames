<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sheets 데이터 관리</title>
    <style>
        body { font-family: sans-serif; margin: 40px; line-height: 1.6; }
        .container { max-width: 600px; margin: auto; }
        .input-group { margin-bottom: 20px; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        input { padding: 8px; margin-right: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 16px; cursor: pointer; background-color: #4CAF50; color: white; border: none; border-radius: 4px; }
        button:hover { background-color: #45a049; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; }
        .loading { color: #666; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 데이터 입력 및 조회</h2>

    <div class="input-group">
        <input type="text" id="userName" placeholder="이름 입력">
        <input type="number" id="userScore" placeholder="점수 입력">
        <button onclick="submitData()">저장하기</button>
    </div>

    <h3>저장된 목록</h3>
    <button onclick="fetchData()" style="background-color: #2196F3;">새로고침</button>
    <div id="status" class="loading"></div>

    <table id="dataTable">
        <thead>
        <tr>
            <th>이름</th>
            <th>점수</th>
        </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
    </table>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwAmYDdKmPBg_nSiANaHkn4w_rOm718JiwqgtUkDPIwZW7bggCEpQyuOf56v27m7UuXyg/exec";


    // 1. 데이터 불러오기 (GET) — redirect 추가
    async function fetchData() {
        const status = document.getElementById('status');
        const tableBody = document.getElementById('tableBody');
        status.innerText = "데이터를 불러오는 중...";
        tableBody.innerHTML = "";

        try {
            const response = await fetch(SCRIPT_URL, {
                redirect: 'follow'   // ✅ 핵심 수정
            });
            const data = await response.json();

            data.forEach(row => {
                const tr = document.createElement('tr');
                // ✅ 시트 헤더명과 일치시키기
                tr.innerHTML = `<td>${row['이름']}</td><td>${row['점수']}</td>`;
                tableBody.appendChild(tr);
            });
            status.innerText = "조회 완료";
        } catch (error) {
            status.innerText = "불러오기 실패: " + error.message;
        }
    }

    // 2. 데이터 저장하기 (POST) — no-cors 추가
    async function submitData() {
        const name = document.getElementById('userName').value;
        const score = document.getElementById('userScore').value;

        if (!name || !score) {
            alert("이름과 점수를 모두 입력해주세요!");
            return;
        }

        const status = document.getElementById('status');
        status.innerText = "저장 중...";

        const formData = new FormData();
        formData.append("name", name);
        formData.append("score", score);

        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: 'no-cors',    // ✅ 핵심 수정
                body: formData
            });

            // no-cors는 응답을 못 읽으므로 성공으로 간주
            alert("저장되었습니다! (시트에서 확인하세요)");
            document.getElementById('userName').value = "";
            document.getElementById('userScore').value = "";
            setTimeout(fetchData, 1500); // ✅ 약간 딜레이 후 새로고침
        } catch (error) {
            alert("저장 실패: " + error.message);
        }
    }

    window.onload = fetchData;
</script>

</body>
</html>
