<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>알파벳 진화 (초등용)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic+Coding:wght@700&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #E8F5E9;
            font-family: 'Jua', sans-serif;
            touch-action: none;
            user-select: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        canvas {
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border-radius: 20px;
            background: #FEFDF5;
            max-width: 95%;
            border: 8px solid #8D6E63;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(232, 245, 233, 0.9);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            text-align: center;
        }
        .ui-panel {
            position: absolute;
            top: 25px;
            pointer-events: none;
            width: 420px;
            max-width: 90%;
            display: flex;
            justify-content: space-between;
            z-index: 10;
        }
        .info-box {
            background: #FFF9C4;
            padding: 10px 20px;
            border-radius: 20px;
            border: 3px solid #FFD54F;
            box-shadow: 0 4px 0 rgba(255, 193, 7, 0.5);
            pointer-events: auto;
            color: #5D4037;
        }
        #evolution-guide {
            position: absolute;
            right: 20px;
            top: 120px;
            background: rgba(255,255,255,0.8);
            padding: 15px;
            border-radius: 15px;
            border: 2px solid #AED581;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .guide-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #555;
        }
        .guide-shape {
            width: 24px;
            height: 24px;
            border: 2px solid #555;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            color: #5D4037;
        }
        .danger-line {
            position: absolute;
            width: 380px;
            max-width: 90%;
            height: 4px;
            border-top: 4px dashed #FF7043;
            pointer-events: none;
            opacity: 0.6;
            z-index: 5;
        }
        .danger-label {
            position: absolute;
            right: 0;
            top: -25px;
            background: #FF7043;
            color: white;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 10px;
        }
        .warning-active {
            animation: blink 0.5s infinite;
            border-color: #D32F2F;
            opacity: 1;
        }
        @keyframes blink {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }
        .btn-start {
            background-color: #4CAF50;
            color: white;
            font-size: 1.5rem;
            padding: 15px 40px;
            border-radius: 50px;
            border: none;
            box-shadow: 0 6px 0 #2E7D32;
            transition: transform 0.1s;
            cursor: pointer;
        }
        .btn-start:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #2E7D32;
        }
        .btn-restart {
            background-color: #FF7043;
            box-shadow: 0 6px 0 #D84315;
        }
        .btn-restart:active {
            box-shadow: 0 2px 0 #D84315;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="ui-panel">
        <div class="info-box">
            <p class="text-sm font-bold opacity-70">점수</p>
            <p id="score" class="text-2xl font-black">0</p>
        </div>
        <div class="info-box text-right">
            <p class="text-sm font-bold opacity-70">다음 알파벳</p>
            <div id="next-shape-display" class="mt-1 flex justify-end items-center h-8"></div>
        </div>
    </div>

    <div id="title-screen" class="overlay">
        <h1 class="text-5xl text-[#2E7D32] mb-4 drop-shadow-sm" style="text-shadow: 2px 2px 0 #fff;">알파벳 합치기</h1>
        <p class="text-xl text-[#558B2F] mb-10 bg-white px-4 py-2 rounded-full shadow-sm">
            🅰️ 같은 알파벳끼리 쾅! 🅱️
        </p>
        <div class="bg-[#FFF9C4] p-6 rounded-3xl border-4 border-[#FFD54F] mb-10 w-64 shadow-md">
            <p class="text-sm font-bold text-[#8D6E63] mb-1">최고 기록 🏆</p>
            <p id="best-score" class="text-4xl font-black text-[#F57F17]">0</p>
        </div>
        <button id="start-btn" class="btn-start">게임 시작! ▶</button>
    </div>

    <div id="gameover-screen" class="overlay" style="display: none;">
        <h2 class="text-5xl text-[#D32F2F] mb-4 drop-shadow-md">앗, 꽉 찼어요!</h2>
        <p id="final-score-msg" class="text-2xl text-[#5D4037] mb-8 font-bold">점수: 0</p>
        <button onclick="location.reload()" class="btn-start btn-restart">다시 하기 🔄</button>
    </div>

    <div id="evolution-guide" class="hidden md:flex">
        <p class="text-sm text-[#558B2F] font-bold mb-2 text-center">진화 순서</p>
    </div>

    <div id="visual-limit-line" class="danger-line">
        <div class="danger-label">여기 넘으면 안돼요!</div>
    </div>
</div>

<script>
    const CONFIG = {
        width: 400,
        height: 640,
        limitY: 200,
        spawnY: 50,
        shapes: [
            { radius: 25, color: '#FF8A80', letter: 'A', name: '에이' },
            { radius: 36, color: '#FFD180', letter: 'B', name: '비' },
            { radius: 47, color: '#FFFF8D', letter: 'C', name: '씨' },
            { radius: 58, color: '#CCFF90', letter: 'D', name: '디' },
            { radius: 69, color: '#A7FFEB', letter: 'E', name: '이' },
            { radius: 80, color: '#80D8FF', letter: 'F', name: '에프' },
            { radius: 91, color: '#82B1FF', letter: 'G', name: '쥐' },
            { radius: 102, color: '#B388FF', letter: 'H', name: '에이치' },
            { radius: 115, color: '#FF80AB', letter: 'I', name: '아이(최대)' }
        ],
        spawnRange: [0, 1, 2]
    };

    const { Engine, Render, Runner, Bodies, Composite, Events, Body, Vector } = Matter;

    let engine, render, runner;
    let score = 0;
    let bestScore = localStorage.getItem('alphabet-suika-kids-best') || 0;
    let isGameOver = false;
    let isGameStarted = false;
    let currentShapeIndex = 0;
    let nextShapeIndex = 0;
    let canDrop = true;
    let previewBody = null;
    let warningTimer = null;

    document.getElementById('best-score').innerText = bestScore;

    function initGame() {
        engine = Engine.create();
        engine.gravity.y = 1.3;

        render = Render.create({
            element: document.getElementById('game-container'),
            engine: engine,
            options: {
                width: CONFIG.width,
                height: CONFIG.height,
                wireframes: false,
                background: '#FEFDF5'
            }
        });

        const wallColor = '#8D6E63';
        const ground = Bodies.rectangle(CONFIG.width / 2, CONFIG.height + 30, CONFIG.width, 60, { isStatic: true, render: { fillStyle: wallColor } });
        const leftWall = Bodies.rectangle(-30, CONFIG.height / 2, 60, CONFIG.height * 2, { isStatic: true, render: { fillStyle: wallColor } });
        const rightWall = Bodies.rectangle(CONFIG.width + 30, CONFIG.height / 2, 60, CONFIG.height * 2, { isStatic: true, render: { fillStyle: wallColor } });

        Composite.add(engine.world, [ground, leftWall, rightWall]);

        // 알파벳 텍스트 렌더링 이벤트 추가
        Events.on(render, 'afterRender', () => {
            const context = render.context;
            const bodies = Composite.allBodies(engine.world);

            context.textAlign = 'center';
            context.textBaseline = 'middle';

            for (let body of bodies) {
                if (body.label === 'alphabet' && body.gameData) {
                    const conf = CONFIG.shapes[body.gameData.index];

                    // 도형이 회전할 때 글자도 같이 회전하도록 캔버스 컨텍스트 조정
                    context.translate(body.position.x, body.position.y);
                    context.rotate(body.angle);

                    // 글자 크기를 원의 반지름에 비례하게 설정
                    context.font = `bold ${conf.radius}px 'Jua'`;
                    context.fillStyle = "#5D4037";
                    context.fillText(conf.letter, 0, 0);

                    // 원래 상태로 복구
                    context.rotate(-body.angle);
                    context.translate(-body.position.x, -body.position.y);
                }
            }
        });

        Render.run(render);
        runner = Runner.create();

        updateLimitLinePosition();
        window.addEventListener('resize', updateLimitLinePosition);

        setupEvents();
        createGuide();
        setNextShape();
    }

    function updateLimitLinePosition() {
        const lineEl = document.getElementById('visual-limit-line');
        const canvas = document.querySelector('canvas');
        if(canvas) {
            const ratio = CONFIG.limitY / CONFIG.height;
            const displayHeight = canvas.clientHeight;
            const offsetTop = canvas.offsetTop;

            lineEl.style.top = (offsetTop + displayHeight * ratio) + 'px';
            lineEl.style.width = canvas.clientWidth + 'px';
        }
    }

    function createGuide() {
        const guide = document.getElementById('evolution-guide');
        CONFIG.shapes.forEach(s => {
            const item = document.createElement('div');
            item.className = 'guide-item';
            item.innerHTML = `
                <div class="guide-shape" style="background:${s.color}; border: 2px solid #5D4037;">${s.letter}</div>
                <span style="font-family:'Jua'">${s.name}</span>
            `;
            guide.appendChild(item);
        });
    }

    // 다각형에서 '원(Circle)' 생성으로 로직 변경
    function createAlphabetBody(x, y, index, isStatic = false) {
        const conf = CONFIG.shapes[index];
        const options = {
            friction: 0.3,
            restitution: 0.2,
            isStatic: isStatic,
            label: 'alphabet',
            render: {
                fillStyle: conf.color,
                strokeStyle: '#5D4037',
                lineWidth: 3
            }
        };

        const body = Bodies.circle(x, y, conf.radius, options);
        body.createdAt = Date.now();
        body.gameData = { index: index };
        return body;
    }

    function setNextShape() {
        currentShapeIndex = nextShapeIndex;
        nextShapeIndex = CONFIG.spawnRange[Math.floor(Math.random() * CONFIG.spawnRange.length)];

        const nextConf = CONFIG.shapes[nextShapeIndex];
        const nextDisplay = document.getElementById('next-shape-display');
        nextDisplay.innerHTML = `<div style="width:32px; height:32px; background:${nextConf.color}; border:2px solid #5D4037; border-radius:50%; display:flex; justify-content:center; align-items:center; font-weight:bold; font-size:18px; color:#5D4037;">${nextConf.letter}</div>`;
    }

    function setupEvents() {
        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach((pair) => {
                const { bodyA, bodyB } = pair;
                if (bodyA.gameData && bodyB.gameData &&
                    bodyA.gameData.index === bodyB.gameData.index) {

                    const currentIndex = bodyA.gameData.index;
                    const maxIndex = CONFIG.shapes.length - 1;

                    if (currentIndex < maxIndex) {
                        const nextIndex = currentIndex + 1;
                        const pos = Vector.div(Vector.add(bodyA.position, bodyB.position), 2);
                        Composite.remove(engine.world, [bodyA, bodyB]);
                        const newBody = createAlphabetBody(pos.x, pos.y, nextIndex);
                        Composite.add(engine.world, newBody);
                        score += (nextIndex + 1) * 10;
                    } else if (currentIndex === maxIndex) {
                        Composite.remove(engine.world, [bodyA, bodyB]);
                        score += 1000;
                    }
                    document.getElementById('score').innerText = score;
                }
            });
        });

        Events.on(engine, 'afterUpdate', () => {
            if (isGameOver || !isGameStarted) return;

            const bodies = Composite.allBodies(engine.world);
            let isViolating = false;
            const now = Date.now();

            for (let body of bodies) {
                if (body.isStatic || body.label !== 'alphabet') continue;

                const isSettled = body.speed < 0.2;
                const isOldEnough = (now - body.createdAt > 2000);

                if (isOldEnough || isSettled) {
                    if (body.bounds.min.y < CONFIG.limitY) {
                        isViolating = true;
                        break;
                    }
                }
            }

            const lineEl = document.getElementById('visual-limit-line');
            if (isViolating) {
                lineEl.classList.add('warning-active');
                if (!warningTimer) {
                    warningTimer = setTimeout(() => {
                        gameOver();
                    }, 2000);
                }
            } else {
                lineEl.classList.remove('warning-active');
                clearTimeout(warningTimer);
                warningTimer = null;
            }
        });

        const gameCanvas = render.canvas;
        const handleMove = (e) => {
            if (!isGameStarted || isGameOver || !canDrop) return;
            const x = getEventX(e);
            const clampedX = Math.max(40, Math.min(CONFIG.width - 40, x));

            if (!previewBody) {
                previewBody = createAlphabetBody(clampedX, CONFIG.spawnY, currentShapeIndex, true);
                Composite.add(engine.world, previewBody);
            } else {
                Body.setPosition(previewBody, { x: clampedX, y: CONFIG.spawnY });
            }
        };

        const handleEnd = (e) => {
            if (!isGameStarted || isGameOver || !canDrop) return;
            const x = getEventX(e);
            const clampedX = Math.max(40, Math.min(CONFIG.width - 40, x));

            if (previewBody) {
                Composite.remove(engine.world, previewBody);
                previewBody = null;
            }

            const dropBody = createAlphabetBody(clampedX, CONFIG.spawnY, currentShapeIndex);
            Composite.add(engine.world, dropBody);

            canDrop = false;
            setTimeout(() => {
                if(!isGameOver) {
                    canDrop = true;
                    setNextShape();
                }
            }, 600);
        };

        gameCanvas.addEventListener('mousemove', handleMove);
        gameCanvas.addEventListener('touchstart', handleMove);
        gameCanvas.addEventListener('mousedown', handleEnd);
        gameCanvas.addEventListener('touchend', handleEnd);
    }

    function getEventX(e) {
        const rect = render.canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        return (clientX - rect.left) * (CONFIG.width / rect.width);
    }

    function gameOver() {
        if (isGameOver) return;
        isGameOver = true;

        if (score > bestScore) {
            bestScore = score;
            localStorage.setItem('alphabet-suika-kids-best', bestScore);
        }
        document.getElementById('final-score-msg').innerText = `내 점수: ${score}`;
        document.getElementById('gameover-screen').style.display = 'flex';
        Runner.stop(runner);
    }

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('title-screen').style.display = 'none';
        isGameStarted = true;
        updateLimitLinePosition();
        Runner.run(runner, engine);
    };

    initGame();
</script>
</body>
</html>
