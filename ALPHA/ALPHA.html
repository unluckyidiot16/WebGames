<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0d12">
<title>alphacov — MVP</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=JetBrains+Mono:wght@400;700&family=IBM+Plex+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:        #0a0d12;
    --panel:     #161b22;
    --panel-2:   #1f2530;
    --line:      #2a3140;
    --line-2:    #3a4252;
    --text:      #e8e2d4;
    --text-mute: #8b8678;
    --accent:    #d4a647;
    --accent-2:  #f0c060;
    --danger:    #c44545;
    --success:   #5fa85f;
    --info:      #5a8fb8;

    --font-display: 'Oswald', 'IBM Plex Sans KR', sans-serif;
    --font-mono:    'JetBrains Mono', monospace;
    --font-body:    'IBM Plex Sans KR', 'JetBrains Mono', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: var(--font-body);
    color: var(--text);
    background: var(--bg);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  button { font-family: inherit; color: inherit; background: none; border: none; cursor: pointer; }

  /* ===== App shell ===== */
  #app {
    position: fixed;
    inset: 0;
    overflow: hidden;
  }

  /* ===== Base screen ===== */
  .base {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-columns: 1fr 1.2fr 1fr;
    grid-template-rows: auto 1fr auto;
    gap: 12px;
    padding: 16px;
    background:
      radial-gradient(ellipse at top, #141923 0%, #0a0d12 70%),
      var(--bg);
  }
  .base-header {
    grid-column: 1 / -1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    border-bottom: 1px solid var(--line);
  }
  .base-title {
    font-family: var(--font-display);
    font-size: 28px;
    letter-spacing: 0.15em;
    color: var(--accent);
  }
  .base-title small {
    font-size: 13px;
    color: var(--text-mute);
    letter-spacing: 0.2em;
    margin-left: 8px;
  }
  .lang-switch {
    display: flex; gap: 4px;
    font-family: var(--font-mono);
    font-size: 12px;
  }
  .lang-switch button {
    padding: 4px 10px;
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--text-mute);
  }
  .lang-switch button.active {
    color: var(--accent);
    border-color: var(--accent);
  }
  .base-header-right {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .coin-display {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: 1px solid var(--accent);
    background: rgba(212, 166, 71, 0.08);
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--accent);
  }
  .coin-display .coin-icon { font-size: 16px; }
  .coin-display .coin-amount { font-weight: bold; letter-spacing: 0.05em; }
  .lang-switch button:not(.active) { cursor: pointer; }
  body:not(.input-touch) .lang-switch button:not(.active):hover { color: var(--text); }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    padding: 14px;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }
  .panel-head {
    font-family: var(--font-display);
    font-size: 14px;
    letter-spacing: 0.2em;
    color: var(--text-mute);
    padding-bottom: 10px;
    margin-bottom: 12px;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
  }
  .panel-head .count {
    color: var(--accent);
  }

  /* Quests */
  .quest-list { overflow-y: auto; flex: 1; max-height: 50vh; }
  /* 자유 제출 - 퀘스트 패널 하단에 분리선 */
  .free-submit {
    border-top: 1px dashed var(--line);
    padding-top: 12px;
    margin-top: 10px;
  }
  .free-submit-head {
    font-family: var(--font-display);
    font-size: 12px;
    letter-spacing: 0.12em;
    color: var(--accent);
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .free-submit-rate {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-mute);
    letter-spacing: 0.05em;
    text-transform: none;
  }
  .free-submit-form {
    display: flex;
    gap: 6px;
  }
  .free-submit-input {
    flex: 1;
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 6px 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    outline: none;
  }
  .free-submit-input:focus { border-color: var(--accent); }
  .free-submit-btn {
    background: var(--accent);
    color: var(--bg);
    border: 0;
    padding: 6px 14px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 0.1em;
    cursor: pointer;
  }
  body:not(.input-touch) .free-submit-btn:hover { background: #e0b558; }
  .free-submit-history {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 8px;
    font-family: var(--font-mono);
    font-size: 10px;
    align-items: center;
  }
  .free-submit-history-label { color: var(--text-mute); }
  .free-submit-tag {
    background: rgba(95, 168, 95, 0.15);
    border: 1px solid rgba(95, 168, 95, 0.4);
    color: var(--success);
    padding: 2px 6px;
    letter-spacing: 0.05em;
  }
  .free-submit-more { color: var(--text-mute); font-size: 9px; }
  .quest {
    border: 1px solid var(--line);
    background: var(--panel-2);
    padding: 10px 12px;
    margin-bottom: 8px;
    transition: border-color .15s;
  }
  .quest.can-submit { border-color: var(--accent); }
  .quest.completed { opacity: 0.45; }
  .quest-prompt {
    font-size: 14px;
    line-height: 1.4;
    margin-bottom: 8px;
  }
  .quest-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-mute);
  }
  .quest .submit-btn {
    font-family: var(--font-display);
    font-size: 12px;
    letter-spacing: 0.15em;
    padding: 4px 10px;
    border: 1px solid var(--accent);
    color: var(--accent);
    background: rgba(212, 166, 71, 0.08);
  }
  body:not(.input-touch) .quest .submit-btn:hover { background: rgba(212, 166, 71, 0.2); }
  .quest .submit-btn:disabled { opacity: 0.3; border-color: var(--line-2); color: var(--text-mute); cursor: not-allowed; background: none;}
  .quest .needed {
    display: inline-flex; gap: 2px; font-family: var(--font-mono); font-size: 11px;
  }
  .quest .needed span {
    padding: 1px 4px;
    border: 1px solid var(--line-2);
    background: rgba(0,0,0,0.2);
  }
  .quest .needed span.have { color: var(--success); border-color: var(--success); }
  .quest .needed span.miss { color: var(--danger); border-color: var(--line-2); }
  .quest .completed-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--success);
    letter-spacing: 0.1em;
  }

  /* Inventory */
  .inv-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }
  .inv-slot {
    aspect-ratio: 1;
    border: 1px solid var(--line);
    background: var(--panel-2);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    position: relative;
  }
  .inv-slot.has { border-color: var(--line-2); }
  .inv-slot .letter {
    font-size: 22px;
    line-height: 1;
    color: var(--text-mute);
  }
  .inv-slot.has .letter { color: var(--accent); }
  .inv-slot .num {
    position: absolute;
    bottom: 3px;
    right: 4px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text);
  }
  .inv-slot.has .num { color: var(--accent-2); }

  /* Equipment */
  .right-column {
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 0;
    overflow: hidden;
  }
  .right-column > .panel {
    flex: 1;
    min-height: 0;
  }
  /* Equipped는 콘텐츠 크기만, Shop이 나머지 공간 차지 */
  .right-column > .panel.equipment-panel { flex: 0 0 auto; }
  .right-column > .panel.shop-panel { flex: 1; min-height: 0; }

  /* Middle column: Inventory (자연 높이) + Items (나머지 공간) */
  .middle-column {
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 0;
    overflow: hidden;
  }
  .middle-column > .panel.inventory-panel { flex: 0 0 auto; }
  .middle-column > .panel.items-panel { flex: 1; min-height: 0; }
  .gear-list { display: flex; flex-direction: column; gap: 8px; }
  .gear {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 8px 10px;
    background: var(--panel-2);
    border: 1px solid var(--line);
  }
  .gear-name { font-family: var(--font-display); letter-spacing: 0.12em; font-size: 13px; }
  .gear-tier { font-family: var(--font-mono); font-size: 10px; color: var(--accent); }
  .gear-stats { font-family: var(--font-mono); font-size: 10px; color: var(--text-mute); margin-top: 4px; }
  .gear-owned { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
  .gear-pick {
    padding: 2px 8px;
    border: 1px solid var(--line);
    background: var(--panel-2);
    color: var(--text-mute);
    font-family: var(--font-mono);
    font-size: 10px;
    cursor: pointer;
  }
  body:not(.input-touch) .gear-pick:hover { border-color: var(--accent); color: var(--text); }
  .gear-pick.equipped { border-color: var(--accent); background: rgba(212, 166, 71, 0.15); color: var(--accent); }
  /* EQUIPPED 슬롯 (간단 표시) */
  .equip-slots { display: flex; flex-direction: column; gap: 4px; }
  .equip-slot {
    padding: 6px 10px;
    background: var(--panel-2);
    border-left: 3px solid var(--accent);
    font-family: var(--font-mono);
  }
  .equip-slot-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--text-mute);
  }
  .equip-slot-body {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-top: 2px;
  }
  .equip-slot-name { font-size: 13px; color: var(--text); font-weight: bold; }
  .equip-slot-tier { font-size: 10px; color: var(--accent); }
  .equip-slot-stats { font-size: 10px; color: var(--text-mute); margin-top: 2px; }
  /* ITEMS 인벤토리 (그리드) */
  .item-inv {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 8px;
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    align-content: start;
  }
  .item-card {
    padding: 6px 8px;
    background: var(--panel-2);
    border: 1px solid var(--line);
    font-family: var(--font-mono);
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  body:not(.input-touch) .item-card:hover:not(.equipped) {
    border-color: var(--accent);
    background: rgba(212, 166, 71, 0.08);
  }
  .item-card.equipped {
    border-color: var(--success);
    background: rgba(95, 168, 95, 0.08);
    cursor: default;
  }
  .item-card-head {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--text-mute);
  }
  .item-card-tier { color: var(--accent); }
  .item-card.equipped .item-card-tier { color: var(--success); }
  .item-card-name {
    font-size: 11px;
    color: var(--text);
    font-weight: bold;
    margin: 3px 0;
    letter-spacing: 0.05em;
  }
  .item-card-stats { font-size: 9px; color: var(--text-mute); }
  .item-card-badge {
    font-size: 8px;
    color: var(--success);
    margin-top: 4px;
    letter-spacing: 0.1em;
  }
  .item-card-hint {
    font-size: 8px;
    color: var(--text-mute);
    margin-top: 4px;
    letter-spacing: 0.1em;
    opacity: 0.7;
  }
  /* 챕터 선택 */
  .footer-left {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
  }
  .chapter-select {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }
  .chapter-select-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-mute);
    letter-spacing: 0.15em;
  }
  .chapter-btn {
    padding: 6px 10px;
    border: 1px solid var(--line);
    background: var(--panel-2);
    color: var(--text-mute);
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 0.05em;
    display: flex;
    flex-direction: column;
    gap: 3px;
    text-align: left;
    min-width: 160px;
  }
  body:not(.input-touch) .chapter-btn:hover:not(.locked):not(.active) {
    border-color: var(--accent);
    color: var(--text);
  }
  .chapter-btn.active {
    background: rgba(212, 166, 71, 0.05);
    font-weight: bold;
  }
  .chapter-btn.locked {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .chapter-btn-head { font-size: 11px; letter-spacing: 0.08em; }
  .chapter-btn-letters {
    display: flex;
    flex-wrap: wrap;
    gap: 1px;
    font-size: 8px;
    line-height: 1.4;
  }
  .ch-letter-prev {
    color: rgba(255, 255, 255, 0.25);
    padding: 0 1px;
  }
  .ch-letter-new {
    font-weight: bold;
    padding: 0 1px;
    text-shadow: 0 0 4px currentColor;
  }
  /* Shop */
  .shop-panel { }
  .shop-list { display: flex; flex-direction: column; gap: 6px; max-height: 280px; overflow-y: auto; }
  .shop-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 10px;
    background: var(--panel-2);
    border: 1px solid var(--line);
    gap: 8px;
  }
  .shop-item.locked { opacity: 0.5; }
  .shop-name { font-family: var(--font-display); font-size: 12px; letter-spacing: 0.08em; }
  .shop-tier { color: var(--accent); font-family: var(--font-mono); font-size: 9px; margin-left: 4px; }
  .shop-stats { font-family: var(--font-mono); font-size: 10px; color: var(--text-mute); margin-top: 2px; }
  .shop-buy {
    padding: 4px 12px;
    border: 1px solid var(--accent);
    background: rgba(212, 166, 71, 0.08);
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: bold;
    cursor: pointer;
  }
  body:not(.input-touch) .shop-buy:hover:not(:disabled) { background: var(--accent); color: var(--bg); }
  .shop-buy:disabled { opacity: 0.4; cursor: not-allowed; }
  .shop-hint { font-family: var(--font-mono); font-size: 10px; color: var(--text-mute); padding: 8px; text-align: center; opacity: 0.7; }

  /* Footer / Depart */
  .base-footer {
    grid-column: 1 / -1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    border-top: 1px solid var(--line);
  }
  .status-line { font-family: var(--font-mono); font-size: 11px; color: var(--text-mute); }
  .status-line .ok { color: var(--success); }
  .depart-btn {
    font-family: var(--font-display);
    font-size: 18px;
    letter-spacing: 0.25em;
    padding: 14px 36px;
    background: var(--accent);
    color: #1a1300;
    border: 2px solid var(--accent);
    transition: all .12s;
  }
  body:not(.input-touch) .depart-btn:hover {
    background: var(--accent-2);
    box-shadow: 0 0 20px rgba(212, 166, 71, 0.4);
  }
  .depart-btn:active { transform: translateY(1px); }

  /* ===== Title screen ===== */
  .title-screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    background:
      radial-gradient(ellipse at center, rgba(212, 166, 71, 0.08) 0%, transparent 60%),
      var(--bg);
    padding: 40px 24px;
    overflow-y: auto;
  }
  .title-logo {
    font-family: var(--font-display);
    font-size: clamp(48px, 9vw, 96px);
    font-weight: 800;
    letter-spacing: 0.16em;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(212, 166, 71, 0.4);
    margin-bottom: -6px;
    line-height: 1;
  }
  .title-tagline {
    font-family: var(--font-mono);
    font-size: 13px;
    letter-spacing: 0.25em;
    color: var(--text-mute);
    margin-bottom: 12px;
  }
  .title-sub {
    font-family: var(--font-display);
    font-size: clamp(16px, 2.4vw, 22px);
    color: var(--text);
    text-align: center;
    max-width: 520px;
    line-height: 1.5;
    margin-bottom: 28px;
  }
  .title-modes {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 720px;
  }
  .mode-card {
    background: var(--panel);
    border: 2px solid var(--line);
    padding: 24px 28px;
    min-width: 240px;
    max-width: 280px;
    cursor: pointer;
    transition: all 0.18s;
    text-align: left;
    font-family: inherit;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  body:not(.input-touch) .mode-card:hover {
    transform: translateY(-2px);
    border-color: var(--mode-color, var(--accent));
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
  }
  .mode-card.selected {
    border-color: var(--mode-color, var(--accent));
    background: rgba(212, 166, 71, 0.06);
    box-shadow: 0 0 0 1px var(--mode-color, var(--accent)) inset;
  }
  .mode-card-icon {
    font-size: 30px;
    line-height: 1;
    margin-bottom: 4px;
  }
  .mode-card-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: bold;
    color: var(--mode-color, var(--text));
    letter-spacing: 0.05em;
  }
  .mode-card-desc {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-mute);
    line-height: 1.6;
    margin-top: 6px;
  }
  .mode-card-pros {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text);
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed var(--line);
  }
  .mode-card-pros .pro { color: var(--success); }
  .mode-card-pros .con { color: #d47a47; }
  .title-start {
    margin-top: 28px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 16px 48px;
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all .15s;
  }
  .title-start:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    background: var(--line);
    color: var(--text-mute);
  }
  body:not(.input-touch) .title-start:not(:disabled):hover {
    background: var(--accent-2);
    box-shadow: 0 0 20px rgba(212, 166, 71, 0.4);
  }
  .title-hint {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-mute);
    margin-top: 16px;
    letter-spacing: 0.1em;
  }
  /* 헤더 난이도 배지 */
  .difficulty-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(15, 19, 26, 0.6);
    border: 1px solid var(--diff-color, var(--line));
    padding: 6px 10px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--diff-color, var(--text));
    letter-spacing: 0.12em;
    cursor: pointer;
    transition: all 0.12s;
  }
  body:not(.input-touch) .difficulty-badge:hover {
    background: rgba(15, 19, 26, 0.9);
  }
  .difficulty-badge .diff-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--diff-color, var(--accent));
  }

const MAX_CHAPTER = CHAPTER_CONFIG.length;

function getChapterConfig(chapter) {
  return CHAPTER_CONFIG[Math.min(chapter, MAX_CHAPTER) - 1] || CHAPTER_CONFIG[0];
}

// 단어가 챕터 letters 풀 안의 글자만 사용하는지 검사
function wordInChapter(word, chapterLetters) {
  for (const ch of word) {
    if (!chapterLetters.includes(ch)) return false;
  }
  return true;
}

const PICK_QUESTS = (n, chapter = 1, excludeIds = []) => {
  const config = getChapterConfig(chapter);
  // 챕터 letters 안의 글자만 쓰는 단어만 — 불가능한 단어는 절대 포함 X
  // (excludeIds: 이미 있는 퀘스트 id는 제외 — 중복 방지)
  const excludeSet = new Set(excludeIds);
  const pool = WORDS.filter(w =>
    wordInChapter(w.word, config.letters) && !excludeSet.has(w.id)
  );
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  // pool < n 이어도 fallback 없음 — 가능한 만큼만 반환
  return shuffled.slice(0, n).map(w => ({ id: w.id, completed: false }));
};

// 자유 제출 처리 - 사전 검증 + 인벤토리 검증 + 보상
function tryFreeSubmit(word, state) {
  const upper = (word || '').toUpperCase().trim();
  if (upper.length < 3) return { ok: false, error: '최소 3글자 이상' };
  if (upper.length > 12) return { ok: false, error: '최대 12글자까지' };
  if (!/^[A-Z]+$/.test(upper)) return { ok: false, error: '영문자만 가능' };
  if (!FREE_WORD_DICT.has(upper)) return { ok: false, error: '사전에 없는 단어' };
  // 이미 자유 제출한 단어인지 확인
  if (state.freeSubmitted && state.freeSubmitted.includes(upper)) {
    return { ok: false, error: '이미 제출한 단어' };
  }
  // 인벤토리에 글자 충분한지
  const need = {};
  for (const ch of upper) need[ch] = (need[ch] || 0) + 1;
  for (const l in need) {
    if ((state.baseInventory[l] || 0) < need[l]) {
      return { ok: false, error: '글자 부족: ' + l };
    }
  }
  return { ok: true, word: upper, need, reward: upper.length * 4 };
}

function loadState() {
  try {
    const raw = localStorage.getItem('alphacov_state_v1');
    if (raw) {
      const s = JSON.parse(raw);
      // 구버전 state 마이그레이션 (gear → equipped + ownedGear)
      if (!s.equipped || !s.ownedGear) {
        s.equipped = { ...DEFAULT_GEAR };
        s.ownedGear = {
          weapon: ['pistol_1'],
          bag: ['light'],
          boots: ['worn'],
        };
        delete s.gear;
        delete s.health;
        delete s.maxHealth;
      }
      if (typeof s.coins !== 'number') s.coins = 0;
      if (typeof s.missionCoins !== 'number') s.missionCoins = 0;
      if (!Array.isArray(s.freeSubmitted)) s.freeSubmitted = [];
      if (typeof s.chapter !== 'number') s.chapter = 1;
      if (typeof s.maxChapter !== 'number') s.maxChapter = s.chapter || 1;
      // 난이도 마이그레이션 — 기존 사용자는 'hard'로 간주 (기존 규칙 유지)
      // 단 difficulty가 null이면 타이틀로 보내서 선택하게 함
      if (s.difficulty !== 'easy' && s.difficulty !== 'hard') {
        // 기존 세이브 (난이도 필드 없음) → 타이틀에서 선택받기
        s.difficulty = null;
        s.scene = 'title';
      }
      // 미션 도중에 새로고침된 경우 베이스로 복귀 (안전)
      if (s.scene === 'mission') s.scene = 'base';
      // 퀘스트 마이그레이션 - 현재 챕터에서 불가능한 미완료 퀘스트를 교체
      // (구버전 PICK_QUESTS fallback이 불가능한 단어를 박아둔 경우 복구)
      if (Array.isArray(s.quests)) {
        const chapterLetters = getChapterConfig(s.chapter).letters;
        const stuckIds = [];
        const keepQuests = s.quests.filter(q => {
          const w = WORD_BY_ID[q.id];
          if (!w) return false;                              // 알 수 없는 id 제거
          if (q.completed) return true;                      // 완료된 건 유지
          const fits = wordInChapter(w.word, chapterLetters);
          if (!fits) { stuckIds.push(q.id); return false; }  // 불가능한 미완료는 교체 대상
          return true;
        });
        if (stuckIds.length > 0) {
          const existingIds = keepQuests.map(q => q.id);
          const need = 5 - keepQuests.length;
          const replacements = need > 0 ? PICK_QUESTS(need, s.chapter, existingIds) : [];
          s.quests = [...keepQuests, ...replacements];
        }
      }
      return s;
    }
  } catch (e) {}
  return null;
}

function freshState() {
  return {
    scene: 'title',                 // 'title' | 'base' | 'mission'
    difficulty: null,               // 'easy' | 'hard' — 타이틀에서 선택
    language: 'ko',
    baseInventory: EMPTY_INV(),     // 베이스 금고
    missionInventory: EMPTY_INV(),  // 미션 중 가방
    equipped: { ...DEFAULT_GEAR },  // 장착 중인 장비 id (슬롯별)
    ownedGear: {                    // 보유 장비 id 배열 (각 슬롯)
      weapon: ['pistol_1'],
      bag: ['light'],
      boots: ['worn'],
    },
    quests: PICK_QUESTS(5, 1),
    completedCount: 0,
    chapter: 1,                     // 현재 선택된 챕터 (다음 미션에 사용)
    maxChapter: 1,                  // 클리어로 잠금 해제된 최대 챕터
    coins: 0,                       // 보상 화폐 (베이스 누적)
    missionCoins: 0,                // 미션 중 적 처치로 누적된 코인 (추출/사망 시 정산)
    freeSubmitted: [],              // 자유 제출한 단어 목록 (중복 방지)
    missionSeed: 0,
    extractedToast: null,
  };
}

// state로부터 장착된 gear 객체 가져오는 헬퍼 (UI/World 전달용)
function resolveGear(state) {
  return {
    weapon: GEAR_BY_ID[state.equipped?.weapon || DEFAULT_GEAR.weapon],
    bag:    GEAR_BY_ID[state.equipped?.bag    || DEFAULT_GEAR.bag],
    boots:  GEAR_BY_ID[state.equipped?.boots  || DEFAULT_GEAR.boots],
  };
}

function reducer(s, a) {
  switch (a.type) {
    case 'SET_LANG':
      return { ...s, language: a.lang };
    case 'SET_DIFFICULTY':
      return { ...s, difficulty: a.difficulty };
    case 'START_GAME':
      // 타이틀에서 모드 선택 후 게임 시작 (베이스로 이동)
      return { ...s, scene: 'base', difficulty: a.difficulty || s.difficulty || 'easy' };
    case 'GO_TO_TITLE':
      // 베이스 → 타이틀 (난이도 재선택용)
      return { ...s, scene: 'title' };
    case 'DEPART':
      return { ...s, scene: 'mission', missionSeed: Date.now(), missionInventory: EMPTY_INV(), missionCoins: 0 };
    case 'COLLECT_LETTER': {
      // 가방 용량 체크
      const total = Object.values(s.missionInventory).reduce((a, b) => a + b, 0);
      if (total >= GEAR_BY_ID[s.equipped.bag].capacity) return s;
      return {
        ...s,
        missionInventory: {
          ...s.missionInventory,
          [a.letter]: (s.missionInventory[a.letter] || 0) + 1,
        },
      };
    }
    case 'EXTRACT': {
      const merged = { ...s.baseInventory };
      const total = Object.values(s.missionInventory).reduce((a, b) => a + b, 0);
      for (const k in s.missionInventory) merged[k] = (merged[k] || 0) + (s.missionInventory[k] || 0);
      const earned = s.missionCoins || 0;
      const coinNote = earned > 0 ? ` · +${earned} ◈` : '';
      return {
        ...s,
        scene: 'base',
        baseInventory: merged,
        missionInventory: EMPTY_INV(),
        coins: (s.coins || 0) + earned,
        missionCoins: 0,
        extractedToast: `+${total} 글자 회수${coinNote}`,
      };
    }
    case 'EARN_COIN_MISSION':
      // 미션 중 적 처치 코인 누적
      return { ...s, missionCoins: (s.missionCoins || 0) + (a.amount || 0) };
    case 'BUY_GEAR': {
      const item = GEAR_BY_ID[a.gearId];
      if (!item) return s;
      const slot = item.slot;
      // 이미 보유 중이면 무시
      if (s.ownedGear[slot].includes(item.id)) return s;
      if ((s.coins || 0) < item.cost) return s;
      return {
        ...s,
        coins: s.coins - item.cost,
        ownedGear: { ...s.ownedGear, [slot]: [...s.ownedGear[slot], item.id] },
        extractedToast: `${item.name} 구매! -${item.cost} 코인`,
      };
    }
    case 'EQUIP_GEAR': {
      const item = GEAR_BY_ID[a.gearId];
      if (!item) return s;
      const slot = item.slot;
      if (!s.ownedGear[slot].includes(item.id)) return s;
      return { ...s, equipped: { ...s.equipped, [slot]: item.id } };
    }
    case 'ABANDON_MISSION': {
      // reason: 'manual' (메뉴 포기) | 'death' (사망)
      if (a.reason === 'death') {
        // 사망: 글자 50% 보존 + (하드 모드일 때만) 장착 장비 손실 (tier 1 제외)
        const preserved = EMPTY_INV();
        let kept = 0, lost = 0;
        for (const l in s.missionInventory) {
          const n = s.missionInventory[l] || 0;
          const k = Math.floor(n * 0.5);
          preserved[l] = k;
          kept += k;
          lost += n - k;
        }
        const merged = { ...s.baseInventory };
        for (const l in preserved) merged[l] = (merged[l] || 0) + preserved[l];

        // 장착 장비 손실 — 이지 모드는 스킵, 하드 모드만 tier > 1 손실
        const isEasy = s.difficulty === 'easy';
        const newOwned = { ...s.ownedGear };
        const newEquipped = { ...s.equipped };
        const lostGear = [];
        if (!isEasy) {
          for (const slot of ['weapon', 'bag', 'boots']) {
            const equippedId = s.equipped[slot];
            const equippedItem = GEAR_BY_ID[equippedId];
            if (equippedItem && equippedItem.tier > 1) {
              // 보유 목록에서 제거
              newOwned[slot] = s.ownedGear[slot].filter(id => id !== equippedId);
              // 기본 장비로 fallback
              newEquipped[slot] = DEFAULT_GEAR[slot];
              lostGear.push(equippedItem.name);
            }
          }
        }
        const lossNote = lostGear.length
          ? ` | 장비 손실: ${lostGear.join(', ')}`
          : (isEasy ? ' (장비 유지)' : '');
        // 미션 코인 50% 보존 (글자와 동일 정책)
        const earnedKept = Math.floor((s.missionCoins || 0) * 0.5);
        const coinNote = earnedKept > 0 ? ` · +${earnedKept} ◈` : '';
        return {
          ...s,
          scene: 'base',
          baseInventory: merged,
          missionInventory: EMPTY_INV(),
          coins: (s.coins || 0) + earnedKept,
          missionCoins: 0,
          ownedGear: newOwned,
          equipped: newEquipped,
          extractedToast: (kept > 0 ? `사망: ${kept}글자 회수 / ${lost}글자 손실` : `사망: 글자를 모두 잃었어요`) + coinNote + lossNote,
        };
      }
      // manual abandon: 글자와 미션 코인 모두 잃음, 장비 유지
      return { ...s, scene: 'base', missionInventory: EMPTY_INV(), missionCoins: 0, extractedToast: '임무 포기 - 주운 글자를 모두 잃었어요' };
    }
    case 'CLEAR_TOAST':
      return { ...s, extractedToast: null };
    case 'SELECT_CHAPTER': {
      // 잠금 해제된 챕터만 선택 가능
      if (a.chapter < 1 || a.chapter > (s.maxChapter || 1)) return s;
      return {
        ...s,
        chapter: a.chapter,
        quests: PICK_QUESTS(5, a.chapter),
      };
    }
    case 'SUBMIT_QUEST': {
      const w = WORD_BY_ID[a.questId];
      if (!w) return s;
      const need = letterCounts(w.word);
      // 검증
      for (const l in need) {
        if ((s.baseInventory[l] || 0) < need[l]) return s;
      }
      const newInv = { ...s.baseInventory };
      for (const l in need) newInv[l] -= need[l];
      const newQuests = s.quests.map(q =>
        q.id === a.questId ? { ...q, completed: true } : q
      );
      const reward = w.word.length * 10; // 단어 길이 × 10 코인
      // 모든 퀘스트 완료시 새 퀘스트 풀 + 챕터 보너스 + 챕터 +1
      const allDone = newQuests.every(q => q.completed);
      const chapterBonus = allDone ? 100 + s.chapter * 50 : 0;
      const newChapter = allDone ? Math.min(MAX_CHAPTER, s.chapter + 1) : s.chapter;
      const chapterAdvanced = allDone && newChapter > s.chapter;
      const newMaxChapter = chapterAdvanced ? Math.max(s.maxChapter || 1, newChapter) : (s.maxChapter || 1);
      const chapterName = chapterAdvanced ? getChapterConfig(newChapter).name : '';
      return {
        ...s,
        baseInventory: newInv,
        quests: allDone ? PICK_QUESTS(5, newChapter) : newQuests,
        chapter: newChapter,
        maxChapter: newMaxChapter,
        completedCount: s.completedCount + 1,
        coins: s.coins + reward + chapterBonus,
        extractedToast: allDone
          ? (chapterAdvanced
              ? `${s.chapter}단계 완료! 다음 단계 "${chapterName}" 열림 +${reward + chapterBonus} 코인`
              : `마지막 단계 완료! +${reward + chapterBonus} 코인`)
          : `"${w.word}" 제출! +${reward} 코인`,
      };
    }
    case 'FREE_SUBMIT': {
      const result = tryFreeSubmit(a.word, s);
      if (!result.ok) {
        return { ...s, extractedToast: '✗ ' + result.error };
      }
      const newInv = { ...s.baseInventory };
      for (const l in result.need) newInv[l] -= result.need[l];
      return {
        ...s,
        baseInventory: newInv,
        coins: s.coins + result.reward,
        freeSubmitted: [...(s.freeSubmitted || []), result.word],
        extractedToast: `"${result.word}" 자유 제출! +${result.reward} 코인`,
      };
    }
    case 'RESET':
      return freshState();
  }
  return s;
}

function letterCounts(word) {
  const m = {};
  for (const c of word.toUpperCase()) m[c] = (m[c] || 0) + 1;
  return m;
}

const TILE = 1;
const MAP_SIZE = 100;
const WALL_HEIGHT = 2;

class World {
  constructor(canvas, onEvents, gear) {
    this.canvas = canvas;
    this.onEvents = onEvents;
    this.gear = gear || { weapon: GEAR_BY_ID['pistol_1'], bag: GEAR_BY_ID['light'], boots: GEAR_BY_ID['worn'] };

    this.renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    this.renderer.setSize(canvas.clientWidth, canvas.clientHeight, false);
    this.renderer.shadowMap.enabled = false;

    this.scene = new THREE.Scene();
    this.scene.background = new THREE.Color(0x0a0d12);
    this.scene.fog = new THREE.Fog(0x0a0d12, 22, 55);

    // Camera: 70° from horizontal (perspective)
    this.camera = new THREE.PerspectiveCamera(45, canvas.clientWidth / canvas.clientHeight, 0.1, 200);
    // 70°: H/B = tan(70°) ≈ 2.747. 거리 23 → H=21.3, B=7.75
    this.camOffset = new THREE.Vector3(0, 21.3, 7.75);

    // Lights (ref 저장 - buildMap에서 챕터별 강도 조정)
    this._amb = new THREE.AmbientLight(0xa8b0c8, 0.45);
    this.scene.add(this._amb);
    this._sunBaseIntensity = 1.1;
    this._dir = new THREE.DirectionalLight(0xfff3d4, this._sunBaseIntensity);
    this._dir.position.set(8, 22, 6);
    this.scene.add(this._dir);
    this._fill = new THREE.DirectionalLight(0x5070a0, 0.4);
    this._fill.position.set(-6, 12, -8);
    this.scene.add(this._fill);
    this._hemi = new THREE.HemisphereLight(0x4a5570, 0x1a1f2a, 0.4);
    this.scene.add(this._hemi);

    // World container
    this.worldGroup = new THREE.Group();
    this.scene.add(this.worldGroup);

    // State
    this.player = null;
    this.playerVel = new THREE.Vector3();
    this.input = { move: new THREE.Vector2() };
    this.walls = [];          // {x,z,w,h} AABBs
    this.letters = [];        // {mesh, letter, picked}
    this.extractZones = [];  // [{x, z, r}, ...] 최대 2개
    this.canExtract = false;

    // letter sprite cache
    this._spriteCache = new Map();

    // === 마우스 조준 + 사격 ===
    this._raycaster = new THREE.Raycaster();
    this._mouseNDC = new THREE.Vector2(0, 0.3); // NDC 기본값 (캐릭터 정면 위쪽)
    this._mouseWorld = new THREE.Vector3();     // 매 프레임 계산
    this._hasMouseAim = false;
    this._groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    this.bullets = [];        // {mesh, vx, vz, life, source?}
    this.enemies = [];
    this._fireCooldown = 0;
    this._fireHeld = false;
    this._mouseFiring = false;
    this._aimJoystickActive = false;
    this._aimJoystickX = 0;
    this._aimJoystickZ = 0;
    // 탄약 + 리로드
    // 탄약 + 리로드 (gear.weapon에서)
    this.magazineMax = this.gear.weapon.magazine;
    this.ammo = this.magazineMax;
    this._reloading = false;
    this._reloadTimer = 0;
    // 플레이어 HP + 피격
    this.hpMax = 100;
    this.hp = 100;
    this._playerHitFlash = 0;
    this._cameraShake = 0;
    this._contactCooldown = 0; // rusher 접촉 데미지 쿨다운
    this._dead = false;
    // 추출 타이머 (5초 버티기)
    this._extractDuration = 5.0;
    this._extractProgress = 0;
    this._extractTriggered = false;

    this._onMouseMove = (e) => {
      const rect = this.canvas.getBoundingClientRect();
      this._mouseNDC.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
      this._mouseNDC.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
      this._hasMouseAim = true;
    };
    this._onMouseDown = (e) => {
      if (e.button !== 0) return;
      this._mouseFiring = true;
      this._fireHeld = true;
    };
    this._onMouseUp = (e) => {
      if (e.button !== 0) return;
      this._mouseFiring = false;
      // 조이스틱이 활성이면 사격 유지, 아니면 멈춤
      if (!this._aimJoystickActive) this._fireHeld = false;
    };
    this.canvas.addEventListener('mousemove', this._onMouseMove);
    this.canvas.addEventListener('mousedown', this._onMouseDown);
    window.addEventListener('mouseup', this._onMouseUp);

    // resize
    this._onResize = this._onResize.bind(this);
    window.addEventListener('resize', this._onResize);
    this._onResize();

    // animate
    this._raf = null;
    this._lastT = performance.now();
    this._tick = this._tick.bind(this);
    this._running = false;
  }

  _onResize() {
    const w = this.canvas.clientWidth;
    const h = this.canvas.clientHeight;
    this.camera.aspect = w / h;
    this.camera.updateProjectionMatrix();
    this.renderer.setSize(w, h, false);
  }

  start() {
    if (this._running) return;
    this._running = true;
    this._lastT = performance.now();
    this._raf = requestAnimationFrame(this._tick);
  }

  stop() {
    this._running = false;
    if (this._raf) cancelAnimationFrame(this._raf);
  }

  destroy() {
    this.stop();
    window.removeEventListener('resize', this._onResize);
    window.removeEventListener('mouseup', this._onMouseUp);
    this.canvas.removeEventListener('mousemove', this._onMouseMove);
    this.canvas.removeEventListener('mousedown', this._onMouseDown);
    this.renderer.dispose();
    // dispose 메시들
    this.scene.traverse(o => {
      if (o.geometry) o.geometry.dispose?.();
      if (o.material) {
        if (Array.isArray(o.material)) o.material.forEach(m => m.dispose());
        else o.material.dispose?.();
      }
    });
  }

  /* === Map building === */
  buildMap(seed, chapterConfig) {
    // 기존 클리어
    while (this.worldGroup.children.length) {
      const c = this.worldGroup.children.pop();
      c.geometry?.dispose?.();
      c.material?.dispose?.();
    }
    this.walls = [];
    this.letters = [];
    this.extractZones = [];
    this.bullets = [];
    this.enemies = [];
    this.ammo = this.magazineMax;
    this._reloading = false;
    this._reloadTimer = 0;
    this.hp = this.hpMax;
    this._dead = false;
    this._playerHitFlash = 0;
    this._cameraShake = 0;
    this._contactCooldown = 0;
    this._extractProgress = 0;
    this._extractTriggered = false;
    this.canExtract = false;
    this.onEvents.onAmmoChange?.(this.ammo, this.magazineMax, false);
    this.onEvents.onHpChange?.(this.hp, this.hpMax);
    this.onEvents.onExtractProgress?.(0, this._extractDuration);

    // 챕터 시각 톤 적용
    const cc = chapterConfig || {
      roomTarget: 14, roomMin: 5, roomMax: 9, enemyDensity: 1.0,
      floor: 0x1a1f2a, wall: 0x2a3340, bg: 0x0a0d12, ambient: 0.45, sun: 1.0, fogStart: 22, fogEnd: 55,
    };
    this.scene.background = new THREE.Color(cc.bg);
    this.scene.fog.color.setHex(cc.bg);
    this.scene.fog.near = cc.fogStart;
    this.scene.fog.far = cc.fogEnd;
    if (this._amb) this._amb.intensity = cc.ambient;
    if (this._dir) this._dir.intensity = cc.sun;
    if (this._fill) this._fill.intensity = 0.4 * (cc.ambient / 0.45);
    if (this._hemi) this._hemi.intensity = 0.4 * (cc.ambient / 0.45);

    // 바닥 (챕터 톤)
    const floorGeo = new THREE.PlaneGeometry(MAP_SIZE * TILE, MAP_SIZE * TILE);
    const floorMat = new THREE.MeshStandardMaterial({ color: cc.floor, roughness: 0.95 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    this.worldGroup.add(floor);

    // 시드 기반 RNG
    const rng = mulberry32(seed >>> 0);

    // === 던전 생성: Rooms-and-Corridors with MST + extra connections ===
    const N = MAP_SIZE;
    const MIN_ROOM = cc.roomMin;
    const MAX_ROOM = cc.roomMax;
    const ROOM_COUNT_TARGET = cc.roomTarget;
    const ROOM_MARGIN = 2;
    this._enemyDensity = cc.enemyDensity;
    this._chapterConfig = cc;  // 적 HP/속도 차등용으로도 저장
    // 챕터의 알파벳 풀 (이 챕터에서 등장 가능한 글자만 스폰)
    const letterPool = (cc.letters || 'ABCDEFGHIJKLMNOPQRSTUVWXYZ').split('');
    const grid = Array.from({length: N}, () => new Array(N).fill(1));

    // --- 1. 방 무작위 배치 ---
    const rooms = [];
    for (let attempt = 0; attempt < 300 && rooms.length < ROOM_COUNT_TARGET; attempt++) {
      const w = MIN_ROOM + Math.floor(rng() * (MAX_ROOM - MIN_ROOM + 1));
      const h = MIN_ROOM + Math.floor(rng() * (MAX_ROOM - MIN_ROOM + 1));
      const x = 2 + Math.floor(rng() * (N - w - 4));
      const z = 2 + Math.floor(rng() * (N - h - 4));
      // 겹침 검사 (margin 포함)
      let overlaps = false;
      for (const r of rooms) {
        if (x < r.x + r.w + ROOM_MARGIN && x + w + ROOM_MARGIN > r.x &&
            z < r.z + r.h + ROOM_MARGIN && z + h + ROOM_MARGIN > r.z) {
          overlaps = true; break;
        }
      }
      if (!overlaps) rooms.push({ x, z, w, h });
    }

    // 방 floor 카빙
    for (const r of rooms) {
      for (let z = r.z; z < r.z + r.h; z++) {
        for (let x = r.x; x < r.x + r.w; x++) grid[z][x] = 0;
      }
    }

    // --- 2. 통로 carve 헬퍼 (폭 3칸) ---
    const carveH = (x1, x2, z) => {
      for (let x = Math.min(x1, x2); x <= Math.max(x1, x2); x++) {
        for (let dz = -1; dz <= 1; dz++) {
          const nz = z + dz;
          if (nz > 0 && nz < N - 1) grid[nz][x] = 0;
        }
      }
    };
    const carveV = (z1, z2, x) => {
      for (let z = Math.min(z1, z2); z <= Math.max(z1, z2); z++) {
        for (let dx = -1; dx <= 1; dx++) {
          const nx = x + dx;
          if (nx > 0 && nx < N - 1) grid[z][nx] = 0;
        }
      }
    };
    const connectRooms = (a, b) => {
      const ra = rooms[a], rb = rooms[b];
      const cx1 = ra.x + Math.floor(ra.w / 2);
      const cz1 = ra.z + Math.floor(ra.h / 2);
      const cx2 = rb.x + Math.floor(rb.w / 2);
      const cz2 = rb.z + Math.floor(rb.h / 2);
      // L자형 (수평 → 수직 또는 반대)
      if (rng() < 0.5) { carveH(cx1, cx2, cz1); carveV(cz1, cz2, cx2); }
      else             { carveV(cz1, cz2, cx1); carveH(cx1, cx2, cz2); }
    };

    // --- 3. MST로 모든 방 연결 ---
    if (rooms.length > 0) {
      const connected = new Set([0]);
      while (connected.size < rooms.length) {
        let bestA = -1, bestB = -1, bestD = Infinity;
        for (const a of connected) {
          for (let b = 0; b < rooms.length; b++) {
            if (connected.has(b)) continue;
            const ra = rooms[a], rb = rooms[b];
            const d = Math.hypot(
              (ra.x + ra.w/2) - (rb.x + rb.w/2),
              (ra.z + ra.h/2) - (rb.z + rb.h/2)
            );
            if (d < bestD) { bestD = d; bestA = a; bestB = b; }
          }
        }
        if (bestB === -1) break;
        connectRooms(bestA, bestB);
        connected.add(bestB);
      }
    }

    // --- 4. 추가 통로 (사이클): 방 개수의 ~40% 만큼 ---
    // 평균 출구 ~2-3개 보장. 인접한 무작위 쌍 연결
    const extraConnections = Math.floor(rooms.length * 0.4);
    for (let i = 0; i < extraConnections; i++) {
      const a = Math.floor(rng() * rooms.length);
      // 인접한 (거리 가까운) 방 후보 중 골라 연결
      const candidates = [];
      for (let b = 0; b < rooms.length; b++) {
        if (b === a) continue;
        const ra = rooms[a], rb = rooms[b];
        const d = Math.hypot(
          (ra.x + ra.w/2) - (rb.x + rb.w/2),
          (ra.z + ra.h/2) - (rb.z + rb.h/2)
        );
        if (d < 25) candidates.push(b);
      }
      if (candidates.length > 0) {
        const b = candidates[Math.floor(rng() * candidates.length)];
        connectRooms(a, b);
      }
    }

    // === 그리드 → 벽 메시 (row-wise greedy로 연속 셀 묶기) ===
    // 벽 색 (챕터 톤)
    const wallColor = cc.wall;
    const wallTopColor = lightenColor(wallColor, 0.18);
    const matWall = new THREE.MeshStandardMaterial({ color: wallColor, roughness: 0.75 });
    const matWallTop = new THREE.MeshStandardMaterial({ color: wallTopColor, roughness: 0.6, emissive: wallColor, emissiveIntensity: 0.12 });
    // 외곽 4벽
    this._addWallRect(-N/2,         -N/2,         N,   1, matWall, matWallTop);
    this._addWallRect(-N/2,          N/2 - 1,     N,   1, matWall, matWallTop);
    this._addWallRect(-N/2,         -N/2,         1,   N, matWall, matWallTop);
    this._addWallRect( N/2 - 1,     -N/2,         1,   N, matWall, matWallTop);
    // 내부 벽 (외곽 제외): horizontal row-greedy
    for (let z = 1; z < N - 1; z++) {
      let start = -1;
      for (let x = 1; x <= N - 1; x++) {
        const isWall = (x < N - 1) && grid[z][x] === 1;
        if (isWall) {
          if (start === -1) start = x;
        } else {
          if (start !== -1) {
            const w = x - start;
            this._addWallRect(start - N/2, z - N/2, w, 1, matWall, matWallTop);
            start = -1;
          }
        }
      }
    }

    // === 스폰 / 추출 / 글자 배치 ===
    // 스폰 방: 맵 중앙에 가까운 큰 방
    const centerSorted = [...rooms].sort((a, b) => {
      const da = Math.hypot(a.x + a.w/2 - N/2, a.z + a.h/2 - N/2);
      const db = Math.hypot(b.x + b.w/2 - N/2, b.z + b.h/2 - N/2);
      return da - db;
    });
    const spawnRoom = centerSorted.find(r => r.w >= 5 && r.h >= 5) || centerSorted[0];
    const spawnX = (spawnRoom.x + spawnRoom.w / 2) - N/2;
    const spawnZ = (spawnRoom.z + spawnRoom.h / 2) - N/2;
    this.spawnRoom = spawnRoom;

    // 추출 존: 4 코너 방 후보 → 랜덤 2개
    // 4 코너: 좌상(0,0), 우상(N,0), 좌하(0,N), 우하(N,N) 기준 가장 가까운 방
    const corners = [
      { cx: 0,  cz: 0  },
      { cx: N,  cz: 0  },
      { cx: 0,  cz: N  },
      { cx: N,  cz: N  },
    ];
    const cornerRooms = [];
    for (const c of corners) {
      // 코너 점에 가장 가까운 방
      let nearest = null, nd = Infinity;
      for (const r of rooms) {
        if (r === spawnRoom) continue;
        const d = Math.hypot(r.x + r.w/2 - c.cx, r.z + r.h/2 - c.cz);
        if (d < nd) { nd = d; nearest = r; }
      }
      if (nearest && !cornerRooms.includes(nearest)) cornerRooms.push(nearest);
    }
    // 후보 셔플 후 2개 선택
    for (let i = cornerRooms.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [cornerRooms[i], cornerRooms[j]] = [cornerRooms[j], cornerRooms[i]];
    }
    const extractCount = Math.min(2, cornerRooms.length);
    const extractRooms = cornerRooms.slice(0, extractCount);
    for (const room of extractRooms) {
      const exX = (room.x + room.w / 2) - N/2;
      const exZ = (room.z + room.h / 2) - N/2;
      this._addExtractZone(exX, exZ, 2.5);
    }
    this.extractRooms = extractRooms;

    // 글자 배치: 방마다 1-3개 + 복도에 흩뿌리기. 스폰 방엔 적게.
    const letterCount = 40;
    const placed = [];
    let placedCount = 0;
    // 우선 각 방에 1-3개씩
    for (const room of rooms) {
      if (placedCount >= letterCount) break;
      const isSpawnRoom = (room === spawnRoom);
      const isExtractRoom = extractRooms.includes(room);
      const target = isSpawnRoom ? 1 : (1 + Math.floor(rng() * 3));
      for (let i = 0; i < target && placedCount < letterCount; i++) {
        let attempts = 0;
        while (attempts++ < 20) {
          const lx = room.x + 1 + rng() * (room.w - 2);
          const lz = room.z + 1 + rng() * (room.h - 2);
          const wx = lx - N/2;
          const wz = lz - N/2;
          // 추출 존 근처는 피하기 (스폰 점에서도 떨어지게)
          if (isSpawnRoom && Math.hypot(wx - spawnX, wz - spawnZ) < 2.5) continue;
          if (isExtractRoom) {
            // 이 방의 중심(추출 존)에서 떨어지게
            const cx = (room.x + room.w/2) - N/2;
            const cz = (room.z + room.h/2) - N/2;
            if (Math.hypot(wx - cx, wz - cz) < 3) continue;
          }
          if (placed.every(p => Math.hypot(p.x - wx, p.z - wz) > 2.0)) {
            const letter = letterPool[Math.floor(rng() * letterPool.length)];
            this._addLetter(wx, wz, letter);
            placed.push({ x: wx, z: wz });
            placedCount++;
            break;
          }
        }
      }
    }
    // 남은 건 미로 floor 어디든 (복도 포함)
    let safeguard = 0;
    while (placedCount < letterCount && safeguard++ < 500) {
      const gx = 2 + Math.floor(rng() * (N - 4));
      const gz = 2 + Math.floor(rng() * (N - 4));
      if (grid[gz][gx] !== 0) continue;
      const wx = gx - N/2 + 0.5;
      const wz = gz - N/2 + 0.5;
      if (placed.every(p => Math.hypot(p.x - wx, p.z - wz) > 2.0)) {
        const letter = letterPool[Math.floor(rng() * letterPool.length)];
        this._addLetter(wx, wz, letter);
        placed.push({ x: wx, z: wz });
        placedCount++;
      }
    }

    // === 적 스폰: 모든 방에 최소 2마리 + 챕터 밀도 곱 ===
    const density = this._enemyDensity || 1.0;
    for (const room of rooms) {
      if (room === spawnRoom) continue;
      const area = room.w * room.h;
      let baseCount;
      if (area < 36) baseCount = 2;
      else if (area < 56) baseCount = 2 + Math.floor(rng() * 2);
      else baseCount = 3 + Math.floor(rng() * 2);
      // 챕터 1 = 70% (대략), 챕터 4 = 150%
      const enemyCount = Math.max(1, Math.round(baseCount * density));

      for (let i = 0; i < enemyCount; i++) {
        let attempts = 0;
        while (attempts++ < 15) {
          const ex = room.x + 1 + rng() * (room.w - 2);
          const ez = room.z + 1 + rng() * (room.h - 2);
          const wx = ex - N/2;
          const wz = ez - N/2;
          // 글자랑 너무 가까운 스폰 피하기
          if (placed.every(p => Math.hypot(p.x - wx, p.z - wz) > 1.5)) {
            const r = rng();
            const type = r < 0.5 ? 'rusher' : r < 0.75 ? 'sniper' : 'hunter';
            this._addEnemy(wx, wz, type);
            break;
          }
        }
      }
    }

    // 미니맵 데이터로 노출
    this.mazeGrid = grid;

    // 플레이어 스폰
    this._addPlayer(spawnX, spawnZ);
  }

  // 월드 좌표에 떠 있는 HP 바 (적/플레이어 머리 위)
  // 카메라가 70도 tilt이므로 평면을 X축 70도 회전해 카메라 정면 향하게
  _makeHpBar(barWidth = 1.4) {
    const group = new THREE.Group();
    // 배경 (다크)
    const bgGeo = new THREE.PlaneGeometry(barWidth + 0.06, 0.22);
    const bgMat = new THREE.MeshBasicMaterial({
      color: 0x0a0d12, transparent: true, opacity: 0.92, side: THREE.DoubleSide, depthTest: false, fog: false,
    });
    const bg = new THREE.Mesh(bgGeo, bgMat);
    bg.renderOrder = 999;
    group.add(bg);
    // 전경 (HP 색) - 좌측 anchor
    const fgGeo = new THREE.PlaneGeometry(1, 0.16);
    fgGeo.translate(0.5, 0, 0);
    const fgMat = new THREE.MeshBasicMaterial({
      color: 0x5fa85f, transparent: true, opacity: 1.0, side: THREE.DoubleSide, depthTest: false, fog: false,
    });
    const fg = new THREE.Mesh(fgGeo, fgMat);
    fg.position.set(-barWidth / 2, 0, 0.001);
    fg.scale.x = barWidth;
    fg.renderOrder = 1000;
    group.add(fg);
    // 카메라 향하게 (카메라가 ~70도 tilt 다운이므로 평면도 70도 위로 회전)
    group.rotation.x = 1.21; // ≈ 69.6도
    return { group, fg, fgMat, barWidth };
  }

  _updateHpBar(hpBar, hp, maxHp) {
    const pct = Math.max(0, hp / maxHp);
    hpBar.fg.scale.x = (hpBar.barWidth - 0.06) * pct;
    const col = pct > 0.5 ? 0x5fa85f : pct > 0.25 ? 0xd4a647 : 0xd44a47;
    hpBar.fgMat.color.setHex(col);
  }

  _addEnemy(x, z, type) {
    const g = new THREE.Group();
    let bodyMat, headMat;
    if (type === 'rusher') {
      // 빨강: 추격형
      bodyMat = new THREE.MeshStandardMaterial({ color: 0xa83a3a, roughness: 0.7 });

      head.position.y = 1.2;
      g.add(head);

        new THREE.BoxGeometry(0.18, 0.05, 0.36),

      marker.position.y = 1.43;
      g.add(marker);
      // 눈
      const eye = new THREE.Mesh(
        new THREE.BoxGeometry(0.32, 0.08, 0.02),
