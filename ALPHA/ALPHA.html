      );
      eye.position.set(0, 1.22, -0.21);
      g.add(eye);
    } else if (type === 'sniper') {
      // 파랑: 원거리형 (멈춰서 사격)
      bodyMat = new THREE.MeshStandardMaterial({ color: 0x3a5cb0, roughness: 0.7 });
      const body = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.0, 0.5), bodyMat);
      body.position.y = 0.5;
      g.add(body);
      headMat = new THREE.MeshStandardMaterial({ color: 0x4565c0, roughness: 0.7 });
      const head = new THREE.Mesh(new THREE.BoxGeometry(0.38, 0.38, 0.38), headMat);
      head.position.y = 1.19;
      g.add(head);
      const marker = new THREE.Mesh(
        new THREE.BoxGeometry(0.18, 0.05, 0.36),
        new THREE.MeshStandardMaterial({ color: 0xff5050, emissive: 0xff5050, emissiveIntensity: 0.7 })
      );
      marker.position.y = 1.4;
      g.add(marker);
      const weapon = new THREE.Mesh(
        new THREE.BoxGeometry(0.08, 0.08, 0.4),
        new THREE.MeshStandardMaterial({ color: 0x1a1f28, roughness: 0.3, metalness: 0.6 })
      );
      weapon.position.set(0.2, 0.8, -0.3);
      g.add(weapon);
    } else { // hunter (추격 + 사격 하이브리드)
      bodyMat = new THREE.MeshStandardMaterial({ color: 0xc06030, roughness: 0.65 });
      const body = new THREE.Mesh(new THREE.BoxGeometry(0.55, 1.05, 0.55), bodyMat);
      body.position.y = 0.525;
      g.add(body);
      headMat = new THREE.MeshStandardMaterial({ color: 0xd07040, roughness: 0.7 });
      const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), headMat);
      head.position.y = 1.25;
      g.add(head);
      // 위 마커
      const marker = new THREE.Mesh(
        new THREE.BoxGeometry(0.18, 0.05, 0.36),
        new THREE.MeshStandardMaterial({ color: 0xff5050, emissive: 0xff5050, emissiveIntensity: 0.7 })
      );
      marker.position.y = 1.48;
      g.add(marker);
      // 두 무기 (양쪽 - 추격 사격 식별)
      const wpnMat = new THREE.MeshStandardMaterial({ color: 0x1a1f28, roughness: 0.3, metalness: 0.6 });
      const wpnL = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.07, 0.35), wpnMat);
      wpnL.position.set(-0.22, 0.82, -0.25);
      g.add(wpnL);
      const wpnR = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.07, 0.35), wpnMat);
      wpnR.position.set(0.22, 0.82, -0.25);
      g.add(wpnR);
    }
    g.position.set(x, 0, z);
    this.worldGroup.add(g);

    const baseConfig = {
      rusher: { hp: 20, speed: 3.0, fireRate: 0, fireRange: 0, coinDrop: 5 },
      sniper: { hp: 10, speed: 2.0, fireRate: 2.0, fireRange: 16, coinDrop: 8 },
      hunter: { hp: 15, speed: 2.6, fireRate: 1.2, fireRange: 9, coinDrop: 12 },
    }[type];
    const hpMul = this._chapterConfig?.enemyHpMul || 1.0;
    const speedMul = this._chapterConfig?.enemySpeedMul || 1.0;
    const hp = Math.round(baseConfig.hp * hpMul);
    const speed = baseConfig.speed * speedMul;

    // 머리 위 HP 바
    const hpBar = this._makeHpBar(0.7);
    this.worldGroup.add(hpBar.group);

    this.enemies.push({
      mesh: g, type,
      x, z,
      hp: hp,
      maxHp: hp,
      speed: speed,
      fireCooldown: 1.0 + Math.random() * 1.5,
      fireRate: baseConfig.fireRate,
      fireRange: baseConfig.fireRange,
      coinDrop: baseConfig.coinDrop,
      bodyMat, headMat,
      origBodyColor: bodyMat.color.getHex(),
      origHeadColor: headMat.color.getHex(),
      hitFlash: 0,
      hpBar,
    });
  }

  _hasLineOfSight(a, b) {
    // 두 점 사이에 벽이 없는지 (시야 확인)
    const dx = b.x - a.x;
    const dz = b.z - a.z;
    const dist = Math.hypot(dx, dz);
    const steps = Math.max(2, Math.floor(dist * 2));
    for (let i = 1; i < steps; i++) {
      const t = i / steps;
      const x = a.x + dx * t;
      const z = a.z + dz * t;
      if (!this._isOpen(x, z, 0.05)) return false;
    }
    return true;
  }

  _damagePlayer(amount) {
    if (this._dead) return;
    this.hp = Math.max(0, this.hp - amount);
    this._playerHitFlash = 0.18;
    this._cameraShake = 0.25;
    // 머티리얼 붉게
    for (const m of this.playerParts.hitMats) {
      m.mat.color.setHex(0xff6060);
      m.mat.emissive.setHex(0xff2020);
      m.mat.emissiveIntensity = 0.8;
    }
    if (this.playerHpBar) this._updateHpBar(this.playerHpBar, this.hp, this.hpMax);
    this.onEvents.onHpChange?.(this.hp, this.hpMax);
    if (this.hp <= 0) {
      this._dead = true;
      this.onEvents.onPlayerDeath?.();
    }
  }

  _fireEnemyBullet(enemy) {
    if (!this.player) return;
    const dx = this.player.position.x - enemy.x;
    const dz = this.player.position.z - enemy.z;
    const dist = Math.hypot(dx, dz);
    if (dist < 0.001) return;
    const nx = dx / dist;
    const nz = dz / dist;
    const speed = 18;
    if (!this._enemyBulletGeo) this._enemyBulletGeo = new THREE.BoxGeometry(0.14, 0.14, 0.55);
    if (!this._enemyBulletMat) this._enemyBulletMat = new THREE.MeshStandardMaterial({
      color: 0xff8080, emissive: 0xff3030, emissiveIntensity: 1.2, roughness: 0.4,
    });
    const mesh = new THREE.Mesh(this._enemyBulletGeo, this._enemyBulletMat);
    mesh.position.set(enemy.x + nx * 0.6, 1.0, enemy.z + nz * 0.6);
    mesh.rotation.y = Math.atan2(nx, nz);
    this.worldGroup.add(mesh);
    const dmg = enemy.type === 'sniper' ? 15 : 10; // sniper 더 아픔
    this.bullets.push({
      mesh, vx: nx * speed, vz: nz * speed, life: 1.5, source: 'enemy', dmg,
    });
  }

  _addWallRect(x, z, w, h, matSide, matTop) {
    // x,z: 좌상 (월드 좌표), w,h: 타일 단위
    const sideMat = matSide || new THREE.MeshStandardMaterial({ color: 0x3a4252, roughness: 0.75 });
    const topMat  = matTop  || new THREE.MeshStandardMaterial({ color: 0x4a5266, roughness: 0.6 });
    // 본체 (벽 측면)
    const geo = new THREE.BoxGeometry(w * TILE, WALL_HEIGHT, h * TILE);
    const mesh = new THREE.Mesh(geo, sideMat);
    mesh.position.set(x + w/2 * TILE, WALL_HEIGHT / 2, z + h/2 * TILE);
    this.worldGroup.add(mesh);
    // 윗면 (위에서 보이는 톱뷰 식별용 - 살짝 밝은 색)
    const topGeo = new THREE.BoxGeometry(w * TILE, 0.04, h * TILE);
    const topMesh = new THREE.Mesh(topGeo, topMat);
    topMesh.position.set(x + w/2 * TILE, WALL_HEIGHT + 0.02, z + h/2 * TILE);
    this.worldGroup.add(topMesh);
    this.walls.push({ x: x, z: z, w: w * TILE, h: h * TILE });
  }

  _isOpen(x, z, r) {
    for (const w of this.walls) {
      const cx = Math.max(w.x, Math.min(x, w.x + w.w));
      const cz = Math.max(w.z, Math.min(z, w.z + w.h));
      if (Math.hypot(x - cx, z - cz) < r) return false;
    }
    return true;
  }

  _fire() {
    if (!this.player) return;
    if (this._fireCooldown > 0) return;
    if (this._reloading) return;
    if (this.ammo <= 0) {
      // 자동 리로드
      this.reload();
      return;
    }
    this._fireCooldown = this.gear.weapon.fireRate;

    const angle = this.player.rotation.y + Math.PI; // 캐릭터 정면(-Z)
    const dx = Math.sin(angle);
    const dz = Math.cos(angle);
    const speed = 32;

    // 총알 메시 (앰버 발광 박스)
    if (!this._bulletGeo) this._bulletGeo = new THREE.BoxGeometry(0.18, 0.18, 0.7);
    if (!this._bulletMat) this._bulletMat = new THREE.MeshStandardMaterial({
      color: 0xfff0a0, emissive: 0xffb030, emissiveIntensity: 1.5, roughness: 0.4,
    });
    const mesh = new THREE.Mesh(this._bulletGeo, this._bulletMat);
    mesh.position.set(
      this.player.position.x + dx * 1.0,
      1.5,
      this.player.position.z + dz * 1.0
    );
    mesh.rotation.y = angle;
    this.worldGroup.add(mesh);

    this.bullets.push({
      mesh, vx: dx * speed, vz: dz * speed, life: 1.2,
    });

    // 탄약 차감
    this.ammo--;
    this.onEvents.onAmmoChange?.(this.ammo, this.magazineMax, false);
  }

  reload() {
    if (this._reloading) return;
    if (this.ammo >= this.magazineMax) return;
    this._reloading = true;
    this._reloadTimer = 1.5;
    this.onEvents.onAmmoChange?.(this.ammo, this.magazineMax, true);
  }

  _addPlayer(x, z) {
    const g = new THREE.Group();

    // ===== 마인크래프트 스티브 비율 머티리얼 =====
    const matSkin  = new THREE.MeshStandardMaterial({ color: 0xd4a780, roughness: 0.75 });  // 머리/팔
    const matVest  = new THREE.MeshStandardMaterial({ color: 0x2a3140, roughness: 0.65 });  // 몸통/헬멧
    const matPants = new THREE.MeshStandardMaterial({ color: 0x6b5a3e, roughness: 0.8 });   // 다리
    const matBoot  = new THREE.MeshStandardMaterial({ color: 0x1a1300, roughness: 0.55 });
    const matAccent= new THREE.MeshStandardMaterial({ color: 0xd4a647, roughness: 0.4, emissive: 0xd4a647, emissiveIntensity: 0.15 });
    const matGun   = new THREE.MeshStandardMaterial({ color: 0x1a1f28, roughness: 0.3, metalness: 0.6 });
    const matGunBody = new THREE.MeshStandardMaterial({ color: 0x5a626d, roughness: 0.3, metalness: 0.7 });
    const matHelmetLight = new THREE.MeshStandardMaterial({ color: 0x5fbfd4, emissive: 0x5fbfd4, emissiveIntensity: 0.5, roughness: 0.3 });

    // ===== 다리 (관절 없이 hip에서만 회전) =====
    // 마인크래프트 비율: 4x12x4 → 게임 단위 0.2x0.6x0.2
    const makeLeg = (mirror) => {
      const sign = mirror ? 1 : -1;
      const hip = new THREE.Group();
      hip.position.set(sign * 0.1, 0.6, 0);
      const leg = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.6, 0.2), matPants);
      leg.position.y = -0.3;
      hip.add(leg);
      // 부츠 (다리 끝)
      const boot = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.08, 0.24), matBoot);
      boot.position.y = -0.6;
      hip.add(boot);
      return { hip };
    };
    const leftLeg = makeLeg(false);
    const rightLeg = makeLeg(true);
    g.add(leftLeg.hip);
    g.add(rightLeg.hip);

    // ===== 몸통 =====
    // 마크 비율: 8x12x4 → 0.4x0.6x0.2
    const torso = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.6, 0.2), matVest);
    torso.position.y = 0.9;
    g.add(torso);
    // 가슴 액센트 (위에서 캐릭터 인식용)
    const chestStripe = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.04, 0.06), matAccent);
    chestStripe.position.set(0, 1.15, -0.08);
    g.add(chestStripe);

    // ===== 팔 (관절 없이 어깨에서만 회전) =====
    // 마크 비율: 4x12x4 → 0.2x0.6x0.2. 두 손 권총 그립으로 정면 모이게 회전 고정
    const makeArm = (mirror) => {
      const sign = mirror ? 1 : -1;
      const shoulder = new THREE.Group();
      shoulder.position.set(sign * 0.3, 1.2, 0);
      shoulder.rotation.x = 1.45;          // 강하게 정면 (83°)
      shoulder.rotation.z = sign * -0.3;   // 안쪽으로 모이게
      const arm = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.6, 0.2), matSkin);
      arm.position.y = -0.3;
      shoulder.add(arm);
      return { shoulder };
    };
    const leftArm = makeArm(false);
    const rightArm = makeArm(true);
    g.add(leftArm.shoulder);
    g.add(rightArm.shoulder);

    // ===== 무기: 장착 weapon id에 따라 다른 메시 =====
    const weaponId = this.gear.weapon.id;
    const gun = new THREE.Group();
    if (weaponId === 'pistol_1') {
      // Pistol Mk.I - 기본 권총
      const grip = new THREE.Mesh(new THREE.BoxGeometry(0.11, 0.2, 0.13), matGun);
      gun.add(grip);
      const slide = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.14, 0.5), matGunBody);
      slide.position.set(0, 0.14, -0.18);
      gun.add(slide);
      const rail = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.03, 0.42), matAccent);
      rail.position.set(0, 0.22, -0.15);
      gun.add(rail);
      const muzzle = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.1, 0.06), matAccent);
      muzzle.position.set(0, 0.14, -0.46);
      gun.add(muzzle);
    } else if (weaponId === 'pistol_2') {
      // Pistol Mk.II - 큰 권총 (블랙 + 시안 디테일)
      const matBlk = new THREE.MeshStandardMaterial({ color: 0x1a1f28, roughness: 0.4, metalness: 0.5 });
      const matCyan = new THREE.MeshStandardMaterial({ color: 0x5fbfd4, emissive: 0x2a6070, emissiveIntensity: 0.5, roughness: 0.3 });
      const grip = new THREE.Mesh(new THREE.BoxGeometry(0.13, 0.24, 0.15), matBlk);
      gun.add(grip);
      const slide = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.16, 0.6), matBlk);
      slide.position.set(0, 0.16, -0.22);
      gun.add(slide);
      const rail = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.03, 0.5), matCyan);
      rail.position.set(0, 0.25, -0.18);
      gun.add(rail);
      const muzzle = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.12, 0.08), matCyan);
      muzzle.position.set(0, 0.16, -0.56);
      gun.add(muzzle);
      // suppressor hint (확장 연장)
      const ext = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), matBlk);
      ext.position.set(0, 0.16, -0.65);
      gun.add(ext);
    } else if (weaponId === 'smg_1') {
      // SMG - 긴 메인 바디 + 매거진 + 손잡이
      const matBlk = new THREE.MeshStandardMaterial({ color: 0x252830, roughness: 0.5 });
      const matSteel = new THREE.MeshStandardMaterial({ color: 0x6a7080, roughness: 0.3, metalness: 0.6 });
      const matMag = new THREE.MeshStandardMaterial({ color: 0x4a3a2a, roughness: 0.7 });
      const grip = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.26, 0.14), matBlk);
      gun.add(grip);
      // 매거진 (하단)
      const mag = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.22, 0.10), matMag);
      mag.position.set(0, -0.12, 0.02);
      gun.add(mag);
      // 메인 바디 (길게)
      const body = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.18, 0.75), matBlk);
      body.position.set(0, 0.18, -0.28);
      gun.add(body);
      // 윗 레일
      const rail = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.04, 0.6), matSteel);
      rail.position.set(0, 0.29, -0.25);
      gun.add(rail);
      // 짧은 muzzle
      const muzzle = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.1, 0.08), matSteel);
      muzzle.position.set(0, 0.18, -0.7);
      gun.add(muzzle);
    } else if (weaponId === 'rifle_1') {
      // Tactical Rifle - 가장 길고 굵음 + 스코프
      const matDark = new THREE.MeshStandardMaterial({ color: 0x1a1a20, roughness: 0.5 });
      const matWood = new THREE.MeshStandardMaterial({ color: 0x6e4a2a, roughness: 0.6 });
      const matSteel = new THREE.MeshStandardMaterial({ color: 0x808890, roughness: 0.25, metalness: 0.7 });
      const matLensCyan = new THREE.MeshStandardMaterial({ color: 0x5fbfd4, emissive: 0x5fbfd4, emissiveIntensity: 0.8 });
      const grip = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.26, 0.14), matDark);
      gun.add(grip);
      // 스톡 (뒤쪽)
      const stock = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.18, 0.3), matWood);
      stock.position.set(0, 0.05, 0.18);
      gun.add(stock);
      // 메인 바디 (매우 길게)
      const body = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.2, 1.0), matDark);
      body.position.set(0, 0.18, -0.42);
      gun.add(body);
      // 스코프 마운트
      const scopeMount = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.06, 0.4), matSteel);
      scopeMount.position.set(0, 0.32, -0.35);
      gun.add(scopeMount);
      // 스코프 본체
      const scope = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.4, 8), matDark);
      scope.rotation.x = Math.PI / 2;
      scope.position.set(0, 0.42, -0.35);
      gun.add(scope);
      // 스코프 렌즈 (시안 발광)
      const lens = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.02, 8), matLensCyan);
      lens.rotation.x = Math.PI / 2;
      lens.position.set(0, 0.42, -0.55);
      gun.add(lens);
      // 긴 muzzle
      const muzzle = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.12, 0.18), matSteel);
      muzzle.position.set(0, 0.18, -0.95);
      gun.add(muzzle);
    } else {
      // fallback - 기본 권총
      const grip = new THREE.Mesh(new THREE.BoxGeometry(0.11, 0.2, 0.13), matGun);
      gun.add(grip);
      const slide = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.14, 0.5), matGunBody);
      slide.position.set(0, 0.14, -0.18);
      gun.add(slide);
    }
    gun.position.set(0, 1.15, -0.7); // 정면, 가슴 높이
    g.add(gun);

    // ===== 머리 (8x8x8 → 0.4 큐브) =====
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), matSkin);
    head.position.y = 1.4;
    g.add(head);
    // 바이저 (앞면 가로 띠)
    const visor = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.08, 0.02), matBoot);
    visor.position.set(0, 1.42, -0.21);
    g.add(visor);
    // 헬멧
    const helmet = new THREE.Mesh(new THREE.BoxGeometry(0.46, 0.12, 0.46), matVest);
    helmet.position.y = 1.66;
    g.add(helmet);
    // 헬멧 위 시안 라이트
    const helmetLight = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.04, 0.36), matHelmetLight);
    helmetLight.position.y = 1.74;
    g.add(helmetLight);

    g.position.set(x, 0, z);
    this.worldGroup.add(g);
    this.player = g;

    // 머리 위 HP 바 (별도 group - 회전 영향 없음)
    this.playerHpBar = this._makeHpBar(0.8);
    this.worldGroup.add(this.playerHpBar.group);
    this._updateHpBar(this.playerHpBar, this.hp, this.hpMax);

    this.playerParts = {
      leftLeg, rightLeg,
      torso, head,
      bounceTargets: [
        { mesh: torso,        baseY: 0.9 },
        { mesh: chestStripe,  baseY: 1.15 },
        { mesh: head,         baseY: 1.4 },
        { mesh: visor,        baseY: 1.42 },
        { mesh: helmet,       baseY: 1.66 },
        { mesh: helmetLight,  baseY: 1.74 },
        { mesh: leftArm.shoulder,  baseY: 1.2 },
        { mesh: rightArm.shoulder, baseY: 1.2 },
        { mesh: gun,          baseY: 1.15 },
      ],
      // 피격 효과용 머티리얼 참조 + 원래 색
      hitMats: [
        { mat: matVest, orig: matVest.color.getHex() },
        { mat: matSkin, orig: matSkin.color.getHex() },
        { mat: matPants, orig: matPants.color.getHex() },
      ],
    };
    this.walkPhase = 0;
  }


  _makeLetterSprite(letter) {
    if (this._spriteCache.has(letter)) return this._spriteCache.get(letter).clone();
    const canvas = document.createElement('canvas');
    canvas.width = 128; canvas.height = 128;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'rgba(15, 19, 26, 0.0)';
    ctx.fillRect(0, 0, 128, 128);
    ctx.font = 'bold 96px Oswald, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // 외곽 (그림자)
    ctx.fillStyle = '#000';
    ctx.fillText(letter, 64 + 3, 64 + 3);
    // 본체
    ctx.fillStyle = '#d4a647';
    ctx.fillText(letter, 64, 64);
    const tex = new THREE.CanvasTexture(canvas);
    tex.needsUpdate = true;
    const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
    const sprite = new THREE.Sprite(mat);
    this._spriteCache.set(letter, sprite);
    return sprite.clone();
  }

  _addLetter(x, z, letter) {
    const group = new THREE.Group();
    // 받침대
    const base = new THREE.Mesh(
      new THREE.BoxGeometry(0.5, 0.4, 0.5),
      new THREE.MeshStandardMaterial({
        color: 0x161b22,
        emissive: 0xd4a647,
        emissiveIntensity: 0.3,
        roughness: 0.6,
      })
    );
    base.position.y = 0.2;
    group.add(base);
    // 글자 빌보드
    const sprite = this._makeLetterSprite(letter);
    sprite.scale.set(1.2, 1.2, 1);
    sprite.position.y = 1.0;
    group.add(sprite);
    group.position.set(x, 0, z);
    this.worldGroup.add(group);
    this.letters.push({ mesh: group, letter, picked: false, baseY: 1.0 });
  }

  _addExtractZone(x, z, r) {
    // 빛나는 디스크
    const geo = new THREE.RingGeometry(r * 0.7, r, 32);
    const mat = new THREE.MeshBasicMaterial({ color: 0x5fa85f, transparent: true, opacity: 0.6, side: THREE.DoubleSide });
    const ring = new THREE.Mesh(geo, mat);
    ring.rotation.x = -Math.PI / 2;
    ring.position.set(x, 0.02, z);
    this.worldGroup.add(ring);

    const innerGeo = new THREE.CircleGeometry(r * 0.7, 32);
    const innerMat = new THREE.MeshBasicMaterial({ color: 0x5fa85f, transparent: true, opacity: 0.15, side: THREE.DoubleSide });
    const inner = new THREE.Mesh(innerGeo, innerMat);
    inner.rotation.x = -Math.PI / 2;
    inner.position.set(x, 0.02, z);
    this.worldGroup.add(inner);

    // 기둥 (빛)
    const beam = new THREE.Mesh(
      new THREE.CylinderGeometry(r, r, 6, 16, 1, true),
      new THREE.MeshBasicMaterial({ color: 0x5fa85f, transparent: true, opacity: 0.08, side: THREE.DoubleSide })
    );
    beam.position.set(x, 3, z);
    this.worldGroup.add(beam);

    this.extractZones.push({ x, z, r });
  }

  /* === Input === */
  setMoveInput(vx, vz) {
    this.input.move.set(vx, vz);
  }

  // 우측 조이스틱: 정규화된 (x, z) 입력. 0이 아니면 그 방향으로 조준 + 사격
  setAimInput(ax, az) {
    const mag = Math.hypot(ax, az);
    if (mag > 0.2) {
      this._aimJoystickActive = true;
      this._aimJoystickX = ax;
      this._aimJoystickZ = az;
      this._fireHeld = true;
    } else {
      this._aimJoystickActive = false;
      // 좌측 조이스틱 모드: 마우스가 활성화돼 있지 않다면 fire도 멈춤
      if (!this._mouseFiring) this._fireHeld = false;
    }
  }

  /* === Tick === */
  _tick(now) {
    if (!this._running) return;
    const dt = Math.min(0.05, (now - this._lastT) / 1000);
    this._lastT = now;
    this._update(dt);
    this.renderer.render(this.scene, this.camera);
    // 미니맵은 매 ~3프레임마다 (성능)
    this._minimapFrame = (this._minimapFrame || 0) + 1;
    if (this._isMinimapValid() && this._minimapFrame % 3 === 0) this._drawMinimap();
    this._raf = requestAnimationFrame(this._tick);
  }

  setMinimapCanvas(canvas) {
    if (!canvas) {
      // 언마운트 시 호출 — 그리기를 중단하기만 함 (다시 등록될 때까지)
      this._minimapCanvas = null;
      this._minimapCtx = null;
      return;
    }
    // 같은 canvas가 다시 들어오면 무시 (idempotent)
    if (canvas === this._minimapCanvas && this._minimapCtx) return;
    this._minimapCanvas = canvas;
    this._minimapCtx = canvas.getContext('2d');
    // 등록 즉시 1프레임 그려서 빈 검은 화면 시간을 최소화
    if (this.mazeGrid) {
      try { this._drawMinimap(); } catch (e) {}
    }
  }

  // _drawMinimap에서 canvas가 분리됐는지 안전 가드
  _isMinimapValid() {
    return !!(this._minimapCtx && this._minimapCanvas && this._minimapCanvas.isConnected);
  }

  _drawMinimap() {
    const ctx = this._minimapCtx;
    const canvas = this._minimapCanvas;
    const size = canvas.width; // 180
    const N = MAP_SIZE;
    const scale = size / N;

    // 배경 (외곽 패딩)
    ctx.fillStyle = '#0a0d12';
    ctx.fillRect(0, 0, size, size);

    // 바닥/벽
    if (this.mazeGrid) {
      // 바닥 (방+복도) - 살짝 밝게
      ctx.fillStyle = '#262c38';
      for (let z = 0; z < N; z++) {
        for (let x = 0; x < N; x++) {
          if (this.mazeGrid[z][x] === 0) {
            ctx.fillRect(x * scale, z * scale, scale, scale);
          }
        }
      }
      // 벽 - 어두운 톤 (바닥과 대비)
      ctx.fillStyle = '#5a6478';
      for (let z = 0; z < N; z++) {
        for (let x = 0; x < N; x++) {
          if (this.mazeGrid[z][x] === 1) {
            ctx.fillRect(x * scale, z * scale, scale, scale);
          }
        }
      }
    }

    // 추출 존 (녹색 - 게임 내 zone 색과 일치)
    if (this.extractZones && this.extractZones.length) {
      ctx.fillStyle = 'rgba(95, 168, 71, 0.5)';
      ctx.strokeStyle = '#7fbf5f';
      ctx.lineWidth = 1.5;
      for (const z of this.extractZones) {
        const ex = (z.x + N/2) * scale;
        const ez = (z.z + N/2) * scale;
        ctx.beginPath();
        ctx.arc(ex, ez, z.r * scale, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      }
    }

    // 안 픽업 글자 (앰버 점, 크게)
    ctx.fillStyle = '#d4a647';
    for (const l of this.letters) {
      if (l.picked) continue;
      const lx = (l.mesh.position.x + N/2) * scale;
      const lz = (l.mesh.position.z + N/2) * scale;
      ctx.fillRect(lx - 2, lz - 2, 4, 4);
    }

    // 적 (빨강 - rusher=원, sniper=사각, hunter=다이아몬드)
    for (const e of this.enemies) {
      const ex = (e.x + N/2) * scale;
      const ez = (e.z + N/2) * scale;
      ctx.fillStyle = '#d44a47';
      if (e.type === 'rusher') {
        ctx.beginPath();
        ctx.arc(ex, ez, 2.5, 0, Math.PI * 2);
        ctx.fill();
      } else if (e.type === 'sniper') {
        ctx.fillRect(ex - 2.5, ez - 2.5, 5, 5);
      } else { // hunter - 다이아몬드 (회전된 사각)
        ctx.beginPath();
        ctx.moveTo(ex, ez - 3);
        ctx.lineTo(ex + 3, ez);
        ctx.lineTo(ex, ez + 3);
        ctx.lineTo(ex - 3, ez);
        ctx.closePath();
        ctx.fill();
      }
    }

    // 총알 (밝은 노랑 = 플레이어, 빨강 = 적)
    for (const b of this.bullets) {
      const bx = (b.mesh.position.x + N/2) * scale;
      const bz = (b.mesh.position.z + N/2) * scale;
      ctx.fillStyle = b.source === 'enemy' ? '#ff6060' : '#fff0a0';
      ctx.fillRect(bx - 1, bz - 1, 2, 2);
    }

    // 플레이어 (시안 점 + 방향 화살표)
    if (this.player) {
      const px = (this.player.position.x + N/2) * scale;
      const pz = (this.player.position.z + N/2) * scale;
      const angle = this.player.rotation.y + Math.PI; // 캐릭터 정면(-Z)
      const dirLen = 10;
      // 방향 라인
      ctx.strokeStyle = '#5fbfd4';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(px, pz);
      ctx.lineTo(px + Math.sin(angle) * dirLen, pz + Math.cos(angle) * dirLen);
      ctx.stroke();
      // 점 (배경 원 + 본체)
      ctx.fillStyle = '#0a0d12';
      ctx.beginPath();
      ctx.arc(px, pz, 4.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#5fbfd4';
      ctx.beginPath();
      ctx.arc(px, pz, 3.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  _update(dt) {
    if (!this.player) return;

    // 사망 시 입력 무시 (애니메이션은 계속)
    const dead = this._dead;

    // 플레이어 피격 효과 타이머 (붉게 + shake)
    if (this._playerHitFlash > 0) {
      this._playerHitFlash = Math.max(0, this._playerHitFlash - dt);
      if (this._playerHitFlash <= 0) {
        // 원래 색 복원
        for (const m of this.playerParts.hitMats) {
          m.mat.color.setHex(m.orig);
          m.mat.emissive.setHex(0x000000);
          m.mat.emissiveIntensity = 0;
        }
      }
    }
    if (this._cameraShake > 0) {
      this._cameraShake = Math.max(0, this._cameraShake - dt * 1.8);
    }
    this._contactCooldown = Math.max(0, this._contactCooldown - dt);

    // 이동
    const speed = 5.5 * this.gear.boots.speedMul; // tiles per second × boots multiplier
    const m = this.input.move;
    let vx = dead ? 0 : m.x * speed;
    let vz = dead ? 0 : m.y * speed;
    const isMoving = (vx !== 0 || vz !== 0);

    if (isMoving) {
      // 정규화
      const mag = Math.hypot(vx, vz);
      if (mag > speed) { vx = vx / mag * speed; vz = vz / mag * speed; }
      // X 충돌
      const nextX = this.player.position.x + vx * dt;
      if (this._isOpen(nextX, this.player.position.z, 0.4)) {
        this.player.position.x = nextX;
      }
      // Z 충돌
      const nextZ = this.player.position.z + vz * dt;
      if (this._isOpen(this.player.position.x, nextZ, 0.4)) {
        this.player.position.z = nextZ;
      }
    }

    // 회전 우선순위: 우측 조이스틱 (모바일 조준) > 마우스 (데스크탑) > 이동 방향
    if (this._aimJoystickActive) {
      // 조이스틱 (x, z)는 화면 좌표 (y는 화면 아래쪽 +) — game world에서 +Z가 화면 아래쪽
      const ax = this._aimJoystickX;
      const az = this._aimJoystickZ;
      this.player.rotation.y = Math.atan2(ax, az) + Math.PI;
    } else if (this._hasMouseAim) {
      this._raycaster.setFromCamera(this._mouseNDC, this.camera);
      if (this._raycaster.ray.intersectPlane(this._groundPlane, this._mouseWorld)) {
        const dx = this._mouseWorld.x - this.player.position.x;
        const dz = this._mouseWorld.z - this.player.position.z;
        if (dx*dx + dz*dz > 0.04) {
          this.player.rotation.y = Math.atan2(dx, dz) + Math.PI;
        }
      }
    } else if (isMoving) {
      const angle = Math.atan2(vx, vz) + Math.PI;
      this.player.rotation.y = angle;
    }

    // 사격 쿨다운 + 리로드 타이머 + 홀드 시 연속 발사
    this._fireCooldown = Math.max(0, this._fireCooldown - dt);
    if (this._reloading) {
      this._reloadTimer -= dt;
      if (this._reloadTimer <= 0) {
        this._reloading = false;
        this.ammo = this.magazineMax;
        this.onEvents.onAmmoChange?.(this.ammo, this.magazineMax, false);
      }
    } else if (this._fireHeld && this._fireCooldown <= 0) {
      this._fire();
    }

    // 총알 업데이트 (벽 + 적 충돌)
    for (let i = this.bullets.length - 1; i >= 0; i--) {
      const b = this.bullets[i];
      b.life -= dt;
      if (b.life <= 0) {
        this.worldGroup.remove(b.mesh);
        this.bullets.splice(i, 1);
        continue;
      }
      // 이동
      b.mesh.position.x += b.vx * dt;
      b.mesh.position.z += b.vz * dt;
      let consumed = false;
      // 벽 충돌
      if (!this._isOpen(b.mesh.position.x, b.mesh.position.z, 0.1)) {
        this.worldGroup.remove(b.mesh);
        this.bullets.splice(i, 1);
        continue;
      }
      // 플레이어 총알 ↔ 적 충돌 (적 총알은 플레이어 체크)
      if (b.source !== 'enemy') {
        for (let j = this.enemies.length - 1; j >= 0; j--) {
          const e = this.enemies[j];
          // logical pos 기준 거리 (shake offset 영향 제거)
          const ddx = b.mesh.position.x - e.x;
          const ddz = b.mesh.position.z - e.z;
          if (Math.hypot(ddx, ddz) < 0.55) {
            e.hp -= this.gear.weapon.damage;
            this.worldGroup.remove(b.mesh);
            this.bullets.splice(i, 1);
            consumed = true;
            if (e.hp <= 0) {
              this.worldGroup.remove(e.mesh);
              this.worldGroup.remove(e.hpBar.group);
              this.enemies.splice(j, 1);
              this.onEvents.onEnemyKill?.(e.type, e.coinDrop);
            } else {
              // 피격 효과: 붉게 + shake
              e.hitFlash = 0.12;
              e.bodyMat.color.setHex(0xff5050);
              e.bodyMat.emissive.setHex(0xff2020);
              e.bodyMat.emissiveIntensity = 1.0;
              e.headMat.color.setHex(0xff5050);
              e.headMat.emissive.setHex(0xff2020);
              e.headMat.emissiveIntensity = 1.0;
              // HP 바 갱신
              this._updateHpBar(e.hpBar, e.hp, e.maxHp);
            }
            break;
          }
        }
      } else {
        // 적 총알 → 플레이어 충돌
        if (this.player && !this._dead) {
          const ddx = b.mesh.position.x - this.player.position.x;
          const ddz = b.mesh.position.z - this.player.position.z;
          if (Math.hypot(ddx, ddz) < 0.55) {
            const dmg = b.dmg || 12;
            this._damagePlayer(dmg);
            this.worldGroup.remove(b.mesh);
            this.bullets.splice(i, 1);
            consumed = true;
          }
        }
      }
      if (consumed) continue;
    }

    // 적 AI + 피격 효과
    if (this.player) {
      for (const enemy of this.enemies) {
        // 피격 효과 처리 (붉게 + shake offset)
        let shakeX = 0, shakeZ = 0;
        if (enemy.hitFlash > 0) {
          enemy.hitFlash = Math.max(0, enemy.hitFlash - dt);
          const amp = enemy.hitFlash * 1.5; // 강도 점점 감소
          shakeX = (Math.random() - 0.5) * amp;
          shakeZ = (Math.random() - 0.5) * amp;
          if (enemy.hitFlash <= 0) {
            // 종료: 원래 색 복원
            enemy.bodyMat.color.setHex(enemy.origBodyColor);
            enemy.bodyMat.emissive.setHex(0x000000);
            enemy.bodyMat.emissiveIntensity = 0;
            enemy.headMat.color.setHex(enemy.origHeadColor);
            enemy.headMat.emissive.setHex(0x000000);
            enemy.headMat.emissiveIntensity = 0;
          }
        }

        const dx = this.player.position.x - enemy.x;
        const dz = this.player.position.z - enemy.z;
        const dist = Math.hypot(dx, dz);
        if (dist > 30) {
          // 멀면 idle (위치만 적용)
          enemy.mesh.position.set(enemy.x + shakeX, 0, enemy.z + shakeZ);
          enemy.hpBar.group.position.set(enemy.x, 2.45, enemy.z);
          continue;
        }
        const nx = dist > 0.001 ? dx / dist : 0;
        const nz = dist > 0.001 ? dz / dist : 0;

        const tryMove = (sx, sz) => {
          // X 슬라이딩 충돌
          const nX = enemy.x + sx;
          if (this._isOpen(nX, enemy.z, 0.35)) enemy.x = nX;
          const nZ = enemy.z + sz;
          if (this._isOpen(enemy.x, nZ, 0.35)) enemy.z = nZ;
        };

        if (enemy.type === 'rusher') {
          // 직선 추격
          if (dist > 0.8) tryMove(nx * enemy.speed * dt, nz * enemy.speed * dt);
          // 접촉 데미지 (쿨다운 0.5초 공유)
          if (dist < 1.0 && this._contactCooldown <= 0 && !this._dead) {
            this._damagePlayer(10);
            this._contactCooldown = 0.5;
          }
        } else if (enemy.type === 'sniper') {
          // 거리 유지 (5~14) + 사격
          if (dist < 5)       tryMove(-nx * enemy.speed * dt,        -nz * enemy.speed * dt);
          else if (dist > 14) tryMove( nx * enemy.speed * 0.6 * dt,  nz * enemy.speed * 0.6 * dt);
          // 사격
          enemy.fireCooldown -= dt;
          if (enemy.fireCooldown <= 0 && dist < enemy.fireRange) {
            if (this._hasLineOfSight({ x: enemy.x, z: enemy.z }, this.player.position)) {
              this._fireEnemyBullet(enemy);
              enemy.fireCooldown = enemy.fireRate;
            } else {
              enemy.fireCooldown = 0.3;
            }
          }
        } else { // hunter: 추격 + 사격
          // 시야 안에 있을 때만 행동, 너무 가까우면 살짝 거리 유지
          const hasLOS = this._hasLineOfSight({ x: enemy.x, z: enemy.z }, this.player.position);
          if (hasLOS && dist < 2.5) {
            // 살짝 후퇴해서 사격 거리 유지
            tryMove(-nx * enemy.speed * 0.5 * dt, -nz * enemy.speed * 0.5 * dt);
          } else if (dist > 1.2) {
            // 추격 (시야 없으면 마지막 방향으로 접근)
            tryMove(nx * enemy.speed * dt, nz * enemy.speed * dt);
          }
          // 사격: 시야 + 사거리 안에 있으면
          enemy.fireCooldown -= dt;
          if (enemy.fireCooldown <= 0 && dist < enemy.fireRange && hasLOS) {
            this._fireEnemyBullet(enemy);
            enemy.fireCooldown = enemy.fireRate;
          }
        }

        // 회전 (피격 시 캐릭터 기준 방향 유지 - 시각만 흔들림)
        enemy.mesh.rotation.y = Math.atan2(dx, dz) + Math.PI;
        // 시각 위치 = 논리 위치 + shake
        enemy.mesh.position.set(enemy.x + shakeX, 0, enemy.z + shakeZ);
        // HP 바 위치 (회전 영향 없음, 머리 위)
        enemy.hpBar.group.position.set(enemy.x, 2.45, enemy.z);
      }
    }

    // 애니메이션: 다리만 swing (관절 없음), 상체 바운스. 팔은 두 손 권총 그립으로 완전 고정.
    if (this.playerParts) {
      const p = this.playerParts;
      if (isMoving) {
        this.walkPhase += dt * 9;
        const sp = Math.sin(this.walkPhase);
        const cp = Math.cos(this.walkPhase);

        // 다리: hip에서만 swing (마인크래프트 스타일 — 무릎 없이 직선 다리가 흔들림)
        const hipSwing = sp * 0.7;
        p.leftLeg.hip.rotation.x   = hipSwing;
        p.rightLeg.hip.rotation.x  = -hipSwing;

        // 상체 바운스 (어깨·팔·총 포함 - 모두 같이 위아래)
        const bounce = Math.abs(sp) * 0.04;
        for (const t of p.bounceTargets) t.mesh.position.y = t.baseY + bounce;
        // 살짝의 좌우 sway
        p.torso.rotation.z = cp * 0.02;
        p.head.rotation.z = -cp * 0.01;
      } else {
        // idle: 다리 중립 복귀
        p.leftLeg.hip.rotation.x  *= 0.85;
        p.rightLeg.hip.rotation.x *= 0.85;
        for (const t of p.bounceTargets) t.mesh.position.y += (t.baseY - t.mesh.position.y) * 0.2;
        p.torso.rotation.z *= 0.85;
        p.head.rotation.z *= 0.85;
        // idle breathing (몸통만 미세하게)
        const breath = Math.sin(performance.now() * 0.0015) * 0.012;
        p.torso.position.y = 0.9 + breath;
      }
    }

    // 플레이어 HP 바 위치 갱신 (머리 위)
    if (this.playerHpBar && this.player) {
      this.playerHpBar.group.position.set(this.player.position.x, 2.5, this.player.position.z);
    }

    // 카메라 추종 (피격 시 shake)
    const target = this.player.position.clone();
    const shake = this._cameraShake;
    const sx = shake > 0 ? (Math.random() - 0.5) * shake * 1.5 : 0;
    const sz = shake > 0 ? (Math.random() - 0.5) * shake * 1.5 : 0;
    this.camera.position.set(
      target.x + this.camOffset.x + sx,
      this.camOffset.y,
      target.z + this.camOffset.z + sz
    );
    this.camera.lookAt(target.x + sx * 0.3, 0.5, target.z + sz * 0.3);

    // 글자 픽업 + 회전
    const px = this.player.position.x, pz = this.player.position.z;
    for (const l of this.letters) {
      if (l.picked) continue;
      l.mesh.rotation.y += dt * 1.5;
      l.mesh.children[1].position.y = l.baseY + Math.sin(performance.now() * 0.003 + l.mesh.position.x) * 0.1;
      if (l.cooldown && l.cooldown > 0) {
        l.cooldown = Math.max(0, l.cooldown - dt);
        continue;
      }
      const d = Math.hypot(l.mesh.position.x - px, l.mesh.position.z - pz);
      if (d < 0.9) {
        const accepted = this.onEvents.onLetterPickup?.(l.letter);
        if (accepted !== false) {
          l.picked = true;
          l.mesh.visible = false;
        } else {
          // 거부됨: 잠시 쿨다운 두기 (연속 호출 방지)
          l.cooldown = 1.0;
        }
      }
    }

    // 추출 존 체크 (배열 중 어느 하나라도 안에 있으면)
    if (this.extractZones.length) {
      const canExtract = this.extractZones.some(
        z => Math.hypot(z.x - px, z.z - pz) < z.r
      );
      if (canExtract !== this.canExtract) {
        this.canExtract = canExtract;
        this.onEvents.onExtractZoneChange?.(canExtract);
      }
      // 5초 추출 타이머 - 존 안에서 누적, 밖이면 0으로 리셋
      if (canExtract && !this._dead) {
        this._extractProgress = Math.min(this._extractDuration, this._extractProgress + dt);
        this.onEvents.onExtractProgress?.(this._extractProgress, this._extractDuration);
        if (this._extractProgress >= this._extractDuration && !this._extractTriggered) {
          this._extractTriggered = true;
          this.onEvents.onAutoExtract?.();
        }
      } else if (this._extractProgress > 0) {
        this._extractProgress = 0;
        this._extractTriggered = false;
        this.onEvents.onExtractProgress?.(0, this._extractDuration);
      }
    }
  }
}

/* 색 밝게/어둡게 */
function lightenColor(hex, amount) {
  const r = (hex >> 16) & 0xff;
  const g = (hex >>  8) & 0xff;
  const b =  hex        & 0xff;
  const nr = Math.min(255, Math.round(r + (255 - r) * amount));
  const ng = Math.min(255, Math.round(g + (255 - g) * amount));
  const nb = Math.min(255, Math.round(b + (255 - b) * amount));
  return (nr << 16) | (ng << 8) | nb;
}

/* mulberry32 PRNG */
function mulberry32(a) {
  return function() {
    let t = a += 0x6D2B79F5;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

/* =========================================================================
   4. INPUT HOOKS — keyboard + touch joystick
   ========================================================================= */
function useKeyboard() {
  const keys = useRef({ w: false, a: false, s: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false });
  useEffect(() => {
    const codeMap = { KeyW: 'w', KeyA: 'a', KeyS: 's', KeyD: 'd' };
    const down = (e) => {
      // IME 대응: 한글 입력 중에도 영문 키 인식
      const codeKey = codeMap[e.code];
      if (codeKey) { keys.current[codeKey] = true; e.preventDefault(); return; }
      const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
      if (k in keys.current) { keys.current[k] = true; e.preventDefault(); }
    };
    const up = (e) => {
      const codeKey = codeMap[e.code];
      if (codeKey) { keys.current[codeKey] = false; return; }
      const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
      if (k in keys.current) keys.current[k] = false;
    };
    window.addEventListener('keydown', down);
    window.addEventListener('keyup', up);
    return () => {
      window.removeEventListener('keydown', down);
      window.removeEventListener('keyup', up);
    };
  }, []);
  return keys;
}

function readKeyboardMove(keys) {
  let x = 0, z = 0;
  if (keys.current.w || keys.current.ArrowUp) z -= 1;
  if (keys.current.s || keys.current.ArrowDown) z += 1;
  if (keys.current.a || keys.current.ArrowLeft) x -= 1;
  if (keys.current.d || keys.current.ArrowRight) x += 1;
  if (x || z) { const m = Math.hypot(x, z); x /= m; z /= m; }
  return { x, z };
}

function Joystick({ side = 'left', onMove }) {
  const ref = useRef(null);
  const stickRef = useRef(null);
  const stateRef = useRef({ active: false, id: null, cx: 0, cy: 0 });

  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const stick = stickRef.current;
    const r = 70 - 30; // radius of stick travel
    const update = (x, y) => {
      const dx = x - stateRef.current.cx;
      const dy = y - stateRef.current.cy;
      const d = Math.hypot(dx, dy);
      let nx = dx, ny = dy;
      if (d > r) { nx = dx / d * r; ny = dy / d * r; }
      stick.style.transform = `translate(calc(-50% + ${nx}px), calc(-50% + ${ny}px))`;
      onMove(nx / r, ny / r);
    };
    const start = (e) => {
      const t = e.touches ? e.touches[0] : e;
      stateRef.current.active = true;
      stateRef.current.id = e.touches ? t.identifier : null;
      const rect = el.getBoundingClientRect();
      stateRef.current.cx = rect.left + rect.width / 2;
      stateRef.current.cy = rect.top + rect.height / 2;
      update(t.clientX, t.clientY);
    };
    const move = (e) => {
      if (!stateRef.current.active) return;
      let t;
      if (e.touches) {
        t = Array.from(e.touches).find(tt => tt.identifier === stateRef.current.id);
        if (!t) return;
      } else t = e;
      update(t.clientX, t.clientY);
    };
    const end = (e) => {
      if (e.touches) {
        const still = Array.from(e.touches).some(tt => tt.identifier === stateRef.current.id);
        if (still) return;
      }
      stateRef.current.active = false;
      stick.style.transform = 'translate(-50%, -50%)';
      onMove(0, 0);
    };
    el.addEventListener('touchstart', start, { passive: false });
    el.addEventListener('touchmove', move, { passive: false });
    el.addEventListener('touchend', end);
    el.addEventListener('touchcancel', end);
    return () => {
      el.removeEventListener('touchstart', start);
      el.removeEventListener('touchmove', move);
      el.removeEventListener('touchend', end);
      el.removeEventListener('touchcancel', end);
    };
  }, [onMove]);

  return html`
    <div class="joystick ${side}" ref=${ref}>
      <div class="joystick-stick" ref=${stickRef}></div>
    </div>
  `;
}

// 입력 모드 감지: 하이브리드 노트북(터치 + 마우스/터치패드)에서 마지막 사용한 입력 추적
// - hasTouch: 디바이스가 터치 지원하는지 (정적)
// - mode: 마지막으로 사용한 입력 ('touch' | 'mouse')
//   터치 시 → 'touch' (조이스틱 표시, cursor 보임)
//   마우스/터치패드 이동 시 → 'mouse' (aim cursor 표시, cursor:none)
function useInputMode() {
  const hasTouch = (typeof window !== 'undefined') &&
    ('ontouchstart' in window || (navigator.maxTouchPoints || 0) > 0);
  // 초기값: 터치 가능 디바이스면 'touch'로 추정, 그 외엔 'mouse'
  const [mode, setMode] = useState(hasTouch ? 'touch' : 'mouse');
  useEffect(() => {
    // 마지막 모드를 ref처럼 기록해서 동일 모드 중복 setState 회피
    let last = hasTouch ? 'touch' : 'mouse';
    const onPointer = (e) => {
      // pointerType: 'mouse' | 'pen' | 'touch'
      const nm = (e.pointerType === 'mouse' || e.pointerType === 'pen') ? 'mouse' : 'touch';
      if (nm !== last) {
        last = nm;
        setMode(nm);
      }
    };
    // pointerdown/pointermove 모두 추적
    window.addEventListener('pointerdown', onPointer, { passive: true });
    window.addEventListener('pointermove', onPointer, { passive: true });
    return () => {
      window.removeEventListener('pointerdown', onPointer);
      window.removeEventListener('pointermove', onPointer);
    };
  }, [hasTouch]);
  return { hasTouch, mode };
}

// 기존 호환 — isTouch 단일 boolean이 필요한 경우
function useIsTouch() {
  const { mode } = useInputMode();
  return mode === 'touch';
}

        setPickToast(`+ ${letter}`);
        setTimeout(() => setPickToast(null), 700);
        return true;
      },
      onExtractZoneChange: (can) => setCanExtract(can),
      onExtractProgress: (progress, duration) => setExtractProgress({ progress, duration }),
      onAutoExtract: () => {
        dispatch({ type: 'EXTRACT' });
      },
      onAmmoChange: (ammo, max, reloading) => setAmmoState({ ammo, max, reloading }),
      onHpChange: (hp, max) => setHpState({ hp, max }),
      onPlayerDeath: () => {
        setIsDead(true);
        // 1.8초 후 자동 베이스 복귀 - 사망 시 글자 50% 보존
        setTimeout(() => {
          dispatch({ type: 'ABANDON_MISSION', reason: 'death' });
        }, 1800);
      },
      onEnemyKill: (type, coinDrop) => {
        if (!coinDrop) return;
        dispatch({ type: 'EARN_COIN_MISSION', amount: coinDrop });
        setPickToast(`+ ${coinDrop} ◈`);
        setTimeout(() => setPickToast(null), 700);
        // BOUNTY 카운터 플래시
        setBountyFlash(true);
        if (bountyTimerRef.current) clearTimeout(bountyTimerRef.current);
        bountyTimerRef.current = setTimeout(() => setBountyFlash(false), 350);
      },
    }, gear);
    worldRef.current = w;
    w.buildMap(state.missionSeed, getChapterConfig(state.chapter || 1));
    if (minimapCanvasNode.current) w.setMinimapCanvas(minimapCanvasNode.current);
    w.start();
    return () => {
      w.stop();
      w.destroy();
    };
  }, []);

  // 입력 루프
  useEffect(() => {
    let id = null;
    const tick = () => {
      if (paused) { worldRef.current?.setMoveInput(0, 0); return; }
      const kb = readKeyboardMove(keys);
      const jx = moveRef.current.x, jz = moveRef.current.z;
      const x = kb.x || jx;
      const z = kb.z || jz;
      worldRef.current?.setMoveInput(x, z);
    };
    id = setInterval(tick, 16);
    return () => clearInterval(id);
  }, [paused, keys]);

  // pause 시 world 정지
  useEffect(() => {
    if (!worldRef.current) return;
    if (paused) worldRef.current.stop();
    else worldRef.current.start();
  }, [paused]);

  const onJoystick = useCallback((x, y) => {
    moveRef.current.x = x;
    moveRef.current.z = y;
  }, []);

  // 우측 조이스틱: 조준 + 자동 사격 (조이스틱 활성 동안)
  const onAimJoystick = useCallback((x, y) => {
    // y는 화면 좌표 (위가 음수). game world Z는 화면 아래가 +.
    worldRef.current?.setAimInput(x, y);
  }, []);

  // ESC pause + R 리로드 (IME 대응 - e.code 사용)
  useEffect(() => {
    const h = (e) => {
      if (e.key === 'Escape') setPaused(p => !p);
      else if (e.code === 'KeyR' || e.key === 'r' || e.key === 'R') worldRef.current?.reload();
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);

  // Aim cursor: mousemove로 위치 갱신 (React state 안 쓰고 직접 DOM 조작 - 빠름)
  useEffect(() => {
    const onMove = (e) => {
      if (!aimRef.current) return;
      aimRef.current.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
    };
    window.addEventListener('mousemove', onMove);
    return () => window.removeEventListener('mousemove', onMove);
  }, []);

  const extract = () => dispatch({ type: 'EXTRACT' });
  const abandon = () => dispatch({ type: 'ABANDON_MISSION' });

  const bagTotal = useMemo(
    () => Object.values(state.missionInventory).reduce((a, b) => a + b, 0),
    [state.missionInventory]
  );

  return html`
    <div class="mission mode-${inputMode}">
      <canvas ref=${canvasRef}></canvas>

      ${inputMode === 'mouse' ? html`
        <div class="aim-cursor ${ammoState.reloading ? 'reloading' : ''} ${ammoState.ammo === 0 ? 'empty' : ''}" ref=${aimRef}>
          <i class="t"></i><i class="b"></i><i class="l"></i><i class="r"></i>
        </div>
      ` : ''}

      <div class="hud">
        <!-- 상단: 좌측 QUESTS, 가운데 챕터 표시, 우측 EXTRACT 상태 -->
        <div class="hud-top">
          <div class="hud-quest">
            <div class="hud-quest-label">임무</div>
            <div class="hud-quest-text">
              ${state.quests.filter(q => !q.completed).slice(0, 1).map(q => {
                const w = WORD_BY_ID[q.id];
                return w.prompt[state.language] || w.prompt.ko;
              })} <span style="color: var(--text-mute); font-family: var(--font-mono); font-size: 11px;">(+${state.quests.filter(q => !q.completed).length - 1})</span>
            </div>
          </div>
          <div class="hud-chapter" style=${`--ch-color: ${getChapterConfig(state.chapter || 1).color}`}>
            <div class="hud-chapter-label">${state.chapter}단계 / ${MAX_CHAPTER}</div>
            <div class="hud-chapter-name">${getChapterConfig(state.chapter || 1).name}</div>
            ${(() => {
              const ch = state.chapter || 1;
              const letters = getChapterConfig(ch).letters || '';
              const prev = ch > 1 ? (CHAPTER_CONFIG[ch - 2]?.letters || '') : '';
              return html`
                <div class="hud-chapter-letters-label">떨어지는 글자</div>
                <div class="hud-chapter-letters">
                  ${letters.split('').map(l => html`
                    <span class=${prev.includes(l) ? 'ch-l-prev' : 'ch-l-new'}>${l}</span>
                  `)}
                </div>
              `;
            })()}
          </div>
          ${canExtract ? html`<div class="hud-extract"><span style="color: var(--success);">▲ 탈출 가능</span></div>` : ''}
        </div>

        <!-- 우상: 미니맵 -->
        <div class="hud-minimap">
          <canvas ref=${setMinimapRef} width="180" height="180"></canvas>
        </div>

        <!-- 하단 중앙: 큰 HP 바 -->
        <div class="hud-hp-center">
          <div class="hud-hp-label">체력</div>
          <div class="hud-hp-bar">
            <div class="hud-hp-fill" style="width: ${(hpState.hp / hpState.max) * 100}%; background: ${hpState.hp > 50 ? '#5fa85f' : hpState.hp > 25 ? '#d4a647' : '#d44a47'}"></div>
          </div>
          <div class="hud-hp-text">${hpState.hp} / ${hpState.max}</div>
        </div>

        <!-- 하단 좌측: 가방 카운터 + 코인 + 주운 글자 -->
        <div class="hud-bottom-left">
          <div class="hud-bag">
            가방 <b>${bagTotal}</b><span style="color: var(--text-mute);"> / ${GEAR_BY_ID[state.equipped.bag].capacity}</span>
          </div>
          ${(state.missionCoins || 0) > 0 ? html`
            <div class="hud-bounty ${bountyFlash ? 'flash' : ''}">
              <span class="bounty-icon">◈</span>
              <span>코인 <b>${state.missionCoins}</b></span>
            </div>
          ` : ''}
          <div class="hud-inv">
            <div class="hud-inv-label">주운 글자</div>
            <div class="hud-inv-letters">
              ${Object.entries(state.missionInventory).filter(([l, n]) => n > 0).map(([l, n]) => html`
                <div class="hud-letter"><b>${l}</b>×${n}</div>
              `)}
              ${bagTotal === 0 ? html`<div style="color: var(--text-mute); font-family: var(--font-mono); font-size: 11px;">비어있음</div>` : ''}
            </div>
          </div>
        </div>

        <!-- 하단 우측: AMMO + EXTRACT/MENU 버튼 -->
        <div class="hud-bottom-right">
          <div class="hud-ammo-big">
            ${ammoState.reloading
              ? html`<span style="color: var(--text-mute);">RELOADING…</span>`
              : html`<span class="ammo-num" style="color: ${ammoState.ammo === 0 ? '#d44a47' : 'var(--accent)'};">${ammoState.ammo}</span><span style="color: var(--text-mute); font-size: 16px;"> / ${ammoState.max}</span><span style="color: var(--text-mute); font-size: 10px; margin-left: 6px;">[R]</span>`}
          </div>
          <div class="hud-actions">
            <button class="hud-btn" onClick=${() => setPaused(true)}>≡ 메뉴</button>
          </div>
        </div>

        ${canExtract ? html`
          <div class="extract-progress-panel">
            <div class="extract-label">EXTRACTING ${extractProgress.duration - extractProgress.progress > 0 ? (extractProgress.duration - extractProgress.progress).toFixed(1) : '0.0'}s</div>
            <div class="extract-progress-bar">
              <div class="extract-progress-fill" style="width: ${(extractProgress.progress / extractProgress.duration) * 100}%"></div>
            </div>
            <div class="extract-hint">이 자리에 가만히 있어!</div>
          </div>
        ` : ''}

        ${hasTouch && inputMode === 'touch' ? html`
          <${Joystick} side="left" onMove=${onJoystick}/>
          <${Joystick} side="right" onMove=${onAimJoystick}/>
        ` : ''}

        ${pickToast ? html`<div class="toast">${pickToast}</div>` : ''}

        ${isDead ? html`
          <div class="death-overlay">
            <div class="death-title">사망</div>
            <div class="death-sub">본부로 돌아가는 중...</div>
          </div>
        ` : ''}

        ${paused ? html`
          <div class="pause-overlay">
            <div class="pause-title">잠시 멈춤</div>
            <button class="pause-btn" onClick=${() => setPaused(false)}>계속하기</button>
            <button class="pause-btn danger" onClick=${abandon}>임무 포기</button>
            <div style="font-family: var(--font-mono); font-size: 11px; color: var(--text-mute); margin-top: 12px;">
              포기하면 주운 글자를 모두 잃어요
            </div>
          </div>
        ` : ''}
      </div>
    </div>
  `;
}

function TitleScreen({ state, dispatch }) {
  // 로컬 선택 상태 — 확정 전까지 state.difficulty에 반영 안 함
  const [picked, setPicked] = useState(state.difficulty || null);
  const start = () => {
    if (!picked) return;
    dispatch({ type: 'START_GAME', difficulty: picked });
  };
  return html`
    <div class="title-screen">
      <div class="title-logo">ALPHACOV</div>
      <div class="title-tagline">// 알파벳 추출 슈터</div>
      <div class="title-sub">
        위험한 던전에 들어가 알파벳을 모으고,<br/>
        무사히 돌아와서 영어 단어를 만들어 보자!
      </div>

      <div class="title-modes">
        <button class="mode-card ${picked === 'easy' ? 'selected' : ''}"
                style="--mode-color: #5fa85f;"
                onClick=${() => setPicked('easy')}>
          <div class="mode-card-icon">🛡️</div>
          <div class="mode-card-title">쉬운 모드</div>
          <div class="mode-card-desc">
            처음 해보거나 차근차근 즐기고 싶을 때
          </div>
          <div class="mode-card-pros">
            <div class="pro">✓ 사망해도 장비를 잃지 않아요</div>
            <div class="pro">✓ 글자는 절반만 잃어요</div>
          </div>
        </button>

        <button class="mode-card ${picked === 'hard' ? 'selected' : ''}"
                style="--mode-color: #d44a47;"
                onClick=${() => setPicked('hard')}>
          <div class="mode-card-icon">⚔️</div>
          <div class="mode-card-title">어려운 모드</div>
          <div class="mode-card-desc">
            진짜 추출 슈터를 경험하고 싶을 때
          </div>
          <div class="mode-card-pros">
            <div class="con">✗ 사망 시 장착한 장비를 잃어요</div>
            <div class="con">✗ 글자도 절반 잃어요</div>
          </div>
        </button>
      </div>

      <button class="title-start" disabled=${!picked} onClick=${start}>
        ${picked === 'easy' ? '쉬운 모드로 시작 ▶'
          : picked === 'hard' ? '어려운 모드로 시작 ▶'
          : '모드를 선택해 주세요'}
      </button>
      <div class="title-hint">언제든지 본부에서 모드를 바꿀 수 있어요</div>
    </div>
  `;
}

function App() {
  const [state, dispatch] = useReducer(reducer, undefined, () => loadState() || freshState());
  const { mode: inputMode } = useInputMode();

  // 자동 저장
  useEffect(() => {
    try { localStorage.setItem('alphacov_state_v1', JSON.stringify(state)); } catch (e) {}
  }, [state]);

  // 토스트 자동 제거
  useEffect(() => {
    if (!state.extractedToast) return;
    const id = setTimeout(() => dispatch({ type: 'CLEAR_TOAST' }), 1800);
    return () => clearTimeout(id);
  }, [state.extractedToast]);

  // 입력 모드를 body class로 노출 — CSS :hover sticky 방지용
  useEffect(() => {
    const cls = document.body.classList;
    if (inputMode === 'touch') {
      cls.add('input-touch');
      cls.remove('input-mouse');
    } else {
      cls.add('input-mouse');
      cls.remove('input-touch');
    }
  }, [inputMode]);

  return html`
    <div>
      ${state.scene === 'title'
        ? html`<${TitleScreen} state=${state} dispatch=${dispatch}/>`
        : state.scene === 'base'
          ? html`<${BaseScreen} state=${state} dispatch=${dispatch}/>`
          : html`<${MissionScreen} state=${state} dispatch=${dispatch}/>`}
      ${state.extractedToast ? html`<div class="toast">${state.extractedToast}</div>` : ''}
    </div>
  `;
}

render(html`<${App}/>`, document.getElementById('app'));
</script>

</body>
</html>
