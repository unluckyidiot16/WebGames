<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>알파벳 뱀 게임</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #111827; /* gray-900 */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; /* 모바일에서 더블 탭 확대 방지 */
            user-select: none; /* 텍스트 선택 방지 */
        }

        #game-container {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
            margin: 0 auto;
            background-color: #1f2937; /* gray-800 */
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            position: relative;
            transition: border 0.2s;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            display: block;
        }

        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 220px;
            margin: 20px auto 0;
        }

        .d-pad-btn {
            background-color: #374151; /* gray-700 */
            border-radius: 12px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: background-color 0.1s, transform 0.1s;
        }

        .d-pad-btn:active {
            background-color: #4b5563; /* gray-600 */
            transform: scale(0.95);
        }

        .btn-up { grid-column: 2; grid-row: 1; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 3; }
    </style>
</head>
<body class="flex flex-col h-screen items-center justify-center p-4">

<!-- 메인 메뉴 -->
<div id="menu-screen" class="flex flex-col items-center w-full max-w-md bg-gray-800 p-8 rounded-2xl shadow-2xl">
    <h1 class="text-3xl font-bold mb-4 text-green-400">알파벳 뱀 게임</h1>
    <p class="text-gray-300 mb-8 text-center text-sm leading-relaxed">
        A부터 Z까지 순서대로 먹으세요!<br>
        <span class="text-blue-400 font-bold">보통</span>: 체력 무한, 벽 통과 가능<br>
        <span class="text-red-400 font-bold">어려움/도전</span>: 오답, 방해물, 벽, 몸통 충돌 시 체력 감소
    </p>

    <div class="flex flex-col w-full gap-4">
        <button onclick="startGame('normal')" class="bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold text-lg shadow-lg">보통 (HP 무한, 벽 통과)</button>
        <button onclick="startGame('hard')" class="bg-orange-600 hover:bg-orange-500 py-3 rounded-xl font-bold text-lg shadow-lg">어려움 (방해물 1개)</button>
        <button onclick="startGame('challenge')" class="bg-red-600 hover:bg-red-500 py-3 rounded-xl font-bold text-lg shadow-lg">도전 (방해물 2개)</button>
    </div>
</div>

<!-- 게임 화면 -->
<div id="game-screen" class="hidden flex-col items-center w-full max-w-md">
    <!-- 상단 상태바 -->
    <div class="flex justify-between items-center w-full mb-4 px-2">
        <div class="text-xl font-bold">
            목표: <span id="target-letter" class="text-yellow-400 text-3xl ml-1">A</span>
        </div>
        <div class="text-xl font-bold flex items-center">
            <span class="text-red-400 mr-2">❤️</span>
            <span id="hp-display" class="text-2xl">3</span>
        </div>
    </div>

    <!-- 캔버스 컨테이너 -->
    <div id="game-container" class="border-4 border-transparent">
        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <!-- 게임 오버 오버레이 -->
        <div id="game-over" class="hidden absolute inset-0 bg-black bg-opacity-80 flex flex-col items-center justify-center rounded-lg z-10">
            <h2 class="text-4xl font-bold text-red-500 mb-4">Game Over</h2>
            <button onclick="showMenu()" class="px-6 py-2 bg-white text-black font-bold rounded-lg mt-4">메뉴로 돌아가기</button>
        </div>

        <!-- 클리어 오버레이 -->
        <div id="victory" class="hidden absolute inset-0 bg-black bg-opacity-80 flex flex-col items-center justify-center rounded-lg z-10">
            <h2 class="text-3xl font-bold text-green-400 mb-2">축하합니다!</h2>
            <p class="text-white mb-6">A부터 Z까지 모두 모았습니다!</p>
            <button onclick="showMenu()" class="px-6 py-2 bg-green-500 text-white font-bold rounded-lg">메뉴로 돌아가기</button>
        </div>
    </div>

    <!-- 터치 D-Pad -->
    <div class="d-pad">
        <div class="d-pad-btn btn-up" onpointerdown="setDirection(0, -1)">▲</div>
        <div class="d-pad-btn btn-left" onpointerdown="setDirection(-1, 0)">◀</div>
        <div class="d-pad-btn btn-right" onpointerdown="setDirection(1, 0)">▶</div>
        <div class="d-pad-btn btn-down" onpointerdown="setDirection(0, 1)">▼</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const TILE_COUNT = 20; // 20x20 그리드
    let tileW, tileH;

    let gameLoop;
    let mode = 'normal';
    let hp = 3;
    let targetCharCode = 65; // 65는 'A'

    let snake = [];
    let dx = 0, dy = 0;
    let lastDx = 0, lastDy = 0; // 180도 회전 방지를 위한 마지막 이동 방향 기록
    let dirQueue = [];

    let alphabets = [];
    let obstacles = [];
    let invincibilityFrames = 0;
    let isGameOver = false;

    function resize() {
        tileW = canvas.width / TILE_COUNT;
        tileH = canvas.height / TILE_COUNT;
    }
    resize();

    function showMenu() {
        document.getElementById('menu-screen').classList.remove('hidden');
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('game-over').classList.add('hidden');
        document.getElementById('victory').classList.add('hidden');
        if (gameLoop) clearInterval(gameLoop);
    }

    function startGame(selectedMode) {
        mode = selectedMode;
        hp = mode === 'normal' ? '∞' : 3;
        targetCharCode = 65; // 'A'
        isGameOver = false;

        snake = [{x: 10, y: 10}];
        dx = 0; dy = 0;
        lastDx = 0; lastDy = 0;
        dirQueue = [];
        invincibilityFrames = 0;
        obstacles = [];

        // 방해물 설정
        if (mode === 'hard') {
            obstacles.push({x: 2, y: 2, dx: 1, dy: 1});
        } else if (mode === 'challenge') {
            obstacles.push({x: 2, y: 2, dx: 1, dy: 1});
            obstacles.push({x: 17, y: 17, dx: -1, dy: 1});
        }

        spawnAlphabets();
        updateUI();

        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        document.getElementById('game-screen').classList.add('flex');
        document.getElementById('game-over').classList.add('hidden');
        document.getElementById('victory').classList.add('hidden');
        document.getElementById('game-container').className = "border-4 border-transparent rounded-lg";

        if (gameLoop) clearInterval(gameLoop);
        gameLoop = setInterval(update, 200); // 0.2초마다 업데이트
    }

    function setDirection(newDx, newDy) {
        if (isGameOver) return;
        dirQueue.push({dx: newDx, dy: newDy});
    }

    // 키보드 조작 지원
    window.addEventListener('keydown', (e) => {
        switch(e.key) {
            case 'ArrowUp': setDirection(0, -1); break;
            case 'ArrowDown': setDirection(0, 1); break;
            case 'ArrowLeft': setDirection(-1, 0); break;
            case 'ArrowRight': setDirection(1, 0); break;
        }
    });

    function getRandomEmptyPos() {
        let x, y, isSafe;
        do {
            isSafe = true;
            x = Math.floor(Math.random() * TILE_COUNT);
            y = Math.floor(Math.random() * TILE_COUNT);

            for(let s of snake) if(s.x === x && s.y === y) isSafe = false;
            for(let a of alphabets) if(a.x === x && a.y === y) isSafe = false;
            for(let o of obstacles) if(o.x === x && o.y === y) isSafe = false;
        } while(!isSafe);
        return {x, y};
    }

    function spawnAlphabets() {
        alphabets = [];
        let correctChar = String.fromCharCode(targetCharCode);
        alphabets.push({ ...getRandomEmptyPos(), char: correctChar, isCorrect: true });

        // 오답 알파벳 3개 생성
        for(let i=0; i<3; i++) {
            let rChar;
            do {
                rChar = String.fromCharCode(65 + Math.floor(Math.random() * 26));
            } while(rChar === correctChar);
            alphabets.push({ ...getRandomEmptyPos(), char: rChar, isCorrect: false });
        }
    }

    function takeDamage() {
        if (mode === 'normal') return; // 보통 난이도는 무적
        if (invincibilityFrames > 0) return;

        hp--;
        invincibilityFrames = 10; // 약 2초간 무적
        updateUI();

        // 화면 테두리 붉게 점멸
        const container = document.getElementById('game-container');
        container.classList.remove('border-transparent');
        container.classList.add('border-red-500');
        setTimeout(() => {
            container.classList.add('border-transparent');
            container.classList.remove('border-red-500');
        }, 300);

        if (hp <= 0) {
            gameOver();
        }
    }

    function gameOver() {
        isGameOver = true;
        clearInterval(gameLoop);
        document.getElementById('game-over').classList.remove('hidden');
    }

    function gameWin() {
        isGameOver = true;
        clearInterval(gameLoop);
        document.getElementById('victory').classList.remove('hidden');
    }

    function updateUI() {
        document.getElementById('target-letter').innerText = String.fromCharCode(targetCharCode);
        document.getElementById('hp-display').innerText = hp;
    }

    function update() {
        if (isGameOver) return;

        // 1. 방해물 이동 및 충돌 검사 (뱀이 정지해 있어도 방해물은 움직임)
        obstacles.forEach(obs => {
            obs.x += obs.dx;
            obs.y += obs.dy;

            if (obs.x <= 0 || obs.x >= TILE_COUNT - 1) obs.dx *= -1;
            if (obs.y <= 0 || obs.y >= TILE_COUNT - 1) obs.dy *= -1;

            // 머리와 충돌 검사
            if (obs.x === snake[0].x && obs.y === snake[0].y) {
                takeDamage();
            }
        });

        if (invincibilityFrames > 0) invincibilityFrames--;

        // 2. 방향 처리
        if (dirQueue.length > 0) {
            let nextDir = dirQueue.shift();
            // 자기 몸통으로 되돌아가는 180도 회전 방지
            if (lastDx === 0 && lastDy === 0) {
                dx = nextDir.dx; dy = nextDir.dy;
            } else if (!(lastDx !== 0 && nextDir.dx === -lastDx) && !(lastDy !== 0 && nextDir.dy === -lastDy)) {
                dx = nextDir.dx; dy = nextDir.dy;
            }
        }

        if (dx === 0 && dy === 0) {
            draw();
            return; // 아직 안 움직임
        }

        let attemptedDx = dx;
        let attemptedDy = dy;
        let head = { x: snake[0].x + dx, y: snake[0].y + dy };

        // 3. 벽 충돌 검사
        if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
            if (mode === 'normal') {
                // 보통: 벽 통과 (반대편에서 나옴)
                if (head.x < 0) head.x = TILE_COUNT - 1;
                if (head.x >= TILE_COUNT) head.x = 0;
                if (head.y < 0) head.y = TILE_COUNT - 1;
                if (head.y >= TILE_COUNT) head.y = 0;
            } else {
                // 어려움/도전: 데미지 입고 이동 정지 (다른 방향을 눌러야 빠져나갈 수 있음)
                takeDamage();
                dx = 0; dy = 0; dirQueue = [];
                draw();
                return;
            }
        }

        // 4. 자신의 몸 충돌 검사
        let selfHit = false;
        for (let i = 0; i < snake.length; i++) {
            if (head.x === snake[i].x && head.y === snake[i].y) selfHit = true;
        }
        if (selfHit) {
            if (mode === 'normal') {
                // 보통: 자기 몸도 통과 가능 (제한 없음)
            } else {
                // 어려움/도전: 몸통 충돌 시 데미지 입고 정지
                takeDamage();
                dx = 0; dy = 0; dirQueue = [];
                draw();
                return;
            }
        }

        // 이동이 확정되었을 때만 마지막 방향 업데이트
        lastDx = attemptedDx;
        lastDy = attemptedDy;
        snake.unshift(head);

        let ateCorrect = false;

        // 5. 알파벳 먹기 처리
        for (let i = 0; i < alphabets.length; i++) {
            let a = alphabets[i];
            if (head.x === a.x && head.y === a.y) {
                if (a.isCorrect) {
                    targetCharCode++;
                    ateCorrect = true;
                    if (targetCharCode > 90) { // 'Z' 완료 시 승리
                        gameWin();
                        return;
                    }
                    spawnAlphabets();
                    updateUI();
                } else {
                    takeDamage();
                    alphabets.splice(i, 1); // 잘못된 알파벳 제거
                }
                break;
            }
        }

        // 정답을 못 먹었으면 꼬리를 잘라서 길이 유지
        if (!ateCorrect) {
            snake.pop();
        }

        draw();
    }

    function draw() {
        // 배경
        ctx.fillStyle = '#1f2937';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 격자무늬
        ctx.strokeStyle = '#374151';
        ctx.lineWidth = 1;
        for(let i=0; i<=TILE_COUNT; i++) {
            ctx.beginPath(); ctx.moveTo(i*tileW, 0); ctx.lineTo(i*tileW, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i*tileH); ctx.lineTo(canvas.width, i*tileH); ctx.stroke();
        }

        // 알파벳
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = `bold ${tileH * 0.7}px sans-serif`;
        alphabets.forEach(a => {
            ctx.fillStyle = a.isCorrect ? '#facc15' : '#9ca3af';
            ctx.fillText(a.char, a.x * tileW + tileW/2, a.y * tileH + tileH/2 + 2);
        });

        // 방해물
        obstacles.forEach(o => {
            ctx.fillStyle = '#ef4444';
            ctx.beginPath();
            ctx.arc(o.x * tileW + tileW/2, o.y * tileH + tileH/2, tileW/2 - 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#ffffff';
            ctx.font = `bold ${tileH * 0.5}px sans-serif`;
            ctx.fillText('X', o.x * tileW + tileW/2, o.y * tileH + tileH/2 + 1);
        });

        // 뱀
        snake.forEach((s, index) => {
            if (invincibilityFrames > 0 && Math.floor(Date.now() / 150) % 2 === 0) {
                ctx.fillStyle = 'rgba(74, 222, 128, 0.3)'; // 무적 깜빡임
            } else {
                ctx.fillStyle = index === 0 ? '#4ade80' : '#22c55e';
            }

            ctx.beginPath();
            ctx.roundRect(s.x * tileW + 1, s.y * tileH + 1, tileW - 2, tileH - 2, 4);
            ctx.fill();

            if (index === 0) {
                ctx.fillStyle = '#000';
                let eyeX = s.x * tileW + tileW/2;
                let eyeY = s.y * tileH + tileH/2;
                ctx.beginPath(); ctx.arc(eyeX - 3, eyeY - 3, 2, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(eyeX + 3, eyeY - 3, 2, 0, Math.PI*2); ctx.fill();
            }
        });
    }
</script>
</body>
</html>
