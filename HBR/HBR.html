<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hi Fine Bye Rhythm</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom Styles -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');

        * {
            font-family: 'Jua', sans-serif;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-drag: none;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #f8fafc; /* slate-50 */
            touch-action: manipulation;
        }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px) rotate(-3deg); }
            50% { transform: translateX(8px) rotate(3deg); }
            75% { transform: translateX(-8px) rotate(-3deg); }
        }
        .animate-shake { animation: shake 0.3s ease-in-out; }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        @keyframes bubblePop {
            0% { transform: scale(0) translateY(20px); opacity: 0; }
            60% { transform: scale(1.1) translateY(0); opacity: 1; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        .animate-bubble { animation: bubblePop 0.2s ease-out forwards; }

        /* Speech Bubble Styling */
        .speech-bubble {
            position: absolute;
            top: -50px;
            right: -60px;
            background: white;
            border-radius: 24px;
            padding: 12px 24px;
            font-size: 2.5rem;
            font-weight: bold;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
            border: 4px solid #cbd5e1;
            z-index: 30;
            transform-origin: bottom left;
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -18px;
            left: 24px;
            border-width: 18px 18px 0 0;
            border-style: solid;
            border-color: #cbd5e1 transparent transparent transparent;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 27px;
            border-width: 13px 13px 0 0;
            border-style: solid;
            border-color: white transparent transparent transparent;
            z-index: 1;
        }

        .bubble-hi { border-color: #22c55e; color: #16a34a; }
        .bubble-hi::after { border-color: #22c55e transparent transparent transparent; }

        .bubble-fine { border-color: #eab308; color: #ca8a04; }
        .bubble-fine::after { border-color: #eab308 transparent transparent transparent; }

        .bubble-bye { border-color: #ef4444; color: #dc2626; }
        .bubble-bye::after { border-color: #ef4444 transparent transparent transparent; }

        .hidden { display: none !important; }
        .btn-press { transition: transform 0.1s, box-shadow 0.1s; }
        .btn-press:active { transform: translateY(8px); box-shadow: 0 0px 0 rgba(0,0,0,0) !important; }

        .disabled-btn { filter: grayscale(100%); opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

<!-- ==========================================
     1. TITLE SCREEN
========================================== -->
<div id="title-screen" class="flex flex-col items-center justify-center w-full h-screen bg-slate-900 text-white p-4">
    <div class="mb-12 text-center animate-pop">
        <h1 class="text-5xl md:text-7xl font-bold text-white drop-shadow-lg mb-2">Hi Fine Bye</h1>
        <h1 class="text-6xl md:text-8xl font-bold text-yellow-400 drop-shadow-lg mb-4 tracking-widest">RHYTHM</h1>
        <p class="text-xl md:text-2xl text-slate-300">리듬형 기억력 게임</p>
    </div>

    <div class="flex flex-col gap-4 w-full max-w-sm">
        <button id="btn-to-stage" class="w-full py-5 bg-blue-500 text-white text-3xl rounded-2xl shadow-[0_8px_0_#1e3a8a] btn-press">
            캠페인 시작
        </button>
        <button id="btn-challenge" class="w-full py-4 bg-purple-600 text-white text-2xl rounded-2xl shadow-[0_6px_0_#4c1d95] btn-press relative overflow-hidden">
            <span id="challenge-text">도전 모드 (잠김)</span>
            <div id="challenge-lock" class="absolute inset-0 bg-black/50 flex items-center justify-center">
                <span class="text-3xl">🔒</span>
            </div>
        </button>
        <button id="btn-reset-data" class="mt-8 text-slate-500 underline text-sm">데이터 초기화</button>
    </div>
</div>

<!-- ==========================================
     2. STAGE SELECT SCREEN
========================================== -->
<div id="stage-select-screen" class="hidden flex flex-col items-center w-full h-screen bg-slate-100 p-4">
    <div class="w-full max-w-2xl flex justify-between items-center mb-6 mt-4">
        <button id="btn-back-title" class="px-4 py-2 bg-slate-300 text-slate-700 rounded-xl font-bold shadow-sm active:scale-95 transition-transform">← 뒤로</button>
        <h2 class="text-3xl font-bold text-slate-800">스테이지 선택</h2>
        <div class="w-16"></div> <!-- Balance spacing -->
    </div>

    <div id="stage-grid" class="grid grid-cols-4 sm:grid-cols-5 gap-3 md:gap-4 w-full max-w-2xl p-2 overflow-y-auto pb-10">
        <!-- JS로 생성됨 -->
    </div>
</div>

<!-- ==========================================
     3. PLAYING SCREEN
========================================== -->
<div id="playing-screen" class="hidden flex flex-col items-center w-full h-screen overflow-hidden transition-colors duration-200">

    <!-- 상단 HUD -->
    <div class="w-full max-w-lg flex justify-between items-center p-4 bg-white shadow-sm rounded-b-2xl z-10">
        <div class="flex flex-col">
            <span id="play-stage-text" class="text-lg text-slate-500 font-bold">Stage 1</span>
            <span id="play-score-text" class="text-2xl font-bold text-slate-800">0</span>
        </div>

        <div class="flex flex-col items-end">
            <div id="play-lives-container" class="flex gap-1 text-2xl">
                <span class="text-red-500">♥</span>
                <span class="text-red-500">♥</span>
                <span class="text-red-500">♥</span>
            </div>
            <span id="combo-display" class="hidden text-xl font-bold text-yellow-500 italic"><span id="combo-text">0</span> COMBO!</span>
        </div>
    </div>

    <!-- 중앙 게임 영역 -->
    <div class="flex-1 w-full max-w-lg flex flex-col items-center justify-center relative p-4">

        <!-- 상태 안내 메시지 -->
        <div id="game-status-msg" class="absolute top-4 text-3xl font-bold text-blue-600 animate-pulse bg-white/80 px-6 py-2 rounded-full shadow-sm z-20">
            잘 보고 기억하세요!
        </div>

        <!-- 피드백 O/X -->
        <div id="feedback-display" class="hidden absolute z-40 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none">
            <!-- JS Injected -->
        </div>

        <!-- 캐릭터 표시 영역 -->
        <div class="relative mt-8">
            <div id="play-char-card" class="w-48 h-48 md:w-64 md:h-64 bg-white rounded-[3rem] shadow-xl p-6 flex items-center justify-center transition-transform">
                <div id="play-char-container" class="w-full h-full flex items-center justify-center">
                    <span class="text-8xl text-slate-200">?</span>
                </div>
            </div>

            <!-- 말풍선 -->
            <div id="speech-bubble" class="hidden speech-bubble">
                HI
            </div>
        </div>

        <!-- 입력 진행도 (Dots) -->
        <div id="progress-dots" class="flex gap-3 mt-12 h-6 items-center">
            <!-- JS Injected: <div class="w-4 h-4 rounded-full bg-slate-300"></div> -->
        </div>
    </div>

    <!-- 하단 컨트롤 영역 -->
    <div id="control-area" class="w-full max-w-lg bg-white p-5 md:p-6 rounded-t-3xl shadow-[0_-10px_30px_rgba(0,0,0,0.05)] z-10 disabled-btn transition-all">

        <!-- 타이머 바 -->
        <div class="w-full h-4 bg-slate-100 rounded-full mb-4 overflow-hidden shadow-inner">
            <div id="time-bar" class="h-full bg-blue-500 rounded-full transition-all ease-linear" style="width: 100%;"></div>
        </div>

        <!-- 입력 버튼 -->
        <div class="flex gap-3">
            <button id="btn-hi" class="flex-1 py-6 bg-green-500 text-white rounded-3xl text-3xl font-bold shadow-[0_8px_0_#14532d] btn-press">
                HI
            </button>
            <button id="btn-fine" class="flex-1 py-6 bg-yellow-400 text-white rounded-3xl text-3xl font-bold shadow-[0_8px_0_#b45309] btn-press">
                FINE
            </button>
            <button id="btn-bye" class="flex-1 py-6 bg-red-500 text-white rounded-3xl text-3xl font-bold shadow-[0_8px_0_#7f1d1d] btn-press">
                BYE
            </button>
        </div>
    </div>
</div>

<!-- ==========================================
     4. RESULT SCREEN (Clear / Game Over)
========================================== -->
<div id="result-screen" class="hidden flex flex-col items-center justify-center w-full h-screen bg-black/80 text-white p-4 absolute top-0 left-0 z-50 backdrop-blur-sm">
    <div id="result-box" class="text-center bg-white p-8 md:p-10 rounded-3xl shadow-2xl animate-pop w-full max-w-sm border-4 border-slate-200">

        <h2 id="result-title" class="text-5xl font-bold mb-2">Stage Clear!</h2>
        <p id="result-desc" class="text-lg text-slate-500 mb-6 font-bold">참 잘했어요!</p>

        <!-- 별점 표시 영역 -->
        <div id="result-stars" class="flex justify-center gap-2 mb-6 text-5xl">
            <span class="text-slate-300">★</span>
            <span class="text-slate-300">★</span>
            <span class="text-slate-300">★</span>
        </div>

        <div class="bg-slate-100 rounded-2xl p-4 mb-8 text-slate-700">
            <div class="text-xl mb-2 flex justify-between font-bold"><span>점수:</span> <span id="result-score" class="text-blue-600">0</span></div>
            <div class="text-xl flex justify-between font-bold"><span>최대 콤보:</span> <span id="result-combo" class="text-yellow-600">0</span></div>
        </div>

        <div class="flex flex-col gap-3">
            <button id="btn-next" class="w-full py-4 bg-green-500 text-white text-2xl font-bold rounded-2xl shadow-[0_6px_0_#14532d] btn-press">
                다음 스테이지
            </button>
            <div class="flex gap-3 w-full">
                <button id="btn-retry" class="flex-1 py-3 bg-blue-500 text-white text-xl font-bold rounded-2xl shadow-[0_4px_0_#1e3a8a] btn-press">
                    다시하기
                </button>
                <button id="btn-home" class="flex-1 py-3 bg-slate-500 text-white text-xl font-bold rounded-2xl shadow-[0_4px_0_#334155] btn-press">
                    메뉴로
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // --- 캐릭터 데이터 (HB.html 에셋 재활용 + 이모지 폴백) ---
    const CHARACTERS = [
        { id: 'angel', emoji: '👼' }, { id: 'cerberus', emoji: '🐺' }, { id: 'cowboy', emoji: '🤠' },
        { id: 'cyclops', emoji: '👁️' }, { id: 'elf', emoji: '🧝' }, { id: 'fairy', emoji: '🧚' },
        { id: 'faun', emoji: '🐾' }, { id: 'geisha', emoji: '🎎' }, { id: 'genie', emoji: '🧞' },
        { id: 'gnome', emoji: '🧙' }, { id: 'goblin', emoji: '👺' }, { id: 'godzilla', emoji: '🦖' },
        { id: 'grim-reaper', emoji: '💀' }, { id: 'haunted', emoji: '🌳' }, { id: 'jackalope', emoji: '🐇' },
        { id: 'king', emoji: '👑' }, { id: 'knight', emoji: '⚔️' }, { id: 'krampus', emoji: '🎄' },
        { id: 'leprechaun', emoji: '🍀' }, { id: 'loch-ness-monster', emoji: '🦕' }, { id: 'medusa', emoji: '🐍' },
        { id: 'oni', emoji: '👹' }, { id: 'princess-blue', emoji: '👸' }, { id: 'princess-pink', emoji: '🫅' },
        { id: 'red-riding-hood', emoji: '🧣' }, { id: 'robot', emoji: '🤖' }, { id: 'spartan', emoji: '🛡️' },
        { id: 'sphynx', emoji: '🦁' }, { id: 'superhero', emoji: '🦸' }, { id: 'ufo', emoji: '🛸' },
        { id: 'vampire', emoji: '🧛' }, { id: 'werewolf', emoji: '🐺' }, { id: 'zombie', emoji: '🧟' }
    ];

    // --- 전역 상태 ---
    let state = {
        maxStage: 1,      // 해금된 최대 스테이지 (1~20)
        stars: {},        // 스테이지별 획득 별 { '1': 3, '2': 2 ... }

        mode: 'campaign', // 'campaign' | 'challenge'
        currentStage: 1,

        lives: 3,
        score: 0,
        combo: 0,
        maxCombo: 0,

        pattern: [],      // 현재 스테이지의 정답 패턴 ['HI', 'FINE', 'BYE'...]
        inputIndex: 0,    // 플레이어가 입력해야 할 현재 위치

        isPlaying: false, // 현재 게임이 진행 중인가?
        phase: 'ready',   // 'ready' | 'presenting' | 'inputting'

        timerId: null,
        animFrameId: null,
        startTime: 0,
        timeLimit: 0,
        timeLeftRatio: 100
    };

    // --- 사운드 효과 (Web Audio API 활용 - 틱, 팝 등 간단한 소리) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playTone(freq, type, duration, vol=0.1) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }
    const SFX = {
        pop: () => playTone(600, 'sine', 0.1, 0.1),
        hi: () => playTone(523.25, 'triangle', 0.15, 0.1), // C5
        fine: () => playTone(659.25, 'triangle', 0.15, 0.1), // E5
        bye: () => playTone(783.99, 'triangle', 0.15, 0.1), // G5
        correct: () => playTone(880, 'sine', 0.1, 0.1),
        wrong: () => { playTone(200, 'sawtooth', 0.3, 0.1); playTone(150, 'sawtooth', 0.4, 0.1); },
        clear: () => { playTone(523.25,'sine',0.1); setTimeout(()=>playTone(659.25,'sine',0.1),100); setTimeout(()=>playTone(783.99,'sine',0.3),200); }
    };

    // --- 로컬 스토리지 데이터 로드/세이브 ---
    function loadData() {
        const saved = localStorage.getItem('HiFineBye_Data');
        if (saved) {
            const data = JSON.parse(saved);
            state.maxStage = data.maxStage || 1;
            state.stars = data.stars || {};
        }
        updateChallengeLock();
    }
    function saveData() {
        localStorage.setItem('HiFineBye_Data', JSON.stringify({
            maxStage: state.maxStage,
            stars: state.stars
        }));
    }

    function updateChallengeLock() {
        const btn = document.getElementById('btn-challenge');
        const lock = document.getElementById('challenge-lock');
        const text = document.getElementById('challenge-text');

        if (state.maxStage > 20) {
            lock.classList.add('hidden');
            text.innerText = "도전 모드 (무한)";
            btn.classList.replace('bg-purple-600', 'bg-fuchsia-500');
            btn.classList.replace('shadow-[0_6px_0_#4c1d95]', 'shadow-[0_6px_0_#a21caf]');
        } else {
            lock.classList.remove('hidden');
            text.innerText = "도전 모드 (20 클리어 시 해금)";
        }
    }

    // --- 헬퍼 함수 ---
    function switchScreen(screenId) {
        ['title', 'stage-select', 'playing'].forEach(id => {
            document.getElementById(`${id}-screen`).classList.add('hidden');
        });
        document.getElementById('result-screen').classList.add('hidden');
        if(screenId) document.getElementById(`${screenId}-screen`).classList.remove('hidden');
    }

    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

    function triggerAnim(el, animClass) {
        el.classList.remove(animClass);
        void el.offsetWidth;
        el.classList.add(animClass);
    }

    function getRandomChar() {
        return CHARACTERS[Math.floor(Math.random() * CHARACTERS.length)];
    }

    // --- 스테이지 난이도 데이터 생성 ---
    function getStageConfig(stage) {
        if (state.mode === 'challenge') {
            // 무한 도전 모드: 스테이지 번호가 높을수록 계속 어려워짐
            let len = 4 + Math.floor(stage / 3);
            let spd = Math.max(300, 800 - (stage * 30));
            let tm = Math.max(3000, 5000 + (len * 500) - (stage * 100));
            return { length: Math.min(len, 15), words: ['HI', 'FINE', 'BYE'], speed: spd, timeLimit: tm };
        }

        // A안 캠페인 기준 1~20 밸런싱
        let length = 2;
        let words = ['HI', 'BYE'];
        let speed = 1000; // ms (말풍선 보여주는 속도)
        let timeLimit = 5000; // ms (입력 제한 시간)

        if (stage >= 2) words = ['HI', 'FINE', 'BYE'];

        if (stage >= 3) length = 3;
        if (stage >= 4) speed = 900;

        if (stage >= 6) { length = 4; speed = 850; timeLimit = 6000; }
        if (stage >= 8) speed = 750;
        if (stage >= 10) { length = 5; speed = 700; timeLimit = 7000; }

        if (stage >= 11) speed = 650;
        if (stage >= 13) { timeLimit = 6000; }
        if (stage >= 15) { length = 6; speed = 600; timeLimit = 7500; }

        if (stage >= 17) { speed = 500; timeLimit = 6500; }
        if (stage >= 19) { length = 7; speed = 450; timeLimit = 7000; }
        if (stage === 20) { length = 7; speed = 400; timeLimit = 6000; } // 최종장

        return { length, words, speed, timeLimit };
    }

    function generatePattern(config) {
        let pattern = [];
        for(let i=0; i<config.length; i++) {
            // 연속 같은 단어 3번 이상 방지 로직
            let word;
            do {
                word = config.words[Math.floor(Math.random() * config.words.length)];
            } while (i >= 2 && pattern[i-1] === word && pattern[i-2] === word);
            pattern.push(word);
        }
        return pattern;
    }

    // --- UI 업데이트 ---
    function updateHUD() {
        document.getElementById('play-stage-text').innerText = state.mode === 'challenge' ? `SURVIVAL ${state.currentStage}` : `Stage ${state.currentStage}`;
        document.getElementById('play-score-text').innerText = state.score;

        // Lives
        const livesCont = document.getElementById('play-lives-container');
        livesCont.innerHTML = '';
        for(let i=0; i<3; i++) {
            livesCont.innerHTML += `<span class="${i < state.lives ? 'text-red-500' : 'text-slate-200'}">♥</span>`;
        }

        // Combo
        const comboEl = document.getElementById('combo-display');
        if (state.combo >= 2) {
            comboEl.classList.remove('hidden');
            document.getElementById('combo-text').innerText = state.combo;
            triggerAnim(comboEl, 'animate-pop');
        } else {
            comboEl.classList.add('hidden');
        }
    }

    function renderProgressDots() {
        const cont = document.getElementById('progress-dots');
        cont.innerHTML = '';
        for(let i=0; i<state.pattern.length; i++) {
            const dot = document.createElement('div');
            dot.className = "w-4 h-4 md:w-5 md:h-5 rounded-full bg-slate-200 transition-colors duration-200 shadow-inner";
            dot.id = `dot-${i}`;
            cont.appendChild(dot);
        }
    }

    function updateProgressDots() {
        for(let i=0; i<state.pattern.length; i++) {
            const dot = document.getElementById(`dot-${i}`);
            if(!dot) continue;

            dot.className = "w-4 h-4 md:w-5 md:h-5 rounded-full transition-colors duration-200 shadow-md";
            if (i < state.inputIndex) {
                // 채워진 색상
                const word = state.pattern[i];
                if(word === 'HI') dot.classList.add('bg-green-500');
                if(word === 'FINE') dot.classList.add('bg-yellow-400');
                if(word === 'BYE') dot.classList.add('bg-red-500');
            } else if (i === state.inputIndex && state.phase === 'inputting') {
                // 현재 입력해야 할 칸 깜빡임
                dot.classList.add('bg-blue-400', 'animate-pulse');
            } else {
                // 대기
                dot.classList.add('bg-slate-200', 'shadow-inner');
            }
        }
    }

    function setStatusMsg(text, colorClass="text-blue-600") {
        const msg = document.getElementById('game-status-msg');
        msg.innerText = text;
        msg.className = `absolute top-4 text-2xl md:text-3xl font-bold animate-pulse bg-white/90 px-6 py-2 rounded-full shadow-sm z-20 ${colorClass}`;
    }

    // --- 게임 로직 ---
    function startStage(stageNum) {
        state.currentStage = stageNum;
        if(state.mode === 'campaign') {
            state.score = 0; // 캠페인은 스테이지마다 점수 초기화
            state.combo = 0;
            state.lives = 3;
        }
        // 챌린지 모드는 점수/생명력 유지

        state.maxCombo = 0;
        state.isPlaying = true;

        switchScreen('playing');

        // FINE 버튼 숨김/표시 처리 (1스테이지는 HI, BYE만)
        const config = getStageConfig(stageNum);
        document.getElementById('btn-fine').classList.toggle('hidden', !config.words.includes('FINE'));

        playRound();
    }

    async function playRound() {
        if (!state.isPlaying) return;

        state.phase = 'ready';
        document.getElementById('control-area').classList.add('disabled-btn');
        document.getElementById('time-bar').style.width = '100%';

        const config = getStageConfig(state.currentStage);
        state.pattern = generatePattern(config);
        state.inputIndex = 0;

        updateHUD();
        renderProgressDots();
        setStatusMsg("잘 보고 기억하세요!", "text-blue-600");

        // 초기 딜레이
        await sleep(1000);

        // --- 패턴 제시 (Presenting Phase) ---
        state.phase = 'presenting';
        const charContainer = document.getElementById('play-char-container');
        const bubble = document.getElementById('speech-bubble');

        for (let i = 0; i < state.pattern.length; i++) {
            if (!state.isPlaying) break;

            const word = state.pattern[i];
            const char = getRandomChar();

            // 캐릭터 표시 (이미지 대신 이모지 사용으로 안정성 확보)
            charContainer.innerHTML = `<span class="text-7xl md:text-8xl drop-shadow-md animate-pop">${char.emoji}</span>`;

            // 말풍선 표시
            bubble.innerText = word;
            bubble.className = `speech-bubble animate-bubble bubble-${word.toLowerCase()}`;
            bubble.classList.remove('hidden');

            // 사운드
            if(word==='HI') SFX.hi(); else if(word==='FINE') SFX.fine(); else SFX.bye();

            // 보여주는 시간
            await sleep(config.speed * 0.7);

            // 숨기기
            charContainer.innerHTML = '';
            bubble.classList.add('hidden');

            // 간격
            await sleep(config.speed * 0.3);
        }

        if(state.isPlaying) {
            startInputPhase(config.timeLimit);
        }
    }

    function startInputPhase(timeLimit) {
        state.phase = 'inputting';
        document.getElementById('control-area').classList.remove('disabled-btn');
        setStatusMsg("순서대로 따라하세요!", "text-green-600");
        updateProgressDots();

        // 타이머 시작
        state.timeLimit = timeLimit;
        state.startTime = performance.now();
        state.timeLeftRatio = 100;

        if (state.animFrameId) cancelAnimationFrame(state.animFrameId);
        state.animFrameId = requestAnimationFrame(updateTimer);
    }

    function updateTimer(timestamp) {
        if (state.phase !== 'inputting' || !state.isPlaying) return;

        const elapsed = timestamp - state.startTime;
        const remaining = state.timeLimit - elapsed;
        state.timeLeftRatio = Math.max(0, (remaining / state.timeLimit) * 100);

        const bar = document.getElementById('time-bar');
        bar.style.width = `${state.timeLeftRatio}%`;

        if (state.timeLeftRatio < 30) {
            bar.classList.replace('bg-blue-500', 'bg-red-500');
            bar.classList.replace('bg-green-500', 'bg-red-500');
        } else {
            bar.classList.replace('bg-red-500', 'bg-blue-500');
        }

        if (remaining <= 0) {
            handleMiss('TIME OUT');
        } else {
            state.animFrameId = requestAnimationFrame(updateTimer);
        }
    }

    // 버튼 클릭/키보드 입력 처리
    function handleInput(word) {
        if (state.phase !== 'inputting' || !state.isPlaying) return;

        const expected = state.pattern[state.inputIndex];

        // 버튼 피드백 효과 임시 생성 (화면 중앙 캐릭터 영역에 작게 표시)
        const charCont = document.getElementById('play-char-container');
        charCont.innerHTML = `<span class="text-6xl font-bold ${word==='HI'?'text-green-500':word==='FINE'?'text-yellow-400':'text-red-500'} animate-pop">${word}</span>`;

        if (word === expected) {
            // 정답
            SFX.pop();
            state.inputIndex++;
            state.combo++;
            if(state.combo > state.maxCombo) state.maxCombo = state.combo;

            // 점수 계산 (빠를수록 높은 보너스)
            const timeBonus = Math.floor(state.timeLeftRatio / 2);
            state.score += 100 + (state.combo * 10) + timeBonus;

            updateHUD();
            updateProgressDots();

            if (state.inputIndex >= state.pattern.length) {
                // 라운드/스테이지 성공
                cancelAnimationFrame(state.animFrameId);
                handleRoundClear();
            }
        } else {
            // 오답
            handleMiss('MISS');
        }
    }

    function showFeedback(type) {
        const fb = document.getElementById('feedback-display');
        fb.classList.remove('hidden');
        if(type === 'MISS' || type === 'TIME OUT') {
            fb.innerHTML = `<span class="text-9xl text-red-500 drop-shadow-lg font-bold">X</span><div class="text-3xl text-red-600 bg-white/80 px-4 rounded-xl font-bold mt-2">${type}</div>`;
            triggerAnim(fb, 'animate-pop');
            triggerAnim(document.getElementById('playing-screen'), 'animate-shake');
            SFX.wrong();
        } else if(type === 'CLEAR') {
            fb.innerHTML = `<span class="text-9xl text-green-400 drop-shadow-lg font-bold">O</span>`;
            triggerAnim(fb, 'animate-pop');
            SFX.correct();
        }
        setTimeout(() => { fb.classList.add('hidden'); }, 800);
    }

    function handleMiss(reason) {
        cancelAnimationFrame(state.animFrameId);
        state.phase = 'ready'; // 입력 차단
        document.getElementById('control-area').classList.add('disabled-btn');

        state.combo = 0;
        state.lives--;
        updateHUD();
        showFeedback(reason);

        if (state.lives <= 0) {
            setTimeout(() => { showResultScreen(false); }, 1000);
        } else {
            // 생명이 남았다면 잠시 후 현재 라운드 패턴 재제시
            setStatusMsg("다시 한 번!", "text-red-500");
            setTimeout(() => { playRound(); }, 1500);
        }
    }

    function handleRoundClear() {
        state.phase = 'ready';
        document.getElementById('control-area').classList.add('disabled-btn');
        showFeedback('CLEAR');

        if (state.mode === 'challenge') {
            // 무한 모드는 바로 다음 라운드로
            state.currentStage++;
            state.lives = Math.min(3, state.lives + 1); // 보너스 생명
            setTimeout(() => { playRound(); }, 1500);
        } else {
            // 캠페인 모드는 결과 화면 출력
            setTimeout(() => { showResultScreen(true); }, 1000);
        }
    }

    function showResultScreen(isClear) {
        state.isPlaying = false;
        SFX.clear();

        const resBox = document.getElementById('result-box');
        const title = document.getElementById('result-title');
        const desc = document.getElementById('result-desc');
        const scoreEl = document.getElementById('result-score');
        const comboEl = document.getElementById('result-combo');
        const starsCont = document.getElementById('result-stars');
        const btnNext = document.getElementById('btn-next');

        document.getElementById('result-screen').classList.remove('hidden');
        triggerAnim(resBox, 'animate-pop');

        scoreEl.innerText = state.score;
        comboEl.innerText = state.maxCombo;

        // 별점 계산
        let earnedStars = 0;
        if (isClear) {
            if (state.lives === 3) earnedStars = 3;
            else if (state.lives === 2) earnedStars = 2;
            else earnedStars = 1;
        }

        starsCont.innerHTML = '';
        for(let i=1; i<=3; i++) {
            starsCont.innerHTML += `<span class="${i <= earnedStars ? 'text-yellow-400 drop-shadow-md' : 'text-slate-300'}">★</span>`;
        }

        if (isClear) {
            title.innerText = state.mode === 'challenge' ? "GAME OVER" : "Stage Clear!";
            title.className = "text-5xl font-bold mb-2 text-green-500";
            desc.innerText = state.lives === 3 ? "퍼펙트! 완벽해요!" : "잘했어요!";
            btnNext.classList.remove('hidden');

            // 데이터 저장 (캠페인일 때만)
            if (state.mode === 'campaign') {
                if (state.currentStage === state.maxStage && state.maxStage < 20) {
                    state.maxStage++;
                } else if (state.currentStage === 20 && state.maxStage === 20) {
                    state.maxStage = 21; // 21은 도전모드 해금 의미
                    desc.innerText = "모든 캠페인 완료! 도전 모드가 열렸습니다!";
                }

                // 최고 별점 갱신
                const prevStars = state.stars[state.currentStage] || 0;
                if (earnedStars > prevStars) {
                    state.stars[state.currentStage] = earnedStars;
                }
                saveData();
            } else {
                // 도전 모드 클리어(라는 건 없음, 무한이므로 여기 올 일은 죽었을 때뿐)
            }
        } else {
            title.innerText = "Game Over";
            title.className = "text-5xl font-bold mb-2 text-red-500";
            desc.innerText = state.mode === 'challenge' ? `Survive: Stage ${state.currentStage}` : "아쉽네요. 다시 도전해보세요!";
            btnNext.classList.add('hidden');
            earnedStars = 0;
        }

        // 챌린지 모드 죽었을 때
        if (state.mode === 'challenge') {
            title.innerText = "기록 달성!";
            title.className = "text-4xl font-bold mb-2 text-purple-500";
            desc.innerText = `${state.currentStage} 스테이지까지 생존했습니다!`;
            btnNext.classList.add('hidden');
            starsCont.innerHTML = '🔥'.repeat(Math.min(3, Math.floor(state.currentStage/5) || 1));
        }
    }

    // --- 스테이지 선택 화면 렌더링 ---
    function renderStageSelect() {
        const grid = document.getElementById('stage-grid');
        grid.innerHTML = '';

        for (let i = 1; i <= 20; i++) {
            const isUnlocked = i <= state.maxStage;
            const stars = state.stars[i] || 0;

            const btn = document.createElement('button');
            btn.className = `flex flex-col items-center justify-center p-3 rounded-2xl border-b-4 transition-transform active:scale-95 ${
                isUnlocked
                    ? 'bg-white border-slate-300 shadow-sm hover:bg-blue-50 text-slate-700'
                    : 'bg-slate-200 border-slate-300 text-slate-400 opacity-70 pointer-events-none'
            }`;

            const num = document.createElement('div');
            num.className = "text-2xl font-bold mb-1";
            num.innerText = i;
            btn.appendChild(num);

            const starCont = document.createElement('div');
            starCont.className = "flex gap-0.5 text-xs md:text-sm";
            if (isUnlocked && stars > 0) {
                for(let s=1; s<=3; s++) {
                    starCont.innerHTML += `<span class="${s <= stars ? 'text-yellow-400' : 'text-slate-300'}">★</span>`;
                }
            } else if (!isUnlocked) {
                starCont.innerHTML = '<span>🔒</span>';
            } else {
                starCont.innerHTML = '<span class="text-transparent">★</span>'; // spacing
            }
            btn.appendChild(starCont);

            if(isUnlocked) {
                btn.onclick = () => {
                    state.mode = 'campaign';
                    startStage(i);
                };
            }

            grid.appendChild(btn);
        }
    }

    // --- 이벤트 리스너 바인딩 ---
    document.getElementById('btn-to-stage').onclick = () => {
        audioCtx.resume();
        renderStageSelect();
        switchScreen('stage-select');
    };

    document.getElementById('btn-challenge').onclick = () => {
        audioCtx.resume();
        if (state.maxStage > 20) {
            state.mode = 'challenge';
            state.score = 0;
            state.lives = 3;
            startStage(1);
        } else {
            triggerAnim(document.getElementById('btn-challenge'), 'animate-shake');
        }
    };

    document.getElementById('btn-back-title').onclick = () => switchScreen('title');

    document.getElementById('btn-home').onclick = () => {
        updateChallengeLock();
        switchScreen('title');
    };

    document.getElementById('btn-retry').onclick = () => {
        document.getElementById('result-screen').classList.add('hidden');
        if (state.mode === 'challenge') {
            state.score = 0;
            state.lives = 3;
            startStage(1);
        } else {
            startStage(state.currentStage);
        }
    };

    document.getElementById('btn-next').onclick = () => {
        document.getElementById('result-screen').classList.add('hidden');
        if (state.currentStage < 20) {
            startStage(state.currentStage + 1);
        } else {
            switchScreen('title');
        }
    };

    document.getElementById('btn-reset-data').onclick = () => {
        if(confirm('모든 진행 데이터를 초기화하시겠습니까?')) {
            localStorage.removeItem('HiFineBye_Data');
            state.maxStage = 1;
            state.stars = {};
            updateChallengeLock();
            alert('초기화되었습니다.');
        }
    };

    // 게임 입력 버튼
    document.getElementById('btn-hi').onclick = () => handleInput('HI');
    document.getElementById('btn-fine').onclick = () => handleInput('FINE');
    document.getElementById('btn-bye').onclick = () => handleInput('BYE');

    // 키보드 입력
    document.addEventListener('keydown', (e) => {
        if (state.phase === 'inputting' && state.isPlaying) {
            if (e.key === 'ArrowLeft') handleInput('HI');
            else if (e.key === 'ArrowDown' || e.key === ' ') {
                if(!document.getElementById('btn-fine').classList.contains('hidden')) handleInput('FINE');
            }
            else if (e.key === 'ArrowRight') handleInput('BYE');
        }
    });

    // 초기화
    window.onload = () => {
        loadData();
    };

</script>
</body>
</html>
