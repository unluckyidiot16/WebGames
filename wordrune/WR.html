<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>워드룬 — 알파벳 IDLE</title>
<!-- Pixel art: Matheus Tanuri / Marth (MiniRogue Dungeon, itch.io) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #0a0a0e; color: #eee;
    font-family: 'Jua', sans-serif;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden; height: 100%;
  }
  body { display: flex; align-items: center; justify-content: center; }

  #game {
    width: 100%; max-width: 480px; height: 100vh; max-height: 900px;
    background: linear-gradient(180deg, #1a1620 0%, #0a0a0e 100%);
    display: flex; flex-direction: column;
    box-shadow: 0 0 40px rgba(255,100,50,0.1);
    position: relative;
  }

  /* HUD */
  #hud {
    padding: 10px 14px; background: rgba(0,0,0,0.4);
    border-bottom: 1px solid #2a2030;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px;
  }
  .hud-stage {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px; color: #ffaa44; cursor: pointer;
  }
  .hud-stats { display: flex; gap: 8px; font-size: 13px; }
  .stat-pill {
    padding: 3px 8px; border-radius: 10px;
    background: rgba(255,255,255,0.06);
  }
  .stat-pill .label { color: #888; margin-right: 4px; font-size: 10px; }
  .stat-pill .val { font-weight: bold; font-size: 12px; }
  .stat-pill.atk .val { color: #ff6a4a; }
  .stat-pill.def .val { color: #6aaeff; }
  .stat-pill.hp  .val { color: #6aff8a; }

  /* 픽셀 아이콘 (icons atlas) */
  .pixicon {
    display: inline-block; width: 14px; height: 14px;
    background-image: url('assets/icons/icons.png');
    background-repeat: no-repeat;
    background-size: 112px 42px; /* 1/2.28 scale of 256x96 */
    vertical-align: middle;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    margin-right: 3px;
  }
  /* atlas 8x3 grid, cell 32x32 → 14x14 scale */
  .pixicon.hp   { background-position: -28px 0px; }    /* row0 col2 heart */
  .pixicon.atk  { background-position: -84px 0px; }    /* row0 col6 sword */
  .pixicon.def  { background-position: -84px -14px; }  /* row1 col6 shield */
  .pixicon.book { background-position: 0px 0px; }      /* row0 col0 */
  .pixicon.gold { background-position: -42px 0px; }    /* row0 col3 */

  /* Combat */
  #combatWrap {
    position: relative; flex: 0 0 200px;
    background: linear-gradient(180deg, #2a1a2e 0%, #4a2a3e 60%, #2a1a1e 100%);
    border-bottom: 2px solid #4a2030; overflow: hidden;
  }
  #combatCanvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }

  .dmg-pop {
    position: absolute; font-family: 'Press Start 2P', monospace;
    font-size: 11px; pointer-events: none;
    text-shadow: 1px 1px 0 #000;
    animation: dmgFloat 0.8s ease-out forwards;
  }
  .dmg-pop.player { color: #ffe066; }
  .dmg-pop.enemy  { color: #ff6a6a; }
  .dmg-pop.spell  { color: #ff44ff; font-size: 13px; font-weight: bold; }
  .dmg-pop.crit   { color: #ffaa00; font-size: 15px; font-weight: bold; }
  @keyframes dmgFloat {
    0% { transform: translateY(0) scale(0.8); opacity: 0; }
    20% { transform: translateY(-10px) scale(1.2); opacity: 1; }
    100% { transform: translateY(-40px) scale(1); opacity: 0; }
  }

  .spell-cast {
    position: absolute; font-family: 'Press Start 2P', monospace;
    font-size: 12px; pointer-events: none;
    text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
    animation: spellCast 0.6s ease-out forwards;
    font-weight: bold;
  }
  @keyframes spellCast {
    0% { transform: translateY(0) scale(0.5); opacity: 0; }
    30% { transform: translateY(-5px) scale(1.4); opacity: 1; }
    100% { transform: translateY(-30px) scale(1); opacity: 0; }
  }

  .loot-pop {
    position: absolute; padding: 4px 8px; border-radius: 4px;
    font-size: 11px; background: rgba(0,0,0,0.7);
    border: 1px solid; pointer-events: none;
    animation: lootFloat 1.2s ease-out forwards;
    white-space: nowrap;
  }
  @keyframes lootFloat {
    0% { transform: translateY(0); opacity: 0; }
    20% { transform: translateY(-8px); opacity: 1; }
    100% { transform: translateY(-40px); opacity: 0; }
  }

  /* Tabs */
  #tabs {
    display: flex; background: rgba(0,0,0,0.5);
    border-bottom: 1px solid #2a2030;
  }
  .tab {
    flex: 1; padding: 10px; text-align: center;
    cursor: pointer; font-size: 13px; color: #777;
    border-bottom: 2px solid transparent;
    transition: all 0.15s; user-select: none; position: relative;
  }
  .tab.active { color: #ffaa44; border-bottom-color: #ffaa44; background: rgba(255,170,68,0.05); }
  .tab .badge {
    display: inline-block; background: #ff5a3a; color: #fff;
    font-size: 10px; padding: 1px 5px; border-radius: 8px;
    margin-left: 4px; vertical-align: middle;
  }

  #tabContent {
    flex: 1; overflow-y: auto; padding: 12px;
    background: rgba(0,0,0,0.2);
    -webkit-overflow-scrolling: touch;
  }

  /* Alphabet grid */
  .alpha-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .alpha-cell {
    aspect-ratio: 1; background: rgba(255,255,255,0.04);
    border: 1px solid #2a2030; border-radius: 4px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Press Start 2P', monospace; position: relative;
    user-select: none; -webkit-user-select: none;
  }
  .alpha-cell.has { background: rgba(255,170,68,0.1); border-color: #ffaa44; cursor: grab; }
  .alpha-cell.has:active { transform: scale(0.95); cursor: grabbing; }
  .alpha-cell.dragging { opacity: 0.4; }
  .alpha-cell .letter { font-size: 12px; color: #ddd; }
  .alpha-cell.has .letter { color: #ffd28a; }
  .alpha-cell .count {
    position: absolute; bottom: 1px; right: 3px;
    font-size: 9px; color: #888;
  }
  .alpha-cell.has .count { color: #ffaa44; }
  .alpha-cell .equip-hint {
    position: absolute; top: 1px; left: 3px;
    font-size: 8px; color: #88aaff;
    font-family: 'Jua';
  }
  .alpha-cell .disassemble-btn {
    position: absolute; top: -4px; right: -4px;
    width: 16px; height: 16px;
    background: #4a2a1a; border: 1px solid #6a3a2a;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; cursor: pointer;
    opacity: 0; transition: opacity 0.15s;
    z-index: 2;
  }
  .alpha-cell:hover .disassemble-btn,
  .alpha-cell.has .disassemble-btn { opacity: 0.8; }
  .alpha-cell .disassemble-btn:hover { opacity: 1; transform: scale(1.1); }

  /* 합성 슬롯 */
  .compose-box {
    margin: 14px 0;
    padding: 12px;
    background: linear-gradient(180deg, rgba(255,170,68,0.06), rgba(255,170,68,0.02));
    border: 1px solid #4a3020;
    border-radius: 6px;
  }
  .compose-box .title {
    font-family: 'Jua'; font-size: 13px; color: #ffaa44;
    margin-bottom: 10px; text-align: center;
  }
  .compose-slots {
    display: flex; gap: 5px; justify-content: center;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .word-slot {
    width: 44px; height: 44px;
    flex: 0 0 44px;
    border: 2px dashed #4a3020;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Press Start 2P', monospace;
    font-size: 16px; color: #ffd28a;
    background: rgba(0,0,0,0.3);
    user-select: none; -webkit-user-select: none;
    transition: all 0.15s;
    box-sizing: border-box;
  }
  .word-slot.filled {
    background: rgba(255,170,68,0.15);
    border: 2px solid #ffaa44;
    cursor: pointer;
  }
  .word-slot.filled:active { transform: scale(0.9); }
  .word-slot.drag-over {
    background: rgba(100,255,150,0.2);
    border: 2px solid #6aff8a;
    transform: scale(1.05);
  }
  .compose-actions {
    display: flex; gap: 6px; justify-content: center;
  }
  .compose-actions button {
    padding: 7px 14px;
    border-radius: 4px; cursor: pointer;
    font-family: 'Jua'; font-size: 12px;
    border: none;
  }
  .compose-actions .btn-compose {
    background: linear-gradient(180deg, #2a8a4a, #155a25);
    color: #fff;
    border-bottom: 2px solid #052a05;
    font-weight: bold;
  }
  .compose-actions .btn-compose:disabled {
    background: #2a2a2a; color: #555; cursor: not-allowed;
  }
  .compose-actions .btn-clear {
    background: rgba(255,255,255,0.08);
    color: #aaa;
    border: 1px solid #3a2a30;
  }

  /* 직업 카드 */
  .class-card-mini {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    background: linear-gradient(180deg, rgba(170,140,68,0.10), rgba(170,140,68,0.02));
    border: 1px solid #4a3020;
    border-radius: 6px;
    cursor: pointer;
    margin-bottom: 14px;
    user-select: none;
    transition: all 0.15s;
  }
  .class-card-mini:active { transform: scale(0.98); }
  .class-card-mini:hover { border-color: #ffaa44; }
  .class-card-mini .icon { font-size: 22px; }
  .class-card-mini .info { flex: 1; }
  .class-card-mini .cname { font-family: 'Jua'; font-size: 13px; color: #ffd28a; }
  .class-card-mini .passive { font-size: 10px; color: #aaa; margin-top: 2px; }
  .class-card-mini .change-hint { font-size: 10px; color: #666; }

  /* 직업 선택 모달 그리드 */
  .class-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    margin-bottom: 12px;
  }
  .class-card {
    padding: 12px 8px;
    background: rgba(255,255,255,0.04);
    border: 2px solid #2a2030;
    border-radius: 6px;
    cursor: pointer;
    text-align: center;
    user-select: none;
    position: relative;
    transition: all 0.15s;
  }
  .class-card:hover { border-color: #ffaa44; transform: translateY(-2px); }
  .class-card.current {
    background: rgba(255,170,68,0.12);
    border-color: #ffaa44;
    box-shadow: 0 0 8px rgba(255,170,68,0.3);
  }
  .class-card.locked {
    opacity: 0.55;
    cursor: not-allowed;
  }
  .class-card.locked:hover { border-color: #2a2030; transform: none; }
  .class-card .ce { font-size: 28px; margin-bottom: 4px; }
  .class-card .cn { font-family: 'Jua'; font-size: 14px; color: #ffd28a; margin-bottom: 2px; }
  .class-card .cd { font-size: 10px; color: #888; margin-bottom: 6px; line-height: 1.3; min-height: 26px; }
  .class-card .cs {
    font-size: 10px; color: #aaa;
    display: flex; gap: 5px; justify-content: center;
    flex-wrap: wrap;
  }
  .class-card .cs .stat { padding: 1px 4px; background: rgba(0,0,0,0.4); border-radius: 3px; }
  .class-card .lock-overlay {
    position: absolute; top: 4px; right: 6px;
    font-size: 11px; color: #aa6a6a;
  }
  .class-card .unlock-bar {
    margin-top: 6px;
    height: 3px; background: rgba(0,0,0,0.5);
    border-radius: 2px; overflow: hidden;
  }
  .class-card .unlock-fill {
    height: 100%; background: linear-gradient(90deg, #ffaa44, #ff6a44);
    transition: width 0.3s;
  }
  .class-card .unlock-text {
    font-size: 9px; color: #aa6a6a; margin-top: 3px;
  }
  .class-card .passive-text {
    font-size: 10px; color: #aaff88; margin-top: 4px;
    min-height: 14px;
  }
  .class-card.current .current-badge {
    position: absolute; top: -8px; left: 50%;
    transform: translateX(-50%);
    padding: 2px 8px;
    background: #ffaa44; color: #1a0a0a;
    border-radius: 8px; font-size: 9px; font-weight: bold;
    font-family: 'Press Start 2P', monospace;
  }

  /* Equipment list */
  .eq-list { display: flex; flex-direction: column; gap: 6px; }
  .eq-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; background: rgba(255,255,255,0.04);
    border-left: 3px solid; border-radius: 4px;
    cursor: pointer; transition: background 0.15s;
  }
  .eq-item:active { background: rgba(255,255,255,0.1); }
  .eq-icon {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; background: rgba(0,0,0,0.4); border-radius: 4px;
  }
  .eq-info { flex: 1; min-width: 0; }
  .eq-name { font-size: 13px; }
  .eq-meta { font-size: 11px; color: #888; margin-top: 2px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .eq-letters { display: flex; gap: 2px; }
  .eq-letter {
    display: inline-block;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px; padding: 2px 4px;
    background: rgba(255,170,68,0.15);
    color: #ffd28a; border-radius: 2px;
  }
  .eq-stat { color: #6aff8a; }
  .eq-stat.atk { color: #ff8a6a; }
  .eq-stat.def { color: #6aaeff; }
  .eq-sockets { display: flex; gap: 2px; }
  .socket-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: rgba(0,0,0,0.6); border: 1px solid #555;
  }
  .socket-dot.filled { background: #ffaa44; border-color: #ffaa44; }

  /* Slots */
  .slot-row {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; margin-bottom: 12px;
  }
  .slot {
    background: rgba(255,255,255,0.04);
    border: 2px dashed #2a2030; border-radius: 6px;
    padding: 8px; min-height: 80px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; cursor: pointer;
    transition: all 0.15s;
  }
  .slot.filled { border-style: solid; }
  .slot:active { transform: scale(0.97); }
  .slot-icon { font-size: 22px; opacity: 0.5; }
  .slot.filled .slot-icon { opacity: 1; }
  .slot-label { font-size: 11px; color: #777; margin-top: 4px; }
  .slot-name { font-size: 11px; margin-top: 2px; }
  .slot-letters {
    display: flex; gap: 2px; margin-top: 4px;
    flex-wrap: wrap; justify-content: center;
  }
  .slot-words { font-size: 9px; color: #ffaa44; margin-top: 2px; }

  /* Word card */
  .word-list { display: flex; flex-direction: column; gap: 6px; }
  .word-card {
    padding: 8px 10px; background: rgba(255,255,255,0.04);
    border-left: 3px solid #ffaa44; border-radius: 4px;
    cursor: pointer; transition: background 0.15s;
  }
  .word-card.locked { opacity: 0.5; border-left-color: #444; }
  .word-card.available { border-left-color: #6aff8a; }
  .word-card:active { background: rgba(255,255,255,0.1); }
  .word-text {
    font-family: 'Press Start 2P', monospace; font-size: 13px;
  }
  .word-elem-badge {
    display: inline-block; font-size: 10px;
    padding: 2px 6px; border-radius: 8px;
    color: #fff; margin-left: 6px;
    font-family: 'Jua', sans-serif;
  }
  .word-stats {
    display: flex; gap: 8px; font-size: 11px;
    color: #aaa; margin-top: 4px; flex-wrap: wrap;
  }
  .word-stats .label { color: #666; }
  .word-stats .special { color: #ff44ff; font-weight: bold; }
  .word-need {
    display: flex; gap: 2px; margin-top: 4px;
    flex-wrap: wrap; font-size: 10px;
  }
  .word-need .ltr {
    font-family: 'Press Start 2P', monospace;
    padding: 2px 4px; border-radius: 2px;
    background: rgba(0,255,100,0.15); color: #6aff8a;
  }
  .word-need .ltr.missing {
    background: rgba(255,80,80,0.15); color: #ff8a8a;
  }
  .word-instances {
    display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap;
  }
  .word-instance {
    display: inline-block; padding: 2px 6px; border-radius: 4px;
    background: rgba(255,170,68,0.2); color: #ffd28a;
    font-size: 11px; font-family: 'Press Start 2P', monospace;
    border: 1px solid #ffaa44;
  }
  .word-instance.socketed {
    background: rgba(100,255,170,0.2);
    color: #6affaa; border-color: #6affaa;
  }

  /* Buttons */
  .btn {
    padding: 8px 14px; border: none;
    background: linear-gradient(180deg, #5a3525, #3a2515);
    color: #ffd28a; font-family: 'Jua', sans-serif;
    font-size: 13px; border-radius: 4px;
    cursor: pointer; border-bottom: 2px solid #1a0a05;
  }
  .btn:active { transform: translateY(1px); border-bottom-width: 1px; }
  .btn.primary {
    background: linear-gradient(180deg, #8a4525, #5a2515);
    color: #fff;
  }
  .btn.success {
    background: linear-gradient(180deg, #258a45, #155a25);
    color: #fff;
  }
  .btn.danger { background: linear-gradient(180deg, #6a2525, #3a1515); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(0.5); }
  .btn-small { padding: 4px 10px; font-size: 11px; }

  /* Modal */
  .modal-bg {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.75);
    display: none; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: #1a1418; border: 1px solid #4a3020;
    border-radius: 8px; padding: 16px; width: 100%;
    max-height: 80%; overflow-y: auto;
  }
  .modal h3 {
    font-size: 14px; color: #ffaa44;
    margin-bottom: 12px; text-align: center;
  }
  .modal-actions { display: flex; gap: 8px; margin-top: 12px; }
  .modal-actions .btn { flex: 1; }

  /* 튜토리얼 오버레이 */
  .tut-bg {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.92);
    display: none; flex-direction: column;
    z-index: 200;
    padding: 20px 16px;
    overflow-y: auto;
  }
  .tut-bg.show { display: flex; animation: tutFadeIn 0.3s ease; }
  @keyframes tutFadeIn { from { opacity: 0; } to { opacity: 1; } }
  .tut-skip {
    position: absolute; top: 12px; right: 12px;
    padding: 5px 12px;
    background: rgba(255,255,255,0.06);
    border: 1px solid #3a2a30;
    border-radius: 4px;
    color: #888;
    font-size: 11px;
    font-family: 'Jua';
    cursor: pointer;
    z-index: 10;
  }
  .tut-skip:hover { color: #ffd28a; border-color: #4a3020; }
  .tut-card {
    flex: 1; display: flex; flex-direction: column;
    align-items: center;
    padding: 40px 16px 20px;
    min-height: 100%;
    box-sizing: border-box;
  }
  .tut-emoji {
    font-size: 56px;
    margin-bottom: 16px;
    animation: tutBob 1.8s ease-in-out infinite;
  }
  @keyframes tutBob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .tut-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 16px; color: #ffaa44;
    margin-bottom: 12px; text-align: center;
    line-height: 1.5;
  }
  .tut-body {
    font-family: 'Jua'; font-size: 14px;
    color: #ddd; line-height: 1.7;
    text-align: center; max-width: 360px;
    margin-bottom: 18px;
  }
  .tut-body b { color: #ffd28a; }
  .tut-body .hl { color: #6aff8a; }
  .tut-demo {
    padding: 12px 14px;
    background: rgba(255,170,68,0.08);
    border: 1px solid #4a3020;
    border-radius: 6px;
    margin: 6px 0 18px;
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    color: #ffd28a;
    text-align: center;
    line-height: 1.8;
    min-width: 260px;
  }
  .tut-demo .ltr {
    display: inline-block;
    padding: 4px 8px;
    margin: 0 2px;
    background: rgba(255,170,68,0.15);
    border: 1px solid #ffaa44;
    border-radius: 3px;
  }
  .tut-demo .arrow { color: #888; margin: 0 6px; }
  .tut-demo .result { color: #6aff8a; }
  .tut-dots {
    display: flex; gap: 8px; justify-content: center;
    margin: 12px 0 18px;
  }
  .tut-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #3a2a30;
    transition: all 0.2s;
  }
  .tut-dot.active {
    background: #ffaa44;
    transform: scale(1.3);
    box-shadow: 0 0 6px rgba(255,170,68,0.5);
  }
  .tut-nav {
    display: flex; gap: 10px;
    width: 100%; max-width: 360px;
  }
  .tut-nav button {
    flex: 1;

<script>
// ============== WordCore 인라인 ==============
(function (global) {
  'use strict';
  const ELEMENTS = {
    fire:  { id: 'fire',  name: '불',   color: '#ff4444' },
    water: { id: 'water', name: '물',   color: '#4488ff' },
    earth: { id: 'earth', name: '땅',   color: '#aa7744' },
    wind:  { id: 'wind',  name: '바람', color: '#88ddaa' },
    light: { id: 'light', name: '빛',   color: '#ffdd44' },
    dark:  { id: 'dark',  name: '암',   color: '#884488' },
  };
  const SEASON_1 = {
    id: 'season_1', name: '시즌 1: 원소의 시작',
    elements: ['fire', 'water', 'earth', 'wind', 'light', 'dark'],
    anchorDict: {
      FIRE: 'fire', BURN: 'fire', FLAME: 'fire', HOT: 'fire',
      ICE: 'water', COLD: 'water', SNOW: 'water', RAIN: 'water', DIVE: 'water',
      ROCK: 'earth', STONE: 'earth', SAND: 'earth',
      WIND: 'wind', AIR: 'wind', STORM: 'wind', QUICK: 'wind',
      SUN: 'light', LIGHT: 'light', STAR: 'light', DAY: 'light',
      DARK: 'dark', NIGHT: 'dark', SHADOW: 'dark',
    },
    nonAnchorWords: ['APPLE','BOOK','FROG','HOUSE','KING','LEVEL','POOL','QUEEN','TREE','ZERO',
                     'QUIZ','BOX','FIX','SKY','JOY','ZIP','MOVE'],
    letterToElement: {
      A:'fire',B:'fire',C:'fire',D:'fire',E:'fire',
      F:'water',G:'water',H:'water',I:'water',
      J:'earth',K:'earth',L:'earth',M:'earth',
      N:'wind',O:'wind',P:'wind',Q:'wind',
      R:'light',S:'light',T:'light',U:'light',
      V:'dark',W:'dark',X:'dark',Y:'dark',Z:'dark',
    },
  };
  SEASON_1.wordPool = [...Object.keys(SEASON_1.anchorDict), ...SEASON_1.nonAnchorWords];

  // 한국어 뜻 (학습용 힌트)
  SEASON_1.wordHints = {
    FIRE: '불', BURN: '불태우다', FLAME: '불꽃', HOT: '뜨거운',
    ICE: '얼음', COLD: '차가운', SNOW: '눈', RAIN: '비', DIVE: '잠수',
    ROCK: '바위', STONE: '돌', SAND: '모래',
    WIND: '바람', AIR: '공기', STORM: '폭풍', QUICK: '빠른',
    SUN: '해', LIGHT: '빛', STAR: '별', DAY: '낮',
    DARK: '어둠', NIGHT: '밤', SHADOW: '그림자',
    APPLE: '사과', BOOK: '책', FROG: '개구리', HOUSE: '집',
    KING: '왕', LEVEL: '단계', POOL: '웅덩이', QUEEN: '여왕',
    TREE: '나무', ZERO: '영(0)',
    QUIZ: '퀴즈', BOX: '상자', FIX: '고치다', SKY: '하늘',
    JOY: '기쁨', ZIP: '잠그다', MOVE: '움직이다',
  };

  const VOWELS = new Set('AEIOU');
  const RARE = new Set('XZQJ');
  const countVowels = w => [...w].filter(c => VOWELS.has(c)).length;
  function countConsonantClusters(w) {
    let count = 0, run = 0;
    for (const c of w) {
      if (!VOWELS.has(c)) run++;
      else { if (run >= 2) count++; run = 0; }
    }
    if (run >= 2) count++;
    return count;
  }
  function countDoubleLetters(w) {
    let c = 0;
    for (let i = 1; i < w.length; i++) if (w[i] === w[i-1]) c++;
    return c;
  }
  const countRareLetters = w => [...w].filter(c => RARE.has(c)).length;
  const isPalindrome = w => w === [...w].reverse().join('');
  const letterSum = w => [...w].reduce((s, c) => s + (c.charCodeAt(0) - 64), 0);
  const allUniqueLetters = w => new Set(w).size === w.length;

  function deriveMechanic(text) {
    const w = text.toUpperCase();
    const len = w.length;
    const vowels = countVowels(w);
    const clusters = countConsonantClusters(w);
    const doubles = countDoubleLetters(w);
    const rares = countRareLetters(w);
    const palin = isPalindrome(w);
    const unique = allUniqueLetters(w);
    const lsum = letterSum(w);
    let special = null;
    if (palin) special = 'reflect';
    else if (clusters >= 2) special = 'armor_pierce';
    else if (unique && len >= 5) special = 'pierce';
    else if (doubles >= 1) special = 'chain';
    return {
      baseDamage: 5 + len * 5,
      targets: vowels >= 3 ? 3 : (vowels >= 2 ? 2 : 1),
      radius: vowels >= 2 ? Math.min(2, vowels - 1) : 0,
      castTime: Math.max(0.3, 1.0 - clusters * 0.15),
      hits: 1 + doubles,
      critChance: Math.min(1, rares * 0.20),
      special,
      cooldown: 4 + len * 1.2 + (lsum % 5) * 0.4,
    };
  }
  function resolveElement(text, season) {
    const w = text.toUpperCase();
    if (season.anchorDict[w]) return season.anchorDict[w];
    return season.letterToElement[w[0]] || 'fire';
  }
  function createWord(text, season) {
    const w = text.toUpperCase();
    return {
      id: 'w_' + Math.random().toString(36).slice(2,8),
      text: w,
      element: resolveElement(w, season),
      mechanic: deriveMechanic(w),
      enhanceLevel: 0,
      isAnchor: !!season.anchorDict[w],
    };
  }
  const round = (n, d) => { const f = Math.pow(10, d); return Math.round(n*f)/f; };
  function effectiveStats(word) {
    const m = word.mechanic;
    const lv = word.enhanceLevel;
    const dmgMul = 1 + lv * 0.10;
    const cdMul  = 1 - lv * 0.05;
    return {
      damage: round(m.baseDamage * dmgMul, 1),
      cooldown: round(Math.max(2.0, m.cooldown * cdMul), 2),
      castTime: m.castTime,
      targets: m.targets,
      radius: m.radius,
      hits: m.hits,
      critChance: m.critChance,
      special: m.special,
      enhanceLevel: lv,
    };
  }
  function resolveDamage(stats, defenderDefense = 0, rng = Math.random) {
    const def = stats.special === 'armor_pierce' ? 0 : defenderDefense;
    const perHit = Math.max(1, stats.damage - def);
    const didCrit = rng() < stats.critChance;
    const critMul = didCrit ? 1.5 : 1.0;
    const oneTargetDmg = perHit * stats.hits * critMul;
    return { perHit, hits: stats.hits, didCrit,
      totalPerTarget: round(oneTargetDmg, 1),
      totalAllTargets: round(oneTargetDmg * stats.targets, 1) };
  }
  function emptyInventory() {
    const inv = {};
    for (let i = 0; i < 26; i++) inv[String.fromCharCode(65+i)] = 0;
    return inv;
  }
  function canCompose(inv, word) {
    const need = {};
    for (const c of word.toUpperCase()) need[c] = (need[c]||0)+1;
    for (const c of Object.keys(need)) if ((inv[c]||0) < need[c]) return false;
    return true;
  }
  function consume(inv, word) {
    const r = { ...inv };
    for (const c of word.toUpperCase()) {
      r[c]--;
      if (r[c] < 0) throw new Error('letter underflow');
    }
    return r;
  }
  function missingLetters(inv, word) {
    const need = {};
    for (const c of word.toUpperCase()) need[c] = (need[c]||0)+1;
    const miss = {};
    for (const c of Object.keys(need)) {
      const have = inv[c]||0;
      if (have < need[c]) miss[c] = need[c] - have;
    }
    return miss;
  }
  function compose(inv, text, season) {
    const w = text.toUpperCase();
    if (!season.wordPool.includes(w)) return { ok: false, reason: 'not_in_pool' };
    if (!canCompose(inv, w)) return { ok: false, reason: 'insufficient_letters' };
    return { ok: true, inv: consume(inv, w), word: createWord(w, season) };
  }
  const EQUIPMENT_TYPES = {
    weapon:    { sockets: 2, statType: 'attack',  baseStat: 5, icon: '⚔️' },
    armor:     { sockets: 1, statType: 'defense', baseStat: 2, icon: '🛡️' },
    accessory: { sockets: 1, statType: 'hp',      baseStat: 20, icon: '💍' },
  };
  const EQUIPMENT_TIERS = {
    common: { letterCount: 1, statMul: 1.0, weight: 60, name: '일반', color: '#bbb' },
    magic:  { letterCount: 2, statMul: 1.8, weight: 25, name: '매직', color: '#5af' },
    rare:   { letterCount: 3, statMul: 3.0, weight: 12, name: '레어', color: '#fc3' },
    unique: { letterCount: 4, statMul: 5.0, weight: 3,  name: '유니크', color: '#f73' },
  };
  const EQUIPMENT_NAMES = {
    weapon: {
      common: ['나무 막대', '녹슨 단검', '낡은 활', '돌도끼'],
      magic:  ['강철 검', '예리한 단검', '연마된 활', '전투 도끼'],
      rare:   ['미스릴 검', '서리 단검', '바람의 활', '룬 도끼'],
      unique: ['용살자', '암살자의 단검', '천공의 활', '심판의 도끼'],
    },
    armor: {
      common: ['헝겊 옷', '가죽 조끼', '나무 방패'],
      magic:  ['철 갑옷', '강화 가죽', '강철 방패'],
      rare:   ['미스릴 갑옷', '용비늘 망토', '신성한 방패'],
      unique: ['불멸의 갑옷', '그림자 망토', '심연의 방패'],
    },
    accessory: {
      common: ['구리 반지', '낡은 목걸이', '나무 부적'],
      magic:  ['은 반지', '룬 목걸이', '마법 부적'],
      rare:   ['금 반지', '용송곳니 목걸이', '서리 부적'],
      unique: ['영원의 반지', '진리의 목걸이', '왕의 부적'],
    },
  };
  const _demandCache = new Map();
  function getLetterDemand(season) {
    if (_demandCache.has(season.id)) return _demandCache.get(season.id);
    const d = {};
    for (let i = 0; i < 26; i++) d[String.fromCharCode(65+i)] = 0;
    for (const w of season.wordPool) for (const c of w) d[c]++;
    _demandCache.set(season.id, d);
    return d;
  }
  function pickWeightedLetter(season, rng = Math.random) {
    const d = getLetterDemand(season);
    const total = Object.values(d).reduce((a,b)=>a+b, 0);
    if (total === 0) return 'A';
    let r = rng() * total;
    for (const c of Object.keys(d)) { r -= d[c]; if (r < 0) return c; }
    return 'A';
  }
  function pickTier(stageLevel = 1, rng = Math.random) {
    const boost = Math.min(stageLevel / 50, 1.0);
    const adj = {
      common: EQUIPMENT_TIERS.common.weight * (1 - boost * 0.5),
      magic:  EQUIPMENT_TIERS.magic.weight  * (1 + boost * 0.3),
      rare:   EQUIPMENT_TIERS.rare.weight   * (1 + boost * 1.0),
      unique: EQUIPMENT_TIERS.unique.weight * (1 + boost * 2.0),
    };
    const total = Object.values(adj).reduce((a,b)=>a+b, 0);
    let r = rng() * total;
    for (const t of Object.keys(adj)) { r -= adj[t]; if (r < 0) return t; }
    return 'common';
  }
  function rollEquipmentDrop(season, opts = {}) {
    const rng = opts.rng || Math.random;
    const stageLevel = opts.stageLevel || 1;
    const tier = opts.tier || pickTier(stageLevel, rng);
    const types = Object.keys(EQUIPMENT_TYPES);
    const type = opts.type || types[Math.floor(rng() * types.length)];
    const tspec = EQUIPMENT_TIERS[tier];
    const ttspec = EQUIPMENT_TYPES[type];
    const namePool = EQUIPMENT_NAMES[type][tier];
    const name = namePool[Math.floor(rng() * namePool.length)];
    const letters = [];
    for (let i = 0; i < tspec.letterCount; i++) letters.push(pickWeightedLetter(season, rng));
    return {
      id: 'eq_' + Math.random().toString(36).slice(2,8),
      type, tier, name, letters,
      statType: ttspec.statType,
      statValue: Math.round(ttspec.baseStat * tspec.statMul),
      sockets: ttspec.sockets,
      socketedWordIds: [],
    };
  }
  function disassembleEquipment(equip) {
    return { letters: equip.letters.slice(), extractedWordIds: equip.socketedWordIds.slice() };
  }
  global.WordCore = {
    ELEMENTS, SEASON_1, EQUIPMENT_TYPES, EQUIPMENT_TIERS, EQUIPMENT_NAMES,
    deriveMechanic, resolveElement, createWord, effectiveStats, resolveDamage,
    emptyInventory, canCompose, consume, missingLetters, compose,
    getLetterDemand, pickWeightedLetter, pickTier, rollEquipmentDrop,
    disassembleEquipment,
  };
})(window);

// ============== 게임 상태 + 저장/로드 ==============
const W = window.WordCore;
const STORAGE_KEY = 'wordrune_save_v1';

// ============== Sprite System ==============
const SPRITES = {
  // Heroes
  knight_idle:   { src: 'assets/hero/knight_idle.png',    frameW: 32, frameH: 40, frames: 12, fps: 8,  loop: true },

  mage_idle:     { src: 'assets/hero/mage_idle.png',      frameW: 22, frameH: 36, frames: 12, fps: 8,  loop: true },
  mage_walk:     { src: 'assets/hero/mage_walk.png',      frameW: 22, frameH: 36, frames: 5,  fps: 10, loop: true },
  mage_attack:   { src: 'assets/hero/mage_attack.png',    frameW: 26, frameH: 36, frames: 12, fps: 16, loop: false },
  archer_idle:   { src: 'assets/hero/archer_idle.png',    frameW: 28, frameH: 34, frames: 12, fps: 8,  loop: true },
  archer_walk:   { src: 'assets/hero/archer_walk.png',    frameW: 28, frameH: 34, frames: 10, fps: 12, loop: true },

function isClassUnlocked(key) {
  const cls = HERO_CLASSES[key];
  if (!cls || !cls.unlock) return true;
  const u = cls.unlock;
  if (u.type === 'discoveredWords') return (state.discoveredWords || []).length >= u.value;
  if (u.type === 'totalKills') return state.totalKills >= u.value;
  if (u.type === 'bossKills') return (state.bossKills || 0) >= u.value;
  if (u.type === 'stage') return state.stage >= u.value;
  return false;
}

function getUnlockProgress(key) {
  const cls = HERO_CLASSES[key];
  if (!cls || !cls.unlock) return { current: 1, needed: 1, ratio: 1 };
  const u = cls.unlock;
  let current = 0;
  if (u.type === 'discoveredWords') current = (state.discoveredWords || []).length;
  else if (u.type === 'totalKills') current = state.totalKills;
  else if (u.type === 'bossKills') current = state.bossKills || 0;
  else if (u.type === 'stage') current = state.stage;
  return { current, needed: u.value, ratio: Math.min(1, current / u.value), label: u.label };
}

class Sprite {
  constructor(meta) {
    this.meta = meta;
    this.image = new Image();
    this.loaded = false;
    this.errored = false;
    this.image.onload = () => { this.loaded = true; };
    this.image.onerror = () => { this.errored = true; console.warn('sprite load failed:', meta.src); };
    this.image.src = meta.src;
    this.frameIdx = 0;
    this.elapsed = 0;
    this.onComplete = null;
  }
  reset() { this.frameIdx = 0; this.elapsed = 0; }
  update(dt) {
    if (!this.loaded) return;
    if (this.meta.fps <= 0) return;
    this.elapsed += dt;
    const frameDur = 1000 / this.meta.fps;
    while (this.elapsed >= frameDur) {
      this.elapsed -= frameDur;
      this.frameIdx++;
      if (this.meta.loop) {
        this.frameIdx %= this.meta.frames;
      } else {
        if (this.frameIdx >= this.meta.frames) {
          this.frameIdx = this.meta.frames - 1;
          if (this.onComplete) { const cb = this.onComplete; this.onComplete = null; cb(); }
          break;
        }
      }
    }
  }
  draw(ctx, x, y, scale = 1, flipX = false) {
    if (!this.loaded) return false;
    const sx = this.frameIdx * this.meta.frameW;
    ctx.save();
    ctx.imageSmoothingEnabled = false;
    ctx.translate(x, y);
    if (flipX) ctx.scale(-1, 1);
    const dw = this.meta.frameW * scale;
    const dh = this.meta.frameH * scale;
    // 앵커: 발 중앙 (그림자 위치)
    ctx.drawImage(this.image,
      sx, 0, this.meta.frameW, this.meta.frameH,
      -dw/2, -dh + 4, dw, dh);
    ctx.restore();
    return true;
  }
  isDone() { return !this.meta.loop && this.frameIdx >= this.meta.frames - 1; }
}

// 모든 스프라이트 로드 완료 대기 (Promise, 타임아웃 5초)
function waitSpritesReady() {
  return new Promise(resolve => {
    const start = performance.now();
    const check = () => {
      const total = Object.keys(sprites).length;
      const ready = Object.values(sprites).filter(s => s.loaded || s.errored).length;
      if (ready >= total || performance.now() - start > 5000) {
        const failed = Object.entries(sprites).filter(([k,s]) => s.errored).map(([k]) => k);
        if (failed.length) console.warn('sprites failed:', failed);
        resolve();
      } else {
        requestAnimationFrame(check);
      }
    };
    check();
  });
}

      data.enemy = null;
      data.player.attackCooldown = 0;

function loadSave() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    const def = defaultState();
    for (const k of Object.keys(def)) if (k in data) state[k] = data[k];
    if (!state.socketTimers) state.socketTimers = {};
    if (!state.wordInv) state.wordInv = [];
    if (!state.discoveredWords) state.discoveredWords = [];
    if (!state.composeSlots) state.composeSlots = [];
    if (state.bossKills === undefined) state.bossKills = 0;
    state.player = { ...def.player, ...state.player };
    if (!state.player.heroClass || !HERO_CLASSES[state.player.heroClass]) {
      state.player.heroClass = 'knight';
    }
    // 마이그레이션: 같은 단어 중복 인스턴스 → 1개로 합치기 (최고 강화 레벨 유지)
    if (state.wordInv.length > 0) {
      const byText = {};
      for (const w of state.wordInv) {
        if (!byText[w.text] || w.enhanceLevel > byText[w.text].enhanceLevel) byText[w.text] = w;
      }
      const merged = Object.values(byText);
      if (merged.length !== state.wordInv.length) {
        console.log('word migration:', state.wordInv.length, '→', merged.length);
        // 사라진 인스턴스가 소켓에 있으면 해당 소켓도 정리
        const validIds = new Set(merged.map(w => w.id));
        for (const slot in state.equipped) {
          const eq = state.equipped[slot];
          if (eq && eq.socketedWordIds) {
            eq.socketedWordIds = eq.socketedWordIds.map(id => validIds.has(id) ? id : null);
          }
        }
        state.wordInv = merged;
      }
    }
    return true;
  } catch(e) { console.warn('load failed', e); return false; }
}
function resetSave() {
  localStorage.removeItem(STORAGE_KEY);
  state = defaultState();
  location.reload();
}

const HIT_FLASH_DURATION = 220; // ms

// 피격 효과 계산: timer가 양수면 active
// dir: 1 = 우측으로 밀림, -1 = 좌측으로 밀림 (방어자 시점)
function getHitFlashFx(timer, dir) {
  if (timer <= 0) return null;
  const t = Math.min(1, timer / HIT_FLASH_DURATION); // 1 → 0
  return {
    xOffset: t * 6 * dir,
    scaleBoost: t * 0.18,
    glowStrength: 10 + t * 12,
    glowColor: '#ff3030',
  };
}

const tileImage = new Image();
let tileLoaded = false;
tileImage.onload = () => { tileLoaded = true; };

function drawBackground() {
  const w = canvas.width, h = canvas.height;

  // 던전 분위기 그라데이션 (배경)
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, w, h - 32);

  if (tileLoaded) {
    // 바닥 타일 — Tile Dungeon 시트의 적당한 바닥 영역에서 슬라이스
    // (시트 분석: x=0,y=64,w=64,h=64 영역에 바닥 패턴 있음)
    const tileSize = 32;
    const floorY = h - 32;
    const offset = (bgScroll * 0.3) % tileSize;
    for (let x = -offset; x < w + tileSize; x += tileSize) {
      // 타일 시트의 바닥 영역 (대략): (32, 96, 32, 32)
      ctx.drawImage(tileImage, 32, 96, 32, 32, x, floorY, tileSize, tileSize);
    }
    // 벽 패턴 (상단 천장)
    for (let x = -offset; x < w + tileSize; x += tileSize) {
      ctx.drawImage(tileImage, 96, 256, 32, 32, x, 0, tileSize, 24);
    }
  } else {
    // 폴백
    ctx.fillStyle = '#1a0a14';
    ctx.fillRect(0, h - 12, w, 12);
  }

  // 토치 (배경 분위기) — 천장에 매달림
  const torch = sprites.torch_yellow;
  if (torch && torch.loaded) {
    for (let i = 0; i < 3; i++) {
      const x = ((i * 180) - (bgScroll * 0.5) % 180);
      torch.draw(ctx, x + 60, 42, 2.5, false);
    }
  }
}
function drawPlayer() {
  const p = state.player;
  // 그림자 (피격 효과와 무관하게 원위치)
  if (p.alive) {
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.ellipse(p.x, p.y + 4, 14, 4, 0, 0, Math.PI*2); ctx.fill();
  }
  if (!p.alive) {
    ctx.save(); ctx.translate(p.x, p.y - 8);
    ctx.strokeStyle = '#ff6a6a'; ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-10, -10); ctx.lineTo(10, 10);
    ctx.moveTo(10, -10); ctx.lineTo(-10, 10);
    ctx.stroke(); ctx.restore(); return;
  }
  const cls = HERO_CLASSES[state.player.heroClass] || HERO_CLASSES.knight;
  const spriteKey = cls.sprites[p.animState === 'attack' ? 'attack' : 'idle'];
  const spr = sprites[spriteKey];
  // 피격 효과 (플레이어는 좌측으로 밀림)
  const fx = getHitFlashFx(p.hitFlashTimer, -1);
  if (spr) {
    ctx.save();
    if (fx) {
      ctx.shadowColor = fx.glowColor;
      ctx.shadowBlur = fx.glowStrength;
    }
    const scale = 2.0 + (fx ? fx.scaleBoost : 0);
    const xPos = p.x + (fx ? fx.xOffset : 0);
    const drawn = spr.draw(ctx, xPos, p.y + (cls.spriteOffsetY||0), scale, false);
    ctx.restore();
    if (!drawn) {
      ctx.fillStyle = '#5a8acc';
      ctx.fillRect(p.x - 10, p.y - 20, 20, 22);
    }
  }
}

function drawEnemy() {
  const e = state.enemy; if (!e) return;
  if (e.alive || e.dyingTimer > 0) {
    ctx.fillStyle = 'rgba(0,0,0,' + (e.alive ? 0.4 : 0.4 * e.dyingTimer/600) + ')';
    ctx.beginPath(); ctx.ellipse(e.x, e.y + 4, e.isBoss ? 22 : 14, e.isBoss ? 6 : 4, 0, 0, Math.PI*2); ctx.fill();
  }
  if (!e.alive && e.dyingTimer <= 0) return;

  let spriteKey;
  if (!e.alive) spriteKey = e.sprites[2];
  else if (e.animState === 'attack') spriteKey = e.sprites[1];
  else spriteKey = e.sprites[0];
  const spr = sprites[spriteKey];

  if (spr) {
    ctx.save();
    if (!e.alive) {
      const fadeStart = 0.3;
      const ratio = e.dyingTimer / 600;
      ctx.globalAlpha = ratio > fadeStart ? 1 : ratio / fadeStart;
    }
    // 적은 우측으로 밀림 (오른쪽 적이라 +방향)
    const fx = e.alive ? getHitFlashFx(e.hitFlashTimer, 1) : null;
    if (fx) {
      ctx.shadowColor = fx.glowColor;
      ctx.shadowBlur = fx.glowStrength;
    }
    const baseScale = e.isBoss ? 1.6 : 2.0;
    const scale = baseScale + (fx ? fx.scaleBoost * baseScale / 2 : 0);
    const xPos = e.x + (fx ? fx.xOffset : 0);
    spr.draw(ctx, xPos, e.y, scale, false);
    ctx.restore();
  } else {
    ctx.fillStyle = e.color || '#888';
    ctx.fillRect(e.x - 12, e.y - 20, 24, 24);
  }

  if (!e.alive) return;
  const barW = e.isBoss ? 80 : 36, barH = e.isBoss ? 6 : 4;
  const yOff = e.isBoss ? -56 : -38;
  const ratio = Math.max(0, e.hp / e.maxHp);
  ctx.fillStyle = '#000'; ctx.fillRect(e.x - barW/2 - 1, e.y + yOff, barW + 2, barH + 2);
  ctx.fillStyle = '#3a1a1a'; ctx.fillRect(e.x - barW/2, e.y + yOff + 1, barW, barH);
  ctx.fillStyle = e.isBoss ? '#ff2020' : '#ff5050';
  ctx.fillRect(e.x - barW/2, e.y + yOff + 1, barW * ratio, barH);
  ctx.fillStyle = e.isBoss ? '#ffaa44' : '#ddd';
  ctx.font = (e.isBoss ? 'bold 12px' : '10px') + ' Jua';
  ctx.textAlign = 'center';
  const label = (e.isBoss ? '💀 ' : '') + e.name + (e.def > 0 ? ' [방' + e.def + ']' : '');
  ctx.fillText(label, e.x, e.y + yOff - 4);
}
function drawProjectiles() {
  const fb = sprites.fireball;
  if (fb && fb.loaded) fb.update(16);
  for (const p of projectiles) {
    const elemColor = W.ELEMENTS[p.element]?.color || '#ffaa44';
    if (fb && fb.loaded) {
      ctx.save();
      ctx.shadowColor = elemColor; ctx.shadowBlur = 12;
      fb.draw(ctx, p.x, p.y, 1.2, false);
      ctx.restore();
    } else {
      ctx.save();
      ctx.fillStyle = elemColor; ctx.shadowColor = elemColor; ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 0.4;
      ctx.beginPath(); ctx.arc(p.x - p.vx*0.05, p.y, 3, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }
}
// 드롭 연출 큐
const drops = []; // { x, y, sprite, equip, popped, life }

function spawnDropChest(x, y, equip, autoDisassembled = false) {
  const spr = new Sprite(SPRITES.chest_open);
  spr.reset();
  drops.push({ x, y, sprite: spr, equip, autoDisassembled, popped: false, life: 1400 });
}

function updateDrops(dt) {
  for (let i = drops.length - 1; i >= 0; i--) {
    const d = drops[i];
    d.sprite.update(dt);
    d.life -= dt;
    if (!d.popped && d.sprite.isDone()) {
      d.popped = true;
      if (d.autoDisassembled) popAutoDis(d.x, d.y, d.equip);
      else popLoot(d.x, d.y, d.equip);
    }
    if (d.life <= 0) drops.splice(i, 1);
  }
}

function drawDrops() {
  for (const d of drops) {
    d.sprite.draw(ctx, d.x, d.y, 2.0, false);
  }
}

let lastRenderTime = performance.now();
function render() {
  const now = performance.now();
  const dt = now - lastRenderTime;
  lastRenderTime = now;
  // 활성 hero sprite 업데이트
  const p = state.player;
  const cls = HERO_CLASSES[p.heroClass] || HERO_CLASSES.knight;
  const heroSpriteKey = cls.sprites[p.animState === 'attack' ? 'attack' : 'idle'];
  if (sprites[heroSpriteKey]) sprites[heroSpriteKey].update(dt);
  // 적 sprite 업데이트
  const e = state.enemy;
  if (e && e.sprites) {
    let key;
    if (!e.alive) key = e.sprites[2];
    else if (e.animState === 'attack') key = e.sprites[1];
    else key = e.sprites[0];
    if (sprites[key]) sprites[key].update(dt);
  }
  // 토치 (배경 장식)
  if (sprites.torch_yellow) sprites.torch_yellow.update(dt);
  updateDrops(dt);

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground(); drawProjectiles(); drawEnemy(); drawPlayer(); drawDrops();
}

// ============== 스탯/캐스팅 ==============
function playerStats() {
  const p = state.player;
  const cls = HERO_CLASSES[p.heroClass] || HERO_CLASSES.knight;
  let atk = cls.baseAtk, def = cls.baseDef, hp = cls.baseHp;
  for (const slot of ['weapon','armor','accessory']) {
    const e = state.equipped[slot]; if (!e) continue;
    if (e.statType === 'attack')  atk += e.statValue;
    if (e.statType === 'defense') def += e.statValue;
    if (e.statType === 'hp')      hp  += e.statValue;
  }
  return { atk, def, hp, attackSpeedMul: cls.attackSpeedMul || 1.0, spellDmgMul: cls.spellDmgMul || 1.0, critBonus: cls.critBonus || 0 };
}
function getEquippedSocketedWordIds() {
  const ids = [];
  for (const slot of ['weapon','armor','accessory']) {
    const eq = state.equipped[slot]; if (!eq) continue;
    for (const wid of eq.socketedWordIds) if (wid) ids.push(wid);
  }
  return ids;
}
function getWordById(id) { return state.wordInv.find(w => w.id === id); }
function refreshHud() {
  const s = playerStats();
  if (state.player.maxHp !== s.hp) {
    const ratio = state.player.hp / state.player.maxHp;
    state.player.maxHp = s.hp;
    state.player.hp = Math.round(s.hp * ratio);
  }
  document.getElementById('stageNum').textContent = state.stage;
  document.getElementById('statAtk').textContent = s.atk;
  document.getElementById('statDef').textContent = s.def;
  document.getElementById('statHp').textContent  = state.player.hp + '/' + state.player.maxHp;
}

// ============== 게임 루프 ==============
let lastTime = performance.now();

function castSpell(word) {
  const p = state.player; const e = state.enemy;
  const stats = W.effectiveStats(word);
  if (!e || !e.alive) return;
  projectiles.push({
    x: p.x + 10, y: p.y - 5, vx: 320, vy: 0,
    element: word.element, stats, life: 1000,
  });
  popSpellCast(p.x, p.y - 30,
    word.text + (word.enhanceLevel > 0 ? '+' + word.enhanceLevel : ''),
    W.ELEMENTS[word.element].color);
}
function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const proj = projectiles[i];
    proj.x += proj.vx * dt / 1000;
    proj.life -= dt;
    const e = state.enemy;
    if (e && e.alive && Math.abs(proj.x - e.x) < 15) {
      const ps = playerStats();
      // 직업 보너스: 크리율 추가
      const boostedStats = { ...proj.stats, critChance: (proj.stats.critChance || 0) + (ps.critBonus || 0) };
      const dmgInfo = W.resolveDamage(boostedStats, e.def);
      // 직업 보너스: 마법 데미지 배율
      const finalDmg = Math.round(dmgInfo.totalPerTarget * (ps.spellDmgMul || 1.0));
      e.hp -= finalDmg;
      e.hitFlashTimer = HIT_FLASH_DURATION;
      popDamage(e.x, e.y - 10, finalDmg, 'spell', dmgInfo.didCrit);
      if (e.hp <= 0) {
        e.hp = 0; e.alive = false; e.dyingTimer = 600;
        const dyingKey = e.sprites && e.sprites[2];
        if (dyingKey && sprites[dyingKey]) sprites[dyingKey].reset();
        state.totalKills++; state.enemyCountThisStage++;
        onEnemyKilled(e);
      }
      projectiles.splice(i, 1); continue;
    }
    if (proj.life <= 0 || proj.x > canvas.width + 30) projectiles.splice(i, 1);
  }
}
function tick(dt) {
  const p = state.player;
  bgScroll += dt * 0.05;
  // 피격 타이머 감소
  if (p.hitFlashTimer > 0) p.hitFlashTimer -= dt;
  if (state.enemy && state.enemy.hitFlashTimer > 0) state.enemy.hitFlashTimer -= dt;
  if (!p.alive) {
    p.respawnTimer -= dt;
    if (p.respawnTimer <= 0) {
      p.alive = true; p.hp = p.maxHp;
      state.enemyCountThisStage = 0; state.enemy = null;
      toast('부활!'); refreshHud();
    }
    updateProjectiles(dt); render(); return;
  }
  if (!state.enemy || (!state.enemy.alive && state.enemy.dyingTimer <= 0)) {
    if (state.enemy && state.enemyCountThisStage >= state.enemiesPerStage) {
      state.stage++; state.enemyCountThisStage = 0;
      if (state.stage > state.bestStage) {
        state.bestStage = state.stage;
        scheduleLeaderboardSync();
      }
      toast(`🏁 스테이지 ${state.stage} 진입!`);
      refreshHud(); scheduleSave();
    }
    spawnEnemy();
  }
  const e = state.enemy;
  if (e && e.alive) {
    const dist = Math.abs(p.x - e.x);
    if (dist <= 320) {
      const socketedIds = getEquippedSocketedWordIds();
      for (const wid of socketedIds) {
        if (state.socketTimers[wid] === undefined) state.socketTimers[wid] = 0;
        state.socketTimers[wid] -= dt;
        if (state.socketTimers[wid] <= 0) {
          const word = getWordById(wid);
          if (word) {
            const stats = W.effectiveStats(word);
            castSpell(word);
            state.socketTimers[wid] = stats.cooldown * 1000;
          }
        }
      }
    }
  }
  if (!e.alive) { e.dyingTimer -= dt; updateProjectiles(dt); render(); return; }
  const dist = Math.abs(p.x - e.x);
  const attackRange = 60;
  if (dist > attackRange) {
    e.x -= 120 * dt / 1000;
    updateProjectiles(dt); render(); return;
  }
  const ps = playerStats();
  p.attackCooldown -= dt; e.attackCooldown -= dt;
  if (p.attackCooldown <= 0) {
    p.attackCooldown = p.attackInterval / (ps.attackSpeedMul || 1.0);
    const dmg = Math.max(1, ps.atk - e.def);
    e.hp -= dmg;
    e.hitFlashTimer = HIT_FLASH_DURATION;
    popDamage(e.x, e.y - 10, dmg, 'enemy', false);
    // 캐릭터 attack 애니
    p.animState = 'attack';
    const cls = HERO_CLASSES[p.heroClass] || HERO_CLASSES.knight;
    const atkKey = cls.sprites.attack;
    if (sprites[atkKey]) {
      sprites[atkKey].reset();
      sprites[atkKey].onComplete = () => { p.animState = 'idle'; };
    }
    if (e.hp <= 0) {
      e.hp = 0; e.alive = false; e.dyingTimer = 600;
      // dying 애니 재시작
      const dyingKey = e.sprites[2];
      if (sprites[dyingKey]) sprites[dyingKey].reset();
      state.totalKills++; state.enemyCountThisStage++;
      onEnemyKilled(e);
    }
  }
  if (e.alive && e.attackCooldown <= 0) {
    e.attackCooldown = e.attackInterval;
    // 적 attack 애니 트리거
    e.animState = 'attack';
    const eAtkKey = e.sprites[1];
    if (sprites[eAtkKey]) {
      sprites[eAtkKey].reset();
      sprites[eAtkKey].onComplete = () => { if (e.alive) e.animState = 'idle'; };
    }
    const dmg = Math.max(1, e.atk - ps.def);
    p.hp -= dmg;
    p.hitFlashTimer = HIT_FLASH_DURATION;
    popDamage(p.x, p.y - 10, dmg, 'player', false);
    if (p.hp <= 0) {
      p.hp = 0; p.alive = false; p.respawnTimer = 2500;
      toast('💀 패배... 2.5초 후 부활');
      scheduleSave();
    }
  }
  updateProjectiles(dt); render();
}
function shouldAutoDisassemble(eq) {
  if (eq.tier === 'common' && state.autoDisCommon) return true;
  if (eq.tier === 'magic' && state.autoDisMagic) return true;
  return false;
}

function onEnemyKilled(e) {
  const opts = { stageLevel: state.stage };
  if (e.isBoss) opts.tier = 'unique';
  const eq = W.rollEquipmentDrop(W.SEASON_1, opts);
  state.totalDrops++;
  if (e.isBoss) state.bossKills = (state.bossKills || 0) + 1;
  scheduleLeaderboardSync();
  // 보스는 항상 인벤에. 일반/매직은 토글 따라 자동 분해
  if (!e.isBoss && shouldAutoDisassemble(eq)) {
    const dis = W.disassembleEquipment(eq);
    for (const c of dis.letters) state.letterInv[c] = (state.letterInv[c]||0) + 1;
    state.autoDisCount++;
    spawnDropChest(e.x, e.y, eq, true); // autoDisassembled
  } else {
    state.equipInv.push(eq);
    spawnDropChest(e.x, e.y, eq, false);
    if (e.isBoss) {
      toast(`👑 보스 처치! <b style="color:#ffaa44">유니크 ${eq.name}</b> 드롭`);
    }
  }
  renderActiveTab();
  scheduleSave();
}
function loop(now) {
  const dt = Math.min(100, now - lastTime);
  lastTime = now;
  tick(dt);
  requestAnimationFrame(loop);
}

      { key: 'all', label: '전체', color: '#aaa' },
      { key: 'common', label: '일반', color: W.EQUIPMENT_TIERS.common.color },
      { key: 'magic', label: '매직', color: W.EQUIPMENT_TIERS.magic.color },
      { key: 'rare', label: '레어', color: W.EQUIPMENT_TIERS.rare.color },
      { key: 'unique', label: '유니크', color: W.EQUIPMENT_TIERS.unique.color },

  html += `<div class="auto-row">

function renderEquipItem(eq, idx) {

  const socketsHtml = Array.from({length: eq.sockets}, (_, i) =>

function setupSlotDropZones() {
  const slots = document.querySelectorAll('.word-slot');
  slots.forEach(slot => {
    slot.addEventListener('dragover', (e) => {
      e.preventDefault();
      slot.classList.add('drag-over');
    });
    slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));
    slot.addEventListener('drop', (e) => {
      e.preventDefault();
      slot.classList.remove('drag-over');
      const letter = e.dataTransfer.getData('text/plain');
      if (letter) addLetterToSlot(letter);
    });
  });
}
function renderWordTab() {
  state.seenWordTab = true;
  document.getElementById('wordBadge').style.display = 'none';
  const pool = W.SEASON_1.wordPool;
  const owned = state.wordInv;
  const ownedByText = {};
  for (const w of owned) {
    if (!ownedByText[w.text]) ownedByText[w.text] = [];
    ownedByText[w.text].push(w);
  }
  const discovered = new Set(state.discoveredWords);
  // 발견된 단어 (한 번이라도 합성한 적 있음)
  const discoveredList = pool.filter(t => discovered.has(t));
  const undiscoveredList = pool.filter(t => !discovered.has(t));

  let html = `<div class="section-h">${W.SEASON_1.name} <span class="sub">${discoveredList.length}/${pool.length} 발견</span></div>`;
  html += `<div style="text-align:center;color:#888;font-size:11px;margin:-4px 0 12px">
    💡 단어 합성은 <b style="color:#ffaa44">인벤토리 탭</b>에서 글자를 슬롯에 넣어 만드세요
  </div>`;

  // 발견한 단어 (강화 가능)
  if (discoveredList.length > 0) {
    html += '<div class="section-h">📖 발견한 단어 <span class="sub">' + discoveredList.length + '개</span></div>';
    html += '<div class="word-list">';
    for (const text of discoveredList) {
      const has = ownedByText[text] || [];
      const kind = has.length > 0 ? 'owned' : 'composable';
      html += renderWordCard(text, has, kind);
    }
    html += '</div>';
  }

  // 미발견 단어 (도감 — ??? + 한국어 뜻)
  if (undiscoveredList.length > 0) {
    html += '<div class="section-h">🔒 미발견 단어 <span class="sub">' + undiscoveredList.length + '개</span></div>';
    html += '<div class="word-list">';
    for (const text of undiscoveredList) {
      html += renderWordCard(text, [], 'undiscovered');
    }
    html += '</div>';
  }
  tabContent.innerHTML = html;
}
function renderWordCard(text, instances, kind) {
  const tempWord = W.createWord(text, W.SEASON_1);
  const elem = W.ELEMENTS[tempWord.element];
  const stats = W.effectiveStats(tempWord);
  const specStr = stats.special ? `<span class="special">${SPECIAL_LABELS[stats.special]}</span>` : '';
  const targetStr = stats.targets > 1 ? `${stats.targets}타겟` : '단일';
  const hint = W.SEASON_1.wordHints[text] || '';

  // 미발견 단어: ??? + 한국어 뜻 + 글자수 힌트
  if (kind === 'undiscovered') {
    return `<div class="word-card undiscovered">
      <div>
        <span class="word-text-hidden">${'?'.repeat(text.length)}</span>
        <span class="word-elem-badge" style="background:${elem.color}">${elem.name}</span>
      </div>
      <div style="display:flex;gap:8px;align-items:center;margin-top:4px">
        <span class="hint-meaning">🎯 ${hint}</span>
        <span class="hint-length">(${text.length}글자)</span>
      </div>
      <div class="word-stats">
        <span><span class="label">DMG</span> ${stats.damage}</span>
        <span><span class="label">CD</span> ${stats.cooldown}s</span>
        <span>${targetStr}</span>
        ${stats.hits > 1 ? `<span>×${stats.hits}히트</span>` : ''}
        ${specStr}
      </div>
    </div>`;
  }

  // 발견된 단어 (owned/composable): 강화 모달 열림
  const miss = W.missingLetters(state.letterInv, text);
  const need = [...text];
  const lockedClass = kind === 'composable' ? 'available' : '';
  const ownedHtml = instances.length > 0
    ? `<div class="word-instances">${instances.map(w => {
        const socketed = isWordSocketed(w.id);
        return `<span class="word-instance ${socketed ? 'socketed' : ''}">+${w.enhanceLevel}${socketed ? ' 🔗' : ''}</span>`;
      }).join('')}</div>` : '';
  const needHtml = `<div class="word-need">${need.map(c => {
    const isMissing = (miss[c] || 0) > 0;
    return `<span class="ltr ${isMissing ? 'missing' : ''}">${c}</span>`;
  }).join('')}</div>`;
  return `<div class="word-card ${lockedClass}" onclick="openWordModal('${text}')">
    <div>
      <span class="word-text" style="color:${elem.color}">${text}</span>
      <span class="word-elem-badge" style="background:${elem.color}">${elem.name}</span>
      ${hint ? `<span style="color:#aaa;font-size:11px;margin-left:8px">${hint}</span>` : ''}
    </div>
    <div class="word-stats">
      <span><span class="label">DMG</span> ${stats.damage}</span>
      <span><span class="label">CD</span> ${stats.cooldown}s</span>
      <span>${targetStr}</span>
      ${stats.hits > 1 ? `<span>×${stats.hits}히트</span>` : ''}
      ${specStr}
    </div>
    ${needHtml}
    ${ownedHtml}
  </div>`;
}
function isWordSocketed(wordId) {
  for (const slot of ['weapon','armor','accessory']) {
    const eq = state.equipped[slot];
    if (eq && eq.socketedWordIds.includes(wordId)) return true;
  }
  for (const eq of state.equipInv) {
    if (eq.socketedWordIds.includes(wordId)) return true;
  }
  return false;
}
function renderActiveTab() {
  if (state.activeTab === 'equip') renderEquipTab();
  else if (state.activeTab === 'inv') renderInvTab();
  else renderWordTab();
}

  if (!isClassUnlocked(key)) { toast('아직 잠긴 직업입니다'); return; }

  const cls = HERO_CLASSES[key];
  state.player.heroClass = key;
  // 능력치 재계산 (playerStats가 cls에서 가져옴)
  // HP는 비율 유지
  const prevMaxHp = state.player.maxHp;

  state.socketTimers[wordId] = 1000;
  toast('🔗 단어 장착!');

  openSlotModal(slot);
  renderActiveTab();
}
function unsocketFromEquipped(slot, socketIdx) {
  const eq = state.equipped[slot]; if (!eq) return;
  const wid = eq.socketedWordIds[socketIdx];

  eq.socketedWordIds[socketIdx] = null;
  delete state.socketTimers[wid];
  toast('🔓 단어 제거');

  openSlotModal(slot);
  renderActiveTab();
}
function openWordModal(text) {
  // 미발견 단어는 모달 X — 인벤 탭으로 안내
  if (!state.discoveredWords.includes(text)) {
    toast('🔮 인벤토리 탭에서 글자를 모아 합성하세요!');

  const owned = state.wordInv.find(w => w.text === text);

  const miss = W.missingLetters(state.letterInv, text);

  html += `<div style="color:#aaa;font-size:12px;margin-bottom:6px">필요 글자 ${can ? '✅' : '❌'}</div>`;
  html += `<div class="word-need" style="margin-bottom:12px">`;
  for (const c of text) {
    const isMissing = (miss[c] || 0) > 0;

  // 스마트 분해 (편의 기능)

      eq.letters.some(c => miss[c] > 0) && (eq.tier === 'common' || eq.tier === 'magic'));
    if (helperEquips.length > 0) {

function composeNewWord(text) {
  const r = W.compose(state.letterInv, text, W.SEASON_1);
  if (!r.ok) { toast('합성 실패: ' + r.reason); return false; }
  state.letterInv = r.inv;
  state.wordInv.push(r.word);
  if (!state.discoveredWords.includes(text)) state.discoveredWords.push(text);
  const ec = W.ELEMENTS[r.word.element].color;
  const hint = W.SEASON_1.wordHints[text] || '';
  toast(`✨ <b style="color:${ec}">${text}</b>${hint ? ' = '+hint : ''} 합성!`);
  scheduleSave();
  hideModal();
  renderActiveTab();
  return true;
}

// === 합성 슬롯 (인벤 탭) ===
const MAX_COMPOSE_SLOTS = 6;

function addLetterToSlot(letter) {
  if (!state.composeSlots) state.composeSlots = [];
  if (state.composeSlots.length >= MAX_COMPOSE_SLOTS) {
    toast(`슬롯은 최대 ${MAX_COMPOSE_SLOTS}개까지`);
    return;
  }
  if (!state.letterInv[letter] || state.letterInv[letter] <= 0) {
    toast(`'${letter}' 글자가 없습니다`);
    return;
  }
  state.letterInv[letter]--;
  state.composeSlots.push({ letter });
  renderActiveTab();
}

function removeFromSlot(idx) {
  if (!state.composeSlots || !state.composeSlots[idx]) return;
  const item = state.composeSlots.splice(idx, 1)[0];
  state.letterInv[item.letter] = (state.letterInv[item.letter] || 0) + 1;
  renderActiveTab();
}

function clearComposeSlots() {
  if (!state.composeSlots) return;
  for (const s of state.composeSlots) {
    state.letterInv[s.letter] = (state.letterInv[s.letter] || 0) + 1;
  }
  state.composeSlots = [];
  renderActiveTab();
}

function tryCompose() {
  const slots = state.composeSlots || [];
  if (slots.length === 0) { toast('글자를 슬롯에 넣으세요'); return; }
  const text = slots.map(s => s.letter).join('');
  // 풀 검증
  if (!W.SEASON_1.wordPool.includes(text)) {
    toast(`❌ "${text}"는 이 시즌의 단어가 아닙니다`);
    return;
  }
  // 이미 슬롯의 글자들은 letterInv에서 차감된 상태 (재합성 시에도 글자 소모됨)
  state.composeSlots = [];
  const ec = W.ELEMENTS[W.createWord(text, W.SEASON_1).element].color;
  const hint = W.SEASON_1.wordHints[text] || '';
  const existing = state.wordInv.find(w => w.text === text);
  if (existing) {
    // 보유 중 — 강화
    existing.enhanceLevel++;
    toast(`💪 <b style="color:${ec}">${text}</b>${hint ? ' = '+hint : ''} +${existing.enhanceLevel} 강화!`);
  } else {
    // 새 합성
    const w = W.createWord(text, W.SEASON_1);
    state.wordInv.push(w);
    if (!state.discoveredWords.includes(text)) {
      state.discoveredWords.push(text);
      scheduleLeaderboardSync();
    }
    toast(`✨ <b style="color:${ec}">${text}</b>${hint ? ' = '+hint : ''} 합성!`);
  }
  renderActiveTab();
  scheduleSave();
}

// 드래그 핸들러
let _draggingLetter = null;
function onDragStart(e, letter) {
  if (!state.letterInv[letter] || state.letterInv[letter] <= 0) {
    e.preventDefault(); return;
  }
  _draggingLetter = letter;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', letter);
  e.currentTarget.classList.add('dragging');
}
function onDragEnd(e) {
  _draggingLetter = null;
  e.currentTarget.classList.remove('dragging');
}

// === 기존 handleComposeInput은 호환성 위해 유지 ===
function handleComposeInput() {
  const input = document.getElementById('wordInput');
  if (!input) return;
  const text = input.value.toUpperCase().trim();
  if (!text) {
    toast('영어 단어를 입력하세요');
    input.focus();
    return;
  }
  // 시즌 풀 검증
  if (!W.SEASON_1.wordPool.includes(text)) {
    toast(`❌ "${text}"는 이 시즌의 단어가 아닙니다`);
    // 입력은 유지 (실수일 수도)
    input.focus();
    return;
  }
  // 글자 검증
  if (!W.canCompose(state.letterInv, text)) {
    const miss = W.missingLetters(state.letterInv, text);
    const missStr = Object.entries(miss).map(([c, n]) => `${c}×${n}`).join(', ');
    toast(`❌ 글자 부족: ${missStr}`);
    input.focus();
    return;
  }
  // 이미 보유한 단어면 모달 띄워서 강화 옵션 보여줌
  const existing = state.wordInv.filter(w => w.text === text);
  if (existing.length > 0) {
    input.value = '';
    openWordModal(text);
    return;
  }
  // 새 합성
  composeNewWord(text);
  input.value = '';
}
function enhanceWordById(wordId) {

  if (!w) return;
  if (!W.canCompose(state.letterInv, w.text)) { toast('글자 부족'); return; }
  state.letterInv = W.consume(state.letterInv, w.text);
  w.enhanceLevel++;
  const ec = W.ELEMENTS[w.element].color;
  toast(`💪 <b style="color:${ec}">${w.text}</b> +${w.enhanceLevel} 강화!`);

function executeBulkDisassemble() {
  const filter = state.equipFilter || 'all';
  // 인덱스 역순으로 splice (앞에서 지우면 인덱스 흔들림)
  const toRemove = [];
  for (let i = state.equipInv.length - 1; i >= 0; i--) {
    const eq = state.equipInv[i];
    if (filter === 'all' || eq.tier === filter) toRemove.push(i);
  }
  let totalLetters = 0;
  for (const i of toRemove) {
    const eq = state.equipInv[i];
    const dis = W.disassembleEquipment(eq);
    for (const c of dis.letters) {
      state.letterInv[c] = (state.letterInv[c]||0) + 1;
      totalLetters++;
    }
    state.equipInv.splice(i, 1);
  }
  toast(`🔨 ${toRemove.length}개 분해 → ${totalLetters}글자 획득`);
  if (!state.seenWordTab) document.getElementById('wordBadge').style.display = 'inline-block';
  hideModal();
  renderActiveTab();
  scheduleSave();
}

  let html = `<h3>알파벳 <span style="color:#ffd28a;font-family:'Press Start 2P'">${letter}</span></h3>`;

  </div>`;

  // 등급별 카운트 표시

  }

  // 옵션: 일반만 / 일반+매직 / 모두
  html += `<div style="color:#aaff88;font-size:11px;text-align:center;margin-bottom:8px">

    html += `<button class="btn" onclick="executeLetterDis('${letter}', 'common_only')">일반만 분해 (${byTier.common.length}개)</button>`;
  }
  if (byTier.common.length + byTier.magic.length > 0) {
    html += `<button class="btn" onclick="executeLetterDis('${letter}', 'common_magic')">일반+매직 분해 (${byTier.common.length + byTier.magic.length}개)</button>`;
  }
  html += `<button class="btn danger" onclick="executeLetterDis('${letter}', 'all')">전체 분해 (${targets.length}개)</button>`;
  html += `</div>`;
  html += `<div class="modal-actions"><button class="btn" onclick="hideModal()">취소</button></div>`;
  showModal(html);
}

function executeLetterDis(letter, mode) {
  const allowedTiers = mode === 'common_only' ? ['common']
                     : mode === 'common_magic' ? ['common','magic']
                     : ['common','magic','rare','unique'];
  const toRemove = [];
  for (let i = state.equipInv.length - 1; i >= 0; i--) {
    const eq = state.equipInv[i];
    if (eq.letters.includes(letter) && allowedTiers.includes(eq.tier)) toRemove.push(i);
  }
  let total = 0;
  let targetGain = 0;
  for (const i of toRemove) {
    const eq = state.equipInv[i];
    const dis = W.disassembleEquipment(eq);
    for (const c of dis.letters) {
      state.letterInv[c] = (state.letterInv[c]||0) + 1;
      total++;
      if (c === letter) targetGain++;
    }
    state.equipInv.splice(i, 1);
  }
  toast(`🔨 ${toRemove.length}개 분해 → ${letter} <b>+${targetGain}</b> (총 ${total}글자)`);
  hideModal();
  renderActiveTab();
  scheduleSave();
}

// 단어 합성 모달에서 호출: 부족 글자를 가진 일반/매직 장비를 분해
function smartDisassembleForWord(text) {
  const miss = W.missingLetters(state.letterInv, text);
  const missingChars = Object.keys(miss);
  if (missingChars.length === 0) { toast('이미 모든 글자 충분'); return; }
  // 부족 글자를 1개라도 포함한 일반/매직 장비를 그리디 분해
  // 단, 분해는 부족 글자가 충분해질 때까지만
  const haveSnapshot = { ...state.letterInv };
  const toRemove = [];
  // 우선순위: 부족 글자를 많이 가진 장비 먼저
  const candidates = state.equipInv
    .map((eq, idx) => ({ eq, idx,
      missingCovered: eq.letters.filter(c => miss[c] > 0).length }))
    .filter(x => (x.eq.tier === 'common' || x.eq.tier === 'magic') && x.missingCovered > 0)
    .sort((a, b) => b.missingCovered - a.missingCovered);
  if (candidates.length === 0) {
    toast('부족 글자 가진 일반/매직 장비가 없습니다');
    return;
  }
  // 그리디: 필요한 만큼만 분해
  const stillMissing = { ...miss };
  for (const cand of candidates) {
    const stillNeeded = Object.values(stillMissing).some(v => v > 0);
    if (!stillNeeded) break;
    toRemove.push(cand.idx);
    for (const c of cand.eq.letters) {
      if (stillMissing[c] && stillMissing[c] > 0) stillMissing[c]--;
    }
  }
  // 인덱스 역순 정렬 후 분해
  toRemove.sort((a,b) => b - a);
  let total = 0;
  for (const i of toRemove) {
    const eq = state.equipInv[i];
    const dis = W.disassembleEquipment(eq);
    for (const c of dis.letters) {
      state.letterInv[c] = (state.letterInv[c]||0) + 1;
      total++;
    }
    state.equipInv.splice(i, 1);
  }
  toast(`🔨 ${toRemove.length}개 분해 → ${total}글자 획득 (${text} 합성 준비)`);
  hideModal();
  // 단어 모달 다시 열어서 합성 가능한지 보여줌
  openWordModal(text);
  scheduleSave();
}

let _tutorialIdx = 0;
let _tutorialFromMenu = false;

function startTutorial(fromMenu = false) {
  _tutorialIdx = 0;
  _tutorialFromMenu = fromMenu;
  document.getElementById('tutBg').classList.add('show');
  renderTutorialSlide();
}

function renderTutorialSlide() {
  const slide = TUTORIAL_SLIDES[_tutorialIdx];
  const isFirst = _tutorialIdx === 0;
  const isLast = _tutorialIdx === TUTORIAL_SLIDES.length - 1;
  let html = `<div class="tut-emoji">${slide.emoji}</div>`;
  html += `<div class="tut-title">${slide.title}</div>`;
  html += `<div class="tut-body">${slide.body}</div>`;
  if (slide.demo) html += `<div class="tut-demo">${slide.demo}</div>`;
  html += `<div class="tut-dots">`;
  for (let i = 0; i < TUTORIAL_SLIDES.length; i++) {
    html += `<div class="tut-dot ${i === _tutorialIdx ? 'active' : ''}"></div>`;
  }
  html += `</div>`;
  html += `<div class="tut-nav">`;
  html += `<button class="btn-prev" ${isFirst ? 'disabled' : ''} onclick="tutorialPrev()">‹ 이전</button>`;
  if (isLast) {
    html += `<button class="btn-start" onclick="closeTutorial(false)">🎮 시작하기!</button>`;
  } else {
    html += `<button class="btn-next" onclick="tutorialNext()">다음 ›</button>`;
  }
  html += `</div>`;
  document.getElementById('tutCard').innerHTML = html;
}

function tutorialNext() {
  if (_tutorialIdx < TUTORIAL_SLIDES.length - 1) {
    _tutorialIdx++;
    renderTutorialSlide();
  }
}
function tutorialPrev() {
  if (_tutorialIdx > 0) {
    _tutorialIdx--;
    renderTutorialSlide();
  }
}
function closeTutorial(skipped) {
  document.getElementById('tutBg').classList.remove('show');
  state.tutorialSeen = true;
  scheduleSave();
  if (!_tutorialFromMenu) {
    toast(skipped ? '튜토리얼은 STAGE 메뉴에서 다시 볼 수 있어요' : '🎮 행운을 빕니다!');
  }
}

// ============== 멀티플레이 (1단계: Leaderboard) ==============
const DEFAULT_SERVER = 'http://localhost:3000'; // 사용자가 설정에서 변경 가능

function initMultiState() {
  if (!state.multi) state.multi = {};
  if (!state.multi.serverUrl) state.multi.serverUrl = DEFAULT_SERVER;
  // 닉네임은 사용자가 등록해야 함
}

let _lbSyncTimer = null;
function scheduleLeaderboardSync() {
  if (!state.multi || !state.multi.nickname) return;
  if (_lbSyncTimer) clearTimeout(_lbSyncTimer);
  _lbSyncTimer = setTimeout(() => { submitLeaderboard(); }, 2500); // 2.5초 debounce
}

async function submitLeaderboard() {
  initMultiState();
  if (!state.multi.nickname) return;
  const url = state.multi.serverUrl.replace(/\/+$/, '');
  const payload = {
    nickname: state.multi.nickname,
    bestStage: state.bestStage || state.stage,
    discovered: (state.discoveredWords || []).length,
    totalKills: state.totalKills || 0,
    bossKills: state.bossKills || 0,
    heroClass: state.player.heroClass || 'knight',
  };
  try {
    const res = await fetch(url + '/leaderboard/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    state.multi.lastSyncOk = !!data.ok;
    state.multi.lastSyncAt = Date.now();
  } catch (e) {
    state.multi.lastSyncOk = false;
    console.warn('leaderboard sync failed', e.message);
  }
}

function openMultiSettings() {
  initMultiState();
  const cur = state.multi.nickname || '';
  const url = state.multi.serverUrl;
  let html = `<h3>⚙️ 멀티 설정</h3>`;
  html += `<div style="margin-bottom:12px">
    <div style="color:#aaa;font-size:11px;margin-bottom:4px">닉네임 (1-12자, 한글/영문/숫자)</div>
    <input type="text" id="multiNickname" value="${cur}" maxlength="12"
      style="width:100%;padding:8px;background:rgba(0,0,0,0.4);border:1px solid #4a3020;border-radius:4px;color:#ffd28a;font-family:'Jua';font-size:13px"
      placeholder="예: 댕청이">
  </div>`;
  html += `<div style="margin-bottom:12px">
    <div style="color:#aaa;font-size:11px;margin-bottom:4px">서버 URL</div>
    <input type="text" id="multiServer" value="${url}"
      style="width:100%;padding:8px;background:rgba(0,0,0,0.4);border:1px solid #4a3020;border-radius:4px;color:#aaa;font-size:11px;font-family:monospace"
      placeholder="http://localhost:3000">
    <div style="color:#666;font-size:10px;margin-top:3px">자체 서버를 운영하지 않는다면 그대로 두세요</div>
  </div>`;
  html += `<div class="modal-actions">
    <button class="btn primary" onclick="saveMultiSettings()">저장</button>
    <button class="btn" onclick="hideModal()">취소</button>
  </div>`;
  showModal(html);
}

function saveMultiSettings() {
  initMultiState();
  const nick = document.getElementById('multiNickname').value.trim();
  const url = document.getElementById('multiServer').value.trim();
  if (!nick) { toast('닉네임을 입력하세요'); return; }
  if (!/^[가-힣a-zA-Z0-9_\-]{1,12}$/.test(nick)) {
    toast('닉네임은 1-12자, 한글/영문/숫자만'); return;
  }
  state.multi.nickname = nick;
  state.multi.serverUrl = url || DEFAULT_SERVER;
  toast(`👋 ${nick}님, 환영합니다!`);
  hideModal();
  submitLeaderboard();
  scheduleSave();
}

async function openMultiLeaderboard(type = 'stage') {
  initMultiState();
  let html = `<h3>🏆 글로벌 순위</h3>`;
  html += `<div style="display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap;justify-content:center">
    ${[
      ['stage', '🏔️ 최고 스테이지'],
      ['words', '📖 단어 발견'],
      ['bossKills', '💀 보스 처치'],
      ['kills', '⚔️ 총 처치'],
    ].map(([k, label]) => `
      <button class="filter-chip ${type===k?'active':''}"
        style="${type===k?'border-color:#ffaa44;color:#ffaa44;background:#ffaa4422':''}"
        onclick="openMultiLeaderboard('${k}')">${label}</button>
    `).join('')}
  </div>`;
  html += `<div id="lbBody" style="min-height:200px"><div style="text-align:center;color:#888;padding:24px">불러오는 중...</div></div>`;
  html += `<div style="text-align:center;color:#666;font-size:10px;margin-top:8px">매주 월요일 00:00 UTC 리셋</div>`;
  html += `<div class="modal-actions"><button class="btn" onclick="hideModal()">닫기</button></div>`;
  showModal(html);

  const url = state.multi.serverUrl.replace(/\/+$/, '');
  try {
    const res = await fetch(`${url}/leaderboard?type=${type}&limit=20`);
    const data = await res.json();
    renderLeaderboardBody(data, type);
  } catch (e) {
    document.getElementById('lbBody').innerHTML = `
      <div style="text-align:center;color:#aa6a6a;padding:24px;font-size:12px">
        ❌ 서버에 연결할 수 없어요<br>
        <span style="color:#666;font-size:10px">설정에서 서버 URL을 확인하세요</span>
      </div>`;
  }
}

function renderLeaderboardBody(data, type) {
  const body = document.getElementById('lbBody');
  if (!body) return;
  if (!data.entries || data.entries.length === 0) {
    body.innerHTML = `<div style="text-align:center;color:#888;padding:24px;font-size:12px">
      이번 주 기록이 아직 없어요<br>
      <span style="color:#666;font-size:10px">${data.week}</span>
    </div>`;
    return;
  }
  const myNick = state.multi.nickname;
  const valKey = type === 'words' ? 'discovered'
    : type === 'kills' ? 'totalKills'
    : type === 'bossKills' ? 'bossKills'
    : 'bestStage';
  const valLabel = type === 'words' ? '발견' : type === 'kills' ? '처치' : type === 'bossKills' ? '보스' : '스테이지';
  const clsEmoji = { knight: '⚔️', mage: '🔮', rogue: '🗡️', archer: '🏹' };
  let html = `<div style="font-size:10px;color:#666;text-align:right;margin-bottom:4px">${data.week} · ${data.count}명</div>`;
  html += `<div style="display:flex;flex-direction:column;gap:3px">`;
  for (const e of data.entries) {
    const isMe = e.nickname === myNick;
    const medalColor = e.rank === 1 ? '#ffd700' : e.rank === 2 ? '#c0c0c0' : e.rank === 3 ? '#cd7f32' : '#666';
    const medal = e.rank <= 3 ? ['🥇','🥈','🥉'][e.rank-1] : `#${e.rank}`;
    html += `<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:${isMe?'rgba(255,170,68,0.15)':'rgba(255,255,255,0.03)'};border-radius:4px;border:1px solid ${isMe?'#ffaa44':'#2a2030'}">
      <div style="min-width:24px;color:${medalColor};font-family:'Press Start 2P';font-size:11px">${medal}</div>
      <div style="font-size:16px">${clsEmoji[e.heroClass] || '⚔️'}</div>
      <div style="flex:1;color:${isMe?'#ffd28a':'#ddd'};font-family:'Jua';font-size:13px">${e.nickname}${isMe?' (나)':''}</div>
      <div style="color:#ffaa44;font-weight:bold;font-size:14px">${e[valKey]}</div>
      <div style="color:#666;font-size:10px">${valLabel}</div>
    </div>`;
  }
  html += `</div>`;
  body.innerHTML = html;
}

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    state.activeTab = t.dataset.tab;
    renderActiveTab();
  });
});

window.addEventListener('load', async () => {
  resizeCanvas();
  await waitSpritesReady();
  const loaded = loadSave();
  if (loaded) toast(`이어하기 — 스테이지 ${state.stage}`);
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === state.activeTab);
  });
  refreshHud();
  renderActiveTab();
  spawnEnemy();
  lastTime = performance.now();
  lastRenderTime = performance.now();
  requestAnimationFrame(loop);
  // 튜토리얼 자동 진입 (첫 진입 + 안 봤으면)
  if (!state.tutorialSeen) {
    setTimeout(() => startTutorial(false), 600);
  }
});
