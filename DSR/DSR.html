<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dino Spelling Run - Heroes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f0f0f0;
            font-family: 'Press+Start+2P', cursive;
            user-select: none;
            touch-action: manipulation;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
            background-color: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 95%;
            image-rendering: pixelated;
            border-radius: 12px;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }

        .word-display {
            font-size: 24px;
            color: #535353;
            letter-spacing: 8px;
            margin-bottom: 10px;
        }

        .letter-hint { color: #ddd; }
        .letter-collected { color: #4caf50; }
        .letter-current { color: #2196f3; text-decoration: underline; }

        .stats-container {
            position: absolute;
            top: 20px;
            right: 20px;
            text-align: right;
            color: #535353;
            font-size: 10px;
            pointer-events: none;
        }

        .hp-container {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 5px;
            pointer-events: none;
        }

        .heart { width: 22px; height: 22px; fill: #ff4d4d; }
        .heart.empty { fill: #ccc; }

        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.98);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .char-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .char-card {
            border: 4px solid #eee;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            width: 160px;
            background: white;
            transition: all 0.2s;
        }

        .char-card.selected { border-color: #2196f3; background: #e3f2fd; transform: translateY(-2px); }
        .char-card.locked { opacity: 0.5; cursor: default; background: #fafafa; }

        .btn {
            background: #535353;
            color: white;
            padding: 14px 28px;
            border: none;
            cursor: pointer;
            margin: 8px;
            font-family: 'Press+Start+2P', cursive;
            font-size: 12px;
            border-radius: 4px;
        }

        .btn:hover:not(:disabled) { background: #333; }
        .btn:disabled { background: #bbb; cursor: not-allowed; }

        #game-over-ui {
            text-align: center;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <div id="current-word" class="word-display"></div>
    </div>

    <div class="stats-container">
        <div>HI-SCORE: <span id="high-score-val">00000</span></div>
        <div style="font-size: 16px; margin-top: 8px;"><span id="score-val">00000</span></div>
        <div style="font-size: 10px; margin-top: 8px; color: #4caf50;">WORDS: <span id="word-count-val">0</span></div>
    </div>

    <div id="hp-bar" class="hp-container"></div>

    <canvas id="gameCanvas"></canvas>

    <div id="overlay">
        <div id="main-menu" style="text-align: center; width: 100%;">
            <h1 style="font-size: 28px; color: #535353; margin-bottom: 10px;">DINO HEROES</h1>
            <p style="font-size: 10px; color: #888; margin-bottom: 25px;">CHALLENGE MODE BEST: <span id="menu-hi-score">0</span></p>

            <div id="character-selection" class="char-grid mx-auto"></div>

            <div class="flex flex-col sm:flex-row justify-center items-center">
                <div class="m-2">
                    <button class="btn" onclick="startGame('practice')">PRACTICE</button>
                    <p style="font-size: 8px; color: #999; margin-top: 5px;">연습 모드 (무적)</p>
                </div>
                <div class="m-2">
                    <button class="btn" onclick="startGame('challenge')">CHALLENGE</button>
                    <p style="font-size: 8px; color: #999; margin-top: 5px;">도전 모드 (해금 가능)</p>
                </div>
            </div>
        </div>

        <div id="game-over-ui" style="display: none;">
            <h2 style="font-size: 32px; color: #ff4d4d; margin-bottom: 15px;">GAME OVER</h2>
            <p id="game-over-reason" style="font-size: 12px; color: #535353; margin-bottom: 30px;"></p>

            <div style="background: #f9f9f9; padding: 20px; border-radius: 8px; margin-bottom: 30px;">
                <p style="font-size: 10px; color: #888;">FINAL SCORE</p>
                <p id="final-score" style="font-size: 24px; color: #535353; margin: 10px 0;">00000</p>
                <p style="font-size: 10px; color: #4caf50;">WORDS COMPLETED: <span id="final-words">0</span></p>
            </div>

            <button class="btn" onclick="showMainMenu()">BACK TO MENU</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreVal = document.getElementById('score-val');
    const highScoreVal = document.getElementById('high-score-val');
    const wordCountVal = document.getElementById('word-count-val');
    const wordEl = document.getElementById('current-word');
    const hpBarEl = document.getElementById('hp-bar');
    const overlay = document.getElementById('overlay');
    const mainMenu = document.getElementById('main-menu');
    const gameOverUi = document.getElementById('game-over-ui');
    const charSelectionEl = document.getElementById('character-selection');

    const CANVAS_WIDTH = 800;
    const CANVAS_HEIGHT = 250;
    const GROUND_Y = 200;
    const GRAVITY = 0.6;
    const JUMP_FORCE = -12;
    const STORAGE_KEY = 'dino_spelling_run_stats';
    const WORDS = ["GALAXY", "PIXEL", "DINO", "RUNNER", "JUNGLE", "ORANGE", "BREEZE", "CACTUS", "SUMMER", "WINTER", "ROCKET", "PLANET", "FOREST", "RIVER", "BEACH"];

    const CHARACTERS = [
        { id: 'green', name: 'GREEN', color: '#535353', speedMult: 1.0, hp: 3, size: 1.0, unlockReq: 0 },
        { id: 'red', name: 'RED REX', color: '#e53935', speedMult: 1.25, hp: 2, size: 0.8, unlockReq: 2 },
        { id: 'blue', name: 'BLUE BRONTO', color: '#1e88e5', speedMult: 0.85, hp: 5, size: 1.3, unlockReq: 4 },
        { id: 'gold', name: 'GOLDEN', color: '#fbc02d', speedMult: 1.5, hp: 1, size: 0.9, unlockReq: 6 }
    ];

    let challengeHighScore = 0;
    let totalWordsCompleted = 0;
    let selectedCharIndex = 0;

    let gameMode = 'practice';
    let hp = 3;
    let score = 0;
    let isRunning = false;
    let gameSpeed = 6;
    let frame = 0;
    let currentWord = "";
    let targetLetterIndex = 0;
    let currentRunWords = 0;
    let animationId = null;

    let dino = { x: 50, y: 0, width: 44, height: 47, vy: 0, isJumping: false };
    let obstacles = [];
    let letters = [];
    let clouds = [];

    function loadStats() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try {
                const data = JSON.parse(saved);
                challengeHighScore = data.highScore || 0;
                totalWordsCompleted = data.totalWords || 0;
                selectedCharIndex = data.selectedChar || 0;
            } catch (e) { console.error(e); }
        }
    }

    function saveStats() {
        const data = {
            highScore: challengeHighScore,
            totalWords: totalWordsCompleted,
            selectedChar: selectedCharIndex
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function initCanvas() {
        canvas.width = CANVAS_WIDTH;
        canvas.height = CANVAS_HEIGHT;
    }

    function showMainMenu() {
        if (animationId) cancelAnimationFrame(animationId);
        isRunning = false;
        overlay.style.display = 'flex';
        mainMenu.style.display = 'block';
        gameOverUi.style.display = 'none';
        document.getElementById('menu-hi-score').innerText = Math.floor(challengeHighScore);
        renderCharSelection();
        updateUI();
    }

    function renderCharSelection() {
        charSelectionEl.innerHTML = "";
        CHARACTERS.forEach((char, index) => {
            const isUnlocked = totalWordsCompleted >= char.unlockReq;
            const isSelected = selectedCharIndex === index;
            const card = document.createElement('div');
            card.className = `char-card ${isSelected ? 'selected' : ''} ${isUnlocked ? '' : 'locked'}`;
            card.innerHTML = `
                <div style="font-size: 8px; margin-bottom: 8px;">${char.name}</div>
                <div style="background: ${char.color}; width: 24px; height: 24px; margin: 0 auto 8px; border-radius: 2px;"></div>
                <div style="font-size: 6px; color: #777;">HP: ${char.hp} | SPD: x${char.speedMult}</div>
                ${!isUnlocked ? `<div style="font-size: 6px; color: #ff9800; margin-top: 6px;">Need ${char.unlockReq} Words</div>` : ''}
            `;
            if (isUnlocked) {
                card.onclick = () => {
                    selectedCharIndex = index;
                    saveStats();
                    renderCharSelection();
                };
            }
            charSelectionEl.appendChild(card);
        });
    }

    function startGame(mode) {
        gameMode = mode;
        const char = CHARACTERS[selectedCharIndex];
        hp = (mode === 'challenge') ? char.hp : 999;
        overlay.style.display = 'none';
        resetGameState();
        isRunning = true;
        loop();
    }

    function resetGameState() {
        const char = CHARACTERS[selectedCharIndex];
        score = 0; frame = 0; currentRunWords = 0;
        gameSpeed = 6 * char.speedMult;
        obstacles = []; letters = []; clouds = [];
        dino.width = 44 * char.size;
        dino.height = 47 * char.size;
        dino.y = GROUND_Y - dino.height;
        dino.vy = 0; dino.isJumping = false;
        setNewWord();
        updateUI();
    }

    function setNewWord() {
        currentWord = WORDS[Math.floor(Math.random() * WORDS.length)];
        targetLetterIndex = 0;
    }

    function updateUI() {
        let html = "";
        for (let i = 0; i < currentWord.length; i++) {
            if (i < targetLetterIndex) html += `<span class="letter-collected">${currentWord[i]}</span>`;
            else if (i === targetLetterIndex) html += `<span class="letter-current">${currentWord[i]}</span>`;
            else html += `<span class="letter-hint">${currentWord[i]}</span>`;
        }
        wordEl.innerHTML = html;
        scoreVal.innerText = String(Math.floor(score)).padStart(5, '0');
        highScoreVal.innerText = String(Math.floor(challengeHighScore)).padStart(5, '0');
        wordCountVal.innerText = totalWordsCompleted;

        hpBarEl.innerHTML = "";
        if (gameMode === 'challenge') {
            for (let i = 0; i < CHARACTERS[selectedCharIndex].hp; i++) {
                hpBarEl.innerHTML += `<svg class="heart ${i < hp ? '' : 'empty'}" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
            }
        }
    }

    function handleAction() {
        if (!isRunning) return;
        if (!dino.isJumping) { dino.vy = JUMP_FORCE; dino.isJumping = true; }
    }

    window.addEventListener('keydown', (e) => { if (e.code === 'Space' || e.code === 'ArrowUp') handleAction(); });
    canvas.addEventListener('mousedown', handleAction);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleAction(); });

    function drawDino(x, y) {
        const char = CHARACTERS[selectedCharIndex];
        const s = char.size;
        ctx.fillStyle = char.color;
        ctx.fillRect(x + 15*s, y, 20*s, 15*s); // 머리
        ctx.fillRect(x + 30*s, y + 5*s, 10*s, 5*s); // 주둥이
        ctx.fillRect(x + 10*s, y + 15*s, 25*s, 20*s); // 몸통
        ctx.fillRect(x, y + 20*s, 10*s, 10*s); // 꼬리
        if (!dino.isJumping && Math.floor(frame / 6) % 2 === 0) {
            ctx.fillRect(x + 12*s, y + 35*s, 6*s, 10*s);
        } else {
            ctx.fillRect(x + 25*s, y + 35*s, 6*s, 10*s);
        }
        ctx.fillStyle = '#fff'; ctx.fillRect(x + 22*s, y + 3*s, 3*s, 3*s);
    }

    function update() {
        if (!isRunning) return;
        const char = CHARACTERS[selectedCharIndex];
        gameSpeed += 0.0005;
        score += 0.15;

        dino.vy += GRAVITY;
        dino.y += dino.vy;
        if (dino.y > GROUND_Y - dino.height) {
            dino.y = GROUND_Y - dino.height;
            dino.vy = 0; dino.isJumping = false;
        }

        clouds.forEach((c, i) => { c.x -= c.speed; if (c.x < -100) clouds.splice(i, 1); });

        // --- 1. 장애물 충돌 판정 (HITBOX ADJUSTMENT) ---
        // 캐릭터와 선인장의 외곽 15% 정도를 무시하여 실제 몸통 충돌만 감지
        obstacles.forEach((o, i) => {
            o.x -= gameSpeed;
            const dinoHitbox = {
                left: dino.x + (dino.width * 0.15),
                right: dino.x + (dino.width * 0.85),
                top: dino.y + (dino.height * 0.15),
                bottom: dino.y + (dino.height * 0.95)
            };
            const cactusHitbox = {
                left: o.x + (o.width * 0.1),
                right: o.x + (o.width * 0.9),
                top: o.y + (o.height * 0.1),
                bottom: o.y + o.height
            };

            if (dinoHitbox.left < cactusHitbox.right &&
                dinoHitbox.right > cactusHitbox.left &&
                dinoHitbox.top < cactusHitbox.bottom &&
                dinoHitbox.bottom > cactusHitbox.top) {
                endGame("HIT A CACTUS!");
            }
            if (o.x < -100) obstacles.splice(i, 1);
        });

        // --- 2. 알파벳 충돌 판정 (HITBOX ADJUSTMENT) ---
        for (let i = letters.length - 1; i >= 0; i--) {
            let l = letters[i];
            l.x -= gameSpeed;

            // 텍스트는 20px 폰트 기준 대략 16x16 픽셀 크기
            // 캔버스 fillText의 l.y는 글자의 바닥 기준선(baseline)임
            const letterHitbox = {
                left: l.x,
                right: l.x + 18,
                top: l.y - 18, // 기준선 위로 판정
                bottom: l.y + 2
            };

            const dinoHitbox = {
                left: dino.x + (dino.width * 0.1),
                right: dino.x + (dino.width * 0.9),
                top: dino.y + (dino.height * 0.1),
                bottom: dino.y + (dino.height * 0.9)
            };

            if (dinoHitbox.left < letterHitbox.right &&
                dinoHitbox.right > letterHitbox.left &&
                dinoHitbox.top < letterHitbox.bottom &&
                dinoHitbox.bottom > letterHitbox.top) {

                if (l.char === currentWord[targetLetterIndex]) {
                    targetLetterIndex++;
                    score += 100;
                    if (targetLetterIndex >= currentWord.length) {
                        score += 500; currentRunWords++;
                        if (gameMode === 'challenge') {
                            totalWordsCompleted++;
                            if (hp < char.hp) hp++;
                            saveStats();
                        }
                        setNewWord();
                    }
                } else {
                    if (gameMode === 'challenge') {
                        hp--;
                        if (hp <= 0) { endGame("OUT OF HEARTS!"); return; }
                    }
                    score = Math.max(0, score - 50);
                }
                letters.splice(i, 1);
                updateUI();
            } else if (l.x < -100) letters.splice(i, 1);
        }

        spawnManager();
        if (gameMode === 'challenge' && score > challengeHighScore) {
            challengeHighScore = score; saveStats();
        }
        updateUI();
    }

    function spawnManager() {
        frame++;
        if (frame % 150 === 0) clouds.push({ x: CANVAS_WIDTH, y: 30 + Math.random() * 50, speed: 0.5 + Math.random() });
        if (frame % 120 === 0 && Math.random() > 0.4) obstacles.push({ x: CANVAS_WIDTH, y: GROUND_Y - 40, width: 25, height: 40 });
        if (frame % 75 === 0) {
            const lastObs = obstacles[obstacles.length - 1];
            const isNearObs = lastObs && (CANVAS_WIDTH - lastObs.x < 180);
            let char; let yPos = GROUND_Y - 70 - Math.random() * 60;
            if (isNearObs) {
                if (Math.random() > 0.4) { char = currentWord[targetLetterIndex]; yPos = GROUND_Y - 120; }
                else return;
            } else {
                char = (Math.random() > 0.5) ? currentWord[targetLetterIndex] : "ABCDEFGHIJKLMNOPQRSTUVWXYZ"[Math.floor(Math.random() * 26)];
            }
            letters.push({ x: CANVAS_WIDTH, y: yPos, char: char });
        }
    }

    function loop() {
        if (!isRunning) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#535353'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, GROUND_Y + 5); ctx.lineTo(CANVAS_WIDTH, GROUND_Y + 5); ctx.stroke();

        clouds.forEach(c => {
            ctx.fillStyle = '#f0f0f0';
            ctx.fillRect(c.x, c.y, 40, 10); ctx.fillRect(c.x + 10, c.y - 5, 20, 5);
        });

        obstacles.forEach(o => {
            ctx.fillStyle = '#535353';
            ctx.fillRect(o.x + 8, o.y, 9, 40); ctx.fillRect(o.x, o.y + 10, 8, 15); ctx.fillRect(o.x + 17, o.y + 5, 8, 20);
        });

        letters.forEach(l => {
            const isTarget = l.char === currentWord[targetLetterIndex];
            ctx.fillStyle = isTarget ? '#2196f3' : '#535353';
            ctx.font = '20px "Press Start 2P"';
            ctx.fillText(l.char, l.x, l.y);
        });

        drawDino(dino.x, dino.y);
        update();
        animationId = requestAnimationFrame(loop);
    }

    function endGame(reason) {
        isRunning = false;
        if (animationId) cancelAnimationFrame(animationId);
        saveStats();
        overlay.style.display = 'flex';
        mainMenu.style.display = 'none';
        gameOverUi.style.display = 'block';
        document.getElementById('game-over-reason').innerText = reason;
        document.getElementById('final-score').innerText = String(Math.floor(score)).padStart(5, '0');
        document.getElementById('final-words').innerText = currentRunWords;
    }

    initCanvas();
    loadStats();
    showMainMenu();
    window.addEventListener('resize', initCanvas);
</script>

</body>
</html>
