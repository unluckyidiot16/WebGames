<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알파벳 스트림스: 통합 에디션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f8fafc;
        }
        .pop-anim {
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .board-path {
            background-image: radial-gradient(#cbd5e1 2px, transparent 2px);
            background-size: 20px 20px;
        }
        .timer-transition {
            transition: width 1s linear, background-color 0.3s ease;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-800 min-h-screen">

<!-- 타이틀 화면 -->
<div id="screen-title" class="flex flex-col items-center justify-center min-h-screen p-4 bg-slate-50">
    <div class="text-center mb-10 pop-anim">
        <h1 class="text-5xl md:text-7xl font-black text-slate-800 tracking-tight mb-4 drop-shadow-sm">알파벳 스트림스</h1>
        <p class="text-lg text-slate-500 font-medium">난이도별 4가지 모드로 내 한계에 도전하세요!</p>
    </div>

    <!-- 모드 선택 버튼 그리드 -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-3xl pop-anim" style="animation-delay: 0.1s;">

        <!-- 튜토리얼 모드 -->
        <button onclick="startGame('tutorial')" class="group p-6 bg-white border-2 border-emerald-400 hover:bg-emerald-50 rounded-3xl shadow-sm text-left flex flex-col justify-between h-full transition-all hover:shadow-md transform hover:-translate-y-1">
            <div class="flex justify-between items-start w-full mb-3">
                <h3 class="text-2xl font-black text-emerald-600">🌱 튜토리얼 모드</h3>
                <span class="bg-emerald-100 text-emerald-800 text-xs font-bold px-2 py-1 rounded-lg">26칸</span>
            </div>
            <p class="text-sm text-slate-500 mb-6 font-medium">조커 없이 A~Z가 한 번씩 등장합니다.<br/>알파벳의 정확한 순서와 위치를 연습해 보세요.</p>
            <div class="text-emerald-700 font-bold bg-emerald-100/50 inline-block px-3 py-1.5 rounded-xl text-sm self-start">
                내 최고 기록: <span id="hs-tutorial" class="text-lg font-black ml-1">0</span>점
            </div>
        </button>

        <!-- 연습 모드 -->
        <button onclick="startGame('practice')" class="group p-6 bg-white border-2 border-blue-400 hover:bg-blue-50 rounded-3xl shadow-sm text-left flex flex-col justify-between h-full transition-all hover:shadow-md transform hover:-translate-y-1">
            <div class="flex justify-between items-start w-full mb-3">
                <h3 class="text-2xl font-black text-blue-600">📘 연습 모드</h3>
                <span class="bg-blue-100 text-blue-800 text-xs font-bold px-2 py-1 rounded-lg">20칸</span>
            </div>
            <p class="text-sm text-slate-500 mb-6 font-medium">오리지널 룰과 동일한 20칸 보드!<br/>무작위 타일과 조커를 활용해 긴 흐름을 만드세요.</p>
            <div class="text-blue-700 font-bold bg-blue-100/50 inline-block px-3 py-1.5 rounded-xl text-sm self-start">
                내 최고 기록: <span id="hs-practice" class="text-lg font-black ml-1">0</span>점
            </div>
        </button>

        <!-- 일반 모드 -->
        <button onclick="startGame('normal')" class="group p-6 bg-white border-2 border-teal-400 hover:bg-teal-50 rounded-3xl shadow-sm text-left flex flex-col justify-between h-full transition-all hover:shadow-md transform hover:-translate-y-1">
            <div class="flex justify-between items-start w-full mb-3">
                <h3 class="text-2xl font-black text-teal-600">⚡ 일반 모드</h3>
                <span class="bg-teal-100 text-teal-800 text-xs font-bold px-2 py-1 rounded-lg">15칸</span>
            </div>
            <p class="text-sm text-slate-500 mb-6 font-medium">15칸으로 축소된 미니 보드판.<br/>빠르고 가볍게, 머리 식히기 좋은 모드입니다.</p>
            <div class="text-teal-700 font-bold bg-teal-100/50 inline-block px-3 py-1.5 rounded-xl text-sm self-start">
                내 최고 기록: <span id="hs-normal" class="text-lg font-black ml-1">0</span>점
            </div>
        </button>

        <!-- 도전 모드 -->
        <button onclick="startGame('challenge')" class="group p-6 bg-gradient-to-br from-orange-500 to-red-500 border-2 border-transparent hover:shadow-xl rounded-3xl shadow-md text-left flex flex-col justify-between h-full transition-all transform hover:-translate-y-1">
            <div class="flex justify-between items-start w-full mb-3">
                <h3 class="text-2xl font-black text-white">🔥 도전 모드</h3>
                <span class="bg-white text-red-600 text-xs font-bold px-2 py-1 rounded-lg">15칸 / 10초</span>
            </div>
            <p class="text-sm text-orange-100 mb-6 font-medium">타일 1개당 단 10초의 제한 시간!<br/>시간 초과 시 무작위 칸에 강제 배치됩니다.</p>
            <div class="text-white font-bold bg-black/20 inline-block px-3 py-1.5 rounded-xl text-sm self-start">
                내 최고 기록: <span id="hs-challenge" class="text-lg font-black ml-1">0</span>점
            </div>
        </button>
    </div>
</div>

<!-- 메인 게임 화면 -->
<div id="screen-game" class="hidden flex-col items-center py-6 px-4 w-full">
    <!-- 상단 헤더 & 돌아가기 버튼 -->
    <header class="w-full max-w-6xl flex justify-between items-center mb-6">
        <button onclick="showTitleScreen()" class="px-4 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold rounded-xl transition-colors text-sm shadow-sm">
            ← 메인 메뉴
        </button>
        <h1 class="text-xl md:text-3xl font-black text-slate-800 tracking-tight flex items-center gap-2">
            알파벳 스트림스 <span id="mode-badge" class="text-sm align-middle px-3 py-1 rounded-lg shadow-sm"></span>
        </h1>
        <div class="w-[88px]"></div> <!-- 밸런스용 공간 -->
    </header>

    <main class="w-full max-w-7xl flex flex-col lg:flex-row gap-6 justify-center items-start">

        <!-- 왼쪽 패널 -->
        <div class="w-full lg:w-[280px] flex flex-col gap-5 items-center bg-white p-6 rounded-3xl shadow-sm border border-slate-200 shrink-0">
            <div class="text-center w-full">
                <h2 class="text-lg font-bold text-slate-700 mb-4">이번 턴 알파벳</h2>
                <div id="current-tile-display" class="mx-auto w-32 h-32 flex items-center justify-center text-7xl font-black rounded-3xl border-[6px] border-slate-200 bg-slate-50 text-slate-800 shadow-inner mb-4 transition-all pop-anim">
                    ?
                </div>
                <p class="text-slate-500 font-medium bg-slate-100 py-2 rounded-xl">남은 타일: <span id="tiles-left" class="text-slate-800 font-black text-xl">0</span>개</p>
            </div>

            <!-- 타이머 UI -->
            <div id="timer-container" class="hidden w-full bg-orange-50 p-4 rounded-xl border border-orange-200">
                <div class="flex justify-between text-sm font-bold text-orange-900 mb-2">
                    <span>배치 제한 시간</span>
                    <span id="timer-text" class="text-red-500">10초</span>
                </div>
                <div class="w-full h-3 bg-white rounded-full overflow-hidden shadow-inner border border-orange-100">
                    <div id="timer-bar" class="h-full bg-orange-500 w-full timer-transition"></div>
                </div>
            </div>

            <button onclick="initGame(currentModeId)" class="w-full py-4 bg-slate-800 hover:bg-slate-900 text-white font-bold rounded-2xl shadow-md transition-colors">
                현재 게임 재시작
            </button>
        </div>

        <!-- 중앙 패널: 동적 보드판 -->
        <div class="w-full flex-1 flex flex-col items-center">
            <div class="bg-white p-4 md:p-8 rounded-[2rem] shadow-lg border-2 border-slate-200 board-path w-full">
                <!-- Grid: 5열 고정. 줄 수는 JS에서 조절 -->
                <div id="board-grid" class="grid grid-cols-5 gap-2 md:gap-4">
                    <!-- JS Dynamic Generate -->
                </div>
            </div>
        </div>

        <!-- 오른쪽 패널: 점수표 -->
        <div class="w-full lg:w-[300px] bg-white p-6 rounded-3xl shadow-sm border border-slate-200 shrink-0">
            <h2 class="text-lg font-bold text-slate-700 mb-4 text-center border-b-2 border-slate-100 pb-3">점수표</h2>
            <div id="score-table-container" class="grid gap-x-4 gap-y-1 text-sm custom-scrollbar max-h-[500px] overflow-y-auto pr-2">
                <!-- JS Dynamic Generate -->
            </div>
        </div>
    </main>
</div>

<!-- 게임 결과 모달 -->
<div id="result-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl max-w-md w-full text-center pop-anim border-4 border-slate-100">
        <h2 class="text-3xl font-black text-slate-800 mb-2">게임 종료!</h2>
        <p class="text-slate-500 mb-6 font-bold" id="result-mode-text">모드 최종 점수</p>

        <div class="relative inline-block mb-6">
            <div id="new-record-badge" class="hidden absolute -top-4 -right-8 bg-red-500 text-white text-xs font-black px-2 py-1 rounded-full transform rotate-12 shadow-lg pop-anim border-2 border-white z-10">
                NEW RECORD!
            </div>
            <div class="text-7xl font-black text-slate-800 bg-slate-50 py-4 px-8 rounded-3xl border-2 border-slate-100 shadow-inner">
                <span id="final-score">0</span><span class="text-3xl text-slate-400">점</span>
            </div>
        </div>

        <div id="segment-breakdown" class="text-left bg-slate-50 p-4 rounded-2xl mb-6 max-h-48 overflow-y-auto space-y-2 text-sm border border-slate-200 custom-scrollbar">
            <!-- 구간 기록 생성 -->
        </div>
        <div class="flex gap-3">
            <button onclick="showTitleScreen()" class="w-1/3 py-4 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold rounded-2xl transition-colors">
                메뉴
            </button>
            <button onclick="initGame(currentModeId)" class="w-2/3 py-4 bg-slate-800 hover:bg-slate-900 text-white text-lg font-bold rounded-2xl shadow-lg transition-colors">
                다시 하기
            </button>
        </div>
    </div>
</div>

<script>
    // --- Game Configuration & Data ---

    // 칸별 배점표
    const SCORE_TABLES = {
        15: [0, 0, 1, 3, 5, 7, 9, 11, 15, 20, 25, 30, 40, 50, 70, 100],
        20: [0, 0, 1, 3, 5, 7, 9, 11, 15, 20, 25, 30, 35, 40, 50, 60, 70, 85, 100, 150, 300],
        26: [0, 0, 1, 2, 4, 6, 8, 10, 13, 16, 20, 25, 30, 35, 40, 50, 60, 70, 80, 95, 110, 130, 150, 200, 300, 400, 500]
    };

    const MODES = {
        'tutorial': { id: 'tutorial', name: '튜토리얼', tiles: 26, timer: 0, poolType: 'A2Z', themeClass: 'border-emerald-500 bg-emerald-50 text-emerald-800', badgeClass: 'bg-emerald-500 text-white' },
        'practice': { id: 'practice', name: '연습 모드', tiles: 20, timer: 0, poolType: 'Standard', themeClass: 'border-blue-500 bg-blue-50 text-blue-800', badgeClass: 'bg-blue-500 text-white' },
        'normal':   { id: 'normal', name: '일반 모드', tiles: 15, timer: 0, poolType: 'Standard', themeClass: 'border-teal-500 bg-teal-50 text-teal-800', badgeClass: 'bg-teal-500 text-white' },
        'challenge':{ id: 'challenge', name: '도전 모드', tiles: 15, timer: 10, poolType: 'Standard', themeClass: 'border-red-500 bg-red-50 text-red-800', badgeClass: 'bg-red-500 text-white' }
    };

    const SEGMENT_COLORS = [
        'bg-red-100 border-red-300 text-red-900',
        'bg-orange-100 border-orange-300 text-orange-900',
        'bg-emerald-100 border-emerald-300 text-emerald-900',
        'bg-blue-100 border-blue-300 text-blue-900',
        'bg-purple-100 border-purple-300 text-purple-900'
    ];

    // --- State Variables ---
    let currentModeId = 'normal';
    let config = MODES[currentModeId];
    let deck = [];
    let board = [];
    let turn = 0;
    let isGameOver = false;
    let finalSegments = [];

    let highScores = { tutorial: 0, practice: 0, normal: 0, challenge: 0 };
    let timerInterval = null;
    let timeLeft = 0;

    // --- Init & Storage ---
    window.onload = () => {
        loadHighScores();
        showTitleScreen();
    };

    function loadHighScores() {
        for (let key in highScores) {
            try {
                let saved = localStorage.getItem('alphabet_stream_' + key);
                if (saved) highScores[key] = parseInt(saved, 10);
            } catch(e) {}
            document.getElementById('hs-' + key).innerText = highScores[key];
        }
    }

    function saveHighScore(mode, score) {
        if (score > highScores[mode]) {
            highScores[mode] = score;
            try { localStorage.setItem('alphabet_stream_' + mode, score); } catch(e) {}
            document.getElementById('hs-' + mode).innerText = score;
            return true;
        }
        return false;
    }

    // --- Screen Manage ---
    function showTitleScreen() {
        stopTimer();
        document.getElementById('screen-game').classList.add('hidden');
        document.getElementById('result-modal').classList.add('hidden');
        document.getElementById('screen-title').classList.remove('hidden');
        document.getElementById('screen-title').classList.add('flex');
        loadHighScores(); // 타이틀 올 때마다 갱신
    }

    function startGame(modeId) {
        currentModeId = modeId;
        config = MODES[modeId];

        document.getElementById('screen-title').classList.add('hidden');
        document.getElementById('screen-title').classList.remove('flex');

        const gameScreen = document.getElementById('screen-game');
        gameScreen.classList.remove('hidden');
        gameScreen.classList.add('flex');

        // 테마 및 뱃지 적용
        const badge = document.getElementById('mode-badge');
        badge.innerText = `${config.name} (${config.tiles}칸)`;
        badge.className = `text-sm align-middle px-3 py-1 rounded-lg shadow-sm font-bold pop-anim ${config.badgeClass}`;

        const timerContainer = document.getElementById('timer-container');
        if (config.timer > 0) timerContainer.classList.remove('hidden');
        else timerContainer.classList.add('hidden');

        initGame(modeId);
    }

    // --- Game Logic ---
    function initGame(modeId) {
        stopTimer();

        // 1. 타일 풀 구성
        let pool = [];
        if (config.poolType === 'A2Z') {
            // 튜토리얼: A~Z 각 1개
            pool = Array.from({ length: 26 }, (_, i) => String.fromCharCode(65 + i));
        } else {
            // 일반/연습: A~Z 각 1개 + 조커 1개 = 27개에서 필요한 만큼 뽑음
            pool = Array.from({ length: 26 }, (_, i) => String.fromCharCode(65 + i));
            pool.push('★');
        }

        // 2. 섞기
        for (let i = pool.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [pool[i], pool[j]] = [pool[j], pool[i]];
        }

        // 3. 덱 준비
        deck = pool.slice(0, config.tiles);

        // 4. 상태 초기화
        board = Array(config.tiles).fill(null);
        turn = 0;
        isGameOver = false;
        finalSegments = [];

        // 5. UI 초기화
        document.getElementById('result-modal').classList.add('hidden');
        renderScoreTableUI();
        updateBoardUI();
        updateInfoUI();

        // 6. 타이머
        if (config.timer > 0) resetAndStartTimer();
    }

    function placeTile(logicalIndex) {
        if (isGameOver || board[logicalIndex] !== null) return;
        stopTimer();

        board[logicalIndex] = deck[turn];
        turn++;

        updateBoardUI();
        updateInfoUI();

        if (turn >= config.tiles) {
            isGameOver = true;
            setTimeout(calculateAndShowResult, 500);
        } else {
            if (config.timer > 0) resetAndStartTimer();
        }
    }

    // --- Timer (Challenge) ---
    function resetAndStartTimer() {
        if (isGameOver) return;
        timeLeft = config.timer;

        const bar = document.getElementById('timer-bar');
        bar.classList.remove('timer-transition');
        bar.style.width = '100%';
        bar.classList.remove('bg-red-500');
        bar.classList.add('bg-orange-500');
        document.getElementById('timer-text').innerText = `${timeLeft}초`;
        document.getElementById('timer-text').classList.remove('text-red-600', 'animate-pulse');

        void bar.offsetWidth; // Reflow
        bar.classList.add('timer-transition');

        timerInterval = setInterval(() => {
            timeLeft--;
            bar.style.width = `${(timeLeft / config.timer) * 100}%`;
            document.getElementById('timer-text').innerText = `${timeLeft}초`;

            if (timeLeft <= 3 && timeLeft > 0) {
                bar.classList.replace('bg-orange-500', 'bg-red-500');
                document.getElementById('timer-text').classList.add('text-red-600', 'animate-pulse');
            }

            if (timeLeft <= 0) {
                stopTimer();
                autoPlaceTile();
            }
        }, 1000);
    }

    function stopTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = null;
    }

    function autoPlaceTile() {
        const emptyIndices = board.map((val, idx) => val === null ? idx : -1).filter(idx => idx !== -1);
        if (emptyIndices.length > 0) {
            placeTile(emptyIndices[Math.floor(Math.random() * emptyIndices.length)]);
        }
    }

    // --- Algorithm: DP 최적 점수 계산 ---
    function calculateBestScore() {
        const n = board.length;
        const dp = new Array(n).fill(-1);
        const parent = new Array(n).fill(-1);
        const scoreTbl = SCORE_TABLES[config.tiles];

        function isValidSequence(start, end) {
            let prevChar = null;
            for (let i = start; i <= end; i++) {
                if (board[i] !== '★') {
                    if (prevChar !== null && board[i] < prevChar) return false;
                    prevChar = board[i];
                }
            }
            return true;
        }

        function getScore(len) {
            if (len <= 0) return 0;
            if (len >= n) return scoreTbl[n];
            return scoreTbl[len];
        }

        for (let i = 0; i < n; i++) {
            for (let j = 0; j <= i; j++) {
                if (isValidSequence(j, i)) {
                    const len = i - j + 1;
                    const prevScore = j > 0 ? dp[j - 1] : 0;
                    const currentScore = prevScore + getScore(len);

                    if (currentScore > dp[i]) {
                        dp[i] = currentScore;
                        parent[i] = j;
                    }
                }
            }
        }

        const segments = [];
        let curr = n - 1;
        while (curr >= 0) {
            const start = parent[curr];
            const len = curr - start + 1;
            segments.push({ start: start, end: curr, length: len, score: getScore(len) });
            curr = start - 1;
        }
        segments.reverse();

        return { totalScore: dp[n - 1], segments };
    }

    function calculateAndShowResult() {
        const result = calculateBestScore();
        finalSegments = result.segments;

        updateBoardUI(true);

        const isNewRecord = saveHighScore(currentModeId, result.totalScore);

        document.getElementById('final-score').innerText = result.totalScore;
        document.getElementById('result-mode-text').innerText = `${config.name} 최종 점수`;

        const badge = document.getElementById('new-record-badge');
        isNewRecord ? badge.classList.remove('hidden') : badge.classList.add('hidden');

        const breakdownContainer = document.getElementById('segment-breakdown');
        breakdownContainer.innerHTML = '';

        result.segments.forEach((seg, idx) => {
            const colorClass = SEGMENT_COLORS[idx % SEGMENT_COLORS.length];
            const div = document.createElement('div');
            div.className = `flex justify-between items-center py-2 px-3 rounded-lg mb-1 font-medium ${colorClass}`;

            const chars = [];
            for(let i=seg.start; i<=seg.end; i++) chars.push(board[i]);
            const charStr = chars.join(' → ');

            div.innerHTML = `
                    <span>[구간 ${idx + 1}] ${charStr} <span class="text-slate-500 text-xs ml-1 opacity-70">(${seg.length}칸)</span></span>
                    <span class="font-bold">+${seg.score}점</span>
                `;
            breakdownContainer.appendChild(div);
        });

        document.getElementById('result-modal').classList.remove('hidden');
    }

    // --- UI Rendering ---

    // 지그재그(S자) 배열의 DOM 렌더링을 처리
    function updateBoardUI(showResultColors = false) {
        const grid = document.getElementById('board-grid');
        grid.innerHTML = '';

        let total = config.tiles;
        let rows = Math.ceil(total / 5);

        for (let r = 0; r < rows; r++) {
            let rowIndices = [];
            for (let c = 0; c < 5; c++) {
                let logicalIdx = r * 5 + c;
                rowIndices.push(logicalIdx < total ? logicalIdx : -1); // -1은 보이지 않는 더미 칸
            }

            // 홀수 번째 줄은 역순(오른쪽에서 왼쪽) 배치
            if (r % 2 === 1) rowIndices.reverse();

            rowIndices.forEach(logicalIdx => {
                if (logicalIdx === -1) {
                    // 그리드 형태를 유지하기 위한 빈 공간
                    let dummy = document.createElement('div');
                    grid.appendChild(dummy);
                    return;
                }

                const tileValue = board[logicalIdx];
                const btn = document.createElement('button');

                let baseClasses = "relative w-full aspect-square flex flex-col items-center justify-center rounded-2xl transition-all duration-300 border-[3px] focus:outline-none overflow-hidden ";

                if (showResultColors && tileValue !== null) {
                    const segIdx = finalSegments.findIndex(s => logicalIdx >= s.start && logicalIdx <= s.end);
                    const colorClasses = segIdx !== -1 ? SEGMENT_COLORS[segIdx % SEGMENT_COLORS.length] : 'bg-slate-200 border-slate-300 text-slate-500';
                    baseClasses += colorClasses + " shadow-md";
                } else {
                    if (tileValue === null) {
                        baseClasses += "border-dashed border-slate-300 bg-white hover:bg-slate-100 cursor-pointer group";
                    } else if (tileValue === '★') {
                        baseClasses += "border-yellow-400 bg-yellow-50 text-yellow-600 shadow-md transform scale-105 z-10";
                    } else {
                        // 모드에 맞는 테마 색상 적용
                        baseClasses += config.themeClass + " shadow-md";
                    }
                }

                btn.className = baseClasses;

                // 칸 번호 표시
                const numSpan = document.createElement('span');
                if (tileValue === null) {
                    numSpan.className = 'absolute top-1.5 left-2 text-xl md:text-2xl font-black text-slate-300 transition-colors group-hover:text-slate-400';
                } else {
                    numSpan.className = 'absolute top-1 left-2 text-xl md:text-2xl font-black text-slate-300 opacity-40 z-0 select-none';
                }
                numSpan.innerText = logicalIdx + 1;
                btn.appendChild(numSpan);

                // 타일 알파벳 표시
                if (tileValue !== null) {
                    const valSpan = document.createElement('span');
                    valSpan.className = 'relative z-10 text-4xl md:text-[2.75rem] font-black pop-anim';
                    valSpan.innerText = tileValue;
                    btn.appendChild(valSpan);
                }

                if (!showResultColors) btn.onclick = () => placeTile(logicalIdx);
                grid.appendChild(btn);
            });
        }
    }

    function updateInfoUI() {
        const tileDisplay = document.getElementById('current-tile-display');
        const leftDisplay = document.getElementById('tiles-left');

        if (turn < config.tiles) {
            const currentTile = deck[turn];
            tileDisplay.innerText = currentTile;

            // 타일 애니메이션 리셋 트릭
            tileDisplay.classList.remove('pop-anim');
            void tileDisplay.offsetWidth;
            tileDisplay.classList.add('pop-anim');

            if(currentTile === '★') {
                tileDisplay.className = "mx-auto w-32 h-32 flex items-center justify-center text-7xl font-black rounded-3xl border-[6px] shadow-lg mb-4 transition-all border-yellow-400 bg-yellow-50 text-yellow-500 pop-anim";
            } else {
                // 모드별 테마 색상 적용
                tileDisplay.className = `mx-auto w-32 h-32 flex items-center justify-center text-7xl font-black rounded-3xl border-[6px] shadow-lg mb-4 transition-all ${config.themeClass} pop-anim`;
            }
            leftDisplay.innerText = config.tiles - turn;
        } else {
            tileDisplay.innerText = '끝';
            tileDisplay.className = "mx-auto w-32 h-32 flex items-center justify-center text-5xl font-black rounded-3xl border-[6px] border-slate-200 bg-slate-100 text-slate-400 shadow-inner mb-4 transition-all";
            leftDisplay.innerText = 0;
        }
    }

    function renderScoreTableUI() {
        const container = document.getElementById('score-table-container');
        container.innerHTML = '';

        const total = config.tiles;
        const scoreTbl = SCORE_TABLES[total];

        // 칸수가 많으면 2단 다단 구성, 아니면 1단으로 나열
        if (total > 15) {
            container.className = "grid grid-cols-2 gap-x-4 gap-y-1 text-sm custom-scrollbar max-h-[500px] overflow-y-auto pr-2";
        } else {
            container.className = "grid grid-cols-1 gap-y-1 text-sm custom-scrollbar max-h-[500px] overflow-y-auto pr-2";
        }

        for(let i = 1; i <= total; i++) {
            const row = document.createElement('div');
            row.className = "flex justify-between items-center py-1 px-2 rounded hover:bg-slate-100 transition-colors border-b border-slate-50 last:border-0";
            row.innerHTML = `<span class="text-slate-500">${i}칸</span> <span class="font-black text-slate-700">+${scoreTbl[i]}</span>`;
            container.appendChild(row);
        }
    }
</script>
</body>
</html>
