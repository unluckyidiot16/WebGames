<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미니 스트림스: 알파벳 에디션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 커스텀 애니메이션 설정 */
        @keyframes fadeInZoom {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }
        .animate-fade-in-zoom {
            animation: fadeInZoom 0.5s ease-out forwards;
        }
        @keyframes slideInBottom {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-in-bottom {
            animation: slideInBottom 0.3s ease-out forwards;
        }
        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        /* 스크롤바 디자인 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 flex flex-col items-center justify-center min-h-screen p-4">

<!-- 시작 화면 -->
<div id="start-screen" class="flex flex-col items-center justify-center max-w-md w-full text-center space-y-8 animate-fade-in-zoom">
    <div class="bg-white p-8 rounded-3xl shadow-xl border-4 border-teal-500 w-full relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-4 bg-teal-500"></div>
        <h1 class="text-4xl md:text-5xl font-extrabold text-teal-600 mb-4 tracking-tight">
            미니 스트림스<br/><span class="text-orange-500 text-3xl">알파벳 에디션</span>
        </h1>
        <p class="text-slate-500 mb-8 font-medium">
            A~Z와 조커(★) 중 무작위로<br/>15개의 타일을 뽑습니다!
        </p>

        <div class="flex flex-col gap-3">
            <button id="btn-start" class="flex items-center justify-center w-full gap-2 bg-teal-500 hover:bg-teal-600 text-white text-xl font-bold py-4 px-8 rounded-2xl transition-all transform hover:scale-105 active:scale-95 shadow-lg shadow-teal-500/30">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><polygon points="6 3 20 12 6 21 6 3"></polygon></svg>
                게임 시작하기
            </button>

            <button id="btn-open-calc-main" class="flex items-center justify-center w-full gap-2 bg-slate-200 hover:bg-slate-300 text-slate-700 text-lg font-bold py-3 px-8 rounded-2xl transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><rect width="16" height="20" x="4" y="2" rx="2"></rect><line x1="8" x2="16" y1="6" y2="6"></line><line x1="16" x2="16" y1="14" y2="18"></line><path d="M16 10h.01"></path><path d="M12 10h.01"></path><path d="M8 10h.01"></path><path d="M12 14h.01"></path><path d="M8 14h.01"></path><path d="M12 18h.01"></path><path d="M8 18h.01"></path></svg>
                점수 계산기
            </button>
        </div>
    </div>
</div>

<!-- 게임 진행 화면 -->
<div id="game-screen" class="hidden max-w-5xl w-full flex-col md:flex-row gap-6 animate-fade-in">
    <!-- 메인 영역 (중앙) -->
    <div class="flex-1 flex flex-col items-center justify-between bg-white rounded-3xl shadow-xl border-4 border-slate-200 p-6 md:p-10 min-h-[500px]">
        <div class="w-full flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold text-slate-700 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 text-orange-500"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path><path d="M5 3v4"></path><path d="M19 17v4"></path><path d="M3 5h4"></path><path d="M17 19h4"></path></svg>
                미니 스트림스
            </h2>
            <div id="progress-text" class="bg-orange-100 text-orange-600 px-4 py-2 rounded-full font-bold text-lg">진행: 0 / 15</div>
        </div>

        <!-- 타일 표시 -->
        <div class="flex-1 flex items-center justify-center w-full relative">
            <div id="empty-display" class="flex items-center justify-center w-64 h-64 md:w-80 md:h-80 bg-slate-100 rounded-3xl border-8 border-dashed border-slate-300">
                <span class="text-slate-400 text-2xl font-bold text-center">아래 버튼을 눌러<br/>첫 타일을 뽑으세요!</span>
            </div>
            <div id="tile-display" class="hidden items-center justify-center w-64 h-64 md:w-80 md:h-80 bg-white rounded-3xl border-8 shadow-2xl transform transition-all duration-300">
                <span id="tile-text" class="text-9xl md:text-[160px] font-black"></span>
            </div>
        </div>

        <!-- 하단 컨트롤 -->
        <div class="w-full mt-10">
            <div id="controls-playing" class="w-full">
                <button id="btn-draw" class="w-full bg-orange-500 hover:bg-orange-600 disabled:bg-orange-300 text-white text-3xl font-black py-6 rounded-2xl shadow-lg shadow-orange-500/30 transition-all transform hover:-translate-y-1 active:translate-y-1">첫 알파벳 뽑기!</button>
            </div>
            <div id="controls-end" class="w-full hidden flex-col gap-3">
                <div class="text-center text-2xl font-bold text-teal-600 bg-teal-50 py-4 rounded-2xl border-2 border-teal-200 mb-2">
                    🎉 15개의 타일을 모두 뽑았습니다!
                </div>
                <button id="btn-open-calc-game" class="w-full flex items-center justify-center gap-2 bg-orange-500 hover:bg-orange-600 text-white text-xl font-bold py-4 rounded-2xl transition-all shadow-md shadow-orange-500/30">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><rect width="16" height="20" x="4" y="2" rx="2"></rect><line x1="8" x2="16" y1="6" y2="6"></line><line x1="16" x2="16" y1="14" y2="18"></line><path d="M16 10h.01"></path><path d="M12 10h.01"></path><path d="M8 10h.01"></path><path d="M12 14h.01"></path><path d="M8 14h.01"></path><path d="M12 18h.01"></path><path d="M8 18h.01"></path></svg>
                    방금 게임 점수 계산하기
                </button>
                <button id="btn-restart" class="w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-900 text-white text-xl font-bold py-4 rounded-2xl transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
                    새 게임 시작하기
                </button>
            </div>
        </div>
    </div>

    <!-- 히스토리 영역 -->
    <div class="w-full md:w-80 bg-slate-100 rounded-3xl p-6 shadow-inner border-2 border-slate-200 flex flex-col max-h-[600px] md:max-h-none">
        <h3 class="text-xl font-bold text-slate-700 mb-4 pb-4 border-b-2 border-slate-200 flex items-center gap-2">📝 뽑힌 순서</h3>
        <div id="history-scroll-area" class="flex-1 overflow-y-auto pr-2 custom-scrollbar">
            <p id="history-empty" class="text-slate-400 text-center mt-10 font-medium">아직 뽑힌 타일이 없습니다.</p>
            <div id="history-container" class="grid grid-cols-3 gap-3"></div>
        </div>
    </div>
</div>

<!-- 점수 계산기 화면 -->
<div id="calc-screen" class="hidden flex-col items-center w-full max-w-4xl bg-white p-6 md:p-10 rounded-3xl shadow-xl border-4 border-teal-500 animate-fade-in-zoom">

    <div class="w-full flex justify-between items-center mb-8 pb-4 border-b-2 border-slate-100">
        <h2 class="text-3xl font-extrabold text-teal-600 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="20" x="4" y="2" rx="2"></rect><line x1="8" x2="16" y1="6" y2="6"></line><line x1="16" x2="16" y1="14" y2="18"></line><path d="M16 10h.01"></path><path d="M12 10h.01"></path><path d="M8 10h.01"></path><path d="M12 14h.01"></path><path d="M8 14h.01"></path><path d="M12 18h.01"></path><path d="M8 18h.01"></path></svg>
            점수 계산기
        </h2>
        <button id="btn-close-calc" class="text-slate-400 hover:text-slate-700 bg-slate-100 p-2 rounded-full transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
        </button>
    </div>

    <p class="text-slate-500 mb-4 font-medium text-center">
        게임판에 적은 순서대로(왼쪽에서 오른쪽으로) 알파벳을 클릭하여 15칸을 채워주세요.
    </p>

    <!-- 15 Slots -->
    <div id="calc-slots" class="grid grid-cols-5 md:grid-cols-5 gap-2 md:gap-4 mb-8 bg-slate-50 p-4 rounded-2xl border-2 border-slate-200">
        <!-- JS 랜더링 -->
    </div>

    <!-- Result Area -->
    <div id="calc-result-area" class="hidden w-full mb-8 animate-slide-in-bottom">
        <div class="bg-teal-50 border-2 border-teal-200 rounded-2xl p-6 text-center shadow-inner">
            <h3 class="text-xl font-bold text-teal-800 mb-2">최종 점수</h3>
            <div class="text-6xl font-black text-teal-600 mb-6"><span id="calc-final-score">0</span><span class="text-3xl">점</span></div>

            <h4 class="text-sm font-bold text-slate-500 mb-3 text-left">연결 그룹 상세 분석</h4>
            <div id="calc-groups-breakdown" class="flex flex-wrap gap-3">
                <!-- JS 랜더링 -->
            </div>
        </div>
    </div>

    <!-- Keypad -->
    <div class="w-full mb-6">
        <div class="flex justify-between items-end mb-2">
            <span class="text-sm font-bold text-slate-400">남은 알파벳 <span id="calc-remain-count">0</span>개</span>
            <button id="btn-calc-reset" class="text-sm font-bold text-orange-500 hover:text-orange-600 flex items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
                다시 입력
            </button>
        </div>
        <div id="calc-keypad" class="flex flex-wrap justify-center gap-2 p-4 bg-slate-100 rounded-2xl border-2 border-slate-200 min-h-[120px]">
            <!-- JS 랜더링 -->
        </div>
    </div>

    <!-- Action -->
    <button id="btn-do-calculate" disabled class="w-full bg-teal-500 hover:bg-teal-600 disabled:bg-slate-300 disabled:cursor-not-allowed text-white text-2xl font-bold py-5 rounded-2xl transition-all shadow-lg shadow-teal-500/30">
        계산하기 (15칸을 모두 채워주세요)
    </button>
</div>

<script>
    // ================= 게임 데이터 =================
    const ALPHABETS = Array.from({ length: 26 }, (_, i) => String.fromCharCode(65 + i));
    const INITIAL_POOL = [...ALPHABETS, '★'];
    const MAX_TURNS = 15;

    // 미니 스트림스 15칸 점수표
    const SCORE_TABLE = {
        1: 0, 2: 1, 3: 3, 4: 5, 5: 7, 6: 9, 7: 11, 8: 15,
        9: 20, 10: 25, 11: 30, 12: 35, 13: 40, 14: 50, 15: 100
    };

    let pool = [];
    let drawnTiles = [];
    let currentTile = null;
    let isAnimating = false;

    // ================= 계산기 데이터 =================
    let calcMode = 'all'; // 'all' (메인메뉴) or 'game' (게임종료후)
    let calcAvailableTiles = [];
    let calcSelectedTiles = [];

    // ================= DOM 요소 =================
    const screens = {
        start: document.getElementById('start-screen'),
        game: document.getElementById('game-screen'),
        calc: document.getElementById('calc-screen')
    };

    // 게임 UI
    const btnStart = document.getElementById('btn-start');
    const btnDraw = document.getElementById('btn-draw');
    const btnRestart = document.getElementById('btn-restart');
    const emptyDisplay = document.getElementById('empty-display');
    const tileDisplay = document.getElementById('tile-display');
    const tileText = document.getElementById('tile-text');
    const progressText = document.getElementById('progress-text');
    const controlsPlaying = document.getElementById('controls-playing');
    const controlsEnd = document.getElementById('controls-end');
    const historyEmpty = document.getElementById('history-empty');
    const historyContainer = document.getElementById('history-container');
    const historyScrollArea = document.getElementById('history-scroll-area');

    // 계산기 UI
    const btnOpenCalcMain = document.getElementById('btn-open-calc-main');
    const btnOpenCalcGame = document.getElementById('btn-open-calc-game');
    const btnCloseCalc = document.getElementById('btn-close-calc');
    const calcSlots = document.getElementById('calc-slots');
    const calcKeypad = document.getElementById('calc-keypad');
    const btnDoCalculate = document.getElementById('btn-do-calculate');
    const calcResultArea = document.getElementById('calc-result-area');
    const calcFinalScore = document.getElementById('calc-final-score');
    const calcGroupsBreakdown = document.getElementById('calc-groups-breakdown');
    const calcRemainCount = document.getElementById('calc-remain-count');
    const btnCalcReset = document.getElementById('btn-calc-reset');

    // ================= 게임 로직 =================
    function switchScreen(targetScreen) {
        Object.values(screens).forEach(screen => {
            screen.classList.add('hidden');
            screen.classList.remove('flex');
        });
        screens[targetScreen].classList.remove('hidden');
        screens[targetScreen].classList.add('flex');
    }

    function startGame() {
        pool = [...INITIAL_POOL];
        drawnTiles = [];
        currentTile = null;
        isAnimating = false;

        switchScreen('game');
        controlsPlaying.classList.remove('hidden');
        controlsEnd.classList.add('hidden');
        controlsEnd.classList.remove('flex');

        updateGameUI();
    }

    function drawTile() {
        if (drawnTiles.length >= MAX_TURNS || pool.length === 0 || isAnimating) return;

        isAnimating = true;
        btnDraw.disabled = true;

        if (currentTile !== null) {
            tileDisplay.classList.add('scale-50', 'opacity-0', 'rotate-12');
        }

        setTimeout(() => {
            const randomIndex = Math.floor(Math.random() * pool.length);
            const selectedTile = pool[randomIndex];

            pool.splice(randomIndex, 1);
            currentTile = selectedTile;
            drawnTiles.push(selectedTile);

            updateGameUI();

            tileDisplay.classList.remove('scale-50', 'opacity-0', 'rotate-12');
            isAnimating = false;
            btnDraw.disabled = false;

            if (drawnTiles.length >= MAX_TURNS) {
                btnDraw.disabled = true;
                setTimeout(() => {
                    controlsPlaying.classList.add('hidden');
                    controlsEnd.classList.remove('hidden');
                    controlsEnd.classList.add('flex');
                }, 1000);
            }
        }, 300);
    }

    function updateGameUI() {
        progressText.innerText = `진행: ${drawnTiles.length} / ${MAX_TURNS}`;

        if (currentTile) {
            emptyDisplay.classList.add('hidden');
            emptyDisplay.classList.remove('flex');
            tileDisplay.classList.remove('hidden');
            tileDisplay.classList.add('flex');

            tileText.innerText = currentTile;

            if (currentTile === '★') {
                tileDisplay.className = 'flex items-center justify-center w-64 h-64 md:w-80 md:h-80 bg-yellow-50 rounded-3xl border-8 border-yellow-400 shadow-2xl transform transition-all duration-300';
                tileText.className = 'text-9xl md:text-[160px] font-black text-yellow-400 drop-shadow-[0_0_15px_rgba(250,204,21,0.5)]';
            } else {
                tileDisplay.className = 'flex items-center justify-center w-64 h-64 md:w-80 md:h-80 bg-white rounded-3xl border-8 border-teal-500 shadow-2xl transform transition-all duration-300';
                tileText.className = 'text-9xl md:text-[160px] font-black text-slate-800';
            }

            btnDraw.innerText = '다음 알파벳 뽑기!';
        } else {
            emptyDisplay.classList.remove('hidden');
            emptyDisplay.classList.add('flex');
            tileDisplay.classList.add('hidden');
            tileDisplay.classList.remove('flex');
            btnDraw.innerText = '첫 알파벳 뽑기!';
            btnDraw.disabled = false;
        }

        if (drawnTiles.length === 0) {
            historyEmpty.classList.remove('hidden');
            historyContainer.innerHTML = '';
        } else {
            historyEmpty.classList.add('hidden');
            historyContainer.innerHTML = drawnTiles.map((tile, index) => {
                const isJoker = tile === '★';
                const bgClass = isJoker ? 'bg-yellow-100 border-yellow-300 text-yellow-600' : 'bg-white border-slate-200 text-slate-700';
                return `
            <div class="flex flex-col items-center justify-center p-3 rounded-xl shadow-sm border-2 animate-slide-in-bottom ${bgClass}">
              <span class="text-xs font-bold opacity-50 mb-1">${index + 1}</span>
              <span class="text-2xl font-black">${tile}</span>
            </div>
          `;
            }).join('');
            historyScrollArea.scrollTop = historyScrollArea.scrollHeight;
        }
    }

    // ================= 계산기 로직 =================
    function openCalculator(mode) {
        calcMode = mode;
        calcSelectedTiles = [];
        calcResultArea.classList.add('hidden');

        if (mode === 'all') {
            calcAvailableTiles = [...INITIAL_POOL];
        } else if (mode === 'game') {
            calcAvailableTiles = [...drawnTiles];
            // 정렬해서 키패드를 예쁘게
            calcAvailableTiles.sort((a, b) => {
                if (a === '★') return 1;
                if (b === '★') return -1;
                return a.localeCompare(b);
            });
        }

        switchScreen('calc');
        renderCalculatorUI();
    }

    function closeCalculator() {
        if (calcMode === 'all') {
            switchScreen('start');
        } else {
            switchScreen('game');
        }
    }

    function resetCalculator() {
        // 선택된 모든 타일을 다시 가용 풀로 반환
        calcAvailableTiles = [...calcAvailableTiles, ...calcSelectedTiles];
        calcSelectedTiles = [];

        // 재정렬
        calcAvailableTiles.sort((a, b) => {
            if (a === '★') return 1;
            if (b === '★') return -1;
            return a.localeCompare(b);
        });

        calcResultArea.classList.add('hidden');
        renderCalculatorUI();
    }

    function renderCalculatorUI() {
        // Slots 랜더링
        calcSlots.innerHTML = Array.from({length: 15}).map((_, i) => {
            const tile = calcSelectedTiles[i];
            if (tile) {
                const isJoker = tile === '★';
                return `<button onclick="removeCalcTile(${i})" class="cursor-pointer flex items-center justify-center h-12 md:h-16 rounded-xl font-black text-xl md:text-3xl shadow-sm border-2 transition-transform hover:scale-95 ${isJoker ? 'bg-yellow-100 border-yellow-400 text-yellow-600' : 'bg-white border-teal-500 text-slate-800'} animate-fade-in-zoom">${tile}</button>`;
            } else {
                return `<div class="flex items-center justify-center h-12 md:h-16 rounded-xl bg-white border-2 border-dashed border-slate-300 text-slate-300 font-bold opacity-70">${i + 1}</div>`;
            }
        }).join('');

        // Keypad 랜더링
        calcRemainCount.innerText = calcAvailableTiles.length;
        calcKeypad.innerHTML = calcAvailableTiles.map((tile, i) => {
            const isJoker = tile === '★';
            return `<button onclick="addCalcTile(${i})" class="flex items-center justify-center w-10 h-10 md:w-12 md:h-12 rounded-lg font-bold text-lg shadow-sm border-2 hover:-translate-y-1 active:translate-y-0 transition-transform ${isJoker ? 'bg-yellow-100 border-yellow-400 text-yellow-600' : 'bg-white border-slate-300 text-slate-700 hover:border-teal-400'} animate-fade-in-zoom">${tile}</button>`;
        }).join('');

        // 계산하기 버튼 상태 업데이트
        const isFull = calcSelectedTiles.length === 15;
        btnDoCalculate.disabled = !isFull;
        if (isFull) {
            btnDoCalculate.innerText = '결과 확인하기!';
            btnDoCalculate.classList.add('animate-pulse');
        } else {
            btnDoCalculate.innerText = `계산하기 (${15 - calcSelectedTiles.length}칸 남음)`;
            btnDoCalculate.classList.remove('animate-pulse');
            calcResultArea.classList.add('hidden'); // 결과 초기화
        }
    }

    // 전역 스코프 함수(onclick 용)
    window.addCalcTile = function(index) {
        if (calcSelectedTiles.length >= 15) return;
        const tile = calcAvailableTiles.splice(index, 1)[0];
        calcSelectedTiles.push(tile);
        renderCalculatorUI();
    };

    window.removeCalcTile = function(index) {
        const tile = calcSelectedTiles.splice(index, 1)[0];
        calcAvailableTiles.push(tile);
        // 키패드 재정렬
        calcAvailableTiles.sort((a, b) => {
            if (a === '★') return 1;
            if (b === '★') return -1;
            return a.localeCompare(b);
        });
        renderCalculatorUI();
    };

    // ================= 점수 알고리즘 =================
    // 기본 배열 점수 산출 함수 (조커가 특정 알파벳으로 변환된 상태)
    function getScoreAndGroupsForSequence(seqArr) {
        let groups = [];
        let currentGroupVals = [seqArr[0]]; // 치환된 값(A~Z)
        let currentGroupOrig = [calcSelectedTiles[0]]; // 원래 텍스트(★ 포함)

        for (let i = 1; i < seqArr.length; i++) {
            // 이전 값보다 크거나 같으면 오름차순 연결됨
            if (seqArr[i] >= seqArr[i - 1]) {
                currentGroupVals.push(seqArr[i]);
                currentGroupOrig.push(calcSelectedTiles[i]);
            } else {
                groups.push(currentGroupOrig);
                currentGroupVals = [seqArr[i]];
                currentGroupOrig = [calcSelectedTiles[i]];
            }
        }
        groups.push(currentGroupOrig);

        let totalScore = 0;
        groups.forEach(g => {
            totalScore += SCORE_TABLE[g.length] || 0;
        });

        return { score: totalScore, groups: groups };
    }

    function doCalculate() {
        btnDoCalculate.classList.remove('animate-pulse');

        const hasJoker = calcSelectedTiles.includes('★');
        let bestResult = { score: -1, groups: [] };

        if (!hasJoker) {
            bestResult = getScoreAndGroupsForSequence(calcSelectedTiles);
        } else {
            // 조커가 있을 경우, A~Z까지 모두 대입해보고 최고 점수를 찾음
            const jokerIdx = calcSelectedTiles.indexOf('★');
            for (let i = 0; i < 26; i++) {
                const testChar = String.fromCharCode(65 + i);
                const testArr = [...calcSelectedTiles];
                testArr[jokerIdx] = testChar;

                const result = getScoreAndGroupsForSequence(testArr);
                if (result.score > bestResult.score) {
                    bestResult = result;
                }
            }
        }

        // 결과 렌더링
        calcFinalScore.innerText = bestResult.score;
        calcGroupsBreakdown.innerHTML = bestResult.groups.map(g => {
            const pts = SCORE_TABLE[g.length] || 0;
            return `
          <div class="flex flex-col items-center bg-white p-2 md:p-3 rounded-xl border border-slate-200 shadow-sm grow">
            <div class="flex gap-1 mb-2 flex-wrap justify-center">
              ${g.map(t => `<span class="inline-flex items-center justify-center w-7 h-7 md:w-8 md:h-8 text-sm md:text-base bg-slate-50 border border-slate-300 rounded-md font-bold ${t === '★' ? 'text-yellow-500 bg-yellow-50 border-yellow-300' : 'text-slate-700'}">${t}</span>`).join('')}
            </div>
            <span class="text-sm font-bold bg-teal-100 text-teal-700 px-3 py-1 rounded-full">${g.length}칸 = ${pts}점</span>
          </div>
        `;
        }).join('');

        calcResultArea.classList.remove('hidden');
    }

    // ================= 이벤트 리스너 =================
    btnStart.addEventListener('click', startGame);
    btnDraw.addEventListener('click', drawTile);
    btnRestart.addEventListener('click', startGame);

    btnOpenCalcMain.addEventListener('click', () => openCalculator('all'));
    btnOpenCalcGame.addEventListener('click', () => openCalculator('game'));
    btnCloseCalc.addEventListener('click', closeCalculator);
    btnCalcReset.addEventListener('click', resetCalculator);
    btnDoCalculate.addEventListener('click', doCalculate);

</script>
</body>
</html>
