<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🐉 드래곤 영단어 플라이트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Jua&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; touch-action: none; }
  body {
    background: #0a0a1a;
    font-family: 'Jua', sans-serif;
    color: #fff;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  #app {
    position: relative;
    width: 100%;
    max-width: 480px;
    height: 100vh;
    height: 100dvh;
    background: #0a0a1a;
    overflow: hidden;
  }

  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  /* HUD ===================================================== */
  .hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: clamp(6px, 2vw, 10px);
    z-index: 5;
    pointer-events: none;
    font-family: 'Press Start 2P', monospace;
  }
  .hud-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: clamp(4px, 1.5vw, 8px);
  }
  .hud-box {
    background: rgba(10, 10, 30, 0.75);
    border: 2px solid #fff;
    padding: 6px 8px;
    font-size: clamp(8px, 2.4vw, 10px);
    line-height: 1.3;
  }
  .hud-box .label { font-size: clamp(6px, 1.8vw, 7px); color: #ffd700; display: block; margin-bottom: 2px; }

  /* HP 전용 강조 박스 (2배 크기) */
  .hud-box.hp-big {
    padding: 10px 14px;
    font-size: clamp(16px, 5vw, 22px);
    border: 3px solid #ef4444;
    background: rgba(30, 10, 10, 0.85);
    line-height: 1.2;
  }
  .hud-box.hp-big .label {
    font-size: clamp(9px, 2.6vw, 11px);
    color: #fca5a5;
    margin-bottom: 4px;
  }
  #hp-display {
    letter-spacing: 2px;
  }
  .hud-center { flex: 1; text-align: center; }
  .word-box {
    display: inline-block;
    background: rgba(10, 10, 30, 0.85);
    border: 2px solid #ffd700;
    padding: clamp(4px, 1.5vw, 8px) clamp(8px, 2.5vw, 12px);
  }
  .word-box .label { font-size: clamp(6px, 1.8vw, 7px); color: #ffd700; margin-bottom: 3px; }
  .word-letters { font-size: clamp(14px, 4.5vw, 20px); letter-spacing: clamp(2px, 1vw, 4px); }
  .letter-done { color: #4ade80; }
  .letter-current { color: #fff; text-decoration: underline; animation: blink 0.6s infinite; }
  .letter-pending { color: #666; }
  @keyframes blink { 50% { opacity: 0.4; } }

  .weapon-bar {
    display: flex;
    gap: 2px;
    justify-content: center;
    margin-top: 4px;
  }
  .weapon-seg {
    width: clamp(8px, 2.5vw, 12px);
    height: clamp(6px, 2vw, 9px);
    background: #222;
    border: 1px solid #444;
  }
  .weapon-seg.active { background: #ffd700; border-color: #fff; }

  /* Fever banner */
  #fever-banner {
    position: absolute;
    top: 40%;
    left: 0; right: 0;
    text-align: center;
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(32px, 10vw, 52px);
    color: #ffd700;
    text-shadow: 4px 4px 0 #ff0066, 8px 8px 0 #000;
    z-index: 7;
    pointer-events: none;
    animation: feverPop 0.5s ease-out;
  }
  @keyframes feverPop {
    0% { transform: scale(0); opacity: 0; }
    50% { transform: scale(1.3); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  #fever-timer {
    position: absolute;
    top: 52%;
    left: 0; right: 0;
    text-align: center;
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: #fff;
    z-index: 7;
    pointer-events: none;
  }

  /* Overlays ================================================ */
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(10, 10, 26, 0.95);
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
  }
  .overlay.hidden { display: none; }

  .title-pixel {
    font-family: 'Press Start 2P', monospace;
    font-size: 24px;
    color: #ffd700;
    text-shadow: 3px 3px 0 #ff0066;
    margin-bottom: 8px;
    line-height: 1.5;
  }
  .subtitle { font-size: 20px; color: #fff; margin-bottom: 24px; }

  .dragon-preview {
    width: 80px; height: 80px;
    margin-bottom: 16px;
    image-rendering: pixelated;
  }

  .stat-card {
    background: rgba(255, 255, 255, 0.08);
    border: 2px solid #ffd700;
    padding: 12px 24px;
    margin-bottom: 20px;
    font-family: 'Press Start 2P', monospace;
  }
  .stat-card .label { font-size: 8px; color: #ffd700; }
  .stat-card .value { font-size: 24px; margin-top: 6px; }

  .desc {
    font-size: 13px;
    line-height: 1.7;
    margin-bottom: 20px;
    color: #cbd5e1;
    max-width: 320px;
  }
  .desc .tag {
    display: inline-block;
    background: #1e293b;
    border: 1px solid #fbbf24;
    color: #fbbf24;
    padding: 1px 6px;
    margin: 0 2px;
    font-size: 11px;
    border-radius: 3px;
  }

  .btn {
    font-family: 'Press Start 2P', monospace;
    background: #ff0066;
    color: #fff;
    border: 4px solid #fff;
    padding: 14px 28px;
    font-size: 14px;
    cursor: pointer;
    margin: 6px;
    box-shadow: 4px 4px 0 #000;
    transition: transform 0.08s, box-shadow 0.08s;
  }
  .btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #000; }
  .btn.small { font-size: 11px; padding: 10px 18px; background: #334155; }

  .controls-hint {
    font-size: 11px;
    color: #94a3b8;
    margin-top: 16px;
    font-family: 'Jua', sans-serif;
  }

  /* Flash effects */
  .flash {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 6;
    opacity: 0;
  }
  .flash.active { animation: flashFade 0.3s; }
  @keyframes flashFade {
    0% { opacity: 0.7; }
    100% { opacity: 0; }
  }

  .shake { animation: shake 0.25s; }
  @keyframes shake {
    0%, 100% { transform: translate(0); }
    25% { transform: translate(-4px, 2px); }
    50% { transform: translate(4px, -2px); }
    75% { transform: translate(-2px, 1px); }
  }

  .combo-text {
    position: absolute;
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    pointer-events: none;
    z-index: 6;
    animation: floatUp 0.8s ease-out forwards;
  }
  @keyframes floatUp {
    0% { transform: translate(-50%, 0); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translate(-50%, -50px); opacity: 0; }
  }

  /* Character selection */
  .char-select {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 20px;
    width: 100%;
    max-width: 340px;
  }
  .char-card {
    background: rgba(255,255,255,0.05);
    border: 3px solid #334155;
    padding: 8px 4px;
    text-align: center;
    cursor: pointer;
    font-family: 'Press Start 2P', monospace;
    transition: transform 0.08s;
    position: relative;
  }
  .char-card:active { transform: scale(0.96); }
  .char-card.selected {
    border-color: #ffd700;
    background: rgba(255, 215, 0, 0.15);
    box-shadow: 0 0 12px rgba(255, 215, 0, 0.4);
  }
  .char-card.locked {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .char-card canvas {
    width: 40px;
    height: 40px;
    image-rendering: pixelated;
    display: block;
    margin: 0 auto 4px;
  }
  .char-name { font-size: 8px; color: #ffd700; margin-bottom: 2px; }
  .char-desc { font-size: 6px; color: #cbd5e1; line-height: 1.3; }
  .char-lock {
    font-size: 6px;
    color: #ef4444;
    margin-top: 3px;
    font-weight: bold;
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="game"></canvas>
  <div id="flash" class="flash"></div>

  <!-- HUD -->
  <div id="hud" class="hud hidden">
    <div class="hud-row">
      <div class="hud-box">
        <span class="label">SCORE</span>
        <span id="score">0</span>
      </div>
      <div class="hud-center">
        <div class="word-box">
          <div class="label">🎯 TARGET</div>
          <div class="word-letters" id="word-display"></div>
        </div>
        <div class="weapon-bar" id="weapon-bar"></div>
      </div>
      <div class="hud-box" style="text-align: right;">
        <span class="label">STAGE</span>
        <span id="stage-num">1</span>
      </div>
    </div>
    <div class="hud-row" style="margin-top: 6px;">
      <div class="hud-box hp-big">
        <span class="label">HP</span>
        <span id="hp-display">❤❤❤</span>
      </div>
      <div style="flex:1"></div>
      <div class="hud-box" style="text-align: right;">
        <span class="label">KILLS</span>
        <span id="kills">0</span>
      </div>
    </div>
  </div>

  <!-- Fever display -->
  <div id="fever-banner" style="display:none;">FEVER!</div>
  <div id="fever-timer" style="display:none;"></div>

  <!-- Title screen -->
  <div id="title-screen" class="overlay">
    <canvas id="title-dragon" class="dragon-preview" width="40" height="40"></canvas>
    <h1 class="title-pixel">DRAGON<br>WORD FLIGHT</h1>
    <div class="stat-card">
      <div class="label">HI-SCORE</div>
      <div class="value" id="best-score">00000</div>
    </div>

    <div style="font-family:'Press Start 2P',monospace; font-size: 9px; color: #ffd700; margin-bottom: 8px;">★ SELECT DRAGON ★</div>
    <div id="char-select" class="char-select"></div>

    <div class="desc">
      적을 쏴서 <span class="tag">알파벳</span>을 떨어뜨리고<br>
      <span class="tag">순서대로</span> 먹어 단어를 완성하세요!<br>
      완성하면 <span class="tag">FEVER MODE</span> 발동 🔥
    </div>
    <button class="btn" onclick="startGame()">PRESS START</button>
    <div class="controls-hint">
      📱 화면을 끌어서 이동 | 🖥️ 마우스 / ← →
    </div>
  </div>

  <!-- Game over -->
  <div id="over-screen" class="overlay hidden">
    <div style="font-size: 48px; margin-bottom: 8px;">💀</div>
    <h1 class="title-pixel" style="font-size: 22px;">GAME OVER</h1>
    <div class="stat-card">
      <div class="label">FINAL SCORE</div>
      <div class="value" id="final-score">00000</div>
    </div>
    <div id="best-badge" class="desc hidden" style="color: #ffd700; font-family: 'Press Start 2P', monospace; font-size: 11px;">
      ★ NEW RECORD ★
    </div>
    <div id="game-stats" class="desc" style="font-family: 'Press Start 2P', monospace; font-size: 10px; line-height: 2;"></div>
    <div>
      <button class="btn" onclick="startGame()">RETRY</button>
      <button class="btn small" onclick="showTitle()">TITLE</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// 영단어 풀 (길이별)
// ============================================================
const WORD_POOLS = {
  3: [
    {w:"CAT",m:"고양이"},{w:"DOG",m:"개"},{w:"PIG",m:"돼지"},{w:"SUN",m:"태양"},
    {w:"CUP",m:"컵"},{w:"BUS",m:"버스"},{w:"EGG",m:"달걀"},{w:"BEE",m:"벌"},
    {w:"HAT",m:"모자"},{w:"BAG",m:"가방"},{w:"ANT",m:"개미"},{w:"COW",m:"소"},
    {w:"FOX",m:"여우"},{w:"BED",m:"침대"},{w:"RED",m:"빨강"},{w:"OWL",m:"올빼미"}
  ],
  4: [
    {w:"BOOK",m:"책"},{w:"DESK",m:"책상"},{w:"MILK",m:"우유"},{w:"FISH",m:"물고기"},
    {w:"TREE",m:"나무"},{w:"DOOR",m:"문"},{w:"HAND",m:"손"},{w:"LION",m:"사자"},
    {w:"BIRD",m:"새"},{w:"STAR",m:"별"},{w:"FROG",m:"개구리"},{w:"CAKE",m:"케이크"},
    {w:"BLUE",m:"파랑"},{w:"BEAR",m:"곰"},{w:"BALL",m:"공"},{w:"MOON",m:"달"}
  ],
  5: [
    {w:"APPLE",m:"사과"},{w:"HOUSE",m:"집"},{w:"WATER",m:"물"},{w:"BREAD",m:"빵"},
    {w:"PIZZA",m:"피자"},{w:"ROBOT",m:"로봇"},{w:"GRAPE",m:"포도"},{w:"TIGER",m:"호랑이"},
    {w:"HAPPY",m:"행복한"},{w:"GREEN",m:"초록"},{w:"SHEEP",m:"양"},{w:"MOUSE",m:"쥐"},
    {w:"TRAIN",m:"기차"},{w:"CLOUD",m:"구름"},{w:"CANDY",m:"사탕"}
  ],
  6: [
    {w:"ORANGE",m:"오렌지"},{w:"BANANA",m:"바나나"},{w:"SCHOOL",m:"학교"},{w:"FLOWER",m:"꽃"},
    {w:"RABBIT",m:"토끼"},{w:"PURPLE",m:"보라"},{w:"MONKEY",m:"원숭이"},{w:"YELLOW",m:"노랑"},
    {w:"WINTER",m:"겨울"},{w:"SUMMER",m:"여름"},{w:"ROCKET",m:"로켓"},{w:"PLANET",m:"행성"}
  ],
  7: [
    {w:"RAINBOW",m:"무지개"},{w:"TEACHER",m:"선생님"},{w:"KITCHEN",m:"부엌"},{w:"GIRAFFE",m:"기린"},
    {w:"CHICKEN",m:"닭"},{w:"STUDENT",m:"학생"},{w:"DRAGONS",m:"용들"}
  ],
  8: [
    {w:"ELEPHANT",m:"코끼리"},{w:"MOUNTAIN",m:"산"},{w:"FOOTBALL",m:"축구"},{w:"BASEBALL",m:"야구"},
    {w:"DINOSAUR",m:"공룡"}
  ]
};

// ============================================================
// 캐릭터 정의
// ============================================================
const CHARACTERS = [
  {
    id: 'flame',
    name: 'FLAME',
    desc: '균형형',
    unlockStage: 1,
    hp: 3,
    fireRateBonus: 0,
    colors: {
      body: '#ef4444', bodyDark: '#991b1b', belly: '#fca5a5',
      wing: '#dc2626', horn: '#ffd700', bullet: '#ffd700', bulletStrong: '#ff8800'
    }
  },
  {
    id: 'ice',
    name: 'ICE',
    desc: 'HP +1',
    unlockStage: 5,
    hp: 4,
    fireRateBonus: 0,
    colors: {
      body: '#3b82f6', bodyDark: '#1e3a8a', belly: '#bfdbfe',
      wing: '#2563eb', horn: '#e0f2fe', bullet: '#67e8f9', bulletStrong: '#22d3ee'
    }
  },
  {
    id: 'thunder',
    name: 'THUNDER',
    desc: '빠른 발사',
    unlockStage: 10,
    hp: 3,
    fireRateBonus: 40, // ms 단축
    colors: {
      body: '#a855f7', bodyDark: '#6b21a8', belly: '#e9d5ff',
      wing: '#9333ea', horn: '#fef3c7', bullet: '#fde047', bulletStrong: '#facc15'
    }
  }
];

// ============================================================
// 게임 튜닝 상수
// ============================================================
const LETTER_DROP_CHANCE = 0.4;     // 적 처치 시 알파벳 드랍 확률
const MAX_LETTERS_ON_SCREEN = 7;    // 화면에 동시 존재 가능한 알파벳 최대 수
const METEOR_MIN_STAGE = 5;         // 운석 등장 시작 스테이지
const METEOR_MIN_INTERVAL = 12000;  // 운석 최소 간격 (ms)
const METEOR_MAX_INTERVAL = 17000;  // 운석 최대 간격 (ms)
const METEOR_WARNING_FRAMES = 120;  // 경고 지속 프레임 (2초 @ 60fps)
const BOSS_INTERVAL = 10;           // 보스 등장 주기 (스테이지)

// ============================================================
// 상수 & Canvas 설정
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = window.devicePixelRatio || 1;

// 반응형 스케일링: 게임 로직은 가상 480px 너비 기준으로 동작,
// 렌더링 시 캔버스 크기에 맞춰 전체 스케일링
const VIRTUAL_W = 480;
let SCALE = 1;

function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  const pixelW = rect.width;
  const pixelH = rect.height;
  // 스케일 계산
  SCALE = pixelW / VIRTUAL_W;
  // 가상 좌표계: W는 항상 480, H는 스케일 반영해서 계산
  W = VIRTUAL_W;
  H = pixelH / SCALE;

  canvas.width = pixelW * DPR;
  canvas.height = pixelH * DPR;
  canvas.style.width = pixelW + 'px';
  canvas.style.height = pixelH + 'px';
  // DPR + SCALE 한 번에 적용
  ctx.setTransform(DPR * SCALE, 0, 0, DPR * SCALE, 0, 0);
  ctx.imageSmoothingEnabled = false;

  if (state.player) {
    state.player.y = H - 80;
    state.player.x = Math.min(W - 20, state.player.x);
  }
}
window.addEventListener('resize', resize);

// ============================================================
// 게임 상태
// ============================================================
const state = {
  player: null,
  bullets: [],
  enemies: [],
  enemyBullets: [], // 적이 쏘는 탄
  letters: [],
  particles: [],
  stars: [],
  speedLines: [],

  // 보스 & 운석
  boss: null,
  meteors: [],
  lastMeteor: 0,

  score: 0,
  bestScore: parseInt(localStorage.getItem('dragonFlight_v2_best') || '0'),
  bestStage: parseInt(localStorage.getItem('dragonFlight_v2_bestStage') || '1'),
  selectedChar: parseInt(localStorage.getItem('dragonFlight_v2_char') || '0'),
  kills: 0,
  hp: 3,

  // 단어 상태
  currentWord: null,
  letterIndex: 0,
  nextWordLength: 3,
  completedWords: 0,

  // 무기
  weaponLv: 1,

  // 스테이지
  stage: 1,

  // 피버
  feverActive: false,
  feverEndTime: 0,
  feverDuration: 5000,
  feverLastSpawn: 0,

  // 플래그
  running: false,
  gameOverType: '',
  lastShot: 0,
  lastSpawn: 0,
  rafId: null,
  startTime: 0
};

// 배경 별 초기화
function initStars() {
  state.stars = [];
  for (let i = 0; i < 60; i++) {
    state.stars.push({
      x: Math.random() * 500,
      y: Math.random() * 800,
      size: Math.floor(Math.random() * 2) + 1,
      speed: 0.3 + Math.random() * 1.2
    });
  }
}
initStars();

document.getElementById('best-score').textContent = String(state.bestScore).padStart(5, '0');

// ============================================================
// 입력
// ============================================================
let pointerX = null;
const keys = {};

function getX(e) {
  const rect = canvas.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  // 가상 좌표계로 변환 (SCALE로 나눔)
  return (cx - rect.left) / SCALE;
}

canvas.addEventListener('touchstart', e => { e.preventDefault(); pointerX = getX(e); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); pointerX = getX(e); }, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); }, { passive: false });
canvas.addEventListener('mousemove', e => { if (state.running) pointerX = getX(e); });
canvas.addEventListener('mouseleave', () => { pointerX = null; });

window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (['arrowleft', 'arrowright', 'a', 'd'].includes(e.key.toLowerCase())) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// ============================================================
// 게임 흐름
// ============================================================
function startGame() {
  resize();
  const char = CHARACTERS[state.selectedChar];
  state.player = {
    x: W / 2,
    y: H - 80,
    w: 32,
    h: 32,
    flameFrame: 0,
    wingFrame: 0,
    invuln: 0
  };
  state.bullets = [];
  state.enemies = [];
  state.enemyBullets = [];
  state.letters = [];
  state.particles = [];
  state.speedLines = [];
  state.boss = null;
  state.meteors = [];
  state.lastMeteor = performance.now();
  state.score = 0;
  state.kills = 0;
  state.hp = char.hp;
  state.maxHp = char.hp;
  state.weaponLv = 1;
  state.stage = 1;
  state.completedWords = 0;
  state.feverActive = false;
  state.feverEndTime = 0;
  state.nextWordLength = 3;
  state.running = true;
  state.startTime = performance.now();
  state.lastShot = 0;
  state.lastSpawn = performance.now();
  pickNewWord();
  hideAllOverlays();
  document.getElementById('hud').classList.remove('hidden');
  updateHUD();
  if (state.rafId) cancelAnimationFrame(state.rafId);
  loop();
}

function hideAllOverlays() {
  document.getElementById('title-screen').classList.add('hidden');
  document.getElementById('over-screen').classList.add('hidden');
}

function showTitle() {
  state.running = false;
  hideAllOverlays();
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('title-screen').classList.remove('hidden');
  document.getElementById('best-score').textContent = String(state.bestScore).padStart(5, '0');
  renderCharSelect();
  drawTitleDragon();
}

// 캐릭터 선택 카드 렌더링
function renderCharSelect() {
  const container = document.getElementById('char-select');
  container.innerHTML = '';
  CHARACTERS.forEach((c, i) => {
    const unlocked = state.bestStage >= c.unlockStage;
    const selected = state.selectedChar === i;
    // 잠긴 캐릭터를 선택 중이면 기본으로 변경
    if (selected && !unlocked) state.selectedChar = 0;

    const card = document.createElement('div');
    card.className = 'char-card' + (state.selectedChar === i ? ' selected' : '') + (unlocked ? '' : ' locked');
    card.innerHTML = `
      <canvas width="40" height="40" id="char-canvas-${i}"></canvas>
      <div class="char-name">${c.name}</div>
      <div class="char-desc">${c.desc}</div>
      ${unlocked ? '' : `<div class="char-lock">🔒 STAGE ${c.unlockStage}</div>`}
    `;
    if (unlocked) {
      card.onclick = () => {
        state.selectedChar = i;
        localStorage.setItem('dragonFlight_v2_char', i);
        renderCharSelect();
        drawTitleDragon();
      };
    }
    container.appendChild(card);
  });

  // 각 카드에 미니 드래곤 스프라이트 그리기
  CHARACTERS.forEach((c, i) => {
    const cv = document.getElementById(`char-canvas-${i}`);
    if (cv) drawMiniDragon(cv, c);
  });
}

function pickNewWord() {
  const len = Math.min(state.nextWordLength, 8);
  const pool = WORD_POOLS[len] || WORD_POOLS[8];
  state.currentWord = pool[Math.floor(Math.random() * pool.length)];
  state.letterIndex = 0;
}

// ============================================================
// HUD 업데이트
// ============================================================
function updateHUD() {
  document.getElementById('score').textContent = String(state.score).padStart(5, '0');
  document.getElementById('stage-num').textContent = state.stage;
  document.getElementById('kills').textContent = state.kills;
  document.getElementById('hp-display').textContent = '❤'.repeat(state.hp) + '·'.repeat(Math.max(0, (state.maxHp || 3) - state.hp));

  // 목표 단어
  const wd = document.getElementById('word-display');
  wd.innerHTML = '';
  if (state.currentWord) {
    for (let i = 0; i < state.currentWord.w.length; i++) {
      const span = document.createElement('span');
      span.textContent = state.currentWord.w[i];
      if (i < state.letterIndex) span.className = 'letter-done';
      else if (i === state.letterIndex) span.className = 'letter-current';
      else span.className = 'letter-pending';
      wd.appendChild(span);
    }
  }

  // 무기 강화 바
  const bar = document.getElementById('weapon-bar');
  bar.innerHTML = '';
  const maxSeg = 8;
  const shown = Math.min(state.weaponLv, maxSeg);
  for (let i = 0; i < maxSeg; i++) {
    const s = document.createElement('div');
    s.className = 'weapon-seg' + (i < shown ? ' active' : '');
    bar.appendChild(s);
  }
}

// ============================================================
// 스폰 & 발사
// ============================================================
function spawnEnemy() {
  const types = ['basic'];
  if (state.stage >= 3) types.push('fast');
  if (state.stage >= 5) types.push('tanky');
  const type = types[Math.floor(Math.random() * types.length)];

  const baseSpeed = 1.0 + state.stage * 0.15;
  let enemy = {
    type, x: 20 + Math.random() * (W - 40), y: -30,
    w: 24, h: 24,
    hp: 1, alive: true, animFrame: 0,
    shootTimer: Math.floor(Math.random() * 80) // 스폰 시 랜덤 오프셋으로 탄환 동기화 방지
  };
  if (type === 'fast') { enemy.speed = baseSpeed * 1.7; enemy.w = 20; enemy.h = 20; }
  else if (type === 'tanky') { enemy.speed = baseSpeed * 0.7; enemy.w = 30; enemy.h = 30; enemy.hp = 2; }
  else { enemy.speed = baseSpeed; }
  state.enemies.push(enemy);
}

// 적이 탄을 발사하는지 판단 (스테이지/타입별)
function canEnemyShoot(enemy) {
  if (enemy.type === 'tanky') return true; // 항상 발사
  if (enemy.type === 'basic' && state.stage >= 4) return true; // 스테이지 4+ 기본 적
  return false; // fast 적은 속도가 빠르므로 발사 안 함
}

function enemyShoot(enemy) {
  state.enemyBullets.push({
    x: enemy.x,
    y: enemy.y + enemy.h/2,
    vx: 0,
    vy: 2.5 + state.stage * 0.1,
    w: 5, h: 7,
    color: enemy.type === 'tanky' ? '#ff0066' : '#a855f7'
  });
}

// ============================================================
// 보스 시스템
// ============================================================
function spawnBoss() {
  const s = state.stage;
  state.boss = {
    x: W / 2,
    y: -50,
    w: 64, h: 48,
    hp: 25 + s * 2,
    maxHp: 25 + s * 2,
    targetY: 85,
    entering: true,
    moveTimer: 0,
    shootTimer: 0,
    animFrame: 0,
    patternIdx: 0,
    alive: true
  };
  showCombo(W/2, H/3 - 30, '⚠ BOSS ⚠', '#ff0066');
  flash('rgba(255, 0, 102, 0.3)');
}

function updateBoss() {
  if (!state.boss || !state.boss.alive) return;
  const b = state.boss;
  b.animFrame++;

  // 등장 연출
  if (b.entering) {
    b.y += 1.5;
    if (b.y >= b.targetY) {
      b.y = b.targetY;
      b.entering = false;
    }
    return;
  }

  // 좌우 이동 (사인파)
  b.moveTimer++;
  b.x = W/2 + Math.sin(b.moveTimer * 0.018) * (W/2 - 50);

  // 공격 패턴 (3가지 로테이션)
  if (state.feverActive) return; // 피버 중엔 보스도 정지
  b.shootTimer++;
  const pattern = Math.floor(b.moveTimer / 180) % 3;
  const fireInterval = 48;

  if (b.shootTimer > fireInterval) {
    b.shootTimer = 0;
    if (pattern === 0) {
      // 3갈래 확산
      for (let i = -1; i <= 1; i++) {
        state.enemyBullets.push({
          x: b.x, y: b.y + b.h/2,
          vx: i * 1.6, vy: 2.8,
          w: 6, h: 9, color: '#ff0066'
        });
      }
    } else if (pattern === 1) {
      // 플레이어 조준탄
      const dx = state.player.x - b.x;
      const dy = state.player.y - b.y;
      const dist = Math.max(1, Math.hypot(dx, dy));
      state.enemyBullets.push({
        x: b.x, y: b.y + b.h/2,
        vx: dx/dist * 2.8,
        vy: dy/dist * 2.8,
        w: 7, h: 9, color: '#ffd700'
      });
    } else {
      // 5갈래 부채꼴
      for (let i = -2; i <= 2; i++) {
        state.enemyBullets.push({
          x: b.x, y: b.y + b.h/2,
          vx: i * 1.0, vy: 2.4,
          w: 5, h: 8, color: '#a855f7'
        });
      }
    }
  }
}

function damageBoss(damage) {
  const b = state.boss;
  b.hp -= damage;
  if (b.hp <= 0) {
    // 격파!
    state.score += 500 * state.stage;
    // 여러 차례 폭발 연출
    for (let i = 0; i < 6; i++) {
      setTimeout(() => {
        if (!state.running) return;
        const ox = b.x + (Math.random() - 0.5) * b.w;
        const oy = b.y + (Math.random() - 0.5) * b.h;
        spawnParticles(ox, oy, '#ffd700', 15);
        spawnParticles(ox, oy, '#ff6600', 10);
      }, i * 80);
    }
    // 확정 알파벳 드랍 5개 (보스 격파 보상) - 피버/완성 체크 포함
    for (let i = 0; i < 5; i++) {
      setTimeout(() => {
        if (!state.running || state.feverActive) return;
        if (!state.currentWord || state.letterIndex >= state.currentWord.w.length) return;
        const dx = (Math.random() - 0.5) * 60;
        dropLetter(b.x + dx, b.y);
      }, 200 + i * 120);
    }
    showCombo(W/2, H/3, 'BOSS DOWN!', '#ffd700');
    flash('rgba(255, 215, 0, 0.5)');
    state.boss = null;
    // 보스 처치는 5킬로 카운트 (스테이지 진행 보상)
    state.kills += 5;
  } else {
    spawnParticles(b.x + (Math.random()-0.5)*20, b.y, '#ffaa00', 3);
  }
}

// ============================================================
// 운석 시스템
// ============================================================
function spawnMeteorWarning() {
  state.meteors.push({
    phase: 'warning',
    x: 40 + Math.random() * (W - 80),
    y: 0,
    warning: METEOR_WARNING_FRAMES,
    hp: 3,
    vy: 0
  });
}

function updateMeteors() {
  // 새 운석 스폰 체크
  if (state.stage >= METEOR_MIN_STAGE && !state.feverActive && !state.boss) {
    const now = performance.now();
    const interval = METEOR_MIN_INTERVAL + Math.random() * (METEOR_MAX_INTERVAL - METEOR_MIN_INTERVAL);
    if (now - state.lastMeteor > interval) {
      state.lastMeteor = now;
      spawnMeteorWarning();
    }
  }

  // 기존 운석 업데이트
  for (const m of state.meteors) {
    if (m.phase === 'warning') {
      m.warning--;
      if (m.warning <= 0) {
        m.phase = 'falling';
        m.vy = 3.5;
      }
    } else {
      m.y += m.vy;
      m.vy = Math.min(m.vy + 0.03, 5); // 소폭 가속
    }
  }
  state.meteors = state.meteors.filter(m => m.hp > 0 && m.y < H + 40);
}

function shoot() {
  const now = performance.now();
  const char = CHARACTERS[state.selectedChar];
  const fireRate = state.feverActive
    ? 60
    : Math.max(70, 280 - state.weaponLv * 25 - char.fireRateBonus);
  if (now - state.lastShot < fireRate) return;
  state.lastShot = now;

  const px = state.player.x;
  const py = state.player.y - 12;
  const lv = state.feverActive ? 10 : state.weaponLv;
  const C = char.colors;

  if (state.feverActive) {
    // 피버: 전방 7갈래 + 강화탄
    for (let i = -3; i <= 3; i++) {
      state.bullets.push({ x: px + i*6, y: py, vx: i*1.2, vy: -9, color: '#ffd700', w: 4, h: 8 });
    }
    state.bullets.push({ x: px, y: py - 5, vx: 0, vy: -12, color: '#fff', w: 6, h: 12 });
  } else if (lv === 1) {
    state.bullets.push({ x: px, y: py, vx: 0, vy: -9, color: C.bullet, w: 3, h: 8 });
  } else if (lv === 2) {
    state.bullets.push({ x: px - 6, y: py, vx: 0, vy: -9, color: C.bullet, w: 3, h: 8 });
    state.bullets.push({ x: px + 6, y: py, vx: 0, vy: -9, color: C.bullet, w: 3, h: 8 });
  } else if (lv === 3) {
    state.bullets.push({ x: px, y: py, vx: 0, vy: -10, color: C.bulletStrong, w: 4, h: 9 });
    state.bullets.push({ x: px - 8, y: py, vx: -0.8, vy: -9, color: C.bullet, w: 3, h: 8 });
    state.bullets.push({ x: px + 8, y: py, vx: 0.8, vy: -9, color: C.bullet, w: 3, h: 8 });
  } else if (lv === 4) {
    state.bullets.push({ x: px - 10, y: py, vx: -0.8, vy: -9, color: C.bullet, w: 3, h: 8 });
    state.bullets.push({ x: px - 4, y: py, vx: 0, vy: -10, color: C.bulletStrong, w: 4, h: 9 });
    state.bullets.push({ x: px + 4, y: py, vx: 0, vy: -10, color: C.bulletStrong, w: 4, h: 9 });
    state.bullets.push({ x: px + 10, y: py, vx: 0.8, vy: -9, color: C.bullet, w: 3, h: 8 });
  } else { // Lv5+
    for (let i = -2; i <= 2; i++) {
      state.bullets.push({ x: px + i*7, y: py, vx: i*1.0, vy: -10, color: i === 0 ? '#ff0066' : C.bulletStrong, w: 4, h: 9 });
    }
    if (lv >= 6) state.bullets.push({ x: px, y: py - 5, vx: 0, vy: -13, color: '#fff', w: 5, h: 11 });
  }
}

// 알파벳 드랍: 현재 단어 기준
function dropLetter(x, y) {
  // 가드: 단어가 이미 완성되었거나 피버 중이면 드랍 스킵
  if (!state.currentWord) return;
  if (state.feverActive) return;
  const word = state.currentWord.w;
  if (state.letterIndex >= word.length) return; // 이미 완성
  const needed = word[state.letterIndex]; // 현재 필요한 글자
  if (!needed) return; // 최후의 안전장치
  // 이미 먹은 글자들
  const already = [...word.slice(0, state.letterIndex)];

  // 드랍 풀: 60% 정답, 25% 방해, 15% 이미 먹은 글자 (무해)
  const r = Math.random();
  let char;
  if (r < 0.60) char = needed;
  else if (r < 0.85) {
    // 방해: 단어에 없는 무작위 알파벳
    const wordSet = new Set(word.split(''));
    let tries = 0;
    do {
      char = String.fromCharCode(65 + Math.floor(Math.random() * 26));
      tries++;
    } while (wordSet.has(char) && tries < 10);
    if (wordSet.has(char)) char = needed; // fallback
  } else {
    // 이미 지난 글자 or 무작위
    if (already.length > 0) char = already[Math.floor(Math.random() * already.length)];
    else char = needed;
  }

  state.letters.push({
    x, y,
    char,
    vx: (Math.random() - 0.5) * 1.5,
    vy: 0.5,
    w: 22, h: 22,
    alive: true,
    bobPhase: Math.random() * Math.PI * 2
  });
}

function spawnParticles(x, y, color, count = 10) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 1 + Math.random() * 3;
    state.particles.push({
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s - 1,
      life: 20 + Math.random() * 15,
      maxLife: 35,
      color,
      size: 2 + Math.floor(Math.random() * 3)
    });
  }
}

function showCombo(x, y, text, color) {
  const el = document.createElement('div');
  el.className = 'combo-text';
  el.style.color = color;
  el.style.textShadow = '2px 2px 0 #000';
  el.textContent = text;
  // x, y는 가상 좌표 → 실제 픽셀 좌표로 변환
  el.style.left = (x * SCALE) + 'px';
  el.style.top = (y * SCALE) + 'px';
  document.getElementById('app').appendChild(el);
  setTimeout(() => el.remove(), 800);
}

function flash(color) {
  const f = document.getElementById('flash');
  f.style.background = color;
  f.classList.remove('active');
  void f.offsetWidth;
  f.classList.add('active');
}

// ============================================================
// 피버 모드
// ============================================================
function enterFever() {
  state.feverActive = true;
  state.feverEndTime = performance.now() + state.feverDuration;
  state.completedWords++;

  flash('#ffd700');
  document.getElementById('fever-banner').style.display = 'block';
  document.getElementById('fever-timer').style.display = 'block';
  setTimeout(() => { document.getElementById('fever-banner').style.display = 'none'; }, 1500);

  // 모든 적에게 피해
  for (const enemy of state.enemies) {
    enemy.hp = 0;
    enemy.alive = false;
    spawnParticles(enemy.x, enemy.y, '#ffd700', 12);
    state.kills++;
    state.score += 50;
  }
  state.enemies = state.enemies.filter(e => e.alive);

  // 스피드 라인 초기화
  state.speedLines = [];
  for (let i = 0; i < 30; i++) {
    state.speedLines.push({
      x: Math.random() * W,
      y: Math.random() * H,
      len: 20 + Math.random() * 40,
      speed: 15 + Math.random() * 15
    });
  }
}

function exitFever() {
  state.feverActive = false;
  state.speedLines = [];
  state.weaponLv = Math.min(state.weaponLv, 5); // 최대 Lv5로 정리
  // 다음 단어 (길이 +1)
  state.nextWordLength = Math.min(state.nextWordLength + 1, 8);
  pickNewWord();
  updateHUD();
}

// ============================================================
// 메인 루프
// ============================================================
function loop() {
  if (!state.running) return;

  // 플레이어 이동
  const speed = state.feverActive ? 9 : 6;
  if (pointerX !== null) {
    const dx = pointerX - state.player.x;
    if (Math.abs(dx) > 2) state.player.x += Math.sign(dx) * Math.min(Math.abs(dx), speed * 1.3);
  }
  if (keys['arrowleft'] || keys['a']) state.player.x -= speed;
  if (keys['arrowright'] || keys['d']) state.player.x += speed;
  state.player.x = Math.max(20, Math.min(W - 20, state.player.x));
  state.player.y = H - 80;
  state.player.wingFrame = (state.player.wingFrame + 1) % 20;
  state.player.flameFrame = (state.player.flameFrame + 1) % 8;
  if (state.player.invuln > 0) state.player.invuln--;

  // 자동 발사
  shoot();

  // 피버 종료 체크
  if (state.feverActive && performance.now() >= state.feverEndTime) {
    exitFever();
    document.getElementById('fever-timer').style.display = 'none';
  }
  if (state.feverActive) {
    const remain = Math.max(0, (state.feverEndTime - performance.now()) / 1000);
    document.getElementById('fever-timer').textContent = remain.toFixed(1) + 's';
  }

  // 총알 이동
  for (const b of state.bullets) {
    b.x += b.vx;
    b.y += b.vy;
  }
  state.bullets = state.bullets.filter(b => b.y > -20 && b.x > -20 && b.x < W + 20);

  // 적 스폰
  const now = performance.now();
  if (state.feverActive) {
    // 피버: 120ms마다 폭풍 스폰, 50% 확률로 2마리 동시
    if (now - state.lastSpawn > 120) {
      state.lastSpawn = now;
      spawnEnemy();
      if (Math.random() < 0.5) spawnEnemy();
    }
  } else {
    // 일반: 상한 200ms (이전 350에서 하향)
    const spawnRate = Math.max(200, 900 - state.stage * 70);
    if (now - state.lastSpawn > spawnRate) {
      state.lastSpawn = now;
      spawnEnemy();
      if (state.stage >= 5 && Math.random() < 0.25) spawnEnemy();
      if (state.stage >= 8 && Math.random() < 0.35) spawnEnemy();
    }
  }

  // 적 이동 & 발사
  for (const enemy of state.enemies) {
    if (!enemy.alive) continue;
    enemy.y += enemy.speed;
    enemy.animFrame = (enemy.animFrame + 1) % 20;

    // 적 탄 발사 (피버 중이 아닐 때만)
    if (!state.feverActive && canEnemyShoot(enemy)) {
      enemy.shootTimer++;
      const shootInterval = enemy.type === 'tanky' ? 80 : 130;
      if (enemy.shootTimer > shootInterval && enemy.y > 30 && enemy.y < H * 0.75) {
        enemy.shootTimer = 0;
        enemyShoot(enemy);
      }
    }

    if (enemy.y > H + 30) enemy.alive = false;
  }

  // 적 탄환 이동
  for (const b of state.enemyBullets) {
    b.x += b.vx;
    b.y += b.vy;
  }
  state.enemyBullets = state.enemyBullets.filter(b => b.y < H + 20 && b.y > -999);

  // 보스 업데이트
  updateBoss();

  // 운석 업데이트
  updateMeteors();

  // 플레이어 총알 <-> 보스 충돌
  if (state.boss && state.boss.alive && !state.boss.entering) {
    const bs = state.boss;
    for (const bullet of state.bullets) {
      if (bullet.y < -10) continue;
      if (Math.abs(bullet.x - bs.x) < bs.w/2 + 2 &&
          Math.abs(bullet.y - bs.y) < bs.h/2 + 2) {
        bullet.y = -999;
        damageBoss(1);
        if (!state.boss) break; // 격파되면 루프 종료
      }
    }
  }

  // 플레이어 총알 <-> 운석 충돌
  for (const m of state.meteors) {
    if (m.phase !== 'falling' || m.hp <= 0) continue;
    for (const bullet of state.bullets) {
      if (bullet.y < -10) continue;
      if (Math.abs(bullet.x - m.x) < 14 && Math.abs(bullet.y - m.y) < 14) {
        bullet.y = -999;
        m.hp--;
        spawnParticles(bullet.x, bullet.y, '#ffaa00', 3);
        if (m.hp <= 0) {
          spawnParticles(m.x, m.y, '#ff6600', 18);
          spawnParticles(m.x, m.y, '#fbbf24', 10);
          state.score += 150;
          showCombo(m.x, m.y - 10, '+150', '#ffd700');
        }
        break;
      }
    }
  }

  // 총알 <-> 적 충돌
  for (const b of state.bullets) {
    if (b.y < -10) continue;
    for (const enemy of state.enemies) {
      if (!enemy.alive) continue;
      if (Math.abs(b.x - enemy.x) < enemy.w/2 + 2 &&
          Math.abs(b.y - enemy.y) < enemy.h/2 + 3) {
        enemy.hp--;
        b.y = -999; // 총알 소멸
        if (enemy.hp <= 0) {
          enemy.alive = false;
          state.kills++;
          state.score += 20 * state.stage;
          spawnParticles(enemy.x, enemy.y, '#ff6666', 8);
          // 알파벳 드랍: 확률 기반 + 화면 상한
          if (!state.feverActive &&
              Math.random() < LETTER_DROP_CHANCE &&
              state.letters.length < MAX_LETTERS_ON_SCREEN) {
            dropLetter(enemy.x, enemy.y);
          }
          // 스테이지 업 체크 (15킬마다)
          const newStage = Math.floor(state.kills / 15) + 1;
          if (newStage > state.stage) {
            state.stage = newStage;
            showCombo(W/2, H/3, 'STAGE ' + state.stage, '#ffd700');
            // 10의 배수 스테이지마다 보스 등장
            if (state.stage % BOSS_INTERVAL === 0 && !state.boss) {
              spawnBoss();
            }
          }
        } else {
          spawnParticles(enemy.x, enemy.y, '#ffaa00', 4);
        }
        break;
      }
    }
  }
  state.enemies = state.enemies.filter(e => e.alive);

  // 플레이어 <-> 적 충돌
  if (state.player.invuln === 0 && !state.feverActive) {
    for (const enemy of state.enemies) {
      if (!enemy.alive) continue;
      if (Math.abs(state.player.x - enemy.x) < (state.player.w + enemy.w)/2 - 4 &&
          Math.abs(state.player.y - enemy.y) < (state.player.h + enemy.h)/2 - 4) {
        enemy.alive = false;
        spawnParticles(enemy.x, enemy.y, '#ff0066', 15);
        loseHP();
        break;
      }
    }
  } else if (state.feverActive) {
    // 피버 중에는 적과 충돌 시 처치
    for (const enemy of state.enemies) {
      if (!enemy.alive) continue;
      if (Math.abs(state.player.x - enemy.x) < (state.player.w + enemy.w)/2 &&
          Math.abs(state.player.y - enemy.y) < (state.player.h + enemy.h)/2) {
        enemy.alive = false;
        state.kills++;
        state.score += 30;
        spawnParticles(enemy.x, enemy.y, '#ffd700', 12);
      }
    }
  }

  // 플레이어 <-> 적 탄환 충돌
  if (state.player.invuln === 0 && !state.feverActive) {
    for (const b of state.enemyBullets) {
      if (Math.abs(state.player.x - b.x) < (state.player.w/2 - 4) &&
          Math.abs(state.player.y - b.y) < (state.player.h/2 - 4)) {
        b.y = -9999;
        spawnParticles(b.x, b.y, '#ff0066', 10);
        loseHP();
        break;
      }
    }
    state.enemyBullets = state.enemyBullets.filter(b => b.y > -999);
  } else if (state.feverActive) {
    // 피버 중엔 적 탄환 무시하고 지운다 (연출)
    for (const b of state.enemyBullets) {
      spawnParticles(b.x, b.y, '#ffd700', 3);
    }
    state.enemyBullets = [];
  }

  // 플레이어 <-> 보스 몸통 충돌
  if (state.boss && state.boss.alive && !state.boss.entering) {
    const bs = state.boss;
    if (state.player.invuln === 0 && !state.feverActive) {
      if (Math.abs(state.player.x - bs.x) < (state.player.w + bs.w)/2 - 6 &&
          Math.abs(state.player.y - bs.y) < (state.player.h + bs.h)/2 - 6) {
        loseHP();
      }
    }
  }

  // 플레이어 <-> 운석 충돌
  if (state.player.invuln === 0 && !state.feverActive) {
    for (const m of state.meteors) {
      if (m.phase !== 'falling' || m.hp <= 0) continue;
      if (Math.abs(state.player.x - m.x) < (state.player.w/2 + 10) &&
          Math.abs(state.player.y - m.y) < (state.player.h/2 + 10)) {
        spawnParticles(m.x, m.y, '#ff0066', 20);
        m.hp = 0; // 운석 소멸
        loseHP();
        break;
      }
    }
  } else if (state.feverActive) {
    // 피버 중엔 운석 돌파 연출
    for (const m of state.meteors) {
      if (m.phase === 'falling' &&
          Math.abs(state.player.x - m.x) < (state.player.w/2 + 10) &&
          Math.abs(state.player.y - m.y) < (state.player.h/2 + 10)) {
        spawnParticles(m.x, m.y, '#ffd700', 20);
        m.hp = 0;
        state.score += 100;
      }
    }
  }

  // 알파벳 이동 & 수집
  for (const L of state.letters) {
    if (!L.alive) continue;
    L.vy = Math.min(L.vy + 0.05, 3);
    L.x += L.vx;
    L.y += L.vy;
    L.bobPhase += 0.15;
    if (L.y > H + 20) L.alive = false;

    // 플레이어와 충돌
    if (L.alive &&
        Math.abs(state.player.x - L.x) < (state.player.w + L.w)/2 - 2 &&
        Math.abs(state.player.y - L.y) < (state.player.h + L.h)/2 - 2) {
      collectLetter(L);
      L.alive = false;
    }
  }
  state.letters = state.letters.filter(L => L.alive);

  // 파티클
  for (const p of state.particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.2;
    p.life--;
  }
  state.particles = state.particles.filter(p => p.life > 0);

  // 별
  for (const s of state.stars) {
    s.y += s.speed * (state.feverActive ? 4 : 1);
    if (s.y > H) { s.y = -5; s.x = Math.random() * W; }
  }

  // 스피드 라인 (피버)
  if (state.feverActive) {
    for (const line of state.speedLines) {
      line.y += line.speed;
      if (line.y > H + 50) {
        line.y = -line.len;
        line.x = Math.random() * W;
      }
    }
  }

  updateHUD();
  render();
  state.rafId = requestAnimationFrame(loop);
}

function collectLetter(L) {
  const needed = state.currentWord.w[state.letterIndex];
  if (L.char === needed) {
    // 정답!
    state.letterIndex++;
    state.weaponLv = Math.min(state.weaponLv + 1, 5);
    state.score += 100;
    spawnParticles(L.x, L.y, '#4ade80', 12);
    showCombo(L.x, L.y - 10, '+' + L.char, '#4ade80');

    if (state.letterIndex >= state.currentWord.w.length) {
      // 단어 완성 → 피버
      state.score += 500;
      showCombo(W/2, H/2 - 30, state.currentWord.w + ' ✓', '#ffd700');
      enterFever();
    }
  } else if (state.currentWord.w.slice(0, state.letterIndex).includes(L.char)) {
    // 이미 먹은 글자 - 소량 점수만
    state.score += 5;
    spawnParticles(L.x, L.y, '#94a3b8', 5);
  } else {
    // 오답 - 무기 약화
    state.weaponLv = Math.max(1, state.weaponLv - 1);
    state.score = Math.max(0, state.score - 20);
    spawnParticles(L.x, L.y, '#ef4444', 10);
    showCombo(L.x, L.y - 10, '−' + L.char, '#ef4444');
    flash('rgba(239, 68, 68, 0.4)');
  }
  updateHUD();
}

function loseHP() {
  state.hp--;
  state.player.invuln = 90; // 1.5초
  flash('rgba(239, 68, 68, 0.5)');
  document.getElementById('app').classList.add('shake');
  setTimeout(() => document.getElementById('app').classList.remove('shake'), 250);
  updateHUD();
  if (state.hp <= 0) gameOver();
}

function gameOver() {
  state.running = false;

  // 최고 점수
  let newRecord = false;
  if (state.score > state.bestScore) {
    state.bestScore = state.score;
    localStorage.setItem('dragonFlight_v2_best', state.score);
    newRecord = true;
  }

  // 최고 스테이지 & 새 캐릭터 언락 체크
  let unlockedNew = null;
  if (state.stage > state.bestStage) {
    const prevStage = state.bestStage;
    state.bestStage = state.stage;
    localStorage.setItem('dragonFlight_v2_bestStage', state.bestStage);
    // 이번 판에서 새로 언락된 캐릭터
    for (const c of CHARACTERS) {
      if (c.unlockStage > prevStage && c.unlockStage <= state.bestStage) {
        unlockedNew = c;
      }
    }
  }

  if (newRecord) document.getElementById('best-badge').classList.remove('hidden');
  else document.getElementById('best-badge').classList.add('hidden');

  document.getElementById('final-score').textContent = String(state.score).padStart(5, '0');
  const secs = Math.floor((performance.now() - state.startTime) / 1000);

  let statsHtml = `KILLS: ${state.kills}<br>WORDS: ${state.completedWords}<br>STAGE: ${state.stage}<br>TIME: ${secs}s`;
  if (unlockedNew) {
    statsHtml += `<br><br><span style="color:#ffd700;">★ NEW DRAGON ★<br>${unlockedNew.name} UNLOCKED!</span>`;
  }
  document.getElementById('game-stats').innerHTML = statsHtml;
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('over-screen').classList.remove('hidden');
}

// ============================================================
// 렌더링 (픽셀 아트)
// ============================================================
function render() {
  // 배경
  ctx.fillStyle = state.feverActive ? '#2a0033' : '#0a0a1a';
  ctx.fillRect(0, 0, W, H);

  // 별
  for (const s of state.stars) {
    ctx.fillStyle = s.size === 1 ? '#445' : '#99a';
    ctx.fillRect(Math.floor(s.x), Math.floor(s.y), s.size, s.size);
  }

  // 스피드 라인 (피버)
  if (state.feverActive) {
    ctx.fillStyle = 'rgba(255, 215, 0, 0.6)';
    for (const line of state.speedLines) {
      ctx.fillRect(Math.floor(line.x), Math.floor(line.y), 2, line.len);
    }
  }

  // 알파벳
  for (const L of state.letters) {
    if (!L.alive) continue;
    drawLetterTile(L);
  }

  // 총알 (플레이어)
  for (const b of state.bullets) {
    ctx.fillStyle = b.color;
    ctx.fillRect(Math.floor(b.x - b.w/2), Math.floor(b.y - b.h/2), b.w, b.h);
    // 빛나는 효과 (외곽)
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillRect(Math.floor(b.x - b.w/2 - 1), Math.floor(b.y - b.h/2), 1, b.h);
    ctx.fillRect(Math.floor(b.x + b.w/2), Math.floor(b.y - b.h/2), 1, b.h);
  }

  // 적 탄환
  for (const b of state.enemyBullets) {
    ctx.fillStyle = b.color;
    ctx.fillRect(Math.floor(b.x - b.w/2), Math.floor(b.y - b.h/2), b.w, b.h);
    // 광휘 (위험 표시)
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillRect(Math.floor(b.x - 1), Math.floor(b.y - b.h/2), 2, 2);
  }

  // 적
  for (const e of state.enemies) {
    if (!e.alive) continue;
    drawEnemy(e);
  }

  // 보스
  if (state.boss && state.boss.alive) {
    drawBoss(state.boss);
    drawBossHPBar(state.boss);
  }

  // 운석 (경고 마커 먼저, 낙하 중인 것은 플레이어 아래쪽으로)
  for (const m of state.meteors) {
    drawMeteor(m);
  }

  // 플레이어
  drawDragon(state.player);

  // 파티클
  for (const p of state.particles) {
    const alpha = Math.max(0, p.life / p.maxLife);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(Math.floor(p.x - p.size/2), Math.floor(p.y - p.size/2), p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// --- 도트 스프라이트 그리기 함수 ---

function drawPx(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), w, h);
}

// 드래곤 (픽셀 아트) - 32x32 프레임, 날개 애니메이션
function drawDragon(p) {
  const cx = Math.floor(p.x);
  const cy = Math.floor(p.y);

  // 깜빡임 (무적)
  if (p.invuln > 0 && Math.floor(p.invuln / 4) % 2 === 0) return;

  const char = CHARACTERS[state.selectedChar];
  const C = char.colors;

  const flame = state.feverActive
    ? ['#fff', '#ffd700', '#ff0066']
    : ['#ffaa00', '#ff6600', '#ff0066'];
  const body = state.feverActive ? '#ffd700' : C.body;
  const bodyDark = state.feverActive ? '#d4a017' : C.bodyDark;
  const belly = state.feverActive ? '#fff3a0' : C.belly;
  const wingColor = state.feverActive ? '#ffd700' : C.wing;
  const hornColor = C.horn;

  // 날개 프레임 (0-9: 위, 10-19: 아래)
  const wingUp = p.wingFrame < 10;

  // 불꽃 (엔진)
  const fIdx = Math.floor(p.flameFrame / 3) % 3;
  drawPx(cx - 2, cy + 14, 4, 6 + fIdx * 2, flame[0]);
  drawPx(cx - 4, cy + 16, 8, 4 + fIdx, flame[1]);
  drawPx(cx - 6, cy + 18, 12, 2, flame[2]);

  // 날개
  if (wingUp) {
    drawPx(cx - 14, cy - 4, 4, 4, wingColor);
    drawPx(cx - 10, cy - 2, 4, 6, wingColor);
    drawPx(cx + 10, cy - 4, 4, 4, wingColor);
    drawPx(cx + 6, cy - 2, 4, 6, wingColor);
  } else {
    drawPx(cx - 14, cy + 2, 4, 6, wingColor);
    drawPx(cx - 10, cy + 0, 4, 6, wingColor);
    drawPx(cx + 10, cy + 2, 4, 6, wingColor);
    drawPx(cx + 6, cy + 0, 4, 6, wingColor);
  }

  // 몸통 (외곽선)
  drawPx(cx - 8, cy - 8, 16, 2, bodyDark);
  drawPx(cx - 8, cy + 10, 16, 2, bodyDark);
  drawPx(cx - 10, cy - 6, 2, 16, bodyDark);
  drawPx(cx + 8, cy - 6, 2, 16, bodyDark);

  // 몸통 내부
  drawPx(cx - 8, cy - 6, 16, 16, body);
  drawPx(cx - 4, cy + 4, 8, 6, belly);

  // 머리
  drawPx(cx - 4, cy - 14, 8, 6, body);
  drawPx(cx - 6, cy - 12, 2, 4, bodyDark);
  drawPx(cx + 4, cy - 12, 2, 4, bodyDark);
  drawPx(cx - 4, cy - 16, 8, 2, bodyDark);

  // 뿔
  drawPx(cx - 8, cy - 14, 2, 4, hornColor);
  drawPx(cx + 6, cy - 14, 2, 4, hornColor);

  // 눈
  drawPx(cx - 4, cy - 10, 2, 2, '#fff');
  drawPx(cx + 2, cy - 10, 2, 2, '#fff');
  drawPx(cx - 3, cy - 9, 1, 1, '#000');
  drawPx(cx + 3, cy - 9, 1, 1, '#000');

  // 피버시 후광
  if (state.feverActive) {
    ctx.globalAlpha = 0.3 + Math.sin(performance.now() * 0.015) * 0.2;
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 2;
    ctx.strokeRect(cx - 16, cy - 18, 32, 36);
    ctx.globalAlpha = 1;
  }
}

// 미니 드래곤 (캐릭터 선택 카드용 - 40x40 캔버스)
function drawMiniDragon(canvasEl, char) {
  const mctx = canvasEl.getContext('2d');
  mctx.imageSmoothingEnabled = false;
  mctx.clearRect(0, 0, 40, 40);
  const C = char.colors;

  // 스케일: 본 드래곤의 좌표를 그대로 사용하고 (0,0)에서 (20,20) 중심으로 배치
  // 40x40 canvas에서 중심 (20, 22) 사용 (약간 아래)
  const cx = 20, cy = 22;
  function mp(x, y, w, h, color) {
    mctx.fillStyle = color;
    mctx.fillRect(x, y, w, h);
  }

  // 불꽃 (고정 프레임)
  mp(cx - 1, cy + 9, 2, 4, '#ffaa00');
  mp(cx - 2, cy + 11, 4, 3, '#ff6600');

  // 날개 (고정 위)
  mp(cx - 9, cy - 3, 3, 3, C.wing);
  mp(cx - 6, cy - 1, 3, 4, C.wing);
  mp(cx + 6, cy - 3, 3, 3, C.wing);
  mp(cx + 3, cy - 1, 3, 4, C.wing);

  // 몸통 외곽
  mp(cx - 5, cy - 5, 10, 1, C.bodyDark);
  mp(cx - 5, cy + 6, 10, 1, C.bodyDark);
  mp(cx - 6, cy - 4, 1, 10, C.bodyDark);
  mp(cx + 5, cy - 4, 1, 10, C.bodyDark);

  // 몸통 내부
  mp(cx - 5, cy - 4, 10, 10, C.body);
  mp(cx - 2, cy + 2, 5, 4, C.belly);

  // 머리
  mp(cx - 2, cy - 9, 5, 4, C.body);
  mp(cx - 2, cy - 10, 5, 1, C.bodyDark);

  // 뿔
  mp(cx - 4, cy - 9, 1, 2, C.horn);
  mp(cx + 3, cy - 9, 1, 2, C.horn);

  // 눈
  mp(cx - 2, cy - 6, 1, 1, '#fff');
  mp(cx + 1, cy - 6, 1, 1, '#fff');
}

// 적 (픽셀 아트 - 적 유형별 다른 모양)
function drawEnemy(e) {
  const cx = Math.floor(e.x);
  const cy = Math.floor(e.y);

  if (e.type === 'basic') {
    // 박쥐 스타일
    const wingUp = e.animFrame < 10;
    // 날개
    if (wingUp) {
      drawPx(cx - 12, cy - 4, 4, 4, '#6b21a8');
      drawPx(cx + 8, cy - 4, 4, 4, '#6b21a8');
      drawPx(cx - 8, cy - 2, 4, 4, '#a855f7');
      drawPx(cx + 4, cy - 2, 4, 4, '#a855f7');
    } else {
      drawPx(cx - 12, cy + 2, 4, 4, '#6b21a8');
      drawPx(cx + 8, cy + 2, 4, 4, '#6b21a8');
      drawPx(cx - 8, cy + 0, 4, 4, '#a855f7');
      drawPx(cx + 4, cy + 0, 4, 4, '#a855f7');
    }
    // 몸통
    drawPx(cx - 6, cy - 6, 12, 12, '#7e22ce');
    drawPx(cx - 4, cy - 4, 8, 8, '#a855f7');
    // 눈 (빨강)
    drawPx(cx - 3, cy - 2, 2, 2, '#ef4444');
    drawPx(cx + 1, cy - 2, 2, 2, '#ef4444');
    // 입
    drawPx(cx - 2, cy + 2, 4, 1, '#000');
  } else if (e.type === 'fast') {
    // 빠른 적 - 화살 모양
    drawPx(cx - 2, cy - 10, 4, 4, '#fbbf24');
    drawPx(cx - 4, cy - 6, 8, 4, '#f59e0b');
    drawPx(cx - 6, cy - 2, 12, 4, '#f59e0b');
    drawPx(cx - 4, cy + 2, 8, 4, '#d97706');
    drawPx(cx - 2, cy + 6, 4, 4, '#d97706');
    // 눈
    drawPx(cx - 2, cy - 4, 1, 1, '#000');
    drawPx(cx + 1, cy - 4, 1, 1, '#000');
  } else if (e.type === 'tanky') {
    // 탱키 - 큰 돌덩이 외계인
    drawPx(cx - 14, cy - 12, 28, 4, '#1e3a8a');
    drawPx(cx - 16, cy - 8, 32, 4, '#1e40af');
    drawPx(cx - 16, cy - 4, 32, 8, '#2563eb');
    drawPx(cx - 14, cy + 4, 28, 4, '#2563eb');
    drawPx(cx - 12, cy + 8, 24, 4, '#1e40af');
    // 내부 밝은 부분
    drawPx(cx - 10, cy - 6, 20, 8, '#3b82f6');
    // 눈들 (3개)
    drawPx(cx - 8, cy - 2, 2, 2, '#ef4444');
    drawPx(cx - 1, cy - 2, 2, 2, '#ef4444');
    drawPx(cx + 6, cy - 2, 2, 2, '#ef4444');
  }
}

// ============================================================
// 보스 렌더링
// ============================================================
function drawBoss(b) {
  const cx = Math.floor(b.x);
  const cy = Math.floor(b.y);
  const wingUp = Math.floor(b.animFrame / 10) % 2 === 0;

  // 큰 박쥐/악마형 보스 (64x48)
  // 날개 (바깥쪽 → 안쪽으로)
  const wingColor1 = '#450a0a';
  const wingColor2 = '#7f1d1d';
  const wingColor3 = '#dc2626';
  if (wingUp) {
    // 왼쪽 날개
    drawPx(cx - 32, cy - 10, 6, 8, wingColor1);
    drawPx(cx - 26, cy - 14, 6, 10, wingColor2);
    drawPx(cx - 20, cy - 16, 8, 14, wingColor3);
    // 오른쪽 날개
    drawPx(cx + 26, cy - 10, 6, 8, wingColor1);
    drawPx(cx + 20, cy - 14, 6, 10, wingColor2);
    drawPx(cx + 12, cy - 16, 8, 14, wingColor3);
  } else {
    drawPx(cx - 32, cy - 4, 6, 10, wingColor1);
    drawPx(cx - 26, cy - 2, 6, 12, wingColor2);
    drawPx(cx - 20, cy - 4, 8, 14, wingColor3);
    drawPx(cx + 26, cy - 4, 6, 10, wingColor1);
    drawPx(cx + 20, cy - 2, 6, 12, wingColor2);
    drawPx(cx + 12, cy - 4, 8, 14, wingColor3);
  }

  // 몸통 외곽
  drawPx(cx - 14, cy - 18, 28, 3, '#450a0a');
  drawPx(cx - 14, cy + 18, 28, 3, '#450a0a');
  drawPx(cx - 17, cy - 15, 3, 33, '#450a0a');
  drawPx(cx + 14, cy - 15, 3, 33, '#450a0a');

  // 몸통 내부
  drawPx(cx - 14, cy - 15, 28, 33, '#991b1b');
  drawPx(cx - 10, cy - 12, 20, 6, '#dc2626'); // 상부 하이라이트
  drawPx(cx - 8, cy + 4, 16, 10, '#7f1d1d'); // 배

  // 뿔 (크게)
  drawPx(cx - 14, cy - 22, 4, 6, '#1e1b4b');
  drawPx(cx - 12, cy - 26, 4, 4, '#1e1b4b');
  drawPx(cx + 10, cy - 22, 4, 6, '#1e1b4b');
  drawPx(cx + 8, cy - 26, 4, 4, '#1e1b4b');

  // 눈 (빨간 악마 눈)
  const blink = Math.floor(b.animFrame / 60) % 2 === 0 || b.animFrame % 60 < 55;
  if (blink) {
    drawPx(cx - 9, cy - 10, 5, 4, '#fff');
    drawPx(cx + 4, cy - 10, 5, 4, '#fff');
    drawPx(cx - 8, cy - 9, 3, 3, '#ef4444');
    drawPx(cx + 5, cy - 9, 3, 3, '#ef4444');
    drawPx(cx - 7, cy - 8, 1, 1, '#000');
    drawPx(cx + 6, cy - 8, 1, 1, '#000');
  } else {
    // 깜빡
    drawPx(cx - 9, cy - 9, 5, 1, '#991b1b');
    drawPx(cx + 4, cy - 9, 5, 1, '#991b1b');
  }

  // 입 (이빨)
  drawPx(cx - 6, cy + 8, 12, 3, '#1e1b4b');
  drawPx(cx - 5, cy + 9, 2, 2, '#fff');
  drawPx(cx - 1, cy + 9, 2, 2, '#fff');
  drawPx(cx + 3, cy + 9, 2, 2, '#fff');

  // 피격 깜빡임
  if (b.hp < b.maxHp && Math.floor(b.animFrame / 3) % 2 === 0 && b.animFrame < 15) {
    ctx.globalAlpha = 0.5;
    drawPx(cx - 17, cy - 18, 34, 37, '#fff');
    ctx.globalAlpha = 1;
  }
}

function drawBossHPBar(b) {
  const barW = W - 40;
  const barH = 8;
  const barX = 20;
  const barY = 55;

  // 배경
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(barX - 2, barY - 2, barW + 4, barH + 4);
  ctx.fillStyle = '#1e1b4b';
  ctx.fillRect(barX, barY, barW, barH);

  // 체력
  const ratio = Math.max(0, b.hp / b.maxHp);
  const fillW = Math.floor(barW * ratio);
  let color = '#dc2626';
  if (ratio > 0.6) color = '#dc2626';
  else if (ratio > 0.3) color = '#f59e0b';
  else color = '#ef4444';
  ctx.fillStyle = color;
  ctx.fillRect(barX, barY, fillW, barH);

  // 번쩍임 (하이라이트)
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fillRect(barX, barY, fillW, 2);

  // BOSS 라벨
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 9px "Press Start 2P", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('★ BOSS ★', W/2, barY - 11);
}

// ============================================================
// 운석 렌더링
// ============================================================
function drawMeteor(m) {
  const cx = Math.floor(m.x);

  if (m.phase === 'warning') {
    // 경고 마커: 상단에 빨간 ! 박스 (깜빡임)
    const blink = Math.floor(m.warning / 8) % 2 === 0;
    if (blink) {
      // 배경 박스
      drawPx(cx - 10, 28, 20, 20, '#000');
      drawPx(cx - 9, 29, 18, 18, '#ff0066');
      drawPx(cx - 7, 31, 14, 14, '#dc2626');

      // ! 느낌표
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 12px "Press Start 2P", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('!', cx, 38);

      // 낙하 경로 점선
      ctx.fillStyle = 'rgba(255, 0, 102, 0.35)';
      for (let dy = 52; dy < H - 20; dy += 8) {
        ctx.fillRect(cx - 1, dy, 2, 4);
      }
    }
  } else {
    const cy = Math.floor(m.y);
    // 불꽃 꼬리
    for (let i = 0; i < 6; i++) {
      ctx.globalAlpha = (1 - i * 0.15) * 0.6;
      ctx.fillStyle = i < 2 ? '#fff3a0' : (i < 4 ? '#f97316' : '#dc2626');
      const trailH = 4;
      ctx.fillRect(cx - 3 - (i%2), cy - 14 - i * 5, 6 + (i%2)*2, trailH);
    }
    ctx.globalAlpha = 1;

    // 운석 몸통 (큰 돌)
    drawPx(cx - 12, cy - 10, 24, 2, '#1c0701');       // 최상단 어두운 테
    drawPx(cx - 14, cy - 8, 28, 4, '#4a1f0a');
    drawPx(cx - 14, cy - 4, 28, 8, '#7c2d12');
    drawPx(cx - 12, cy + 4, 24, 4, '#7c2d12');
    drawPx(cx - 10, cy + 8, 20, 3, '#4a1f0a');

    // 돌 텍스처
    drawPx(cx - 10, cy - 6, 6, 3, '#92400e');
    drawPx(cx + 2, cy + 2, 6, 3, '#a16207');
    drawPx(cx - 4, cy, 4, 3, '#a16207');

    // 뜨거운 부분 (균열)
    drawPx(cx - 8, cy - 2, 2, 2, '#fbbf24');
    drawPx(cx + 4, cy - 5, 2, 2, '#fbbf24');
    drawPx(cx, cy + 4, 2, 2, '#f59e0b');

    // HP 표시 (작은 동그라미)
    if (m.hp < 3) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 8px "Press Start 2P", monospace';
      ctx.textAlign = 'center';
      ctx.fillText(m.hp, cx, cy + 1);
    }
  }
}

// 알파벳 글자 (박스 없이 외곽선 있는 픽셀 글자로)
function drawLetterTile(L) {
  const cx = Math.floor(L.x);
  const cy = Math.floor(L.y + Math.sin(L.bobPhase) * 2);
  const word = state.currentWord.w;
  const needed = word[state.letterIndex];
  const isCorrect = L.char === needed;
  const isAlreadyEaten = word.slice(0, state.letterIndex).includes(L.char);

  let color;
  if (isCorrect) color = '#4ade80';        // 밝은 녹색
  else if (isAlreadyEaten) color = '#94a3b8'; // 회색
  else color = '#f87171';                    // 연한 빨강

  // 정답 글자엔 펄스 후광 (끌림 효과)
  if (isCorrect) {
    const pulse = 0.15 + Math.abs(Math.sin(performance.now() * 0.005)) * 0.25;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#4ade80';
    // 후광: 글자 주변 원형 빛 (픽셀 스타일)
    ctx.fillRect(cx - 14, cy - 10, 28, 20);
    ctx.fillRect(cx - 10, cy - 14, 20, 28);
    ctx.globalAlpha = 1;
  }

  // 글자 그리기 (외곽선 + 메인 색)
  ctx.font = 'bold 24px "Press Start 2P", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // 8방향 외곽선 (검은색) - 복잡한 배경 위에서도 가독성 확보
  ctx.fillStyle = '#000';
  const outlineOffsets = [
    [-2, 0], [2, 0], [0, -2], [0, 2],
    [-2, -2], [2, -2], [-2, 2], [2, 2],
    [-1, -2], [1, -2], [-1, 2], [1, 2],
    [-2, -1], [2, -1], [-2, 1], [2, 1]
  ];
  for (const [dx, dy] of outlineOffsets) {
    ctx.fillText(L.char, cx + dx, cy + dy);
  }

  // 메인 글자
  ctx.fillStyle = color;
  ctx.fillText(L.char, cx, cy);

  // 정답 글자 반짝임 (양쪽에 번갈아)
  if (isCorrect) {
    const t = performance.now() * 0.004 + L.bobPhase * 3;
    ctx.fillStyle = '#fff';
    const sparkleAlpha = 0.6 + Math.sin(t * 2) * 0.4;
    ctx.globalAlpha = sparkleAlpha;
    // 좌상 반짝
    ctx.fillRect(cx - 12 + Math.cos(t) * 2, cy - 12, 2, 2);
    ctx.fillRect(cx - 13 + Math.cos(t) * 2, cy - 10, 2, 2);
    // 우하 반짝
    ctx.fillRect(cx + 10, cy + 10 + Math.sin(t) * 2, 2, 2);
    ctx.fillRect(cx + 12, cy + 9 + Math.sin(t) * 2, 2, 2);
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// 타이틀 드래곤 프리뷰 (선택된 캐릭터 색상 반영)
// ============================================================
let titleRafId = null;
function drawTitleDragon() {
  const c = document.getElementById('title-dragon');
  const tctx = c.getContext('2d');
  tctx.imageSmoothingEnabled = false;
  const C = CHARACTERS[state.selectedChar].colors;

  let t = 0;
  function tick() {
    tctx.clearRect(0, 0, 40, 40);
    const wingUp = Math.floor(t / 10) % 2 === 0;

    // 불꽃
    const fi = Math.floor(t / 3) % 3;
    tctx.fillStyle = '#ff0066'; tctx.fillRect(18, 32, 4, 2 + fi);
    tctx.fillStyle = '#ff6600'; tctx.fillRect(17, 30, 6, 3);
    tctx.fillStyle = '#ffaa00'; tctx.fillRect(18, 28, 4, 3);

    // 날개
    tctx.fillStyle = C.wing;
    if (wingUp) {
      tctx.fillRect(4, 14, 4, 4); tctx.fillRect(8, 16, 4, 6);
      tctx.fillRect(32, 14, 4, 4); tctx.fillRect(28, 16, 4, 6);
    } else {
      tctx.fillRect(4, 20, 4, 4); tctx.fillRect(8, 18, 4, 6);
      tctx.fillRect(32, 20, 4, 4); tctx.fillRect(28, 18, 4, 6);
    }

    // 몸통
    tctx.fillStyle = C.bodyDark; tctx.fillRect(12, 14, 16, 2); tctx.fillRect(12, 28, 16, 2);
    tctx.fillRect(10, 16, 2, 12); tctx.fillRect(28, 16, 2, 12);
    tctx.fillStyle = C.body; tctx.fillRect(12, 16, 16, 12);
    tctx.fillStyle = C.belly; tctx.fillRect(16, 22, 8, 6);

    // 머리
    tctx.fillStyle = C.body; tctx.fillRect(16, 8, 8, 6);
    tctx.fillStyle = C.bodyDark; tctx.fillRect(16, 6, 8, 2);
    tctx.fillStyle = C.horn; tctx.fillRect(12, 6, 2, 4); tctx.fillRect(26, 6, 2, 4);

    // 눈
    tctx.fillStyle = '#fff'; tctx.fillRect(16, 10, 2, 2); tctx.fillRect(22, 10, 2, 2);
    tctx.fillStyle = '#000'; tctx.fillRect(17, 11, 1, 1); tctx.fillRect(23, 11, 1, 1);

    t++;
    if (document.getElementById('title-screen').classList.contains('hidden')) {
      return;
    } else {
      titleRafId = requestAnimationFrame(tick);
    }
  }
  if (titleRafId) cancelAnimationFrame(titleRafId);
  tick();
}

// ============================================================
// 초기 실행
// ============================================================
resize();
setTimeout(() => {
  resize();
  renderCharSelect();
  drawTitleDragon();
}, 100);
</script>
