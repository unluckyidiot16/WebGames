<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alphabet : A→Z Merge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap');

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #f8f9fa;
            touch-action: none; /* 모바일에서 스크롤 방지 */
        }

        .game-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .board-bg {
            background-color: #bbada0;
            border-radius: 8px;
            padding: 10px;
            position: relative;
        }

        .grid-container {
            display: grid;
            gap: 10px;
        }

        .cell {
            background-color: #cdc1b4;
            border-radius: 6px;
            width: 100%;
            padding-bottom: 100%; /* 1:1 비율 유지 */
            position: relative;
        }

        .tile {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
            transition: all 0.15s ease-in-out;
            transform-origin: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        @media (max-width: 400px) {
            .tile { font-size: 2rem; }
        }

        /* 타일 생성/합체 애니메이션 */
        .tile.new { animation: appear 0.2s ease-in-out; }
        .tile.merged { animation: pop 0.2s ease-in-out; }

        @keyframes appear {
            0% { opacity: 0; transform: scale(0); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* 커스텀 모달 */
        .modal-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(238, 228, 218, 0.9);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body class="text-gray-800 antialiased h-screen flex flex-col items-center justify-center overflow-hidden">

<div class="game-container p-4 flex flex-col h-full justify-between">
    <!-- Header / HUD -->
    <header class="mb-4">
        <div class="flex justify-between items-end mb-2">
            <div>
                <!-- 타이틀 디자인 개선 -->
                <h1 class="text-3xl sm:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500 drop-shadow-sm pb-1">A→Z Merge</h1>
                <div class="flex items-center gap-2 mt-1">
                    <p class="text-lg font-semibold text-gray-600" id="stage-display">Stage 1</p>
                    <span id="mode-badge" class="px-2 py-0.5 text-xs font-bold rounded-full bg-blue-100 text-blue-700 hidden">일반 모드</span>
                </div>
            </div>
            <div class="flex gap-1 sm:gap-2 items-end">
                <!-- 타이머 (도전 모드 전용) -->
                <div id="timer-container" class="hidden bg-red-50 rounded px-2 py-1 text-center border border-red-200 min-w-[50px] sm:min-w-[60px]">
                    <div class="text-[10px] text-red-500 uppercase font-bold leading-tight">Time</div>
                    <div class="font-bold text-sm sm:text-base text-red-600 leading-tight" id="timer-display">00:00</div>
                </div>
                <div class="bg-gray-200 rounded px-2 py-1 text-center min-w-[50px] sm:min-w-[60px]">
                    <div class="text-[10px] text-gray-500 uppercase font-bold leading-tight">Score</div>
                    <div class="font-bold text-sm sm:text-base leading-tight" id="score">0</div>
                </div>
                <div class="bg-gray-200 rounded px-2 py-1 text-center min-w-[50px] sm:min-w-[60px]">
                    <div class="text-[10px] text-gray-500 uppercase font-bold leading-tight">Best</div>
                    <div class="font-bold text-sm sm:text-base leading-tight" id="best-score">0</div>
                </div>
            </div>
        </div>

        <div class="flex justify-between items-center bg-white p-2 sm:p-3 rounded-lg shadow-sm border border-gray-100">
            <div class="flex items-center gap-2">
                <span class="text-xs sm:text-sm text-gray-500 font-bold">목표:</span>
                <span class="w-7 h-7 sm:w-8 sm:h-8 rounded bg-blue-500 text-white flex items-center justify-center font-bold text-lg sm:text-xl shadow-sm" id="goal-letter">G</span>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-xs sm:text-sm text-gray-500 font-bold">현재 최고:</span>
                <span class="w-7 h-7 sm:w-8 sm:h-8 rounded bg-gray-200 text-gray-700 flex items-center justify-center font-bold text-lg sm:text-xl" id="best-letter">A</span>
            </div>
        </div>
    </header>

    <!-- Game Board -->
    <main class="flex-grow flex items-center justify-center">
        <div class="board-bg w-full" id="board-container">
            <div class="grid-container" id="grid">
                <!-- Cells will be generated by JS -->
            </div>

            <!-- Overlays -->
            <!-- 메인 메뉴 (모드 선택) -->
            <div id="main-menu-overlay" class="modal-overlay">
                <h2 class="text-4xl sm:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-purple-600 mb-6 pb-1 text-center">A→Z Merge</h2>

                <div class="bg-white/70 p-4 rounded-xl mb-8 max-w-sm text-sm text-gray-700 shadow-sm w-[90%]">
                    <p class="mb-2 font-bold text-gray-800 text-base">🎮 게임 방법</p>
                    <ul class="list-disc pl-5 mb-3 space-y-1">
                        <li>스와이프(방향키)로 타일을 미세요.</li>
                        <li>같은 알파벳이 만나면 다음 알파벳이 됩니다.</li>
                    </ul>
                    <p class="font-bold text-blue-600 mt-2 bg-blue-50 p-2 rounded">💡 Stage 1 목표: G 만들기</p>
                </div>

                <div class="flex flex-col gap-3 w-full max-w-[250px]">
                    <button id="btn-normal-mode" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-6 rounded-full shadow-md transition transform hover:scale-105 flex flex-col items-center">
                        <span>일반 모드</span>
                        <span class="text-[10px] font-normal opacity-80">시간 무제한, 여유롭게 즐기기</span>
                    </button>
                    <button id="btn-challenge-mode" class="bg-purple-500 hover:bg-purple-600 text-white font-bold py-3 px-6 rounded-full shadow-md transition transform hover:scale-105 flex flex-col items-center">
                        <span>도전 모드</span>
                        <span class="text-[10px] font-normal opacity-80">제한시간 내에 클리어 (타임어택)</span>
                    </button>
                </div>
            </div>

            <div id="stage-clear-overlay" class="modal-overlay" style="display: none;">
                <h2 class="text-4xl font-bold mb-2 text-green-600" id="clear-title">G 완성!</h2>
                <p class="mb-6 text-lg text-gray-700 font-semibold">목표 글자를 만들었습니다!</p>
                <div class="flex gap-3">
                    <button id="btn-next-stage" class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-full shadow-md transition transform hover:scale-105">다음 스테이지</button>
                </div>
            </div>

            <div id="game-over-overlay" class="modal-overlay" style="display: none;">
                <h2 class="text-4xl font-bold mb-2 text-red-500" id="game-over-title">Game Over</h2>
                <p class="mb-6 text-gray-700 font-medium text-center px-4" id="game-over-desc">보드가 꽉 차서 더 이상 움직일 수 없습니다.</p>
                <div class="flex gap-3">
                    <button id="btn-retry" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 px-6 rounded-full shadow-md transition transform hover:scale-105">현재 스테이지 재시도</button>
                    <button id="btn-restart" class="bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-6 rounded-full shadow-md transition transform hover:scale-105">처음으로</button>
                </div>
            </div>

            <div id="game-ending-overlay" class="modal-overlay" style="display: none;">
                <h2 class="text-5xl font-extrabold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-yellow-600 text-center pb-2">Z 완성!<br>축하합니다!</h2>
                <p class="mb-6 text-lg text-gray-700 font-semibold">모든 스테이지를 클리어했습니다.</p>
                <button id="btn-play-again" class="bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-3 px-8 rounded-full shadow-md transition transform hover:scale-105">메인 메뉴로</button>
            </div>
        </div>
    </main>

    <!-- Footer / Controls -->
    <footer class="mt-4 flex justify-between items-center text-sm text-gray-400">
        <p>상하좌우 스와이프 또는 방향키</p>
        <button id="btn-help" class="underline hover:text-gray-600">메인 메뉴</button>
    </footer>
</div>

<script>
    // --- Game Configuration ---
    const STAGES = {
        // timeLimit는 도전 모드 시 주어지는 시간(초 단위)
        1: { size: 4, goalVal: 7, startVal: 1, initialTiles: 2, spawnPool: [{val: 1, prob: 1.0}], timeLimit: 90 }, // A -> G (1->7)
        2: { size: 5, goalVal: 16, startVal: 8, initialTiles: 2, spawnPool: [{val: 8, prob: 0.8}, {val: 9, prob: 0.2}], timeLimit: 180 }, // H -> P (8->16)
        3: { size: 5, goalVal: 26, startVal: 17, initialTiles: 3, spawnPool: [{val: 17, prob: 0.8}, {val: 18, prob: 0.2}], timeLimit: 300 } // Q -> Z (17->26)
    };

    // --- State Variables ---
    let currentStage = 1;
    let boardSize = 4;
    let board = [];
    let score = 0;
    let bestScore = localStorage.getItem('azMergeBestScore') || 0;
    let maxTileVal = 1;
    let isGameOver = false;
    let isStageClear = false;
    let isMoving = false; // 입력 방지 락
    let gameMode = 'normal'; // 'normal' | 'challenge'

    // Timer Variables
    let timer = 0;
    let timerInterval = null;

    // --- DOM Elements ---
    const gridEl = document.getElementById('grid');
    const scoreEl = document.getElementById('score');
    const bestScoreEl = document.getElementById('best-score');
    const stageDisplayEl = document.getElementById('stage-display');
    const goalLetterEl = document.getElementById('goal-letter');
    const bestLetterEl = document.getElementById('best-letter');
    const modeBadgeEl = document.getElementById('mode-badge');
    const timerContainer = document.getElementById('timer-container');
    const timerDisplay = document.getElementById('timer-display');

    const overlays = {
        mainMenu: document.getElementById('main-menu-overlay'),
        clear: document.getElementById('stage-clear-overlay'),
        over: document.getElementById('game-over-overlay'),
        ending: document.getElementById('game-ending-overlay')
    };

    // --- Utility Functions ---
    // 숫자를 알파벳으로 변환 (1=A, 26=Z)
    const getLetter = (val) => val === 0 ? '' : String.fromCharCode(64 + val);

    // 타일 색상 생성 (값에 따라 동적으로 색상 변화)
    const getTileColor = (val) => {
        if (val === 0) return 'transparent';
        const hue = (val * 137.5) % 360;
        const saturation = val < 10 ? '60%' : '75%';
        const lightness = val < 15 ? '55%' : '45%';
        return `hsl(${hue}, ${saturation}, ${lightness})`;
    };

    // --- Initialization ---
    function initGame() {
        bestScoreEl.innerText = bestScore;
        showOverlay('mainMenu');
    }

    function setGameMode(mode) {
        gameMode = mode;
        modeBadgeEl.classList.remove('hidden', 'bg-blue-100', 'text-blue-700', 'bg-purple-100', 'text-purple-700');

        if (mode === 'normal') {
            modeBadgeEl.innerText = '일반 모드';
            modeBadgeEl.classList.add('bg-blue-100', 'text-blue-700');
            timerContainer.classList.add('hidden');
        } else {
            modeBadgeEl.innerText = '도전 모드';
            modeBadgeEl.classList.add('bg-purple-100', 'text-purple-700');
            timerContainer.classList.remove('hidden');
        }

        startStage(1);
    }

    function startStage(stageNum) {
        currentStage = stageNum;
        const config = STAGES[currentStage];
        boardSize = config.size;
        isGameOver = false;
        isStageClear = false;

        // 점수는 1스테이지 시작 시 초기화
        if(stageNum === 1) {
            score = 0;
            maxTileVal = 1;
        } else {
            maxTileVal = config.startVal;
        }

        updateHUD();

        // 보드 초기화
        board = Array(boardSize).fill().map(() => Array(boardSize).fill(null));
        gridEl.style.gridTemplateColumns = `repeat(${boardSize}, 1fr)`;
        gridEl.innerHTML = '';

        // 배경 셀 생성
        for (let i = 0; i < boardSize * boardSize; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            gridEl.appendChild(cell);
        }

        // 초기 타일 배치
        for (let i = 0; i < config.initialTiles; i++) {
            addRandomTile(false);
        }

        renderBoard();

        // 타이머 설정 (도전 모드)
        clearInterval(timerInterval);
        if (gameMode === 'challenge') {
            timer = config.timeLimit;
            updateTimerDisplay();

            timerInterval = setInterval(() => {
                if (isGameOver || isStageClear) {
                    clearInterval(timerInterval);
                    return;
                }
                timer--;
                updateTimerDisplay();

                if (timer <= 0) {
                    clearInterval(timerInterval);
                    triggerGameOver('time');
                }
            }, 1000);
        }
    }

    function updateTimerDisplay() {
        const m = Math.floor(timer / 60).toString().padStart(2, '0');
        const s = (timer % 60).toString().padStart(2, '0');
        timerDisplay.innerText = `${m}:${s}`;
    }

    function triggerGameOver(reason) {
        isGameOver = true;
        clearInterval(timerInterval);

        const titleEl = document.getElementById('game-over-title');
        const descEl = document.getElementById('game-over-desc');

        if (reason === 'time') {
            titleEl.innerText = "Time Over!";
            titleEl.className = "text-4xl font-bold mb-2 text-purple-600";
            descEl.innerText = "제한 시간이 초과되었습니다.";
        } else {
            titleEl.innerText = "Game Over";
            titleEl.className = "text-4xl font-bold mb-2 text-red-500";
            descEl.innerHTML = "보드가 꽉 찼습니다!<br>더 이상 타일을 합치거나 이동할 수 없습니다.";
        }

        showOverlay('over');
    }

    function spawnValue() {
        const pool = STAGES[currentStage].spawnPool;
        const rand = Math.random();
        let cumulativeProb = 0;
        for (let item of pool) {
            cumulativeProb += item.prob;
            if (rand <= cumulativeProb) return item.val;
        }
        return pool[0].val; // Fallback
    }

    function addRandomTile(isNew = true) {
        const emptyCells = [];
        for (let r = 0; r < boardSize; r++) {
            for (let c = 0; c < boardSize; c++) {
                if (board[r][c] === null) {
                    emptyCells.push({r, c});
                }
            }
        }
        if (emptyCells.length > 0) {
            const {r, c} = emptyCells[Math.floor(Math.random() * emptyCells.length)];
            board[r][c] = { val: spawnValue(), isNew: isNew, isMerged: false };
        }
    }

    // --- Rendering ---
    function renderBoard() {
        document.querySelectorAll('.tile').forEach(el => el.remove());
        const cells = document.querySelectorAll('.cell');

        let currentMax = 0;

        for (let r = 0; r < boardSize; r++) {
            for (let c = 0; c < boardSize; c++) {
                const tileData = board[r][c];
                if (tileData) {
                    if(tileData.val > currentMax) currentMax = tileData.val;

                    const tileEl = document.createElement('div');
                    tileEl.className = 'tile';
                    tileEl.innerText = getLetter(tileData.val);
                    tileEl.style.backgroundColor = getTileColor(tileData.val);

                    if (tileData.val === 1 || tileData.val === 2) {
                        tileEl.style.color = '#3f3f46';
                    }

                    if (tileData.isNew) tileEl.classList.add('new');
                    if (tileData.isMerged) tileEl.classList.add('merged');

                    tileData.isNew = false;
                    tileData.isMerged = false;

                    const cellIndex = r * boardSize + c;
                    cells[cellIndex].appendChild(tileEl);
                }
            }
        }

        if (currentMax > maxTileVal) {
            maxTileVal = currentMax;
            bestLetterEl.innerText = getLetter(maxTileVal);
        }

        scoreEl.innerText = score;
        if (score > bestScore) {
            bestScore = score;
            bestScoreEl.innerText = bestScore;
            localStorage.setItem('azMergeBestScore', bestScore);
        }
    }

    function updateHUD() {
        stageDisplayEl.innerText = `Stage ${currentStage}`;
        goalLetterEl.innerText = getLetter(STAGES[currentStage].goalVal);
        bestLetterEl.innerText = getLetter(maxTileVal);
        scoreEl.innerText = score;
    }

    function showOverlay(id) {
        Object.values(overlays).forEach(el => el.style.display = 'none');
        if (id && overlays[id]) {
            overlays[id].style.display = 'flex';
            if(id === 'clear') {
                document.getElementById('clear-title').innerText = `${getLetter(STAGES[currentStage].goalVal)} 완성!`;
            }
        }
    }

    // --- Core Logic ---
    function slide(row) {
        let arr = row.filter(val => val !== null);
        let missing = boardSize - arr.length;
        let zeros = Array(missing).fill(null);
        return arr.concat(zeros);
    }

    function merge(row) {
        for (let i = 0; i < boardSize - 1; i++) {
            if (row[i] !== null && row[i+1] !== null && row[i].val === row[i+1].val) {
                row[i] = { val: row[i].val + 1, isMerged: true, isNew: false };
                row[i+1] = null;
                score += row[i].val;

                if (row[i].val === STAGES[currentStage].goalVal) {
                    isStageClear = true;
                }
            }
        }
        return row;
    }

    function operate(row) {
        row = slide(row);
        row = merge(row);
        row = slide(row);
        return row;
    }

    function moveLeft() {
        let moved = false;
        for (let r = 0; r < boardSize; r++) {
            let row = board[r];
            let newRow = operate([...row]);
            if (JSON.stringify(row) !== JSON.stringify(newRow)) moved = true;
            board[r] = newRow;
        }
        return moved;
    }

    function moveRight() {
        let moved = false;
        for (let r = 0; r < boardSize; r++) {
            let row = board[r].slice().reverse();
            let newRow = operate(row);
            newRow.reverse();
            if (JSON.stringify(board[r]) !== JSON.stringify(newRow)) moved = true;
            board[r] = newRow;
        }
        return moved;
    }

    function moveUp() {
        let moved = false;
        for (let c = 0; c < boardSize; c++) {
            let row = [board[0][c], board[1][c], board[2][c], board[3][c]];
            if(boardSize === 5) row.push(board[4][c]);

            let newRow = operate([...row]);
            if (JSON.stringify(row) !== JSON.stringify(newRow)) moved = true;

            for (let r = 0; r < boardSize; r++) {
                board[r][c] = newRow[r];
            }
        }
        return moved;
    }

    function moveDown() {
        let moved = false;
        for (let c = 0; c < boardSize; c++) {
            let row = [board[0][c], board[1][c], board[2][c], board[3][c]];
            if(boardSize === 5) row.push(board[4][c]);
            row.reverse();

            let newRow = operate([...row]);
            newRow.reverse();

            let originalRow = [board[0][c], board[1][c], board[2][c], board[3][c]];
            if(boardSize === 5) originalRow.push(board[4][c]);

            if (JSON.stringify(originalRow) !== JSON.stringify(newRow)) moved = true;

            for (let r = 0; r < boardSize; r++) {
                board[r][c] = newRow[r];
            }
        }
        return moved;
    }

    function handleInput(direction) {
        if (isGameOver || isStageClear || isMoving || overlays.mainMenu.style.display === 'flex') return;

        let moved = false;
        if (direction === 'LEFT') moved = moveLeft();
        else if (direction === 'RIGHT') moved = moveRight();
        else if (direction === 'UP') moved = moveUp();
        else if (direction === 'DOWN') moved = moveDown();

        if (moved) {
            isMoving = true;
            addRandomTile(true);
            renderBoard();

            setTimeout(() => {
                checkGameState();
                isMoving = false;
            }, 150);
        }
    }

    function checkGameState() {
        if (isStageClear) {
            clearInterval(timerInterval); // 클리어 시 타이머 정지
            if (currentStage === 3) {
                showOverlay('ending');
            } else {
                showOverlay('clear');
            }
            return;
        }

        // 보드 꽉참 & 병합 가능 여부 체크
        let hasEmpty = false;
        let canMerge = false;

        for (let r = 0; r < boardSize; r++) {
            for (let c = 0; c < boardSize; c++) {
                if (board[r][c] === null) {
                    hasEmpty = true;
                    break;
                }
                if (c < boardSize - 1 && board[r][c+1] !== null && board[r][c].val === board[r][c+1].val) canMerge = true;
                if (r < boardSize - 1 && board[r+1][c] !== null && board[r][c].val === board[r+1][c].val) canMerge = true;
            }
        }

        // 빈 칸이 없고 합칠 수도 없으면 "보드 꽉 참" 게임 오버
        if (!hasEmpty && !canMerge) {
            triggerGameOver('full');
        }
    }

    // --- Input Listeners ---
    document.addEventListener('keydown', (e) => {
        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
            e.preventDefault();
        }
        if (e.key === 'ArrowLeft') handleInput('LEFT');
        if (e.key === 'ArrowRight') handleInput('RIGHT');
        if (e.key === 'ArrowUp') handleInput('UP');
        if (e.key === 'ArrowDown') handleInput('DOWN');
    });

    // Touch Swipe Logic
    let touchStartX = 0;
    let touchStartY = 0;

    const boardContainer = document.getElementById('board-container');

    boardContainer.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
        touchStartY = e.changedTouches[0].screenY;
    }, {passive: false});

    boardContainer.addEventListener('touchmove', (e) => {
        e.preventDefault();
    }, {passive: false});

    boardContainer.addEventListener('touchend', (e) => {
        let touchEndX = e.changedTouches[0].screenX;
        let touchEndY = e.changedTouches[0].screenY;
        handleSwipe(touchStartX, touchStartY, touchEndX, touchEndY);
    }, {passive: false});

    function handleSwipe(startX, startY, endX, endY) {
        const dx = endX - startX;
        const dy = endY - startY;
        const absDx = Math.abs(dx);
        const absDy = Math.abs(dy);

        if (Math.max(absDx, absDy) > 30) {
            if (absDx > absDy) {
                if (dx > 0) handleInput('RIGHT');
                else handleInput('LEFT');
            } else {
                if (dy > 0) handleInput('DOWN');
                else handleInput('UP');
            }
        }
    }

    // --- Button Listeners ---
    document.getElementById('btn-normal-mode').addEventListener('click', () => {
        showOverlay(null);
        setGameMode('normal');
    });

    document.getElementById('btn-challenge-mode').addEventListener('click', () => {
        showOverlay(null);
        setGameMode('challenge');
    });

    document.getElementById('btn-help').addEventListener('click', () => {
        clearInterval(timerInterval); // 메인 메뉴 진입 시 타이머 정지
        showOverlay('mainMenu');
    });

    document.getElementById('btn-next-stage').addEventListener('click', () => {
        showOverlay(null);
        startStage(currentStage + 1);
    });

    document.getElementById('btn-retry').addEventListener('click', () => {
        showOverlay(null);
        startStage(currentStage);
    });

    document.getElementById('btn-restart').addEventListener('click', () => {
        showOverlay('mainMenu');
    });

    document.getElementById('btn-play-again').addEventListener('click', () => {
        showOverlay('mainMenu');
    });

    // 게임 시작 (초기화)
    initGame();

</script>
</body>
</html>
