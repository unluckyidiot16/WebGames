<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐉 드래곤 영단어 플라이트 2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Jua&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; touch-action: none; }
        body {
            background: #0a0a1a;
            font-family: 'Jua', sans-serif;
            color: #fff;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #app {
            position: relative;
            width: min(100vw, calc(100vh * 16 / 9));
            height: min(100vh, calc(100vw * 9 / 16));
            background: #0a0a1a;
            overflow: hidden;
        }

        /* 모바일 세로 모드일 때 회전 안내 */
        #rotate-notice {
            display: none;
            position: fixed;
            inset: 0;
            background: #0a0a1a;
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ffd700;
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            text-align: center;
            padding: 24px;
            line-height: 1.8;
        }
        #rotate-notice .icon {
            font-size: 64px;
            margin-bottom: 24px;
            animation: rotateHint 2s ease-in-out infinite;
        }
        @keyframes rotateHint {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
        }
        @media (orientation: portrait) and (max-width: 900px) {
            #rotate-notice { display: flex; }
            #app { display: none; }
        }

        canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        /* HUD ===================================================== */
        .hud {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            padding: clamp(6px, 1.5vw, 10px);
            z-index: 5;
            pointer-events: none;
            font-family: 'Press Start 2P', monospace;
        }
        .hud-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: clamp(4px, 1.5vw, 8px);
        }
        /* 가로 모드용: HUD 왼/오 분산 + 중앙 단어 표시 */
        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .hud-bottom {
            position: absolute;
            left: clamp(6px, 1.5vw, 10px);
            right: clamp(6px, 1.5vw, 10px);
            bottom: clamp(6px, 1.5vw, 10px);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .hud-box {
            background: rgba(10, 10, 30, 0.75);
            border: 2px solid #fff;
            padding: 6px 8px;
            font-size: clamp(8px, 1.6vw, 11px);
            line-height: 1.3;
        }
        .hud-box .label { font-size: clamp(6px, 1.2vw, 8px); color: #ffd700; display: block; margin-bottom: 2px; }

        /* HP 전용 강조 박스 */
        .hud-box.hp-big {
            padding: 8px 12px;
            font-size: clamp(14px, 3vw, 20px);
            border: 3px solid #ef4444;
            background: rgba(30, 10, 10, 0.85);
            line-height: 1.2;
        }
        .hud-box.hp-big .label {
            font-size: clamp(8px, 1.6vw, 10px);
            color: #fca5a5;
            margin-bottom: 4px;
        }
        #hp-display {
            letter-spacing: 2px;
        }
        .hud-center { flex: 1; text-align: center; }
        .word-box {
            display: inline-block;
            background: rgba(10, 10, 30, 0.85);
            border: 2px solid #ffd700;
            padding: clamp(4px, 1vw, 8px) clamp(8px, 2vw, 14px);
        }
        .word-box .label { font-size: clamp(6px, 1.2vw, 8px); color: #ffd700; margin-bottom: 3px; }
        .word-letters { font-size: clamp(14px, 3.2vw, 22px); letter-spacing: clamp(2px, 0.8vw, 4px); }
        .letter-done { color: #4ade80; }
        .letter-current { color: #fff; text-decoration: underline; animation: blink 0.6s infinite; }
        .letter-pending { color: #666; }
        @keyframes blink { 50% { opacity: 0.4; } }

        .weapon-bar {
            display: flex;
            gap: 2px;
            justify-content: center;
            margin-top: 4px;
        }
        .weapon-seg {
            width: clamp(8px, 2.5vw, 12px);
            height: clamp(6px, 2vw, 9px);
            background: #222;
            border: 1px solid #444;
        }
        .weapon-seg.active { background: #ffd700; border-color: #fff; }

        /* Fever banner */
        #fever-banner {
            position: absolute;
            top: 40%;
            left: 0; right: 0;
            text-align: center;
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(32px, 10vw, 52px);
            color: #ffd700;
            text-shadow: 4px 4px 0 #ff0066, 8px 8px 0 #000;
            z-index: 7;
            pointer-events: none;
            animation: feverPop 0.5s ease-out;
        }
        @keyframes feverPop {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.3); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        #fever-timer {
            position: absolute;
            top: 52%;
            left: 0; right: 0;
            text-align: center;
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            color: #fff;
            z-index: 7;
            pointer-events: none;
        }

        /* Overlays ================================================ */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(10, 10, 26, 0.95);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 20px 40px;
            text-align: center;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .overlay.hidden { display: none; }

        .title-pixel {
            font-family: 'Press Start 2P', monospace;
            font-size: 24px;
            color: #ffd700;
            text-shadow: 3px 3px 0 #ff0066;
            margin-bottom: 8px;
            line-height: 1.5;
        }
        .subtitle { font-size: 20px; color: #fff; margin-bottom: 24px; }

        .dragon-preview {
            width: 80px; height: 80px;
            margin-bottom: 16px;
            image-rendering: pixelated;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid #ffd700;
            padding: 12px 24px;
            margin-bottom: 20px;
            font-family: 'Press Start 2P', monospace;
        }
        .stat-card .label { font-size: 8px; color: #ffd700; }
        .stat-card .value { font-size: 24px; margin-top: 6px; }

        .desc {
            font-size: 13px;
            line-height: 1.7;
            margin-bottom: 20px;
            color: #cbd5e1;
            max-width: 320px;
        }
        .desc .tag {
            display: inline-block;
            background: #1e293b;
            border: 1px solid #fbbf24;
            color: #fbbf24;
            padding: 1px 6px;
            margin: 0 2px;
            font-size: 11px;
            border-radius: 3px;
        }

        .btn {
            font-family: 'Press Start 2P', monospace;
            background: #ff0066;
            color: #fff;
            border: 4px solid #fff;
            padding: 14px 28px;
            font-size: 14px;
            cursor: pointer;
            margin: 6px;
            box-shadow: 4px 4px 0 #000;
            transition: transform 0.08s, box-shadow 0.08s;
        }
        .btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #000; }
        .btn.small { font-size: 11px; padding: 10px 18px; background: #334155; }

        .controls-hint {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 16px;
            font-family: 'Jua', sans-serif;
        }

        /* Flash effects */
        .flash {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 6;
            opacity: 0;
        }
        .flash.active { animation: flashFade 0.3s; }
        @keyframes flashFade {
            0% { opacity: 0.7; }
            100% { opacity: 0; }
        }

        .shake { animation: shake 0.25s; }
        @keyframes shake {
            0%, 100% { transform: translate(0); }
            25% { transform: translate(-4px, 2px); }
            50% { transform: translate(4px, -2px); }
            75% { transform: translate(-2px, 1px); }
        }

        .combo-text {
            position: absolute;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            pointer-events: none;
            z-index: 6;
            animation: floatUp 0.8s ease-out forwards;
        }
        @keyframes floatUp {
            0% { transform: translate(-50%, 0); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translate(-50%, -50px); opacity: 0; }
        }

        /* Character selection */
        .char-select {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 16px;
            width: 100%;
            max-width: 360px;
        }
        .char-card {
            background: rgba(255,255,255,0.05);
            border: 2px solid #334155;
            padding: 6px 3px;
            text-align: center;
            cursor: pointer;
            font-family: 'Press Start 2P', monospace;
            transition: transform 0.08s;
            position: relative;
        }
        .char-card:active { transform: scale(0.96); }
        .char-card.selected {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.15);
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.4);
        }
        .char-card.locked {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .char-card canvas {
            width: 40px;
            height: 40px;
            image-rendering: pixelated;
            display: block;
            margin: 0 auto 4px;
        }
        .char-name { font-size: 8px; color: #ffd700; margin-bottom: 2px; }
        .char-desc { font-size: 6px; color: #cbd5e1; line-height: 1.3; }
        .char-lock {
            font-size: 6px;
            color: #ef4444;
            margin-top: 3px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div id="rotate-notice">
    <div class="icon">📱</div>
    <div>화면을 가로로<br>회전해 주세요</div>
</div>
<div id="app">
    <canvas id="game"></canvas>
    <div id="flash" class="flash"></div>

    <!-- HUD -->
    <div id="hud" class="hud hidden">
        <div class="hud-top">
            <div class="hud-box">
                <span class="label">SCORE</span>
                <span id="score">0</span>
            </div>
            <div class="hud-center">
                <div class="word-box">
                    <div class="label">🎯 TARGET</div>
                    <div class="word-letters" id="word-display"></div>
                </div>
                <div class="weapon-bar" id="weapon-bar"></div>
            </div>
            <div class="hud-box" style="text-align: right;">
                <span class="label">STAGE</span>
                <span id="stage-num">1</span>
            </div>
        </div>
        <div class="hud-bottom">
            <div class="hud-box hp-big">
                <span class="label">HP</span>
                <span id="hp-display">❤❤❤</span>
            </div>
            <div class="hud-box" style="text-align: right;">
                <span class="label">KILLS</span>
                <span id="kills">0</span>
            </div>
        </div>
    </div>

    <!-- Fever display -->
    <div id="fever-banner" style="display:none;">FEVER!</div>
    <div id="fever-timer" style="display:none;"></div>

    <!-- Title screen -->
    <div id="title-screen" class="overlay">
        <canvas id="title-dragon" class="dragon-preview" width="40" height="40"></canvas>
        <h1 class="title-pixel">DRAGON<br>WORD FLIGHT 2</h1>
        <div class="stat-card">
            <div class="label">HI-SCORE</div>
            <div class="value" id="best-score">00000</div>
        </div>

        <div style="font-family:'Press Start 2P',monospace; font-size: 9px; color: #ffd700; margin-bottom: 8px;">★ SELECT DRAGON ★</div>
        <div id="char-select" class="char-select"></div>

        <div class="desc">
            적을 쏴서 <span class="tag">알파벳</span>을 떨어뜨리고<br>
            <span class="tag">순서대로</span> 먹어 단어를 완성하세요!<br>
            완성하면 <span class="tag">FEVER MODE</span> 발동 🔥
        </div>
        <button class="btn" onclick="startGame()">PRESS START</button>
        <div class="controls-hint">
            📱 화면을 위/아래로 끌어서 이동 | 🖥️ 마우스 / ↑ ↓
        </div>
    </div>

    <!-- Game over -->
    <div id="over-screen" class="overlay hidden">
        <div style="font-size: 48px; margin-bottom: 8px;">💀</div>
        <h1 class="title-pixel" style="font-size: 22px;">GAME OVER</h1>
        <div class="stat-card">
            <div class="label">FINAL SCORE</div>
            <div class="value" id="final-score">00000</div>
        </div>
        <div id="best-badge" class="desc hidden" style="color: #ffd700; font-family: 'Press Start 2P', monospace; font-size: 11px;">
            ★ NEW RECORD ★
        </div>
        <div id="game-stats" class="desc" style="font-family: 'Press Start 2P', monospace; font-size: 10px; line-height: 2;"></div>
        <div>
            <button class="btn" onclick="startGame()">RETRY</button>
            <button class="btn small" onclick="showTitle()">TITLE</button>
        </div>
    </div>
</div>

<script>
    // ============================================================
    // 영단어 풀 (길이별)
    // ============================================================
    const WORD_POOLS = {
        3: [
            {w:"CAT",m:"고양이"},{w:"DOG",m:"개"},{w:"PIG",m:"돼지"},{w:"SUN",m:"태양"},
            {w:"CUP",m:"컵"},{w:"BUS",m:"버스"},{w:"EGG",m:"달걀"},{w:"BEE",m:"벌"},
            {w:"HAT",m:"모자"},{w:"BAG",m:"가방"},{w:"ANT",m:"개미"},{w:"COW",m:"소"},
            {w:"FOX",m:"여우"},{w:"BED",m:"침대"},{w:"RED",m:"빨강"},{w:"OWL",m:"올빼미"}
        ],
        4: [
            {w:"BOOK",m:"책"},{w:"DESK",m:"책상"},{w:"MILK",m:"우유"},{w:"FISH",m:"물고기"},
            {w:"TREE",m:"나무"},{w:"DOOR",m:"문"},{w:"HAND",m:"손"},{w:"LION",m:"사자"},
            {w:"BIRD",m:"새"},{w:"STAR",m:"별"},{w:"FROG",m:"개구리"},{w:"CAKE",m:"케이크"},
            {w:"BLUE",m:"파랑"},{w:"BEAR",m:"곰"},{w:"BALL",m:"공"},{w:"MOON",m:"달"}
        ],
        5: [
            {w:"APPLE",m:"사과"},{w:"HOUSE",m:"집"},{w:"WATER",m:"물"},{w:"BREAD",m:"빵"},
            {w:"PIZZA",m:"피자"},{w:"ROBOT",m:"로봇"},{w:"GRAPE",m:"포도"},{w:"TIGER",m:"호랑이"},
            {w:"HAPPY",m:"행복한"},{w:"GREEN",m:"초록"},{w:"SHEEP",m:"양"},{w:"MOUSE",m:"쥐"},
            {w:"TRAIN",m:"기차"},{w:"CLOUD",m:"구름"},{w:"CANDY",m:"사탕"}
        ],
        6: [
            {w:"ORANGE",m:"오렌지"},{w:"BANANA",m:"바나나"},{w:"SCHOOL",m:"학교"},{w:"FLOWER",m:"꽃"},
            {w:"RABBIT",m:"토끼"},{w:"PURPLE",m:"보라"},{w:"MONKEY",m:"원숭이"},{w:"YELLOW",m:"노랑"},
            {w:"WINTER",m:"겨울"},{w:"SUMMER",m:"여름"},{w:"ROCKET",m:"로켓"},{w:"PLANET",m:"행성"}
        ],
        7: [
            {w:"RAINBOW",m:"무지개"},{w:"TEACHER",m:"선생님"},{w:"KITCHEN",m:"부엌"},{w:"GIRAFFE",m:"기린"},
            {w:"CHICKEN",m:"닭"},{w:"STUDENT",m:"학생"},{w:"DRAGONS",m:"용들"}
        ],
        8: [
            {w:"ELEPHANT",m:"코끼리"},{w:"MOUNTAIN",m:"산"},{w:"FOOTBALL",m:"축구"},{w:"BASEBALL",m:"야구"},
            {w:"DINOSAUR",m:"공룡"}
        ]
    };

    // ============================================================
    // 캐릭터 정의 (6종)
    // ============================================================
    const CHARACTERS = [
        {
            id: 'flame', name: 'FLAME', desc: '균형형',
            unlockStage: 1, hp: 3, fireRateBonus: 0, maxOptions: 3, speedBonus: 0,
            bulletShape: 'rect',
            colors: {
                body: '#ef4444', bodyDark: '#991b1b', belly: '#fca5a5',
                wing: '#dc2626', horn: '#ffd700',
                bullet: '#ffd700', bulletStrong: '#ff8800'
            }
        },
        {
            id: 'ice', name: 'ICE', desc: 'HP +1',
            unlockStage: 5, hp: 4, fireRateBonus: -20, maxOptions: 3, speedBonus: 0,
            bulletShape: 'ice',
            colors: {
                body: '#3b82f6', bodyDark: '#1e3a8a', belly: '#bfdbfe',
                wing: '#2563eb', horn: '#e0f2fe',
                bullet: '#67e8f9', bulletStrong: '#22d3ee'
            }
        },
        {
            id: 'thunder', name: 'THUNDER', desc: '빠른 발사',
            unlockStage: 10, hp: 3, fireRateBonus: 40, maxOptions: 4, speedBonus: 0,
            bulletShape: 'zigzag',
            colors: {
                body: '#a855f7', bodyDark: '#6b21a8', belly: '#e9d5ff',
                wing: '#9333ea', horn: '#fef3c7',
                bullet: '#fde047', bulletStrong: '#facc15'
            }
        },
        {
            id: 'wind', name: 'WIND', desc: '빠른 이동',
            unlockStage: 15, hp: 3, fireRateBonus: 20, maxOptions: 4, speedBonus: 2,
            bulletShape: 'slash',
            colors: {
                body: '#10b981', bodyDark: '#065f46', belly: '#a7f3d0',
                wing: '#059669', horn: '#f0fdf4',
                bullet: '#6ee7b7', bulletStrong: '#10b981'
            }
        },
        {
            id: 'holy', name: 'HOLY', desc: 'HP +2',
            unlockStage: 20, hp: 5, fireRateBonus: -30, maxOptions: 5, speedBonus: 0,
            bulletShape: 'orb',
            colors: {
                body: '#fbbf24', bodyDark: '#b45309', belly: '#fef3c7',
                wing: '#f59e0b', horn: '#fff',
                bullet: '#fff', bulletStrong: '#fef3c7'
            }
        },
        {
            id: 'shadow', name: 'SHADOW', desc: '고위험 고화력',
            unlockStage: 30, hp: 2, fireRateBonus: 60, maxOptions: 5, speedBonus: 0,
            bulletShape: 'arrow',
            colors: {
                body: '#334155', bodyDark: '#0f172a', belly: '#64748b',
                wing: '#1e293b', horn: '#dc2626',
                bullet: '#c084fc', bulletStrong: '#ef4444'
            }
        }
    ];

    // 판넬(옵션) 배치 오프셋 (플레이어 기준 상대좌표)
    // 가로형 횡스크롤이므로 위/아래/뒤로 배치
    const OPTION_OFFSETS = [
        { x: -8, y: -28 },  // 위
        { x: -8, y:  28 },  // 아래
        { x: -22, y: -42 }, // 뒤-위 (대각)
        { x: -22, y:  42 }, // 뒤-아래 (대각)
        { x: 24,  y:   0 }  // 머리 앞
    ];

    // ============================================================
    // 게임 튜닝 상수
    // ============================================================
    const LETTER_DROP_CHANCE = 0.4;     // 적 처치 시 알파벳 드랍 확률
    const MAX_LETTERS_ON_SCREEN = 7;    // 화면에 동시 존재 가능한 알파벳 최대 수
    const METEOR_MIN_STAGE = 5;         // 운석 등장 시작 스테이지
    const METEOR_MIN_INTERVAL = 12000;  // 운석 최소 간격 (ms)
    const METEOR_MAX_INTERVAL = 17000;  // 운석 최대 간격 (ms)
    const METEOR_WARNING_FRAMES = 120;  // 경고 지속 프레임 (2초 @ 60fps)
    const BOSS_INTERVAL = 10;           // 보스 등장 주기 (스테이지)

    // ============================================================
    // 상수 & Canvas 설정
    // ============================================================
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    let W = 0, H = 0, DPR = window.devicePixelRatio || 1;

    // 반응형 스케일링: 게임 로직은 가상 480px 높이 기준으로 동작 (가로형 횡스크롤),
    // 렌더링 시 캔버스 크기에 맞춰 전체 스케일링.
    // 즉 H는 항상 480, W는 화면 비율에 따라 가변 (보통 800~960).
    const VIRTUAL_H = 480;
    let SCALE = 1;

    function resize() {
        const rect = canvas.parentElement.getBoundingClientRect();
        const pixelW = rect.width;
        const pixelH = rect.height;
        // 스케일은 세로 기준
        SCALE = pixelH / VIRTUAL_H;
        H = VIRTUAL_H;
        W = pixelW / SCALE;

        canvas.width = pixelW * DPR;
        canvas.height = pixelH * DPR;
        canvas.style.width = pixelW + 'px';
        canvas.style.height = pixelH + 'px';
        // DPR + SCALE 한 번에 적용
        ctx.setTransform(DPR * SCALE, 0, 0, DPR * SCALE, 0, 0);
        ctx.imageSmoothingEnabled = false;

        if (state.player) {
            state.player.x = 80; // 왼쪽 고정
            state.player.y = Math.min(H - 20, state.player.y);
        }
    }
    window.addEventListener('resize', resize);
    window.addEventListener('orientationchange', () => setTimeout(resize, 200));

    // ============================================================

    const state = {

        enemies: [],

        letters: [],

    // 배경 별 초기화
    function initStars() {

    initStars();

    document.getElementById('best-score').textContent = String(state.bestScore).padStart(5, '0');

    // ============================================================
    // 입력
    // ============================================================
    let pointerY = null;
    const keys = {};

    function getY(e) {
        const rect = canvas.getBoundingClientRect();
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        // 가상 좌표계로 변환 (SCALE로 나눔)
        return (cy - rect.top) / SCALE;
    }

    canvas.addEventListener('touchstart', e => { e.preventDefault(); pointerY = getY(e); }, { passive: false });
    canvas.addEventListener('touchmove', e => { e.preventDefault(); pointerY = getY(e); }, { passive: false });
    canvas.addEventListener('touchend', e => { e.preventDefault(); }, { passive: false });
    canvas.addEventListener('mousemove', e => { if (state.running) pointerY = getY(e); });
    canvas.addEventListener('mouseleave', () => { pointerY = null; });

    window.addEventListener('keydown', e => {
        keys[e.key.toLowerCase()] = true;
        if (['arrowup', 'arrowdown', 'w', 's'].includes(e.key.toLowerCase())) e.preventDefault();
    });
    window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

    // ============================================================
    // 게임 흐름
    // ============================================================
    function startGame() {
        resize();
        const char = CHARACTERS[state.selectedChar];
        state.player = {
            x: 80,        // 화면 왼쪽 고정
            y: H / 2,     // 세로 중앙
            w: 32,
            h: 32,
            flameFrame: 0,
            wingFrame: 0,
            invuln: 0
        };
        state.bullets = [];
        state.enemies = [];
        state.enemyBullets = [];
        state.letters = [];
        state.particles = [];
        state.speedLines = [];
        state.boss = null;
        state.meteors = [];
        state.options = [];
        state.lastMeteor = performance.now();
        state.score = 0;
        state.kills = 0;
        state.hp = char.hp;
        state.maxHp = char.hp;
        state.weaponLv = 1;
        state.stage = 1;
        state.completedWords = 0;

    function hideAllOverlays() {
        document.getElementById('title-screen').classList.add('hidden');
        document.getElementById('over-screen').classList.add('hidden');
    }

    function showTitle() {
        state.running = false;
        hideAllOverlays();
        document.getElementById('hud').classList.add('hidden');
        document.getElementById('title-screen').classList.remove('hidden');
        document.getElementById('best-score').textContent = String(state.bestScore).padStart(5, '0');
        renderCharSelect();
        drawTitleDragon();
