    // 캐릭터 선택 카드 렌더링
    function renderCharSelect() {
        const container = document.getElementById('char-select');
        container.innerHTML = '';
        CHARACTERS.forEach((c, i) => {
            const unlocked = state.bestStage >= c.unlockStage;
            const selected = state.selectedChar === i;
            // 잠긴 캐릭터를 선택 중이면 기본으로 변경
            if (selected && !unlocked) state.selectedChar = 0;

            const card = document.createElement('div');
            card.className = 'char-card' + (state.selectedChar === i ? ' selected' : '') + (unlocked ? '' : ' locked');
            card.innerHTML = `
      <canvas width="40" height="40" id="char-canvas-${i}"></canvas>
      <div class="char-name">${c.name}</div>
      <div class="char-desc">${c.desc}</div>
      ${unlocked ? '' : `<div class="char-lock">🔒 STAGE ${c.unlockStage}</div>`}
    `;
            if (unlocked) {
                card.onclick = () => {
                    state.selectedChar = i;
                    localStorage.setItem('dragonFlight2_char', i);
                    renderCharSelect();
                    drawTitleDragon();
                };
            }
            container.appendChild(card);
        });

        // 각 카드에 미니 드래곤 스프라이트 그리기
        CHARACTERS.forEach((c, i) => {
            const cv = document.getElementById(`char-canvas-${i}`);
            if (cv) drawMiniDragon(cv, c);
        });
    }

    function pickNewWord() {
        const len = Math.min(state.nextWordLength, 8);
        const pool = WORD_POOLS[len] || WORD_POOLS[8];
        state.currentWord = pool[Math.floor(Math.random() * pool.length)];
        state.letterIndex = 0;
    }

    // ============================================================
    // HUD 업데이트
    // ============================================================
    function updateHUD() {
        document.getElementById('score').textContent = String(state.score).padStart(5, '0');
        document.getElementById('stage-num').textContent = state.stage;
        document.getElementById('kills').textContent = state.kills;
        document.getElementById('hp-display').textContent = '❤'.repeat(state.hp) + '·'.repeat(Math.max(0, (state.maxHp || 3) - state.hp));

        // 목표 단어
        const wd = document.getElementById('word-display');
        wd.innerHTML = '';
        if (state.currentWord) {
            for (let i = 0; i < state.currentWord.w.length; i++) {
                const span = document.createElement('span');
                span.textContent = state.currentWord.w[i];
                if (i < state.letterIndex) span.className = 'letter-done';
                else if (i === state.letterIndex) span.className = 'letter-current';
                else span.className = 'letter-pending';
                wd.appendChild(span);
            }
        }

        // 무기 강화 바
        const bar = document.getElementById('weapon-bar');
        bar.innerHTML = '';
        const maxSeg = 8;
        const shown = Math.min(state.weaponLv, maxSeg);
        for (let i = 0; i < maxSeg; i++) {
            const s = document.createElement('div');
            s.className = 'weapon-seg' + (i < shown ? ' active' : '');
            bar.appendChild(s);
        }
    }

    // ============================================================
    // 스폰 & 발사
    // ============================================================
    function spawnEnemy() {
        const types = ['basic'];
        if (state.stage >= 3) types.push('fast');
        if (state.stage >= 5) types.push('tanky');
        const type = types[Math.floor(Math.random() * types.length)];

        const baseSpeed = 1.0 + state.stage * 0.15;
        // 가로 모드: 화면 오른쪽 바깥에서 스폰, 왼쪽으로 진행
        let enemy = {
            type, x: W + 30, y: 30 + Math.random() * (H - 60),
            w: 24, h: 24,
            hp: 1, alive: true, animFrame: 0,
            shootTimer: Math.floor(Math.random() * 80) // 스폰 시 랜덤 오프셋으로 탄환 동기화 방지
        };
        if (type === 'fast') { enemy.speed = baseSpeed * 1.7; enemy.w = 20; enemy.h = 20; }
        else if (type === 'tanky') { enemy.speed = baseSpeed * 0.7; enemy.w = 30; enemy.h = 30; enemy.hp = 2; }
        else { enemy.speed = baseSpeed; }
        state.enemies.push(enemy);
    }

    // 적이 탄을 발사하는지 판단 (스테이지/타입별)
    function canEnemyShoot(enemy) {
        if (enemy.type === 'tanky') return true; // 항상 발사
        if (enemy.type === 'basic' && state.stage >= 4) return true; // 스테이지 4+ 기본 적
        return false; // fast 적은 속도가 빠르므로 발사 안 함
    }

    function enemyShoot(enemy) {
        // 가로 모드: 적 탄환은 왼쪽으로 발사 (플레이어 방향)
        state.enemyBullets.push({
            x: enemy.x - enemy.w/2,
            y: enemy.y,
            vx: -(2.5 + state.stage * 0.1),
            vy: 0,
            w: 10, h: 7,  // 가로형으로 회전 (원본 7×10 → 10×7)
            color: enemy.type === 'tanky' ? '#dc2626' : '#ef4444'
        });
    }

    // ============================================================
    // 보스 시스템
    // ============================================================
    function spawnBoss() {
        const s = state.stage;
        // 가로 모드: 보스는 화면 오른쪽 바깥에서 등장, 왼쪽으로 진입
        state.boss = {
            x: W + 50,
            y: H / 2,
            w: 64, h: 48,
            hp: 25 + s * 2,
            maxHp: 25 + s * 2,
            targetX: W - 90,   // 등장 후 멈출 위치 (오른쪽에서 살짝 안쪽)
            entering: true,
            moveTimer: 0,
            shootTimer: 0,
            animFrame: 0,
            patternIdx: 0,
            alive: true
        };
        showCombo(W/2, H/2 - 30, '⚠ BOSS ⚠', '#ff0066');
        flash('rgba(255, 0, 102, 0.3)');
    }

    function updateBoss() {
        if (!state.boss || !state.boss.alive) return;
        const b = state.boss;
        b.animFrame++;

        // 등장 연출 (오른쪽에서 왼쪽으로 진입)
        if (b.entering) {
            b.x -= 1.5;
            if (b.x <= b.targetX) {
                b.x = b.targetX;
                b.entering = false;
            }
            return;
        }

        // 상하 이동 (사인파)
        b.moveTimer++;
        b.y = H/2 + Math.sin(b.moveTimer * 0.018) * (H/2 - 50);

        // 공격 패턴 (3가지 로테이션)
        if (state.feverActive) return; // 피버 중엔 보스도 정지
        b.shootTimer++;
        const pattern = Math.floor(b.moveTimer / 180) % 3;
        const fireInterval = 48;

        if (b.shootTimer > fireInterval) {
            b.shootTimer = 0;
            if (pattern === 0) {
                // 3갈래 확산 (왼쪽으로)
                for (let i = -1; i <= 1; i++) {
                    state.enemyBullets.push({
                        x: b.x - b.w/2, y: b.y,
                        vx: -2.8, vy: i * 1.6,
                        w: 12, h: 8, color: '#ef4444'
                    });
                }
            } else if (pattern === 1) {
                // 플레이어 조준탄 (가장 위협적 - 큼 + 짙은 빨강)
                const dx = state.player.x - b.x;
                const dy = state.player.y - b.y;
                const dist = Math.max(1, Math.hypot(dx, dy));
                state.enemyBullets.push({
                    x: b.x - b.w/2, y: b.y,
                    vx: dx/dist * 2.8,
                    vy: dy/dist * 2.8,
                    w: 14, h: 10, color: '#dc2626'
                });
            } else {
                // 5갈래 부채꼴 (왼쪽으로)
                for (let i = -2; i <= 2; i++) {
                    state.enemyBullets.push({
                        x: b.x - b.w/2, y: b.y,
                        vx: -2.4, vy: i * 1.0,
                        w: 11, h: 7, color: '#b91c1c'
                    });
                }
            }
        }
    }

    function damageBoss(damage) {
        const b = state.boss;
        b.hp -= damage;
        if (b.hp <= 0) {
            // 격파!
            state.score += 500 * state.stage;
            // 여러 차례 폭발 연출
            for (let i = 0; i < 6; i++) {
                setTimeout(() => {
                    if (!state.running) return;
                    const ox = b.x + (Math.random() - 0.5) * b.w;
                    const oy = b.y + (Math.random() - 0.5) * b.h;
                    spawnParticles(ox, oy, '#ffd700', 15);
                    spawnParticles(ox, oy, '#ff6600', 10);
                }, i * 80);
            }
            // 확정 알파벳 드랍 5개 (보스 격파 보상) - 피버/완성 체크 포함
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    if (!state.running || state.feverActive) return;
                    if (!state.currentWord || state.letterIndex >= state.currentWord.w.length) return;
                    const dx = (Math.random() - 0.5) * 60;
                    dropLetter(b.x + dx, b.y);
                }, 200 + i * 120);
            }
            showCombo(W/2, H/2, 'BOSS DOWN!', '#ffd700');
            flash('rgba(255, 215, 0, 0.5)');
            state.boss = null;
            // 보스 처치는 5킬로 카운트 (스테이지 진행 보상)
            state.kills += 5;
        } else {
            spawnParticles(b.x + (Math.random()-0.5)*20, b.y, '#ffaa00', 3);
        }
    }

    // ============================================================
    // 운석 시스템
    // ============================================================
    function spawnMeteorWarning() {
        state.meteors.push({
            phase: 'warning',
            x: 60 + Math.random() * (W - 120),
            y: 0,
            warning: METEOR_WARNING_FRAMES,
            hp: 3,
            vy: 0
        });
    }

    function updateMeteors() {
        // 새 운석 스폰 체크
        if (state.stage >= METEOR_MIN_STAGE && !state.feverActive && !state.boss) {
            const now = performance.now();
            const interval = METEOR_MIN_INTERVAL + Math.random() * (METEOR_MAX_INTERVAL - METEOR_MIN_INTERVAL);
            if (now - state.lastMeteor > interval) {
                state.lastMeteor = now;
                spawnMeteorWarning();
            }
        }

        // 기존 운석 업데이트
        for (const m of state.meteors) {
            if (m.phase === 'warning') {
                m.warning--;
                if (m.warning <= 0) {
                    m.phase = 'falling';
                    m.vy = 3.5;
                }
            } else {
                m.y += m.vy;
                m.vy = Math.min(m.vy + 0.03, 5); // 소폭 가속
            }
        }
        state.meteors = state.meteors.filter(m => m.hp > 0 && m.y < H + 40);
    }

    function shoot() {
        const now = performance.now();
        const char = CHARACTERS[state.selectedChar];
        const fireRate = state.feverActive
            ? 60
            : Math.max(70, 280 - state.weaponLv * 25 - char.fireRateBonus);
        if (now - state.lastShot < fireRate) return;
        state.lastShot = now;

        // 가로 모드: 총알이 오른쪽으로 발사
        // px = 플레이어 앞쪽(머리), py = 플레이어 중앙
        const px = state.player.x + 12;
        const py = state.player.y;
        const lv = state.feverActive ? 10 : state.weaponLv;
        const C = char.colors;
        const SH = char.bulletShape;

        if (state.feverActive) {
            // 피버: 전방 7갈래 + 강화탄 (모두 사각 + 금색으로 통일감)
            for (let i = -3; i <= 3; i++) {
                state.bullets.push({ x: px, y: py + i*6, vx: 9, vy: i*1.2, color: '#ffd700', w: 8, h: 4, shape: 'rect' });
            }
            state.bullets.push({ x: px + 5, y: py, vx: 12, vy: 0, color: '#fff', w: 12, h: 6, shape: 'rect' });
        } else if (lv === 1) {
            state.bullets.push({ x: px, y: py, vx: 9, vy: 0, color: C.bullet, w: 9, h: 4, shape: SH });
        } else if (lv === 2) {
            state.bullets.push({ x: px, y: py - 6, vx: 9, vy: 0, color: C.bullet, w: 9, h: 4, shape: SH });
            state.bullets.push({ x: px, y: py + 6, vx: 9, vy: 0, color: C.bullet, w: 9, h: 4, shape: SH });
        } else if (lv === 3) {
            state.bullets.push({ x: px, y: py, vx: 10, vy: 0, color: C.bulletStrong, w: 10, h: 5, shape: SH });
            state.bullets.push({ x: px, y: py - 8, vx: 9, vy: -0.8, color: C.bullet, w: 9, h: 4, shape: SH });
            state.bullets.push({ x: px, y: py + 8, vx: 9, vy: 0.8, color: C.bullet, w: 9, h: 4, shape: SH });
        } else if (lv === 4) {
            state.bullets.push({ x: px, y: py - 10, vx: 9, vy: -0.8, color: C.bullet, w: 9, h: 4, shape: SH });
            state.bullets.push({ x: px, y: py - 4, vx: 10, vy: 0, color: C.bulletStrong, w: 10, h: 5, shape: SH });
            state.bullets.push({ x: px, y: py + 4, vx: 10, vy: 0, color: C.bulletStrong, w: 10, h: 5, shape: SH });
            state.bullets.push({ x: px, y: py + 10, vx: 9, vy: 0.8, color: C.bullet, w: 9, h: 4, shape: SH });
        } else { // Lv5+
            for (let i = -2; i <= 2; i++) {
                state.bullets.push({ x: px, y: py + i*7, vx: 10, vy: i*1.0, color: i === 0 ? C.bulletStrong : C.bullet, w: 10, h: 5, shape: SH });
            }
        }

        // 판넬(옵션) 총알 - 각 옵션 위치에서 직선탄 발사 (오른쪽으로)
        for (const opt of state.options) {
            state.bullets.push({
                x: opt.x + 8, y: opt.y,
                vx: 9, vy: 0,
                color: C.bullet, w: 7, h: 3, shape: SH
            });
        }
    }

    // 알파벳 드랍: 현재 단어 기준
    function dropLetter(x, y) {
        // 가드: 단어가 이미 완성되었거나 피버 중이면 드랍 스킵
        if (!state.currentWord) return;
        if (state.feverActive) return;
        const word = state.currentWord.w;
        if (state.letterIndex >= word.length) return; // 이미 완성
        const needed = word[state.letterIndex]; // 현재 필요한 글자
        if (!needed) return; // 최후의 안전장치
        // 이미 먹은 글자들
        const already = [...word.slice(0, state.letterIndex)];

        // 드랍 풀: 60% 정답, 25% 방해, 15% 이미 먹은 글자 (무해)
        const r = Math.random();
        let char;
        if (r < 0.60) char = needed;
        else if (r < 0.85) {
            // 방해: 단어에 없는 무작위 알파벳
            const wordSet = new Set(word.split(''));
            let tries = 0;
            do {
                char = String.fromCharCode(65 + Math.floor(Math.random() * 26));
                tries++;
            } while (wordSet.has(char) && tries < 10);
            if (wordSet.has(char)) char = needed; // fallback
        } else {
            // 이미 지난 글자 or 무작위
            if (already.length > 0) char = already[Math.floor(Math.random() * already.length)];
            else char = needed;
        }

        state.letters.push({
            x, y,
            char,
            vx: -(0.8 + Math.random() * 0.7),  // 왼쪽으로 흐름 (-0.8 ~ -1.5)
            vy: 0,                              // 위아래는 sin파로 처리 (update에서)
            w: 22, h: 22,
            alive: true,
            bobPhase: Math.random() * Math.PI * 2,
            baseY: y                            // 둥둥 기준 Y
        });
    }

    function spawnParticles(x, y, color, count = 10) {
        for (let i = 0; i < count; i++) {
            const a = Math.random() * Math.PI * 2;
            const s = 1 + Math.random() * 3;
            state.particles.push({
                x, y,
                vx: Math.cos(a) * s,
                vy: Math.sin(a) * s - 1,
                life: 20 + Math.random() * 15,
                maxLife: 35,
                color,
                size: 2 + Math.floor(Math.random() * 3)
            });
        }
    }

    function showCombo(x, y, text, color) {
        const el = document.createElement('div');
        el.className = 'combo-text';
        el.style.color = color;
        el.style.textShadow = '2px 2px 0 #000';
        el.textContent = text;
        // x, y는 가상 좌표 → 실제 픽셀 좌표로 변환
        el.style.left = (x * SCALE) + 'px';
        el.style.top = (y * SCALE) + 'px';
        document.getElementById('app').appendChild(el);
        setTimeout(() => el.remove(), 800);
    }

    function flash(color) {
        const f = document.getElementById('flash');
        f.style.background = color;
        f.classList.remove('active');
        void f.offsetWidth;
        f.classList.add('active');
    }

    // ============================================================
    // 피버 모드
    // ============================================================
    function enterFever() {
        state.feverActive = true;
        state.feverEndTime = performance.now() + state.feverDuration;
        state.completedWords++;

        flash('#ffd700');
        document.getElementById('fever-banner').style.display = 'block';
        document.getElementById('fever-timer').style.display = 'block';
        setTimeout(() => { document.getElementById('fever-banner').style.display = 'none'; }, 1500);

        // 모든 적에게 피해
        for (const enemy of state.enemies) {
            enemy.hp = 0;
            enemy.alive = false;
            spawnParticles(enemy.x, enemy.y, '#ffd700', 12);
            state.kills++;
            state.score += 50;
        }
        state.enemies = state.enemies.filter(e => e.alive);

        // 스피드 라인 초기화
        state.speedLines = [];
        for (let i = 0; i < 30; i++) {
            state.speedLines.push({
                x: Math.random() * W,
                y: Math.random() * H,
                len: 20 + Math.random() * 40,
                speed: 15 + Math.random() * 15
            });
        }
    }

    function exitFever() {
        state.feverActive = false;
        state.speedLines = [];
        state.weaponLv = Math.min(state.weaponLv, 5); // 최대 Lv5로 정리
        // 다음 단어 (길이 +1)
        state.nextWordLength = Math.min(state.nextWordLength + 1, 8);
        pickNewWord();
        updateHUD();
    }

    // ============================================================
    // 메인 루프
    // ============================================================
    function loop() {
        if (!state.running) return;

        // 플레이어 이동 (가로 모드: 상하)
        const char = CHARACTERS[state.selectedChar];
        const speed = (state.feverActive ? 9 : 6) + (char.speedBonus || 0);
        if (pointerY !== null) {
            const dy = pointerY - state.player.y;
            if (Math.abs(dy) > 2) state.player.y += Math.sign(dy) * Math.min(Math.abs(dy), speed * 1.3);
        }
        if (keys['arrowup'] || keys['w']) state.player.y -= speed;
        if (keys['arrowdown'] || keys['s']) state.player.y += speed;
        state.player.y = Math.max(20, Math.min(H - 20, state.player.y));
        state.player.x = 80;  // 가로 위치는 왼쪽 고정
        state.player.wingFrame = (state.player.wingFrame + 1) % 20;
        state.player.flameFrame = (state.player.flameFrame + 1) % 8;
        if (state.player.invuln > 0) state.player.invuln--;

        // 판넬(옵션) 위치 업데이트 (lerp 추종)
        for (let i = 0; i < state.options.length; i++) {
            const opt = state.options[i];
            const offset = OPTION_OFFSETS[i];
            const targetX = state.player.x + offset.x;
            const targetY = state.player.y + offset.y;
            opt.x += (targetX - opt.x) * 0.18;
            opt.y += (targetY - opt.y) * 0.18;
            // 화면 경계 clamp
            opt.y = Math.max(8, Math.min(H - 8, opt.y));
            opt.flameFrame = (opt.flameFrame + 1) % 8;
        }

        // 자동 발사
        shoot();

        // 피버 종료 체크
        if (state.feverActive && performance.now() >= state.feverEndTime) {
            exitFever();
            document.getElementById('fever-timer').style.display = 'none';
        }
        if (state.feverActive) {
            const remain = Math.max(0, (state.feverEndTime - performance.now()) / 1000);
            document.getElementById('fever-timer').textContent = remain.toFixed(1) + 's';
        }

        // 총알 이동
        for (const b of state.bullets) {
            b.x += b.vx;
            b.y += b.vy;
        }
        state.bullets = state.bullets.filter(b => b.x < W + 20 && b.y > -20 && b.y < H + 20);

        // 적 스폰
        const now = performance.now();
        if (state.feverActive) {
            // 피버: 120ms마다 폭풍 스폰, 50% 확률로 2마리 동시
            if (now - state.lastSpawn > 120) {
                state.lastSpawn = now;
                spawnEnemy();
                if (Math.random() < 0.5) spawnEnemy();
            }
        } else {
            // 일반: 상한 200ms (이전 350에서 하향)
            const spawnRate = Math.max(200, 900 - state.stage * 70);
            if (now - state.lastSpawn > spawnRate) {
                state.lastSpawn = now;
                spawnEnemy();
                if (state.stage >= 5 && Math.random() < 0.25) spawnEnemy();
                if (state.stage >= 8 && Math.random() < 0.35) spawnEnemy();
            }
        }

        // 적 이동 & 발사
        for (const enemy of state.enemies) {
            if (!enemy.alive) continue;
            enemy.x -= enemy.speed;     // 가로 모드: 왼쪽으로 진행
            enemy.animFrame = (enemy.animFrame + 1) % 20;

            // 적 탄 발사 (피버 중이 아닐 때만)
            if (!state.feverActive && canEnemyShoot(enemy)) {
                enemy.shootTimer++;
                const shootInterval = enemy.type === 'tanky' ? 80 : 130;
                // 화면 안에 들어와서 너무 왼쪽까지 가지 않은 구간에서만 발사
                if (enemy.shootTimer > shootInterval && enemy.x < W - 30 && enemy.x > W * 0.25) {
                    enemy.shootTimer = 0;
                    enemyShoot(enemy);
                }
            }

            if (enemy.x < -30) enemy.alive = false;
        }

        // 적 탄환 이동
        for (const b of state.enemyBullets) {
            b.x += b.vx;
            b.y += b.vy;
        }
        state.enemyBullets = state.enemyBullets.filter(b => b.x > -20 && b.x < W + 999);

        // 보스 업데이트
        updateBoss();

        // 운석 업데이트
        updateMeteors();

        // 플레이어 총알 <-> 보스 충돌
        if (state.boss && state.boss.alive && !state.boss.entering) {
            const bs = state.boss;
            for (const bullet of state.bullets) {
                if (bullet.y < -10) continue;
                if (Math.abs(bullet.x - bs.x) < bs.w/2 + 2 &&
                    Math.abs(bullet.y - bs.y) < bs.h/2 + 2) {
                    bullet.y = -999;
                    damageBoss(1);
                    if (!state.boss) break; // 격파되면 루프 종료
                }
            }
        }

        // 플레이어 총알 <-> 운석 충돌
        for (const m of state.meteors) {
            if (m.phase !== 'falling' || m.hp <= 0) continue;
            for (const bullet of state.bullets) {
                if (bullet.y < -10) continue;
                if (Math.abs(bullet.x - m.x) < 14 && Math.abs(bullet.y - m.y) < 14) {
                    bullet.y = -999;
                    m.hp--;
                    spawnParticles(bullet.x, bullet.y, '#ffaa00', 3);
                    if (m.hp <= 0) {
                        spawnParticles(m.x, m.y, '#ff6600', 18);
                        spawnParticles(m.x, m.y, '#fbbf24', 10);
                        state.score += 150;
                        showCombo(m.x, m.y - 10, '+150', '#ffd700');
                    }
                    break;
                }
            }
        }

        // 총알 <-> 적 충돌
        for (const b of state.bullets) {
            if (b.y < -10) continue;
            for (const enemy of state.enemies) {
                if (!enemy.alive) continue;
                if (Math.abs(b.x - enemy.x) < enemy.w/2 + 2 &&
                    Math.abs(b.y - enemy.y) < enemy.h/2 + 3) {
                    enemy.hp--;
                    b.y = -999; // 총알 소멸
                    if (enemy.hp <= 0) {
                        enemy.alive = false;
                        state.kills++;
                        state.score += 20 * state.stage;
                        spawnParticles(enemy.x, enemy.y, '#ff6666', 8);
                        // 알파벳 드랍: 확률 기반 + 화면 상한
                        if (!state.feverActive &&
                            Math.random() < LETTER_DROP_CHANCE &&
                            state.letters.length < MAX_LETTERS_ON_SCREEN) {
                            dropLetter(enemy.x, enemy.y);
                        }
                        // 스테이지 업 체크 (15킬마다)
                        const newStage = Math.floor(state.kills / 15) + 1;
                        if (newStage > state.stage) {
                            state.stage = newStage;
                            showCombo(W/2, H/2, 'STAGE ' + state.stage, '#ffd700');
                            // 10의 배수 스테이지마다 보스 등장
                            if (state.stage % BOSS_INTERVAL === 0 && !state.boss) {
                                spawnBoss();
                            }
                        }
                    } else {
                        spawnParticles(enemy.x, enemy.y, '#ffaa00', 4);
                    }
                    break;
                }
            }
        }
        state.enemies = state.enemies.filter(e => e.alive);

        // 플레이어 <-> 적 충돌
        if (state.player.invuln === 0 && !state.feverActive) {
            for (const enemy of state.enemies) {
                if (!enemy.alive) continue;
                if (Math.abs(state.player.x - enemy.x) < (state.player.w + enemy.w)/2 - 4 &&
                    Math.abs(state.player.y - enemy.y) < (state.player.h + enemy.h)/2 - 4) {
                    enemy.alive = false;
                    spawnParticles(enemy.x, enemy.y, '#ff0066', 15);
                    loseHP();
                    break;
                }
            }
        } else if (state.feverActive) {
            // 피버 중에는 적과 충돌 시 처치
            for (const enemy of state.enemies) {
                if (!enemy.alive) continue;
                if (Math.abs(state.player.x - enemy.x) < (state.player.w + enemy.w)/2 &&
                    Math.abs(state.player.y - enemy.y) < (state.player.h + enemy.h)/2) {
                    enemy.alive = false;
                    state.kills++;
                    state.score += 30;
                    spawnParticles(enemy.x, enemy.y, '#ffd700', 12);
                }
            }
        }

        // 플레이어 <-> 적 탄환 충돌
        if (state.player.invuln === 0 && !state.feverActive) {
            for (const b of state.enemyBullets) {
                if (Math.abs(state.player.x - b.x) < (state.player.w/2 - 4) &&
                    Math.abs(state.player.y - b.y) < (state.player.h/2 - 4)) {
                    b.x = -9999;
                    spawnParticles(b.x, b.y, '#ff0066', 10);
                    loseHP();
                    break;
                }
            }
            state.enemyBullets = state.enemyBullets.filter(b => b.x > -999);
        } else if (state.feverActive) {
            // 피버 중엔 적 탄환 무시하고 지운다 (연출)
            for (const b of state.enemyBullets) {
                spawnParticles(b.x, b.y, '#ffd700', 3);
            }
            state.enemyBullets = [];
        }

        // 플레이어 <-> 보스 몸통 충돌
        if (state.boss && state.boss.alive && !state.boss.entering) {
            const bs = state.boss;
            if (state.player.invuln === 0 && !state.feverActive) {
                if (Math.abs(state.player.x - bs.x) < (state.player.w + bs.w)/2 - 6 &&
                    Math.abs(state.player.y - bs.y) < (state.player.h + bs.h)/2 - 6) {
                    loseHP();
                }
            }
        }

        // 플레이어 <-> 운석 충돌
        if (state.player.invuln === 0 && !state.feverActive) {
            for (const m of state.meteors) {
                if (m.phase !== 'falling' || m.hp <= 0) continue;
                if (Math.abs(state.player.x - m.x) < (state.player.w/2 + 10) &&
                    Math.abs(state.player.y - m.y) < (state.player.h/2 + 10)) {
                    spawnParticles(m.x, m.y, '#ff0066', 20);
                    m.hp = 0; // 운석 소멸
                    loseHP();
                    break;
                }
            }
        } else if (state.feverActive) {
            // 피버 중엔 운석 돌파 연출
            for (const m of state.meteors) {
                if (m.phase === 'falling' &&
                    Math.abs(state.player.x - m.x) < (state.player.w/2 + 10) &&
                    Math.abs(state.player.y - m.y) < (state.player.h/2 + 10)) {
                    spawnParticles(m.x, m.y, '#ffd700', 20);
                    m.hp = 0;
                    state.score += 100;
                }
            }
        }

        // 알파벳 이동 & 수집 (가로 모드: 왼쪽으로 흐름 + 위아래 둥둥)
        for (const L of state.letters) {
            if (!L.alive) continue;
            L.x += L.vx;
            L.bobPhase += 0.08;
            // baseY를 약간씩 따라가게 (vy로 운동량 유지하지 않고 sin으로 둥둥)
            L.y = L.baseY + Math.sin(L.bobPhase) * 8;
            if (L.x < -20) L.alive = false;

            // 플레이어와 충돌
            if (L.alive &&
                Math.abs(state.player.x - L.x) < (state.player.w + L.w)/2 - 2 &&
                Math.abs(state.player.y - L.y) < (state.player.h + L.h)/2 - 2) {
                collectLetter(L);
                L.alive = false;
            }
        }
        state.letters = state.letters.filter(L => L.alive);

        // 파티클
        for (const p of state.particles) {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.2;
            p.life--;
        }
        state.particles = state.particles.filter(p => p.life > 0);

        // 별 (가로 모드: 오른쪽→왼쪽으로 흐름)
        for (const s of state.stars) {
            s.x -= s.speed * (state.feverActive ? 4 : 1);
            if (s.x < -5) { s.x = W + 5; s.y = Math.random() * H; }
        }

        // 스피드 라인 (피버) - 가로 모드: 오른쪽→왼쪽으로 길게
        if (state.feverActive) {
            for (const line of state.speedLines) {
                line.x -= line.speed;
                if (line.x < -line.len) {
                    line.x = W + line.len;
                    line.y = Math.random() * H;
                }
            }
        }

        updateHUD();
        render();
        state.rafId = requestAnimationFrame(loop);
    }

    function collectLetter(L) {
        const needed = state.currentWord.w[state.letterIndex];
        if (L.char === needed) {
            // 정답!
            state.letterIndex++;
            const char = CHARACTERS[state.selectedChar];
            if (state.weaponLv < 5) {
                state.weaponLv++;
            } else if (state.options.length < char.maxOptions) {
                // Lv5 상태에서 정답 → 판넬 추가
                const idx = state.options.length;
                const offset = OPTION_OFFSETS[idx];
                state.options.push({
                    x: state.player.x + offset.x,
                    y: state.player.y + offset.y,
                    flameFrame: 0
                });
                showCombo(state.player.x, state.player.y - 30, '★ PANEL +1 ★', '#fbbf24');
                spawnParticles(state.player.x, state.player.y, '#fbbf24', 20);
            }
            state.score += 100;
            spawnParticles(L.x, L.y, '#4ade80', 12);
            showCombo(L.x, L.y - 10, '+' + L.char, '#4ade80');

            if (state.letterIndex >= state.currentWord.w.length) {
                // 단어 완성 → 피버
                state.score += 500;
                showCombo(W/2, H/2 - 30, state.currentWord.w + ' ✓', '#ffd700');
                enterFever();
            }
        } else if (state.currentWord.w.slice(0, state.letterIndex).includes(L.char)) {
            // 이미 먹은 글자 - 소량 점수만
            state.score += 5;
            spawnParticles(L.x, L.y, '#94a3b8', 5);
        } else {
            // 오답 - 무기 약화 (판넬은 유지)
            state.weaponLv = Math.max(1, state.weaponLv - 1);
            state.score = Math.max(0, state.score - 20);
            spawnParticles(L.x, L.y, '#ef4444', 10);
            showCombo(L.x, L.y - 10, '−' + L.char, '#ef4444');
            flash('rgba(239, 68, 68, 0.4)');
        }
        updateHUD();
    }

    function loseHP() {
        state.hp--;
        state.player.invuln = 90; // 1.5초
        flash('rgba(239, 68, 68, 0.5)');
        document.getElementById('app').classList.add('shake');
        setTimeout(() => document.getElementById('app').classList.remove('shake'), 250);
        updateHUD();
        if (state.hp <= 0) gameOver();
    }

    function gameOver() {
        state.running = false;

        // 최고 점수
        let newRecord = false;
        if (state.score > state.bestScore) {
            state.bestScore = state.score;
            localStorage.setItem('dragonFlight2_best', state.score);
            newRecord = true;
        }

        // 최고 스테이지 & 새 캐릭터 언락 체크
        let unlockedNew = null;
        if (state.stage > state.bestStage) {
            const prevStage = state.bestStage;
            state.bestStage = state.stage;
            localStorage.setItem('dragonFlight2_bestStage', state.bestStage);
            // 이번 판에서 새로 언락된 캐릭터
            for (const c of CHARACTERS) {
                if (c.unlockStage > prevStage && c.unlockStage <= state.bestStage) {
                    unlockedNew = c;
                }
            }
        }

        if (newRecord) document.getElementById('best-badge').classList.remove('hidden');
        else document.getElementById('best-badge').classList.add('hidden');

        document.getElementById('final-score').textContent = String(state.score).padStart(5, '0');
        const secs = Math.floor((performance.now() - state.startTime) / 1000);

        let statsHtml = `KILLS: ${state.kills}<br>WORDS: ${state.completedWords}<br>STAGE: ${state.stage}<br>TIME: ${secs}s`;
        if (unlockedNew) {
            statsHtml += `<br><br><span style="color:#ffd700;">★ NEW DRAGON ★<br>${unlockedNew.name} UNLOCKED!</span>`;
        }
        document.getElementById('game-stats').innerHTML = statsHtml;
        document.getElementById('hud').classList.add('hidden');
        document.getElementById('over-screen').classList.remove('hidden');
    }

    // ============================================================
    // 렌더링 (픽셀 아트)
    // ============================================================
    function render() {
        // 배경
        ctx.fillStyle = state.feverActive ? '#2a0033' : '#0a0a1a';
        ctx.fillRect(0, 0, W, H);

        // 별
        for (const s of state.stars) {
            ctx.fillStyle = s.size === 1 ? '#445' : '#99a';
            ctx.fillRect(Math.floor(s.x), Math.floor(s.y), s.size, s.size);
        }

        // 스피드 라인 (피버) - 가로 모드: 가로 방향 길쭉한 선
        if (state.feverActive) {
            ctx.fillStyle = 'rgba(255, 215, 0, 0.6)';
            for (const line of state.speedLines) {
                ctx.fillRect(Math.floor(line.x), Math.floor(line.y), line.len, 2);
            }
        }

        // 알파벳
        for (const L of state.letters) {
            if (!L.alive) continue;
            drawLetterTile(L);
        }

        // 총알 (플레이어) - shape별 렌더
        for (const b of state.bullets) {
            drawPlayerBullet(b);
        }

        // 적 탄환 (위험 강조: 어두운 외곽 + 흰 중앙 하이라이트)
        // 가로 모드: 왼쪽으로 발사하므로 반시계방향 90도 회전
        for (const b of state.enemyBullets) {
            ctx.save();
            ctx.translate(Math.floor(b.x), Math.floor(b.y));
            ctx.rotate(-Math.PI / 2);
            // 회전된 좌표에서 b.w(원본 가로)는 회전 후 세로폭, b.h(높이)는 가로폭이 됨
            // shoot 함수에서 가로형으로 w>h 값을 넣어줬으므로 swap해서 사용 → 시각적으로 길쭉한 가로탄
            const tw = b.h, th = b.w;
            // 어두운 외곽 (후광)
            ctx.fillStyle = '#450a0a';
            ctx.fillRect(-tw/2 - 1, -th/2 - 1, tw + 2, th + 2);
            // 메인 몸체 (빨강 캡슐)
            ctx.fillStyle = b.color;
            ctx.fillRect(-tw/2, -th/2, tw, th);
            // 흰 중앙 세로 라인 (회전 후엔 가로가 됨 - 즉 진행 방향 라인)
            ctx.fillStyle = 'rgba(255,255,255,0.55)';
            ctx.fillRect(-1, -th/2 + 1, 2, Math.max(2, th - 2));
            // 상단 번쩍 포인트
            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            ctx.fillRect(-1, -th/2 + 1, 2, 2);
            ctx.restore();
        }

        // 적
        for (const e of state.enemies) {
            if (!e.alive) continue;
            drawEnemy(e);
        }

        // 보스
        if (state.boss && state.boss.alive) {
            drawBoss(state.boss);
            drawBossHPBar(state.boss);
        }

        // 운석 (경고 마커 먼저, 낙하 중인 것은 플레이어 아래쪽으로)
        for (const m of state.meteors) {
            drawMeteor(m);
        }

        // 플레이어
        drawDragon(state.player);

        // 판넬(옵션) - 플레이어 뒤쪽에 그리면 시각적으로 전면에 가려지므로 먼저 그리는 게 좋지만
        // 여기서는 플레이어가 더 잘 보이도록 뒤에 그린 후 판넬이 플레이어 위로 오게
        for (const opt of state.options) {
            drawOption(opt);
        }

        // 파티클
        for (const p of state.particles) {
            const alpha = Math.max(0, p.life / p.maxLife);
            ctx.globalAlpha = alpha;
            ctx.fillStyle = p.color;
            ctx.fillRect(Math.floor(p.x - p.size/2), Math.floor(p.y - p.size/2), p.size, p.size);
        }
        ctx.globalAlpha = 1;
    }

    // --- 도트 스프라이트 그리기 함수 ---

    function drawPx(x, y, w, h, color) {
        ctx.fillStyle = color;
        ctx.fillRect(Math.floor(x), Math.floor(y), w, h);
    }

    // ============================================================
    // 플레이어 총알 렌더 (캐릭터별 모양)
    // 가로 모드: 시계방향 90도 회전 → 원본 위쪽(뾰족한 끝)이 오른쪽 향함
    // ============================================================
    function drawPlayerBullet(b) {
        ctx.save();
        ctx.translate(Math.floor(b.x), Math.floor(b.y));
        ctx.rotate(Math.PI / 2);
        drawPlayerBulletBody(b);
        ctx.restore();
    }

    function drawPlayerBulletBody(b) {
        const cx = 0;
        const cy = 0;
        const shape = b.shape || 'rect';
        const color = b.color;
        // 회전된 좌표계에서는 원본 b.w(가로)가 세로, b.h(높이)가 가로처럼 보일 수 있어
        // 'rect' 외 shape들은 모양이 고정값이라 그대로 사용. rect만 b.w/b.h를 swap해서 사용
        // (shoot 함수에서 가로 모드용으로 넓은 w, 작은 h 값을 넣어줬으므로 회전 시 자연스럽게 길쭉한 가로 탄이 됨)

        switch (shape) {
            case 'rect': {
                // FLAME: 회전 전 기준 원본은 세로 직사각이었음
                // shoot 함수에서 가로 모드용으로 w(=가로)>h를 부여 → 회전 후엔 다시 세로>가로 모양으로 그려야 함
                // 그래서 여기선 b.h를 가로폭, b.w를 세로폭으로 사용 (시각적으로 길쭉한 가로 탄)
                drawPx(cx - b.h/2, cy - b.w/2, b.h, b.w, color);
                ctx.fillStyle = 'rgba(255,255,255,0.35)';
                ctx.fillRect(Math.floor(cx - b.h/2 - 1), Math.floor(cy - b.w/2), 1, b.w);
                ctx.fillRect(Math.floor(cx + b.h/2), Math.floor(cy - b.w/2), 1, b.w);
                break;
            }
            case 'ice': {
                // ICE: 마름모 얼음 결정
                drawPx(cx - 1, cy - 5, 2, 1, color);        // 상단 꼭지
                drawPx(cx - 2, cy - 4, 4, 1, color);
                drawPx(cx - 3, cy - 3, 6, 1, color);
                drawPx(cx - 3, cy - 2, 6, 2, color);        // 중앙 최대폭
                drawPx(cx - 3, cy, 6, 1, color);
                drawPx(cx - 2, cy + 1, 4, 1, color);
                drawPx(cx - 1, cy + 2, 2, 2, color);        // 하단 꼭지
                // 흰 하이라이트 (얼음 반짝)
                drawPx(cx - 1, cy - 2, 1, 2, '#fff');
                drawPx(cx, cy - 4, 1, 1, '#fff');
                break;
            }
            case 'zigzag': {
                // THUNDER: 번개 지그재그
                drawPx(cx - 1, cy - 5, 3, 2, color);         // 상단
                drawPx(cx, cy - 3, 3, 2, color);             // 오른쪽 이동
                drawPx(cx - 2, cy - 1, 3, 2, color);         // 왼쪽 이동
                drawPx(cx - 1, cy + 1, 3, 2, color);         // 오른쪽
                drawPx(cx - 2, cy + 3, 3, 2, color);         // 하단
                // 흰 코어
                drawPx(cx, cy - 3, 1, 1, '#fff');
                drawPx(cx - 1, cy, 1, 1, '#fff');
                drawPx(cx, cy + 2, 1, 1, '#fff');
                break;
            }
            case 'slash': {
                // WIND: 얇고 긴 바람 칼 (대각 느낌)
                drawPx(cx - 2, cy - 5, 2, 2, color);
                drawPx(cx - 1, cy - 3, 2, 2, color);
                drawPx(cx, cy - 1, 2, 2, color);
                drawPx(cx + 1, cy + 1, 2, 2, color);
                drawPx(cx + 2, cy + 3, 2, 2, color);
                // 잔상
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.fillRect(cx - 2, cy - 5, 1, 1);
                ctx.fillRect(cx, cy - 1, 1, 1);
                ctx.fillRect(cx + 2, cy + 3, 1, 1);
                break;
            }
            case 'orb': {
                // HOLY: 빛 구슬 (원형) + 후광
                // 외부 후광 (반투명)
                ctx.globalAlpha = 0.4;
                drawPx(cx - 4, cy - 2, 8, 4, color);
                drawPx(cx - 2, cy - 4, 4, 8, color);
                ctx.globalAlpha = 1;
                // 몸체 (원형)
                drawPx(cx - 1, cy - 3, 2, 1, color);
                drawPx(cx - 2, cy - 2, 4, 1, color);
                drawPx(cx - 3, cy - 1, 6, 2, color);
                drawPx(cx - 2, cy + 1, 4, 1, color);
                drawPx(cx - 1, cy + 2, 2, 1, color);
                // 중앙 흰 하이라이트
                drawPx(cx - 1, cy - 1, 2, 2, '#fff');
                break;
            }
            case 'arrow': {
                // SHADOW: 삼각 화살촉 (위로 뾰족)
                drawPx(cx, cy - 5, 1, 1, color);             // 꼭지
                drawPx(cx - 1, cy - 4, 3, 1, color);
                drawPx(cx - 2, cy - 3, 5, 1, color);          // 날개 넓음
                drawPx(cx - 2, cy - 2, 5, 2, color);
                drawPx(cx - 1, cy, 3, 2, color);              // 몸체 좁아짐
                drawPx(cx - 1, cy + 2, 3, 2, color);
                drawPx(cx, cy + 4, 1, 1, color);              // 끝
                // 중앙 라인 (어두운 코어)
                drawPx(cx, cy - 2, 1, 4, '#000');
                break;
            }
            default: {
                drawPx(cx - b.h/2, cy - b.w/2, b.h, b.w, color);
            }
        }
    }

    // ============================================================
    // 판넬(옵션) 렌더 - 옆모습 미니 드래곤 (머리 오른쪽)
    // ============================================================
    function drawOption(opt) {
        const cx = Math.floor(opt.x);
        const cy = Math.floor(opt.y);
        const char = CHARACTERS[state.selectedChar];
        const C = char.colors;

        // 미니 추진 불꽃 (꼬리 뒤 = 왼쪽)
        const fIdx = Math.floor(opt.flameFrame / 3) % 3;
        drawPx(cx - 12 - fIdx, cy - 1, 3, 2, '#ff0066');
        drawPx(cx - 10, cy - 1, 3, 3, '#ff6600');

        // 꼬리 (왼쪽)
        drawPx(cx - 8, cy - 1, 2, 3, C.bodyDark);
        drawPx(cx - 7, cy, 1, 1, C.body);

        // 몸통 외곽
        drawPx(cx - 6, cy - 4, 8, 1, C.bodyDark);    // 등
        drawPx(cx - 6, cy + 4, 8, 1, C.bodyDark);    // 배 아래
        drawPx(cx + 2, cy - 3, 1, 7, C.bodyDark);    // 가슴

        // 몸통 메인
        drawPx(cx - 6, cy - 3, 8, 7, C.body);
        // 배 (밝은 색)
        drawPx(cx - 4, cy + 1, 6, 3, C.belly);

        // 머리 (오른쪽)
        drawPx(cx + 3, cy - 5, 5, 1, C.bodyDark);    // 머리 위
        drawPx(cx + 8, cy - 4, 1, 4, C.bodyDark);    // 입 끝
        drawPx(cx + 3, cy - 1, 5, 1, C.bodyDark);    // 턱
        drawPx(cx + 3, cy - 4, 5, 3, C.body);        // 머리 메인

        // 뿔 (작게, 위)
        drawPx(cx + 4, cy - 6, 1, 1, C.horn);
        drawPx(cx + 6, cy - 7, 1, 2, C.horn);

        // 눈 (하나만)
        drawPx(cx + 5, cy - 3, 2, 2, '#fff');
        drawPx(cx + 6, cy - 3, 1, 1, '#000');

        // 작은 날개 (등 위로 펄럭)
        const wingUp = (opt.flameFrame % 12) < 6;
        if (wingUp) {
            drawPx(cx - 3, cy - 7, 5, 1, C.bodyDark);
            drawPx(cx - 4, cy - 6, 7, 2, C.wing);
            drawPx(cx - 2, cy - 4, 4, 1, C.wing);
        } else {
            drawPx(cx - 3, cy - 5, 7, 1, C.bodyDark);
            drawPx(cx - 4, cy - 4, 7, 2, C.wing);
        }
    }

    // 드래곤 (옆모습 픽셀 아트) - 머리는 오른쪽 향함, 꼬리/엔진은 왼쪽
    function drawDragon(p) {
        // 깜빡임 (무적)
        if (p.invuln > 0 && Math.floor(p.invuln / 4) % 2 === 0) return;

        const cx = Math.floor(p.x);
        const cy = Math.floor(p.y);
        const char = CHARACTERS[state.selectedChar];
        const C = char.colors;

        const flame = state.feverActive
            ? ['#fff', '#ffd700', '#ff0066']
            : ['#ffaa00', '#ff6600', '#ff0066'];
        const body = state.feverActive ? '#ffd700' : C.body;
        const bodyDark = state.feverActive ? '#d4a017' : C.bodyDark;
        const belly = state.feverActive ? '#fff3a0' : C.belly;
        const wingColor = state.feverActive ? '#ffd700' : C.wing;
        const hornColor = C.horn;

        // 날개 프레임
        const wingUp = p.wingFrame < 10;

        // === 추진 불꽃 (꼬리 뒤쪽 = 왼쪽) ===
        const fIdx = Math.floor(p.flameFrame / 3) % 3;
        drawPx(cx - 22 - fIdx, cy - 1, 4, 3, flame[2]);
        drawPx(cx - 19, cy - 2, 5, 5, flame[1]);
        drawPx(cx - 16, cy - 1, 4, 3, flame[0]);

        // === 꼬리 (왼쪽 끝, 가늘게) ===
        drawPx(cx - 14, cy - 2, 3, 5, bodyDark);   // 꼬리 끝 외곽
        drawPx(cx - 13, cy - 1, 2, 3, body);       // 꼬리 끝 내부
        drawPx(cx - 11, cy - 4, 3, 9, bodyDark);   // 꼬리 굵어짐
        drawPx(cx - 10, cy - 3, 2, 7, body);

        // === 몸통 (가로 타원) ===
        // 외곽선
        drawPx(cx - 9, cy - 7, 14, 1, bodyDark);   // 등
        drawPx(cx - 9, cy + 7, 14, 1, bodyDark);   // 배 아래
        drawPx(cx + 5, cy - 6, 1, 14, bodyDark);   // 가슴 쪽
        // 메인
        drawPx(cx - 9, cy - 6, 14, 13, body);
        // 배 (밝은 색)
        drawPx(cx - 7, cy + 2, 10, 5, belly);

        // === 목 + 머리 (오른쪽) ===
        // 목 외곽
        drawPx(cx + 4, cy - 5, 1, 8, bodyDark);
        drawPx(cx + 4, cy + 3, 5, 1, bodyDark);     // 목 아래
        // 목 메인
        drawPx(cx + 5, cy - 4, 4, 8, body);

        // 머리 외곽
        drawPx(cx + 7, cy - 9, 9, 1, bodyDark);     // 머리 위
        drawPx(cx + 16, cy - 8, 1, 6, bodyDark);    // 입 끝
        drawPx(cx + 8, cy - 2, 9, 1, bodyDark);     // 턱
        // 머리 메인
        drawPx(cx + 7, cy - 8, 9, 6, body);
        // 주둥이 살짝 더 앞으로
        drawPx(cx + 16, cy - 5, 1, 2, body);
        // 입 (살짝)
        drawPx(cx + 13, cy - 3, 3, 1, bodyDark);

        // === 뿔 (머리 위) ===
        drawPx(cx + 9, cy - 11, 2, 3, hornColor);
        drawPx(cx + 12, cy - 12, 2, 4, hornColor);  // 뒤쪽 큰 뿔

        // === 눈 ===
        drawPx(cx + 11, cy - 6, 3, 3, '#fff');
        drawPx(cx + 12, cy - 5, 2, 2, '#000');
        drawPx(cx + 12, cy - 5, 1, 1, '#fff');      // 하이라이트

        // === 날개 (등 위, 펄럭 애니메이션) ===
        if (wingUp) {
            // 위로 펼친 자세 (큰 날개)
            drawPx(cx - 4, cy - 14, 8, 1, bodyDark);   // 외곽 위
            drawPx(cx - 6, cy - 13, 12, 2, wingColor);
            drawPx(cx - 4, cy - 11, 10, 4, wingColor);
            drawPx(cx - 2, cy - 7, 6, 1, wingColor);   // 안쪽 연결부
            // 날개 앞쪽 골격 라인
            drawPx(cx + 2, cy - 12, 1, 4, bodyDark);
        } else {
            // 약간 내린 자세
            drawPx(cx - 5, cy - 11, 12, 1, bodyDark);
            drawPx(cx - 6, cy - 10, 12, 3, wingColor);
            drawPx(cx - 4, cy - 8, 8, 2, wingColor);
            drawPx(cx + 1, cy - 9, 1, 3, bodyDark);
        }

        // === 다리 (아래쪽 1쌍, 작게) ===
        drawPx(cx + 0, cy + 7, 2, 3, bodyDark);
        drawPx(cx - 1, cy + 9, 4, 1, bodyDark);     // 발

        // 피버시 후광
        if (state.feverActive) {
            ctx.globalAlpha = 0.3 + Math.sin(performance.now() * 0.015) * 0.2;
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 2;
            ctx.strokeRect(cx - 22, cy - 16, 42, 32);
            ctx.globalAlpha = 1;
        }
    }

    // 미니 드래곤 (캐릭터 선택 카드용 - 40x40 캔버스, 옆모습 머리 오른쪽)
    function drawMiniDragon(canvasEl, char) {
        const mctx = canvasEl.getContext('2d');
        mctx.imageSmoothingEnabled = false;
        mctx.clearRect(0, 0, 40, 40);
        const C = char.colors;

        // 캔버스 중심 기준 (좌표는 -20~20)
        const cx = 20, cy = 20;
        function mp(x, y, w, h, color) {
            mctx.fillStyle = color;
            mctx.fillRect(x, y, w, h);
        }

        // 추진 불꽃 (꼬리 뒤 = 왼쪽)
        mp(cx - 17, cy - 1, 3, 3, '#ff6600');
        mp(cx - 14, cy - 1, 2, 3, '#ffaa00');

        // 꼬리
        mp(cx - 12, cy - 2, 3, 5, C.bodyDark);
        mp(cx - 11, cy - 1, 2, 3, C.body);

        // 몸통 외곽
        mp(cx - 9, cy - 5, 12, 1, C.bodyDark);   // 등
        mp(cx - 9, cy + 5, 12, 1, C.bodyDark);   // 배 아래
        mp(cx + 3, cy - 4, 1, 9, C.bodyDark);    // 가슴

        // 몸통 메인
        mp(cx - 9, cy - 4, 12, 9, C.body);
        // 배 (밝은 색)
        mp(cx - 7, cy + 1, 9, 4, C.belly);

        // 머리 (오른쪽)
        mp(cx + 4, cy - 6, 7, 1, C.bodyDark);    // 머리 위
        mp(cx + 11, cy - 5, 1, 5, C.bodyDark);   // 입 끝
        mp(cx + 4, cy - 1, 7, 1, C.bodyDark);    // 턱
        mp(cx + 4, cy - 5, 7, 4, C.body);        // 머리 메인

        // 뿔 (위)
        mp(cx + 5, cy - 8, 2, 2, C.horn);
        mp(cx + 8, cy - 9, 2, 3, C.horn);

        // 눈
        mp(cx + 7, cy - 4, 2, 2, '#fff');
        mp(cx + 8, cy - 4, 1, 1, '#000');

        // 입 라인 (살짝)
        mp(cx + 9, cy - 2, 2, 1, C.bodyDark);

        // 날개 (등 위로 펼침, 카드는 정적 모습)
        mp(cx - 4, cy - 9, 8, 1, C.bodyDark);
        mp(cx - 5, cy - 8, 10, 2, C.wing);
        mp(cx - 3, cy - 6, 6, 1, C.wing);

        // 다리 (작게)
        mp(cx + 1, cy + 5, 1, 2, C.bodyDark);
    }

    // 적 (옆모습 외계인 3종) - 모두 왼쪽이 진행 방향(머리/입), 오른쪽이 꼬리/촉수
    function drawEnemy(e) {
        const cx = Math.floor(e.x);
        const cy = Math.floor(e.y);
        const frameA = e.animFrame < 10; // 2프레임 애니메이션

        if (e.type === 'basic') {
            // ===== 문어형 외계인 (보라) - 왼쪽 머리, 오른쪽 촉수 =====
            // 안테나 (머리 위)
            drawPx(cx - 8, cy - 11, 2, 3, '#7e22ce');
            drawPx(cx - 9, cy - 13, 4, 2, '#c084fc');  // 빛나는 끝

            // 머리 외곽 (둥근 돔, 왼쪽으로 튀어나옴)
            drawPx(cx - 8, cy - 9, 8, 2, '#6b21a8');   // 위
            drawPx(cx - 11, cy - 7, 12, 2, '#7e22ce');
            drawPx(cx - 12, cy - 5, 14, 8, '#a855f7'); // 메인 머리

            // 머리 아래 어두운 테
            drawPx(cx - 11, cy + 3, 12, 2, '#7e22ce');
            drawPx(cx - 8, cy + 5, 8, 1, '#6b21a8');

            // 큰 눈 (옆에서 본 한 개)
            drawPx(cx - 9, cy - 4, 5, 5, '#fff');
            drawPx(cx - 8, cy - 3, 3, 3, '#ef4444');
            drawPx(cx - 7, cy - 2, 1, 1, '#000');

            // 입 (왼쪽 아래 - 진행 방향)
            drawPx(cx - 11, cy + 1, 3, 2, '#581c87');
            drawPx(cx - 11, cy + 2, 1, 1, '#fff'); // 이빨 1
            drawPx(cx - 9, cy + 2, 1, 1, '#fff');  // 이빨 2

            // 촉수 (오른쪽 뒤로 흔들림)
            if (frameA) {
                drawPx(cx + 1, cy - 2, 2, 5, '#7e22ce');
                drawPx(cx + 3, cy + 1, 2, 5, '#7e22ce');
                drawPx(cx + 5, cy - 1, 2, 5, '#7e22ce');
                drawPx(cx + 7, cy + 2, 2, 4, '#7e22ce');
                drawPx(cx + 9, cy + 0, 2, 4, '#6b21a8');
            } else {
                drawPx(cx + 1, cy + 0, 2, 5, '#7e22ce');
                drawPx(cx + 3, cy - 2, 2, 5, '#7e22ce');
                drawPx(cx + 5, cy + 1, 2, 5, '#7e22ce');
                drawPx(cx + 7, cy - 1, 2, 4, '#7e22ce');
                drawPx(cx + 9, cy + 2, 2, 4, '#6b21a8');
            }

        } else if (e.type === 'fast') {
            // ===== 게형 외계인 (빨강) - 왼쪽 큰 집게, 오른쪽 꼬리 =====
            // 눈자루 (위)
            drawPx(cx - 4, cy - 10, 2, 5, '#991b1b');
            drawPx(cx - 5, cy - 12, 4, 3, '#ef4444');
            drawPx(cx - 4, cy - 11, 2, 1, '#fde047'); // 노랑 동공

            // 몸통 (가로 납작 타원)
            drawPx(cx - 7, cy - 6, 13, 2, '#7f1d1d');   // 등
            drawPx(cx - 9, cy - 4, 17, 4, '#dc2626');   // 메인
            drawPx(cx - 7, cy + 0, 13, 2, '#991b1b');   // 배 위
            drawPx(cx - 5, cy + 2, 9, 2, '#7f1d1d');    // 배 아래

            // 줄무늬
            drawPx(cx - 4, cy - 2, 2, 2, '#7f1d1d');
            drawPx(cx + 0, cy - 2, 2, 2, '#7f1d1d');
            drawPx(cx + 4, cy - 2, 2, 2, '#7f1d1d');

            // 큰 집게 (왼쪽 앞으로 - 진행/공격 방향)
            if (frameA) {
                drawPx(cx - 12, cy - 2, 4, 2, '#dc2626');  // 팔
                drawPx(cx - 16, cy - 4, 4, 6, '#ef4444');  // 집게
                drawPx(cx - 17, cy - 5, 1, 3, '#7f1d1d');  // 집게 위
                drawPx(cx - 17, cy + 1, 1, 3, '#7f1d1d');  // 집게 아래
                drawPx(cx - 14, cy - 1, 2, 2, '#000');     // 집게 입 (벌림)
            } else {
                drawPx(cx - 11, cy - 2, 3, 2, '#dc2626');
                drawPx(cx - 14, cy - 3, 3, 5, '#ef4444');
                drawPx(cx - 15, cy - 3, 1, 5, '#7f1d1d');
                drawPx(cx - 13, cy - 1, 1, 1, '#000');
            }

            // 다리 (아래쪽 4개)
            if (frameA) {
                drawPx(cx - 5, cy + 4, 1, 3, '#7f1d1d');
                drawPx(cx - 1, cy + 4, 1, 3, '#7f1d1d');
                drawPx(cx + 3, cy + 4, 1, 3, '#7f1d1d');
                drawPx(cx + 6, cy + 4, 1, 2, '#7f1d1d');
            } else {
                drawPx(cx - 5, cy + 4, 1, 2, '#7f1d1d');
                drawPx(cx - 1, cy + 4, 1, 3, '#7f1d1d');
                drawPx(cx + 3, cy + 4, 1, 2, '#7f1d1d');
                drawPx(cx + 6, cy + 4, 1, 3, '#7f1d1d');
            }

            // 꼬리 (작게 오른쪽)
            drawPx(cx + 8, cy - 1, 2, 3, '#7f1d1d');

        } else if (e.type === 'tanky') {
            // ===== 대형 오징어형 외계인 (파랑) - 큰 머리 왼쪽, 촉수 오른쪽 =====
            // 큰 돔 머리 (여러 층 - 왼쪽으로 둥글게)
            drawPx(cx - 12, cy - 12, 10, 2, '#1e3a8a'); // 위 어둠
            drawPx(cx - 14, cy - 10, 14, 2, '#1e40af');
            drawPx(cx - 16, cy - 8, 16, 4, '#2563eb');
            drawPx(cx - 17, cy - 4, 17, 6, '#3b82f6'); // 메인 머리

            // 머리 하이라이트 (반사광)
            drawPx(cx - 13, cy - 10, 4, 1, '#60a5fa');
            drawPx(cx - 15, cy - 8, 3, 2, '#60a5fa');

            // 큰 눈 (옆에서 본 1개)
            drawPx(cx - 13, cy - 5, 6, 6, '#fff');
            drawPx(cx - 12, cy - 4, 4, 4, '#ef4444');
            drawPx(cx - 11, cy - 3, 2, 2, '#000');
            drawPx(cx - 11, cy - 3, 1, 1, '#fff');     // 동공 하이라이트

            // 머리 아래 (입 부분)
            drawPx(cx - 16, cy + 2, 16, 2, '#1e40af');
            drawPx(cx - 14, cy + 4, 12, 2, '#1e3a8a');

            // 이빨 (위협적, 입 안)
            drawPx(cx - 14, cy + 5, 1, 2, '#fff');
            drawPx(cx - 11, cy + 5, 1, 2, '#fff');
            drawPx(cx - 8, cy + 5, 1, 2, '#fff');
            drawPx(cx - 5, cy + 5, 1, 2, '#fff');

            // 촉수 6개 (오른쪽 뒤로 - 좌우 교차 펄럭)
            if (frameA) {
                drawPx(cx + 1, cy - 4, 2, 6, '#2563eb');   // 위 1
                drawPx(cx + 1, cy + 2, 2, 4, '#2563eb');   // 아래 1
                drawPx(cx + 4, cy - 5, 2, 8, '#2563eb');   // 위 2
                drawPx(cx + 4, cy + 4, 2, 4, '#2563eb');   // 아래 2
                drawPx(cx + 7, cy - 3, 2, 6, '#2563eb');   // 위 3
                drawPx(cx + 7, cy + 3, 2, 5, '#2563eb');   // 아래 3
                // 촉수 끝
                drawPx(cx + 4, cy + 7, 2, 2, '#1e3a8a');
                drawPx(cx + 7, cy + 7, 2, 2, '#1e3a8a');
            } else {
                drawPx(cx + 1, cy - 5, 2, 4, '#2563eb');
                drawPx(cx + 1, cy + 1, 2, 5, '#2563eb');
                drawPx(cx + 4, cy - 3, 2, 6, '#2563eb');
                drawPx(cx + 4, cy + 3, 2, 5, '#2563eb');
                drawPx(cx + 7, cy - 5, 2, 8, '#2563eb');
                drawPx(cx + 7, cy + 3, 2, 4, '#2563eb');
                drawPx(cx + 1, cy + 5, 2, 2, '#1e3a8a');
                drawPx(cx + 7, cy - 6, 2, 2, '#1e3a8a');
            }
        }
    }

    // ============================================================
    // 보스 렌더링 - 옆모습 박쥐/악마 (왼쪽이 입/사격 방향)
    // ============================================================
    function drawBoss(b) {
        const cx = Math.floor(b.x);
        const cy = Math.floor(b.y);
        const wingUp = Math.floor(b.animFrame / 10) % 2 === 0;

        const wingColor1 = '#450a0a';
        const wingColor2 = '#7f1d1d';
        const wingColor3 = '#dc2626';

        // === 꼬리 (오른쪽) ===
        drawPx(cx + 16, cy - 2, 4, 5, '#7f1d1d');
        drawPx(cx + 20, cy - 1, 4, 4, '#7f1d1d');
        drawPx(cx + 24, cy + 0, 4, 3, '#991b1b');
        drawPx(cx + 28, cy + 1, 3, 2, '#991b1b');
        // 꼬리 끝 뾰족한 가시
        drawPx(cx + 30, cy - 1, 3, 2, '#1e1b4b');
        drawPx(cx + 32, cy - 3, 1, 4, '#1e1b4b');

        // === 큰 날개 (등 위로 펼쳐짐, 펄럭) ===
        if (wingUp) {
            // 위로 활짝 펼친 자세
            drawPx(cx - 14, cy - 30, 28, 3, wingColor1);   // 날개 위 외곽
            drawPx(cx - 16, cy - 27, 32, 4, wingColor2);
            drawPx(cx - 14, cy - 23, 30, 6, wingColor3);   // 메인
            drawPx(cx - 10, cy - 17, 24, 4, wingColor3);   // 안쪽 (몸통 연결)
            // 날개 골격 (어두운 라인)
            drawPx(cx - 14, cy - 28, 1, 12, '#1e1b4b');
            drawPx(cx - 6, cy - 28, 1, 12, '#1e1b4b');
            drawPx(cx + 2, cy - 28, 1, 12, '#1e1b4b');
            drawPx(cx + 10, cy - 26, 1, 10, '#1e1b4b');
            // 날개 끝 갈고리
            drawPx(cx - 16, cy - 30, 2, 2, '#1e1b4b');
            drawPx(cx + 14, cy - 30, 2, 2, '#1e1b4b');
        } else {
            // 약간 내린 자세 (퍼덕)
            drawPx(cx - 12, cy - 20, 26, 3, wingColor1);
            drawPx(cx - 14, cy - 17, 30, 4, wingColor2);
            drawPx(cx - 12, cy - 13, 26, 4, wingColor3);
            drawPx(cx - 8, cy - 9, 22, 3, wingColor3);
            drawPx(cx - 12, cy - 18, 1, 8, '#1e1b4b');
            drawPx(cx - 4, cy - 18, 1, 8, '#1e1b4b');
            drawPx(cx + 4, cy - 18, 1, 8, '#1e1b4b');
            drawPx(cx + 12, cy - 16, 1, 6, '#1e1b4b');
        }

        // === 몸통 (가운데) ===
        // 외곽
        drawPx(cx - 8, cy - 14, 22, 2, '#450a0a');   // 등 위
        drawPx(cx - 8, cy + 14, 22, 2, '#450a0a');   // 배 아래
        drawPx(cx + 14, cy - 12, 2, 26, '#450a0a'); // 등 뒤쪽

        // 몸통 메인
        drawPx(cx - 8, cy - 12, 22, 26, '#991b1b');
        drawPx(cx - 4, cy - 8, 16, 6, '#dc2626');   // 상부 하이라이트
        drawPx(cx - 6, cy + 4, 18, 8, '#7f1d1d');   // 배

        // === 머리 (왼쪽) ===
        // 머리 외곽
        drawPx(cx - 24, cy - 12, 16, 2, '#450a0a');  // 머리 위
        drawPx(cx - 26, cy - 10, 4, 22, '#450a0a'); // 입 끝 (왼쪽)
        drawPx(cx - 24, cy + 10, 16, 2, '#450a0a'); // 턱

        // 머리 메인
        drawPx(cx - 24, cy - 10, 16, 20, '#991b1b');
        drawPx(cx - 22, cy - 6, 14, 6, '#dc2626'); // 머리 하이라이트

        // === 뿔 (크게, 위) ===
        drawPx(cx - 22, cy - 16, 3, 6, '#1e1b4b');
        drawPx(cx - 21, cy - 22, 3, 6, '#1e1b4b');  // 앞 뿔 (큰)
        drawPx(cx - 12, cy - 16, 3, 6, '#1e1b4b');
        drawPx(cx - 11, cy - 20, 3, 4, '#1e1b4b');  // 뒤 뿔
        // 뿔 꼭대기 하이라이트
        drawPx(cx - 21, cy - 24, 1, 2, '#7f1d1d');
        drawPx(cx - 11, cy - 22, 1, 2, '#7f1d1d');

        // === 눈 (옆모습이라 한 개, 빨간 악마 눈) ===
        const blink = Math.floor(b.animFrame / 60) % 2 === 0 || b.animFrame % 60 < 55;
        if (blink) {
            drawPx(cx - 19, cy - 6, 7, 5, '#fff');
            drawPx(cx - 17, cy - 5, 4, 3, '#ef4444');
            drawPx(cx - 16, cy - 4, 2, 1, '#000');
            drawPx(cx - 16, cy - 4, 1, 1, '#fff');     // 동공 하이라이트
        } else {
            drawPx(cx - 19, cy - 5, 7, 1, '#991b1b');
        }

        // === 입 (왼쪽, 사격 방향, 이빨 보임) ===
        // 입 라인 (위)
        drawPx(cx - 26, cy + 4, 18, 1, '#1e1b4b');
        // 입 안 (검정)
        drawPx(cx - 26, cy + 5, 17, 4, '#000');
        // 송곳니 (위 줄)
        drawPx(cx - 24, cy + 5, 1, 3, '#fff');
        drawPx(cx - 21, cy + 5, 1, 3, '#fff');
        drawPx(cx - 18, cy + 5, 1, 2, '#fff');
        drawPx(cx - 14, cy + 5, 1, 3, '#fff');
        drawPx(cx - 11, cy + 5, 1, 2, '#fff');
        // 송곳니 (아래 줄)
        drawPx(cx - 23, cy + 7, 1, 2, '#fff');
        drawPx(cx - 19, cy + 7, 1, 2, '#fff');
        drawPx(cx - 15, cy + 7, 1, 2, '#fff');
        // 혀 / 어두운 입 끝
        drawPx(cx - 9, cy + 6, 1, 3, '#7f1d1d');

        // === 다리 (작게, 몸통 아래) ===
        drawPx(cx - 2, cy + 16, 3, 4, '#450a0a');
        drawPx(cx - 4, cy + 19, 6, 2, '#1e1b4b');   // 발톱
        drawPx(cx + 6, cy + 16, 3, 4, '#450a0a');
        drawPx(cx + 4, cy + 19, 6, 2, '#1e1b4b');

        // === 피격 깜빡임 ===
        if (b.hp < b.maxHp && Math.floor(b.animFrame / 3) % 2 === 0 && b.animFrame < 15) {
            ctx.globalAlpha = 0.5;
            drawPx(cx - 28, cy - 30, 62, 52, '#fff');
            ctx.globalAlpha = 1;
        }
    }

    function drawBossHPBar(b) {
        const barW = W - 40;
        const barH = 8;
        const barX = 20;
        const barY = 75;

        // 배경
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(barX - 2, barY - 2, barW + 4, barH + 4);
        ctx.fillStyle = '#1e1b4b';
        ctx.fillRect(barX, barY, barW, barH);

        // 체력
        const ratio = Math.max(0, b.hp / b.maxHp);
        const fillW = Math.floor(barW * ratio);
        let color = '#dc2626';
        if (ratio > 0.6) color = '#dc2626';
        else if (ratio > 0.3) color = '#f59e0b';
        else color = '#ef4444';
        ctx.fillStyle = color;
        ctx.fillRect(barX, barY, fillW, barH);

        // 번쩍임 (하이라이트)
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.fillRect(barX, barY, fillW, 2);

        // BOSS 라벨
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 9px "Press Start 2P", monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText('★ BOSS ★', W/2, barY - 11);
    }

    // ============================================================
    // 운석 렌더링
    // ============================================================
    function drawMeteor(m) {
        const cx = Math.floor(m.x);

        if (m.phase === 'warning') {
            // 경고 마커: 상단에 빨간 ! 박스 (깜빡임)
            const blink = Math.floor(m.warning / 8) % 2 === 0;
            if (blink) {
                // 배경 박스
                drawPx(cx - 10, 28, 20, 20, '#000');
                drawPx(cx - 9, 29, 18, 18, '#ff0066');
                drawPx(cx - 7, 31, 14, 14, '#dc2626');

                // ! 느낌표
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 12px "Press Start 2P", monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('!', cx, 38);

                // 낙하 경로 점선
                ctx.fillStyle = 'rgba(255, 0, 102, 0.35)';
                for (let dy = 52; dy < H - 20; dy += 8) {
                    ctx.fillRect(cx - 1, dy, 2, 4);
                }
            }
        } else {
            const cy = Math.floor(m.y);
            // 불꽃 꼬리
            for (let i = 0; i < 6; i++) {
                ctx.globalAlpha = (1 - i * 0.15) * 0.6;
                ctx.fillStyle = i < 2 ? '#fff3a0' : (i < 4 ? '#f97316' : '#dc2626');
                const trailH = 4;
                ctx.fillRect(cx - 3 - (i%2), cy - 14 - i * 5, 6 + (i%2)*2, trailH);
            }
            ctx.globalAlpha = 1;

            // 운석 몸통 (큰 돌)
            drawPx(cx - 12, cy - 10, 24, 2, '#1c0701');       // 최상단 어두운 테
            drawPx(cx - 14, cy - 8, 28, 4, '#4a1f0a');
            drawPx(cx - 14, cy - 4, 28, 8, '#7c2d12');
            drawPx(cx - 12, cy + 4, 24, 4, '#7c2d12');
            drawPx(cx - 10, cy + 8, 20, 3, '#4a1f0a');

            // 돌 텍스처
            drawPx(cx - 10, cy - 6, 6, 3, '#92400e');
            drawPx(cx + 2, cy + 2, 6, 3, '#a16207');
            drawPx(cx - 4, cy, 4, 3, '#a16207');

            // 뜨거운 부분 (균열)
            drawPx(cx - 8, cy - 2, 2, 2, '#fbbf24');
            drawPx(cx + 4, cy - 5, 2, 2, '#fbbf24');
            drawPx(cx, cy + 4, 2, 2, '#f59e0b');

            // HP 표시 (작은 동그라미)
            if (m.hp < 3) {
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 8px "Press Start 2P", monospace';
                ctx.textAlign = 'center';
                ctx.fillText(m.hp, cx, cy + 1);
            }
        }
    }

    // 알파벳 글자 (박스 없이 외곽선 있는 픽셀 글자로)
    function drawLetterTile(L) {
        const cx = Math.floor(L.x);
        const cy = Math.floor(L.y + Math.sin(L.bobPhase) * 2);
        const word = state.currentWord.w;
        const needed = word[state.letterIndex];
        const isCorrect = L.char === needed;
        const isAlreadyEaten = word.slice(0, state.letterIndex).includes(L.char);

        let color;
        if (isCorrect) color = '#4ade80';        // 밝은 녹색
        else if (isAlreadyEaten) color = '#94a3b8'; // 회색
        else color = '#f87171';                    // 연한 빨강

        // 정답 글자엔 펄스 후광 (끌림 효과)
        if (isCorrect) {
            const pulse = 0.15 + Math.abs(Math.sin(performance.now() * 0.005)) * 0.25;
            ctx.globalAlpha = pulse;
            ctx.fillStyle = '#4ade80';
            // 후광: 글자 주변 원형 빛 (픽셀 스타일)
            ctx.fillRect(cx - 14, cy - 10, 28, 20);
            ctx.fillRect(cx - 10, cy - 14, 20, 28);
            ctx.globalAlpha = 1;
        }

        // 글자 그리기 (외곽선 + 메인 색)
        ctx.font = 'bold 24px "Press Start 2P", monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // 8방향 외곽선 (검은색) - 복잡한 배경 위에서도 가독성 확보
        ctx.fillStyle = '#000';
        const outlineOffsets = [
            [-2, 0], [2, 0], [0, -2], [0, 2],
            [-2, -2], [2, -2], [-2, 2], [2, 2],
            [-1, -2], [1, -2], [-1, 2], [1, 2],
            [-2, -1], [2, -1], [-2, 1], [2, 1]
        ];
        for (const [dx, dy] of outlineOffsets) {
            ctx.fillText(L.char, cx + dx, cy + dy);
        }

        // 메인 글자
        ctx.fillStyle = color;
        ctx.fillText(L.char, cx, cy);

        // 정답 글자 반짝임 (양쪽에 번갈아)
        if (isCorrect) {
            const t = performance.now() * 0.004 + L.bobPhase * 3;
            ctx.fillStyle = '#fff';
            const sparkleAlpha = 0.6 + Math.sin(t * 2) * 0.4;
            ctx.globalAlpha = sparkleAlpha;
            // 좌상 반짝
            ctx.fillRect(cx - 12 + Math.cos(t) * 2, cy - 12, 2, 2);
            ctx.fillRect(cx - 13 + Math.cos(t) * 2, cy - 10, 2, 2);
            // 우하 반짝
            ctx.fillRect(cx + 10, cy + 10 + Math.sin(t) * 2, 2, 2);
            ctx.fillRect(cx + 12, cy + 9 + Math.sin(t) * 2, 2, 2);
            ctx.globalAlpha = 1;
        }
    }

    // ============================================================
    // 타이틀 드래곤 프리뷰 (선택된 캐릭터 색상 반영, 옆모습 머리 오른쪽)
    // ============================================================
    let titleRafId = null;
    function drawTitleDragon() {
        const c = document.getElementById('title-dragon');
        const tctx = c.getContext('2d');
        tctx.imageSmoothingEnabled = false;
        const C = CHARACTERS[state.selectedChar].colors;

        let t = 0;
        function tick() {
            tctx.clearRect(0, 0, 40, 40);
            const wingUp = Math.floor(t / 10) % 2 === 0;
            const cx = 20, cy = 20;
            function tp(x, y, w, h, color) {
                tctx.fillStyle = color;
                tctx.fillRect(x, y, w, h);
            }

            // 추진 불꽃 (꼬리 뒤)
            const fi = Math.floor(t / 3) % 3;
            tp(cx - 17 - fi, cy - 1, 3, 3, '#ff0066');
            tp(cx - 15, cy - 2, 4, 5, '#ff6600');
            tp(cx - 13, cy - 1, 3, 3, '#ffaa00');

            // 꼬리
            tp(cx - 12, cy - 2, 3, 5, C.bodyDark);
            tp(cx - 11, cy - 1, 2, 3, C.body);

            // 몸통 외곽
            tp(cx - 9, cy - 5, 12, 1, C.bodyDark);
            tp(cx - 9, cy + 5, 12, 1, C.bodyDark);
            tp(cx + 3, cy - 4, 1, 9, C.bodyDark);

            // 몸통 메인
            tp(cx - 9, cy - 4, 12, 9, C.body);
            tp(cx - 7, cy + 1, 9, 4, C.belly);

            // 머리
            tp(cx + 4, cy - 6, 7, 1, C.bodyDark);
            tp(cx + 11, cy - 5, 1, 5, C.bodyDark);
            tp(cx + 4, cy - 1, 7, 1, C.bodyDark);
            tp(cx + 4, cy - 5, 7, 4, C.body);

            // 뿔
            tp(cx + 5, cy - 8, 2, 2, C.horn);
            tp(cx + 8, cy - 9, 2, 3, C.horn);

            // 눈
            tp(cx + 7, cy - 4, 2, 2, '#fff');
            tp(cx + 8, cy - 4, 1, 1, '#000');

            // 입 라인
            tp(cx + 9, cy - 2, 2, 1, C.bodyDark);

            // 날개 (펄럭 애니메이션)
            if (wingUp) {
                tp(cx - 4, cy - 11, 8, 1, C.bodyDark);
                tp(cx - 5, cy - 10, 10, 3, C.wing);
                tp(cx - 3, cy - 7, 6, 1, C.wing);
            } else {
                tp(cx - 5, cy - 8, 10, 1, C.bodyDark);
                tp(cx - 6, cy - 7, 11, 2, C.wing);
                tp(cx - 4, cy - 5, 7, 1, C.wing);
            }

            // 다리
            tp(cx + 1, cy + 5, 1, 2, C.bodyDark);

            t++;
            if (document.getElementById('title-screen').classList.contains('hidden')) {
                return;
            } else {
                titleRafId = requestAnimationFrame(tick);
            }
        }
        if (titleRafId) cancelAnimationFrame(titleRafId);
        tick();
    }

    // ============================================================
    // 초기 실행
    // ============================================================
    resize();
    setTimeout(() => {
        resize();
        renderCharSelect();
        drawTitleDragon();
    }, 100);
</script>
</body>
</html>
