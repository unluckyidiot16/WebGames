<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<title>영재학급 4일 커리큘럼 플래너</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --bg2: #f4f3ee; --bg3: #eceae3;
  --text: #1a1a1e; --text2: #5a5958; --text3: #8a8880;
  --border: #dddcd5; --border2: #c8c7c0;
  --shadow: 0 1px 4px rgba(0,0,0,.07), 0 0 0 1px rgba(0,0,0,.05);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b;
    --text: #e2e0d8; --text2: #9a9890; --text3: #6a6866;
    --border: #3a3a36; --border2: #4a4a46;
    --shadow: 0 1px 4px rgba(0,0,0,.3), 0 0 0 1px rgba(255,255,255,.04);
  }
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
  background: var(--bg2); color: var(--text); font-size: 13px; line-height: 1.5; min-height: 100vh;
}
.page { max-width: 960px; margin: 0 auto; padding: 20px 16px 40px; }
.wrap { padding: 10px 0; }

.day-tabs { display: flex; gap: 7px; margin-bottom: 18px; }
.dt {
  flex: 1; padding: 11px 8px; border-radius: 10px;
  border: 1.5px solid var(--border2);
  background: var(--bg); cursor: pointer; transition: all .15s; text-align: center;
  box-shadow: var(--shadow); font-family: inherit;
}
.dt .day-num { font-size: 10px; font-weight: 600; color: var(--text3); margin-bottom: 3px; }
.dt .day-title { font-size: 12px; font-weight: 500; color: var(--text2); line-height: 1.3; }
.dt.on { border-color: transparent; }
.dpanel { display: none; }
.dpanel.on { display: block; }

.day-meta { border-radius: 10px; padding: 13px 15px; margin-bottom: 15px; border: 1.5px solid; box-shadow: var(--shadow); }
.day-meta h2 { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
.day-meta p { font-size: 12px; opacity: .85; line-height: 1.55; }

.period-list { display: flex; flex-direction: column; gap: 9px; }

.period {
  border-radius: 10px; border: 1.5px solid var(--border2);
  background: var(--bg); overflow: hidden; cursor: pointer;
  transition: border-color .15s, box-shadow .15s;
  box-shadow: var(--shadow);
}
.period:hover { border-color: var(--border2); box-shadow: 0 2px 8px rgba(0,0,0,.1), 0 0 0 1px rgba(0,0,0,.06); }
.period.open { border-color: var(--border2); }

.period-header {
  display: grid; grid-template-columns: 52px 1fr auto;
  gap: 10px; align-items: center; padding: 11px 13px;
  background: var(--bg2);
}
.pnum {
  width: 38px; height: 38px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; color: #fff; flex-shrink: 0;
  box-shadow: 0 2px 5px rgba(0,0,0,.2);
}
.ptime { font-size: 10px; color: var(--text3); margin-bottom: 1px; }
.ptitle { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
.pq { font-size: 11px; color: var(--text2); margin-top: 2px; line-height: 1.4; }
.toggle { font-size: 16px; color: var(--text3); transition: transform .2s; flex-shrink: 0; }
.period.open .toggle { transform: rotate(180deg); }

.period-body { display: none; padding: 0 13px 13px; border-top: 1px solid var(--border); }
.period.open .period-body { display: block; }

.pb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-top: 11px; }
.pb-card {
  background: var(--bg2); border-radius: 8px; padding: 10px 12px;
  border: 1px solid var(--border);
}
.pb-card h4 {
  font-size: 10px; font-weight: 700; color: var(--text2);
  margin-bottom: 7px; text-transform: uppercase; letter-spacing: .06em;
}
.pb-card p, .pb-card li { font-size: 11px; color: var(--text); line-height: 1.65; }
.pb-card ul { padding-left: 14px; }

.time-bar { display: flex; margin-top: 11px; border-radius: 6px; overflow: hidden; border: 1px solid rgba(0,0,0,.08); }
.tb { text-align: center; padding: 5px 0; font-size: 10px; font-weight: 500; }

.model-pill {
  display: inline-block; padding: 3px 9px; border-radius: 8px;
  font-size: 10px; font-weight: 500; margin: 2px 3px 0 0;
  border: 1px solid transparent;
}

.next-q {
  background: var(--bg2); border-left: 3px solid #E8A838;
  border-radius: 0 8px 8px 0; padding: 8px 11px;
  font-size: 11px; color: var(--text2); margin-top: 11px; line-height: 1.6;
  border-top: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
}
.next-q strong { color: var(--text); font-weight: 600; }
</style>
</head>
<body>
<div class="page">
<div class="wrap">
<div class="day-tabs" id="dayTabs"></div>

    periods:[
      {title:"갈릴레오의 배신 — 낙하 실험",q:"무거운 게 먼저 떨어진다는 게 정말 맞을까?",time:"09:00 – 09:45",model:["낙하 실험 물체 세트 (같은 외형·다른 무게 3종)","속이 빈 것·채워진 것·중간"],times:[{l:"예측",w:15,c:"#854F0B"},{l:"낙하 실험",w:44,c:"#BA7517"},{l:"변수 탐구",w:30,c:"#EF9F27"},{l:"정리",w:11,c:"#FAC775"}],act:["\"어느 쪽이 먼저 떨어질까?\" 손 들기","같은 모양 다른 무게 동시 낙하 → 동시!","모양이 다른 물체 낙하 → 차이 발생","\"무게가 아니라면 뭐가 영향을 주는 걸까?\"","공기저항 개념으로 정리"],discover:["진공에서 모든 물체는 동시 낙하","공기저항이 변수임","2000년 상식이 실험으로 뒤집혔다"],next:"\"눈에 안 보이는 공기가 어떻게 힘을 낼 수 있나?\""},

const tabsEl = document.getElementById('dayTabs');
const panelsEl = document.getElementById('dayPanels');

DAYS.forEach((day,di)=>{
  const tab = document.createElement('button');
  tab.className='dt'+(di===0?' on':'');
  tab.style.cssText=di===0?`background:${day.bg};border-color:${day.color};`:'';
  tab.innerHTML=`<div class="day-num">${day.num}</div><div class="day-title">${day.title}</div>`;
  tab.onclick=()=>{
    document.querySelectorAll('.dt').forEach((t,i)=>{
      t.classList.toggle('on',i===di);
      t.style.cssText=i===di?`background:${day.bg};border-color:${day.color};`:'';
    });
    document.querySelectorAll('.dpanel').forEach((p,i)=>p.classList.toggle('on',i===di));
  };
  tabsEl.appendChild(tab);

  const panel = document.createElement('div');
  panel.className='dpanel'+(di===0?' on':'');

  let html=`<div class="day-meta" style="background:${day.bg};border-color:${day.border}">
    <h2 style="color:${day.color}">${day.num} · ${day.title}</h2>
    <p style="color:${day.color}">${day.meta}</p>
  </div><div class="period-list">`;

  day.periods.forEach((p,pi)=>{
    const modelPills=p.model.map(m=>`<span class="model-pill" style="background:${day.bg};color:${day.color};border-color:${day.border}">${m}</span>`).join('');
    const actItems=p.act.map(a=>`<li>${a}</li>`).join('');
    const discItems=p.discover.map(d=>`<li>${d}</li>`).join('');
    const timeBar=p.times.map(t=>`<div class="tb" style="width:${t.w}%;background:${t.c};color:#fff">${t.l}</div>`).join('');

    html+=`<div class="period" id="p${di}_${pi}">
      <div class="period-header" onclick="togglePeriod('p${di}_${pi}')">
        <div style="display:flex;align-items:center;justify-content:center">
          <div class="pnum" style="background:${day.color}">${pi+1}교시</div>
        </div>
        <div>
          <div class="ptime">${p.time}</div>
          <div class="ptitle">${p.title}</div>
          <div class="pq">${p.q}</div>
        </div>
        <div class="toggle">▾</div>
      </div>
      <div class="period-body">
        <div style="margin-top:11px;margin-bottom:5px">${modelPills}</div>
        <div class="time-bar">${timeBar}</div>
        <div class="pb-grid">
          <div class="pb-card"><h4>활동 순서</h4><ul>${actItems}</ul></div>
          <div class="pb-card"><h4>학생이 발견해야 할 것</h4><ul>${discItems}</ul></div>
        </div>
        <div class="next-q"><strong>다음 교시 연결 질문:</strong> ${p.next}</div>
      </div>
    </div>`;
  });

  html+='</div>';
  panel.innerHTML=html;
  panelsEl.appendChild(panel);
});

function togglePeriod(id){
  document.getElementById(id).classList.toggle('open');
}
</script>
