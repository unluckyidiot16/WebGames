<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개념 마인드맵</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#0f0f13;--bg2:#16161d;--bg3:#1e1e28;
            --b:#2a2a38;--b2:#3a3a50;
            --t:#e8e8f0;--t2:#9090a8;--t3:#5a5a72;
            --math:#4f9cf9;--sci:#3ecf8e;
            --elem:#f4a742;--mid:#a78bfa;--high:#f87171;
            --pw:260px;--hh:50px;
        }
        body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--t);height:100vh;overflow:hidden;display:flex;flex-direction:column}
        header{height:var(--hh);background:var(--bg2);border-bottom:1px solid var(--b);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0}
        .logo{font-size:13px;font-weight:700;white-space:nowrap}.logo em{color:var(--math);font-style:normal}
        .srch{flex:1;max-width:280px;position:relative}
        .srch input{width:100%;background:var(--bg3);border:1px solid var(--b);border-radius:8px;padding:5px 10px 5px 26px;font-size:12px;color:var(--t);font-family:inherit;outline:none;transition:border-color .15s}
        .srch input:focus{border-color:var(--math)}.srch input::placeholder{color:var(--t3)}
        .sic{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:12px;pointer-events:none}
        .hbadges{display:flex;gap:4px;margin-left:auto}
        .hb{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid;cursor:pointer;background:transparent;font-family:inherit;transition:all .15s}
        .hb.a{color:var(--t2);border-color:var(--b2)}.hb.a.on{background:var(--b2);color:var(--t)}
        .hb.m{color:var(--math);border-color:var(--math)}.hb.m.on{background:var(--math);color:#fff}
        .hb.s{color:var(--sci);border-color:var(--sci)}.hb.s.on{background:var(--sci);color:#000}
        .layout{display:flex;flex:1;overflow:hidden}
        .panel{width:var(--pw);background:var(--bg2);border-right:1px solid var(--b);display:flex;flex-direction:column;flex-shrink:0}
        .ps{padding:11px;border-bottom:1px solid var(--b)}
        .pt{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:7px}
        .gbs{display:flex;flex-direction:column;gap:3px}
        .gb{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:6px;border:1px solid var(--b);background:transparent;cursor:pointer;font-size:11px;color:var(--t2);font-family:inherit;transition:all .15s;text-align:left}
        .gb:hover,.gb.on{background:var(--bg3);color:var(--t);border-color:var(--b2)}
        .gd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
        .leg{display:flex;flex-direction:column;gap:6px}
        .li{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--t2)}
        .ll{flex-shrink:0}
        .ni{flex:1;overflow-y:auto;padding:11px}
        .ni::-webkit-scrollbar{width:3px}.ni::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
        .em{color:var(--t3);font-size:11px;line-height:1.7;text-align:center;margin-top:20px}
        .bq-btn{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:6px;border:1px solid;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;background:transparent;color:var(--sci);border-color:var(--sci)}
        .bq-btn:hover{background:var(--sci);color:#000}
        .bq-btn.loading{opacity:.5;cursor:not-allowed}
        .bq-box{margin-top:12px;border-radius:8px;overflow:hidden;border:1px solid var(--b2)}
        .bq-header{background:#0d2e1f;padding:8px 11px;font-size:10px;font-weight:700;color:var(--sci);letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
        .bq-close{background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px;line-height:1;padding:0}
        .bq-close:hover{color:var(--t)}
        .bq-section{padding:10px 11px;border-bottom:1px solid var(--b)}
        .bq-section:last-child{border-bottom:none}
        .bq-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:5px}
        .bq-text{font-size:11px;color:var(--t);line-height:1.7}
        .bq-tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:600;margin-right:4px;margin-bottom:2px}
        .bq-spinner{display:inline-block;width:10px;height:10px;border:2px solid #3ecf8e44;border-top-color:var(--sci);border-radius:50%;animation:spin .7s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .in{font-size:14px;font-weight:700;margin-bottom:5px}
        .it{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
        .itg{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500}
        .cs h4{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin:9px 0 5px}
        .cr{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--b);cursor:pointer;transition:color .1s}
        .cr:hover{color:var(--math)}.cr:last-child{border-bottom:none}
        .cd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
        .cn{font-size:11px;flex:1}.ct{font-size:9px;color:var(--t3)}
        .cw{flex:1;position:relative;overflow:hidden}
        canvas{position:absolute;inset:0;cursor:grab}.grabbing{cursor:grabbing!important}
        .tt{position:absolute;background:var(--bg2);border:1px solid var(--b2);border-radius:8px;padding:6px 10px;font-size:11px;pointer-events:none;opacity:0;transition:opacity .12s;z-index:50;box-shadow:0 4px 16px rgba(0,0,0,.5);max-width:180px}
        .tt.show{opacity:1}.ttn{font-weight:600;margin-bottom:2px}.ttm{font-size:10px;color:var(--t2)}
        .sb{position:absolute;bottom:10px;right:10px;background:var(--bg2);border:1px solid var(--b);border-radius:7px;padding:5px 10px;font-size:10px;color:var(--t3);display:flex;gap:10px}
        .sb b{color:var(--t2);font-weight:500}
        .zb{position:absolute;bottom:10px;left:10px;display:flex;gap:3px}
        .zbtn{width:28px;height:28px;background:var(--bg2);border:1px solid var(--b);border-radius:6px;color:var(--t2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:inherit}
        .zbtn:hover{background:var(--bg3);color:var(--t)}
        .nav-link:hover{opacity:.75}
    </style>
</head>
<body>
<header>
    <div class="logo">개념 마인드맵 <em>·</em> 수학·과학</div>
    <div class="srch"><span class="sic">⌕</span><input type="text" id="SI" placeholder="개념 검색..."></div>
    <div class="hbadges">
        <button class="hb a on" id="ba">전체</button>
        <button class="hb m" id="bm">수학</button>
        <button class="hb s" id="bs">과학</button>
    </div>
    <div style="display:flex;gap:6px;margin-left:10px">
        <a href="/gifted.html" style="padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid var(--mid);color:var(--mid);text-decoration:none;display:flex;align-items:center">문항 생성</a>
        <a href="/chat.html" style="padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid var(--sci);color:var(--sci);text-decoration:none;display:flex;align-items:center">학생 채팅</a>
    </div>
</header>
<div class="layout">
    <div class="panel">
        <div class="ps">
            <div class="pt">학교급 필터</div>
            <div class="gbs">
                <button class="gb on" id="ga"><span class="gd" style="background:#fff3"></span>전체</button>
                <button class="gb" id="ge"><span class="gd" style="background:var(--elem)"></span>초등 (1~6학년)</button>
                <button class="gb" id="gm"><span class="gd" style="background:var(--mid)"></span>중학교 (1~3학년)</button>
                <button class="gb" id="gh"><span class="gd" style="background:var(--high)"></span>고등학교</button>
            </div>
        </div>
        <div class="ps">
            <div class="pt">노드 유형</div>
            <div class="leg">
                <div class="li"><span class="ll" style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--math)"></span>수학 개념</div>
                <div class="li"><span class="ll" style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--sci)"></span>과학 개념</div>
            </div>
            <div class="pt" style="margin-top:10px">연결선 유형</div>
            <div class="leg">
                <div class="li"><span class="ll" style="display:inline-block;width:22px;height:2px;background:var(--math);opacity:.5"></span>위계 (선수→후속)</div>
                <div class="li"><span class="ll" style="display:inline-block;width:22px;height:1px;border-top:2px dashed var(--sci)"></span>교과 간 연결</div>
                <div class="li"><span class="ll" style="display:inline-block;width:22px;height:1px;border-top:2px dotted var(--elem)"></span>재등장 (심화)</div>
            </div>
        </div>
        <div class="ni" id="NI"><div class="em">노드를 클릭하면<br>연결 정보가 표시됩니다</div></div>
    </div>
    <div class="cw">
        <canvas id="cv"></canvas>
        <div class="tt" id="TT"><div class="ttn" id="TTN"></div><div class="ttm" id="TTM"></div></div>
        <div class="sb">노드 <b id="SN">0</b> · 연결 <b id="SL">0</b> · 표시 <b id="SV">0</b></div>
        <div class="zb">
            <button class="zbtn" id="ZI">+</button>
            <button class="zbtn" id="ZO">−</button>
            <button class="zbtn" id="ZR">⊙</button>
        </div>
    </div>
</div>

        {s:'M01',t:'M02',tp:'hier'},{s:'M02',t:'M03',tp:'hier'},{s:'M03',t:'M04',tp:'hier'},
        {s:'M04',t:'M05',tp:'hier'},{s:'M03',t:'M06',tp:'hier'},{s:'M01',t:'M20',tp:'reapp'},
        {s:'M20',t:'M21',tp:'hier'},{s:'M06',t:'M22',tp:'hier'},{s:'M22',t:'M20',tp:'hier'},
        {s:'M21',t:'M40',tp:'hier'},
        {s:'M07',t:'M08',tp:'hier'},{s:'M08',t:'M09',tp:'hier'},{s:'M09',t:'M10',tp:'hier'},
        {s:'M08',t:'M11',tp:'hier'},{s:'M11',t:'M35',tp:'reapp'},{s:'M09',t:'M35',tp:'hier'},
        {s:'M12',t:'M13',tp:'hier'},{s:'M08',t:'M12',tp:'hier'},{s:'M11',t:'M13',tp:'hier'},
        {s:'M28',t:'M29',tp:'hier'},{s:'M29',t:'M32',tp:'hier'},{s:'M30',t:'M31',tp:'hier'},
        {s:'M35',t:'M47',tp:'reapp'},{s:'M29',t:'M47',tp:'hier'},
        {s:'M15',t:'M23',tp:'hier'},{s:'M23',t:'M24',tp:'hier'},{s:'M24',t:'M25',tp:'hier'},
        {s:'M14',t:'M15',tp:'hier'},
        {s:'M15',t:'M26',tp:'hier'},{s:'M26',t:'M27',tp:'hier'},{s:'M23',t:'M26',tp:'hier'},
        {s:'M25',t:'M27',tp:'hier'},{s:'M27',t:'M41',tp:'hier'},{s:'M26',t:'M41',tp:'reapp'},
        {s:'M41',t:'M44',tp:'hier'},{s:'M32',t:'M42',tp:'hier'},
        {s:'M44',t:'M45',tp:'hier'},{s:'M45',t:'M46',tp:'hier'},
        {s:'M40',t:'M43',tp:'hier'},
        {s:'M16',t:'M33',tp:'hier'},{s:'M33',t:'M49',tp:'hier'},{s:'M34',t:'M49',tp:'hier'},
        {s:'S01',t:'S20',tp:'reapp'},{s:'S20',t:'S21',tp:'hier'},{s:'S21',t:'S22',tp:'hier'},
        {s:'S22',t:'S40',tp:'hier'},{s:'S23',t:'S41',tp:'hier'},{s:'S24',t:'S40',tp:'hier'},
        {s:'S02',t:'S23',tp:'hier'},{s:'S03',t:'S41',tp:'hier'},
        {s:'S04',t:'S25',tp:'reapp'},{s:'S25',t:'S43',tp:'hier'},{s:'S05',t:'S43',tp:'reapp'},
        {s:'S26',t:'S42',tp:'hier'},{s:'S27',t:'S44',tp:'hier'},
        {s:'S06',t:'S28',tp:'reapp'},{s:'S28',t:'S44',tp:'hier'},{s:'S07',t:'S28',tp:'reapp'},
        {s:'S44',t:'S45',tp:'hier'},
        {s:'S09',t:'S31',tp:'reapp'},{s:'S31',t:'S46',tp:'hier'},{s:'S10',t:'S29',tp:'reapp'},
        {s:'S29',t:'S30',tp:'hier'},{s:'S08',t:'S47',tp:'reapp'},
        {s:'S11',t:'S32',tp:'hier'},{s:'S32',t:'S48',tp:'hier'},
        {s:'S12',t:'S14',tp:'hier'},{s:'S13',t:'S14',tp:'hier'},{s:'S14',t:'S49',tp:'hier'},
        {s:'S33',t:'S48',tp:'hier'},{s:'S34',t:'S48',tp:'lat'},
        // cross-subject
        {s:'M14',t:'S23',tp:'lat'},{s:'M12',t:'S04',tp:'lat'},{s:'M13',t:'S01',tp:'lat'},
        {s:'M26',t:'S25',tp:'lat'},{s:'M27',t:'S25',tp:'lat'},{s:'M45',t:'S43',tp:'lat'},
        {s:'M46',t:'S43',tp:'lat'},{s:'M42',t:'S44',tp:'lat'},{s:'M47',t:'S43',tp:'lat'},
        {s:'M49',t:'S33',tp:'lat'},{s:'M43',t:'S46',tp:'lat'},{s:'M35',t:'S24',tp:'lat'},
        {s:'M09',t:'S24',tp:'lat'},{s:'M10',t:'S24',tp:'lat'},{s:'M31',t:'S46',tp:'lat'},
        {s:'M05',t:'S21',tp:'lat'},{s:'M40',t:'S46',tp:'lat'},{s:'M44',t:'S42',tp:'lat'},
        {s:'M28',t:'S09',tp:'lat'},{s:'M34',t:'S14',tp:'lat'},
    ];

    // ── MINDMAP TREE STRUCTURE ──────────────────────────────────────
    // subject → areas (order = clockwise from top for each half)
    const MATH_AREAS = ['수와 연산','도형과 측정','규칙성과 비','함수','미적분','확률과 통계'];
    const SCI_AREAS  = ['물질','운동과 에너지','지구와 우주','생명'];
    const GRADE_ORDER = {elem:0, middle:1, high:2};

    // ── INDEX & ADJACENCY ───────────────────────────────────────────
    const NM={};
    ND.forEach(n=>NM[n.id]=n);
    const ADJ={};
    ND.forEach(n=>ADJ[n.id]=[]);
    LK.forEach(l=>{
        const src=NM[l.s],tgt=NM[l.t];
        if(!src||!tgt)return;
        l.src=src;l.tgt=tgt;
        ADJ[src.id].push({node:tgt,tp:l.tp,dir:'out'});
        ADJ[tgt.id].push({node:src,tp:l.tp,dir:'in'});
    });

    // ── COLORS ─────────────────────────────────────────────────────
    const NC={math:{elem:'#4f9cf9',middle:'#2563eb',high:'#1d4ed8'},
        sci:{elem:'#3ecf8e',middle:'#16a34a',high:'#15803d'}};
    const SC={elem:'#f4a742',middle:'#a78bfa',high:'#f87171'};
    const EC={hier:'#4f9cf9aa',lat:'#3ecf8eaa',reapp:'#f4a742aa'};
    const AREA_COL={
        '수와 연산':'#60a5fa','도형과 측정':'#818cf8','규칙성과 비':'#a78bfa',
        '함수':'#c084fc','미적분':'#e879f9','확률과 통계':'#f472b6',
        '물질':'#34d399','운동과 에너지':'#2dd4bf','지구와 우주':'#38bdf8','생명':'#86efac',
    };

    // ── LAYOUT ─────────────────────────────────────────────────────
    let PX=0,PY=0,SC2=1;
    // Virtual nodes for subject & area centers
    const VNODES=[]; // {id, x, y, label, col, type:'subject'|'area', sub}

    function computeLayout(W,H){
        VNODES.length=0;
        const cx=W/2, cy=H/2;

        // Radii
        const R0=0;           // center (implicit root)
        const R1=80;          // subject nodes
        const R2=200;         // area nodes
        const R3e=310;        // elem concept ring
        const R3m=390;        // middle concept ring
        const R3h=470;        // high concept ring
        const ringR={elem:R3e,middle:R3m,high:R3h};

        // Math: left half  (angles 90°→270° = π/2→3π/2)
        // Sci:  right half (angles -90°→90° = -π/2→π/2)
        const subjectAngles={
            math:{cx:cx-R1,cy,midAngle:Math.PI,startAngle:Math.PI/2,endAngle:3*Math.PI/2,areas:MATH_AREAS},
            sci: {cx:cx+R1,cy,midAngle:0,    startAngle:-Math.PI/2,endAngle:Math.PI/2,  areas:SCI_AREAS},
        };

        Object.entries(subjectAngles).forEach(([sub,cfg])=>{
            // subject virtual node
            VNODES.push({id:'__'+sub,x:cfg.cx,y:cfg.cy,label:sub==='math'?'수학':'과학',
                col:sub==='math'?'#4f9cf9':'#3ecf8e',type:'subject',sub});

            const areas=cfg.areas;
            const totalAng=cfg.endAngle-cfg.startAngle;
            // weight by node count
            const areaNodes={};
            areas.forEach(a=>areaNodes[a]=ND.filter(n=>n.s===sub&&n.a===a));
            const totalN=ND.filter(n=>n.s===sub).length;

            let anglePtr=cfg.startAngle + totalAng*0.03;

            areas.forEach(area=>{
                const nodes=areaNodes[area];
                if(!nodes||!nodes.length)return;
                const areaFrac=nodes.length/totalN;
                const areaSweep=totalAng*0.94*areaFrac;
                const areaMid=anglePtr+areaSweep/2;

                // area virtual node
                const ax=cx+R2*Math.cos(areaMid);
                const ay=cy+R2*Math.sin(areaMid);
                VNODES.push({id:'__'+area,x:ax,y:ay,label:area,col:AREA_COL[area]||'#888',
                    type:'area',sub,parentAngle:areaMid});

                // concept nodes by grade
                const byGrade={elem:[],middle:[],high:[]};
                nodes.forEach(n=>byGrade[n.g].push(n));

                Object.entries(byGrade).forEach(([gr,gNodes])=>{
                    if(!gNodes.length)return;
                    gNodes.sort((a,b)=>a.n.localeCompare(b.n));
                    const r=ringR[gr];
                    // each grade gets a sub-arc within the area sweep
                    const gSweep=Math.min(areaSweep*0.88, gNodes.length*0.32);
                    const gStart=areaMid-gSweep/2;
                    gNodes.forEach((nd,i)=>{
                        const frac=gNodes.length>1?i/(gNodes.length-1):0.5;
                        const angle=gStart+frac*gSweep;
                        nd.x=cx+r*Math.cos(angle);
                        nd.y=cy+r*Math.sin(angle);
                        nd._areaMid=areaMid;
                        nd._r=r;
                    });
                });

                anglePtr+=areaSweep;
            });
        });
    }

    // ── CANVAS ─────────────────────────────────────────────────────
    const cv=document.getElementById('cv');
    const ctx=cv.getContext('2d');

    function resize(){
        const w=cv.parentElement;
        cv.width=w.clientWidth;
        cv.height=w.clientHeight;
    }

    function vis(){
        const v=new Set();
        ND.forEach(n=>{
            if(fsub!=='all'&&n.s!==fsub)return;
            if(fgr!=='all'&&n.g!==fgr)return;
            if(fstr&&!n.n.includes(fstr)&&!n.a.includes(fstr))return;
            v.add(n.id);
        });
        return v;
    }

    function nr(n){return n.g==='high'?12:n.g==='middle'?10:8}

    function toScreen(wx,wy){return{x:wx*SC2+PX,y:wy*SC2+PY}}

    // ── DRAW ────────────────────────────────────────────────────────
    let sel=null,fsub='all',fgr='all',fstr='';

    function draw(){
        ctx.clearRect(0,0,cv.width,cv.height);
        const V=vis();
        const selC=new Set();
        if(sel){selC.add(sel);ADJ[sel].forEach(c=>selC.add(c.node.id));}

        // -- tree branch lines (subject→area, area→concepts) --
        VNODES.forEach(vn=>{
            if(vn.type==='subject'){
                // subject → root center line
                const c=toScreen(cv.width/2/SC2,cv.height/2/SC2);
                // actually draw subject→area lines below
            }
            if(vn.type==='area'){
                // area → subject
                const subVN=VNODES.find(v=>v.id==='__'+vn.sub);
                if(subVN){
                    const sp=toScreen(subVN.x,subVN.y),tp=toScreen(vn.x,vn.y);
                    ctx.beginPath();ctx.moveTo(sp.x,sp.y);ctx.lineTo(tp.x,tp.y);
                    ctx.strokeStyle=vn.col+'55';ctx.lineWidth=1.5;ctx.setLineDash([]);
                    ctx.stroke();
                }
                // area → its concepts (tree lines)
                ND.filter(n=>n.s===vn.sub&&n.a===vn.label.replace('__','')).forEach(n=>{
                    if(!V.has(n.id))return;
                    const sp=toScreen(vn.x,vn.y),tp=toScreen(n.x,n.y);
                    ctx.beginPath();ctx.moveTo(sp.x,sp.y);ctx.lineTo(tp.x,tp.y);
                    ctx.strokeStyle=vn.col+'33';ctx.lineWidth=1;ctx.setLineDash([3,3]);
                    ctx.stroke();ctx.setLineDash([]);
                });
            }
        });

        // subject→area connection (subject vnode → area vnode)
        // already done above

        // -- concept-to-concept edges --
        LK.forEach(l=>{
            if(!l.src||!l.tgt)return;
            if(!V.has(l.src.id)||!V.has(l.tgt.id))return;
            const dim=sel&&!selC.has(l.src.id)&&!selC.has(l.tgt.id);
            const hi=sel&&(selC.has(l.src.id)||selC.has(l.tgt.id));
            const sp=toScreen(l.src.x,l.src.y),tp=toScreen(l.tgt.x,l.tgt.y);
            ctx.beginPath();
            ctx.strokeStyle=EC[l.tp];
            ctx.globalAlpha=dim?.04:hi?.95:.25;
            ctx.lineWidth=(hi?2.5:1.5);
            ctx.setLineDash(l.tp==='lat'?[5,4]:l.tp==='reapp'?[2,4]:[]);
            ctx.moveTo(sp.x,sp.y);ctx.lineTo(tp.x,tp.y);
            ctx.stroke();ctx.setLineDash([]);ctx.globalAlpha=1;
        });

        // -- virtual nodes (subject & area) --
        VNODES.forEach(vn=>{
            if(fsub!=='all'&&vn.sub!==fsub)return;
            const sp=toScreen(vn.x,vn.y);
            const r=(vn.type==='subject'?20:13)*SC2;
            ctx.beginPath();ctx.arc(sp.x,sp.y,r,0,Math.PI*2);
            ctx.fillStyle=vn.col+'22';ctx.fill();
            ctx.strokeStyle=vn.col;ctx.lineWidth=2;ctx.stroke();
            if(SC2>.3){
                ctx.fillStyle=vn.col;
                ctx.font=`${vn.type==='subject'?'bold ':''} ${Math.max(8,vn.type==='subject'?11:9)*SC2}px 'Noto Sans KR',sans-serif`;
                ctx.textAlign='center';
                const dy=vn.type==='subject'?r+13*SC2:r+10*SC2;
                ctx.fillText(vn.label,sp.x,sp.y+dy);
            }
        });

        // -- concept nodes --
        ND.forEach(n=>{
            if(!V.has(n.id))return;
            const sp=toScreen(n.x,n.y);
            const r=nr(n)*SC2;
            const dim=sel&&!selC.has(n.id);
            const hi=sel&&n.id===sel;
            ctx.globalAlpha=dim?.1:1;
            ctx.beginPath();ctx.arc(sp.x,sp.y,r,0,Math.PI*2);
            ctx.fillStyle=NC[n.s][n.g];ctx.fill();
            ctx.strokeStyle=hi?'#fff':SC[n.g];ctx.lineWidth=(hi?2.5:1.5);ctx.stroke();
            if(SC2>.38){
                ctx.fillStyle=dim?'#333':'#d0d0e0';
                ctx.font=`${Math.max(7,9*SC2)}px 'Noto Sans KR',sans-serif`;
                ctx.textAlign='center';
                ctx.fillText(n.n,sp.x,sp.y+r+Math.max(7,10*SC2));
            }
            ctx.globalAlpha=1;
        });

        document.getElementById('SN').textContent=ND.length;
        document.getElementById('SL').textContent=LK.length;
        document.getElementById('SV').textContent=V.size;
    }

    // ── INTERACTION ─────────────────────────────────────────────────
    let drag=null,panning=false,ps=null;

    function hitTest(sx,sy){
        const V=vis();
        for(let i=ND.length-1;i>=0;i--){
            const n=ND[i];if(!V.has(n.id))continue;
            const sp=toScreen(n.x,n.y),r=nr(n)*SC2;
            if((sx-sp.x)**2+(sy-sp.y)**2<=r*r)return n;
        }return null;
    }

    function rc(){return cv.getBoundingClientRect()}

    cv.addEventListener('mousedown',e=>{
        const r=rc(),sx=e.clientX-r.left,sy=e.clientY-r.top;
        const h=hitTest(sx,sy);
        if(h){drag=h;cv.classList.add('grabbing')}
        else{panning=true;ps={x:sx-PX,y:sy-PY};cv.classList.add('grabbing')}
    });
    cv.addEventListener('mousemove',e=>{
        const r=rc(),sx=e.clientX-r.left,sy=e.clientY-r.top;
        if(panning){PX=sx-ps.x;PY=sy-ps.y;draw();return}
        const h=hitTest(sx,sy),tt=document.getElementById('TT');
        if(h){
            document.getElementById('TTN').textContent=h.n;
            document.getElementById('TTM').textContent=(h.s==='math'?'수학':'과학')+' · '+h.a+' · '+h.d;
            tt.style.left=(sx+14)+'px';tt.style.top=(sy-8)+'px';tt.classList.add('show');
        }else tt.classList.remove('show');
    });
    cv.addEventListener('mouseup',()=>{drag=null;panning=false;cv.classList.remove('grabbing')});
    cv.addEventListener('click',e=>{
        const r=rc(),h=hitTest(e.clientX-r.left,e.clientY-r.top);
        if(h){sel===h.id?(sel=null,renderEmpty()):(sel=h.id,renderInfo(h))}
        else{sel=null;renderEmpty();}
        draw();
    });
    cv.addEventListener('wheel',e=>{
        e.preventDefault();
        const r=rc(),sx=e.clientX-r.left,sy=e.clientY-r.top;
        const f=e.deltaY<0?1.12:.89,ns=Math.max(.1,Math.min(4,SC2*f));
        PX=sx-(sx-PX)*(ns/SC2);PY=sy-(sy-PY)*(ns/SC2);SC2=ns;draw();
    },{passive:false});

    // ── INFO PANEL ──────────────────────────────────────────────────
    function renderEmpty(){document.getElementById('NI').innerHTML='<div class="em">노드를 클릭하면<br>연결 정보가 표시됩니다</div>'}
    // ── BRIDGE QUESTION ──────────────────────────────────────────────
    async function generateBridge(srcNode, tgtNode, btnEl) {
        btnEl.classList.add('loading');
        btnEl.innerHTML = '<span class="bq-spinner"></span> 생성 중...';

        try {
            const res = await fetch(`${SERVER}/api/bridge`, {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ srcNode, tgtNode }),
            });
            if(!res.ok) throw new Error(`서버 오류 ${res.status}`);
            const bq = await res.json();

            // Remove existing bridge box if any
            const existing = document.getElementById('BQ');
            if(existing) existing.remove();

            const box = document.createElement('div');
            box.id = 'BQ';
            box.className = 'bq-box';
            box.innerHTML = `
      <div class="bq-header">
        <span>⟡ ${srcNode.n} → ${tgtNode.n}</span>
        <button class="bq-close" id="BQClose">✕</button>
      </div>
      <div class="bq-section">
        <div class="bq-label">브릿지 질문</div>
        <div class="bq-text" style="color:var(--sci);font-weight:500">"${bq.question}"</div>
      </div>
      <div class="bq-section">
        <div class="bq-label">교사 노트</div>
        <div class="bq-text">${bq.why}</div>
      </div>
      <div class="bq-section">
        <div class="bq-label">예상 학생 반응</div>
        <div class="bq-text" style="color:var(--t2)">${bq.student_response}</div>
      </div>
      <div class="bq-section">
        <div class="bq-label">후속 질문</div>
        <div class="bq-text">"${bq.followup}"</div>
      </div>
      <div class="bq-section">
        <div class="bq-label">선수 개념</div>
        <div>${bq.prior.split(',').map(p=>`<span class="bq-tag" style="background:var(--b2);color:var(--t2)">${p.trim()}</span>`).join('')}</div>
      </div>
    `;
            document.getElementById('NI').appendChild(box);
            document.getElementById('BQClose').addEventListener('click', ()=>box.remove());
            box.scrollIntoView({behavior:'smooth', block:'nearest'});
        } catch(err) {
            console.error(err);
            btnEl.innerHTML = '⚠ 오류';
        } finally {
            btnEl.classList.remove('loading');
            btnEl.innerHTML = '⟡ 브릿지 질문 생성';
        }
    }

    function renderInfo(n){
        const sc=n.s==='math'?'var(--math)':'var(--sci)';
        const sl=n.s==='math'?'수학':'과학';
        const gc={elem:'var(--elem)',middle:'var(--mid)',high:'var(--high)'}[n.g];
        const gl={elem:'초등',middle:'중학교',high:'고등'}[n.g];
        const tl={hier:'위계',lat:'교과연결',reapp:'재등장'};
        const gr={hier:[],lat:[],reapp:[]};
        ADJ[n.id].forEach(c=>gr[c.tp].push(c));
        let ch='';
        for(const [tp,it] of Object.entries(gr)){
            if(!it.length)continue;
            ch+=`<div class="cs"><h4>${tl[tp]} (${it.length})</h4>`;
            it.forEach(c=>{
                const cc=c.node.s==='math'?'var(--math)':'var(--sci)';
                // Bridge button only for cross-subject (lat) connections
                const showBridge = tp==='lat';
                ch+=`<div class="cr" data-j="${c.node.id}" style="flex-wrap:wrap;gap:4px">
        <span class="cd" style="background:${cc}"></span>
        <span class="cn" style="flex:1">${c.dir==='out'?'→':'←'} ${c.node.n}</span>
        <span class="ct">${c.node.s==='math'?'수':'과'}</span>
        ${showBridge?`<button class="bq-btn" data-src="${n.id}" data-tgt="${c.node.id}">⟡ 브릿지</button>`:''}
      </div>`;
            });
            ch+='</div>';
        }
        document.getElementById('NI').innerHTML=`<div class="in">${n.n}</div><div class="it"><span class="itg" style="background:${sc}22;color:${sc}">${sl}</span><span class="itg" style="background:${gc}22;color:${gc}">${gl}</span><span class="itg" style="background:#fff1;color:var(--t2)">${n.d}</span></div><span class="itg" style="background:#fff1;color:var(--t3)">${n.a}</span>${ch}`;
    }
    document.getElementById('NI').addEventListener('click',e=>{
        // Bridge button click
        const bBtn = e.target.closest('.bq-btn');
        if(bBtn && !bBtn.classList.contains('loading')){
            const src=NM[bBtn.dataset.src], tgt=NM[bBtn.dataset.tgt];
            if(src&&tgt) generateBridge(src,tgt,bBtn);
            return;
        }
        // Node jump click
        const rw=e.target.closest('.cr');if(!rw)return;
        const n=NM[rw.dataset.j];if(!n)return;
        sel=n.id;renderInfo(n);
        PX=cv.width/2-n.x*SC2;PY=cv.height/2-n.y*SC2;draw();
    });

    // ── FILTERS ─────────────────────────────────────────────────────
    function setSub(s){fsub=s;['a','m','s'].forEach((x,i)=>document.getElementById('b'+x).classList.toggle('on',['all','math','sci'][i]===s));draw();}
    function setGr(g){fgr=g;['a','e','m','h'].forEach((x,i)=>document.getElementById('g'+x).classList.toggle('on',['all','elem','middle','high'][i]===g));draw();}
    document.getElementById('ba').addEventListener('click',()=>setSub('all'));
    document.getElementById('bm').addEventListener('click',()=>setSub('math'));
    document.getElementById('bs').addEventListener('click',()=>setSub('sci'));
    document.getElementById('ga').addEventListener('click',()=>setGr('all'));
    document.getElementById('ge').addEventListener('click',()=>setGr('elem'));
    document.getElementById('gm').addEventListener('click',()=>setGr('middle'));
    document.getElementById('gh').addEventListener('click',()=>setGr('high'));
    document.getElementById('SI').addEventListener('input',e=>{fstr=e.target.value.trim();draw();});
    document.getElementById('ZI').addEventListener('click',()=>{SC2=Math.min(4,SC2*1.3);draw();});
    document.getElementById('ZO').addEventListener('click',()=>{SC2=Math.max(.1,SC2/1.3);draw();});
    document.getElementById('ZR').addEventListener('click',()=>{
        SC2=0.75;PX=cv.width*.125;PY=cv.height*.1;draw();
    });

    // ── INIT ────────────────────────────────────────────────────────
    window.addEventListener('load',()=>{
        resize();
        window.addEventListener('resize',()=>{resize();computeLayout(cv.width,cv.height);draw();});
        computeLayout(cv.width,cv.height);
        SC2=0.75; PX=cv.width*.125; PY=cv.height*.1;
        draw();
    });
</script>
</body>
</html>
