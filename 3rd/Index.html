<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3학년 영어 게임 🌟</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Jua (귀여운 느낌의 폰트) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Jua', sans-serif;
            background-color: #f0fdf4;
            background-image: radial-gradient(#bbf7d0 2px, transparent 2px);
            background-size: 30px 30px;
        }

        .game-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .game-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">

<!-- Header -->
<header class="text-center mb-12 animate-bounce">
    <h1 class="text-5xl md:text-6xl text-green-600 drop-shadow-md mb-2">🌟 3학년 영어 게임 🌟</h1>
    <p class="text-xl text-green-800">원하는 게임을 골라서 재미있게 즐겨보세요!</p>
</header>

<!-- Game List Container (총 9개 게임을 위해 넓은 화면에서 4열 그리드 지원) -->
<main class="w-full max-w-7xl grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="game-container">
    <!-- 게임 카드들이 JavaScript를 통해 여기에 생성됩니다. -->
</main>

<script>
    // 게임 데이터 정의 (알파벳 스크램블 게임, 알파벳 도둑잡기 추가)
    const games = [
        { id: 1, title: 'ABC 팡', url: 'https://unluckyidiot16.github.io/WebGames/ABCP/ABCP.html', color: 'from-pink-400 to-rose-400', icon: 'gamepad-2' },
        { id: 2, title: 'AtoZ', url: 'https://unluckyidiot16.github.io/WebGames/AM/AM.html', color: 'from-orange-400 to-amber-400', icon: 'spell-check' },
        { id: 3, title: '영어단어 스크램블', url: 'https://unluckyidiot16.github.io/WebGames/SC/SC.html', color: 'from-emerald-400 to-teal-400', icon: 'shuffle' },
        { id: 4, title: '영단어 팡', url: 'https://unluckyidiot16.github.io/WebGames/PPE/PPE.html', color: 'from-blue-400 to-indigo-400', icon: 'bomb' },
        { id: 5, title: '기억력 게임', url: 'https://unluckyidiot16.github.io/WebGames/AZM/AZM.html', color: 'from-purple-400 to-violet-400', icon: 'brain' },
        { id: 6, title: '알파뱀', url: 'https://unluckyidiot16.github.io/WebGames/AS/AS.html', color: 'from-lime-400 to-green-500', icon: 'puzzle' },
        { id: 7, title: '알파벳 스크램블 게임', url: 'https://unluckyidiot16.github.io/WebGames/ASR/ASR.html', color: 'from-cyan-400 to-blue-500', icon: 'keyboard' },
        { id: 8, title: '알파벳 도둑잡기', url: 'https://unluckyidiot16.github.io/WebGames/AOM/AOM.html', color: 'from-fuchsia-400 to-pink-500', icon: 'search' },
        { id: 9, title: '알파벳 수박게임', url: 'https://unluckyidiot16.github.io/WebGames/AZmerge/AZmerge.html', color: 'from-red-400 to-rose-500', icon: 'apple' }
    ];

    // UI 렌더링 함수 (해금 로직 제거, 모두 바로 플레이 가능)
    function renderGames() {
        const container = document.getElementById('game-container');
        container.innerHTML = '';

        games.forEach((game) => {
            const card = document.createElement('a');

            card.href = game.url;
            card.className = `game-card relative block p-6 rounded-3xl shadow-lg bg-gradient-to-br ${game.color} text-white overflow-hidden`;

            card.innerHTML = `
                    <div class="flex justify-between items-start mb-4 relative z-10">
                        <span class="text-xl font-bold bg-white/30 px-3 py-1 rounded-full border border-white/50 shadow-sm text-white">
                            Game ${game.id}
                        </span>
                    </div>
                    
                    <div class="flex flex-col items-center justify-center py-4 relative z-10">
                        <div class="bg-white/20 p-4 rounded-full mb-3 shadow-inner">
                            <i data-lucide="${game.icon}" class="w-12 h-12 text-white drop-shadow-md"></i>
                        </div>
                        <h2 class="text-3xl font-bold text-center drop-shadow-md">${game.title}</h2>
                    </div>

                    <div class="absolute -bottom-4 -right-4 bg-white/20 w-32 h-32 rounded-full blur-2xl"></div>
                    <div class="absolute -top-4 -left-4 bg-white/20 w-24 h-24 rounded-full blur-xl"></div>
                `;

            container.appendChild(card);
        });

        // 아이콘 렌더링
        lucide.createIcons();
    }

    // 초기 렌더링
    renderGames();
</script>
</body>
</html>
